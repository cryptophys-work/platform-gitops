apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco-system
spec:
  interval: 1h
  # Previously suspended: 330+ restarts on chart 7.2.1 due to loader.enabled: false conflict
  # Fix: removed loader block (use default), upgraded chart >=7.3.0 with Talos eBPF fixes
  # If crashes persist after deploy: re-add suspend: true (Tetragon covers runtime detection)
  chart:
    spec:
      chart: falco
      version: "8.0.1"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: DaemonSet
              name: falco
            patch: |
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: falco
              spec:
                updateStrategy:
                  rollingUpdate:
                    maxUnavailable: 10
  values:
    driver:
      kind: modern_ebpf
    affinity: null
    # FALCO CORE RESOURCES (DaemonSet)
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 768Mi
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: cryptophys.io/storage-only
        operator: Exists
        effect: NoSchedule
      - key: cryptophys.io/role
        operator: Exists
        effect: NoSchedule
      - key: cryptophys.io/pool
        operator: Exists
        effect: NoSchedule
      - key: ray-head
        operator: Exists
        effect: NoSchedule
      - key: bridge-system
        operator: Exists
        effect: NoSchedule
      - key: dao-system
        operator: Exists
        effect: NoSchedule
      - key: ray-cluster
        operator: Exists
        effect: NoSchedule
      - key: node.kubernetes.io/memory-pressure
        operator: Exists
        effect: NoSchedule
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoSchedule
      - key: node.kubernetes.io/unreachable
        operator: Exists
        effect: NoExecute
      - key: node.cilium.io/agent-not-ready
        operator: Exists
        effect: NoSchedule
    falcosidekick:
      enabled: true
      webui:
        enabled: false
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 256Mi
      config:
        loki:
          hostport: "http://platform-observability-loki.observability-system.svc.cluster.local:3100"
          minimumpriority: "warning"
    customRules:
      rules-critical-syscalls.yaml: |
        - rule: Terminal shell in container
          desc: A shell was spawned in a container with an attached terminal.
          condition: >
            spawned_process and container and shell_procs and proc.tty != 0
            and container.id != host
          output: "A shell was spawned in a container (user=%user.name container_id=%container.id container_name=%container.name shell=%proc.name parent=%proc.pname cmdline=%proc.cmdline)"
          priority: WARNING
        - rule: Unexpected outbound connection
          desc: An outbound connection was made by a process that is not on the allowed list.
          condition: >
            (evt.type=connect or evt.type=sendto or evt.type=sendmsg) and
            (fd.typechar='4' or fd.typechar='6') and
            container.id != "host" and
            not proc.name in (list_of_allowed_processes)
          output: "Unexpected outbound connection (proc.name=%proc.name, container.id=%container.id, fd.name=%fd.name)"
          priority: NOTICE
