apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: tetragon
  namespace: kube-system # Tetragon is typically deployed in kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: tetragon
      version: "0.11.0" # Use a specific, stable version
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  values:
    tetragon:
      image:
        repository: quay.io/cilium/tetragon
      export:
        # Export events to Loki for correlation
        stdout: false
        json:
          enabled: true
          path: "/var/run/cilium/tetragon/tetragon.log"
    # Assuming a sidecar or Fluentd will pick up this log
