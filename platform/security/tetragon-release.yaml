apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: tetragon
  namespace: tetragon-system
spec:
  interval: 1h
  install:
    timeout: 10m
  upgrade:
    timeout: 10m
    remediation:
      retries: 2
  chart:
    spec:
      chart: tetragon
      version: "1.6.0" # Upgraded from 0.11.0 — v1.x works without tracefs/debugfs on Talos
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  values:
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: cryptophys.io/storage-only
        operator: Exists
        effect: NoSchedule
      - key: cryptophys.io/role
        operator: Exists
        effect: NoSchedule
      - key: cryptophys.io/pool
        operator: Exists
        effect: NoSchedule
      - key: ray-cluster
        operator: Exists
        effect: NoSchedule
      - key: ray-head
        operator: Exists
        effect: NoSchedule
      - key: bridge-system
        operator: Exists
        effect: NoSchedule
      - key: dao-system
        operator: Exists
        effect: NoSchedule
      - key: node.kubernetes.io/memory-pressure
        operator: Exists
        effect: NoSchedule
    extraVolumes:
      - name: tracefs
        hostPath:
          path: /sys/kernel/tracing
          type: Directory
    tetragon:
      image:
        repository: quay.io/cilium/tetragon
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      extraVolumeMounts:
        - name: tracefs
          mountPath: /sys/kernel/tracing  # Talos tracefs: pre-mounted at this path on host
      export:
        # Export events to Loki for correlation
        stdout: false
        json:
          enabled: true
          path: "/var/run/cilium/tetragon/tetragon.log"
    # Assuming a sidecar or Fluentd will pick up this log
