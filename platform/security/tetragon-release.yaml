apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: tetragon
  namespace: tetragon-system
spec:
  interval: 1h
  install:
    timeout: 10m
  upgrade:
    timeout: 10m
    remediation:
      retries: 2
  chart:
    spec:
      chart: tetragon
      version: "1.6.0" # Upgraded from 0.11.0 — v1.x works without tracefs/debugfs on Talos
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: DaemonSet
              name: tetragon
            patch: |
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: tetragon
              spec:
                updateStrategy:
                  rollingUpdate:
                    maxUnavailable: 10
                template:
                  metadata:
                    annotations:
                      cryptophys.io/daemonset-refresh: "2026-04-12T13:15:00Z"
                  spec:
                    nodeSelector:
                      kubernetes.io/os: linux
                    containers:
                      - name: export-stdout
                        resources:
                          requests:
                            cpu: 10m
                            memory: 16Mi
                          limits:
                            cpu: 10m
                            memory: 16Mi
                      - name: tetragon
                        resources:
                          requests:
                            cpu: 150m
                            memory: 192Mi
                          limits:
                            cpu: 150m
                            memory: 192Mi
  values:
    nodeSelector:
      kubernetes.io/os: linux
    extraVolumes:
      - name: tracefs
        hostPath:
          path: /sys/kernel/tracing
          type: Directory
    tetragon:
      image:
        repository: quay.io/cilium/tetragon
      resources:
        requests:
          cpu: 150m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      extraVolumeMounts:
        - name: tracefs
          mountPath: /sys/kernel/tracing  # Talos tracefs: pre-mounted at this path on host
      export:
        # Export events to Loki for correlation
        stdout: false
        json:
          enabled: true
          path: "/var/run/cilium/tetragon/tetragon.log"
    # Assuming a sidecar or Fluentd will pick up this log
