apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: gatekeeper
  namespace: gatekeeper-system
spec:
  interval: 1h
  releaseName: gatekeeper
  chart:
    spec:
      chart: gatekeeper
      version: "3.21.1"
      sourceRef:
        kind: HelmRepository
        name: gatekeeper
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    replicas: 1
    # Enable external data / sync
    controllerManager:
      exemptNamespaces:
        - kube-system
        - flux-system
        - gatekeeper-system
  # Config CR moved to 15-security-runtime-crs (CRD/CR split — config.gatekeeper.sh/v1alpha1 not ready at dry-run)
