apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-health
  namespace: apps-core
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-health-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-health-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-health-reader
subjects:
  - kind: ServiceAccount
    name: cluster-health
    namespace: apps-core

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-remediation
  namespace: apps-core

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-remediation-writer
rules:
  # Read cluster state
  - apiGroups: [""]
    resources: ["nodes", "pods", "pods/log", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  # Write remediation actions
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  # Flux operations
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "patch"]
  # ArgoCD operations
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-remediation-writer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-remediation-writer
subjects:
  - kind: ServiceAccount
    name: cluster-remediation
    namespace: apps-core
