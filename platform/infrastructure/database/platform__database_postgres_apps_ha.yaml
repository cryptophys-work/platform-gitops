apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-apps-ha
  namespace: postgresql-system
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  monitoring:
    enablePodMonitor: false
    disableDefaultQueries: true
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser-secret
  storage:
    size: 10Gi
    storageClass: longhorn-single
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  bootstrap:
    initdb:
      database: gitea
      owner: gitea
      encoding: UTF8
      localeCType: C
      localeCollate: C
      postInitApplicationSQL:
        - "ALTER USER gitea PASSWORD 'GiteaSecure2026!'"
  # WAL archiving: prevents pg_rewind loop on replica restart
  backup:
    barmanObjectStore:
      endpointURL: http://platform-backup-minio.minio-system.svc.cluster.local:9000
      destinationPath: s3://cnpg-wal/postgres-apps-ha/
      s3Credentials:
        accessKeyId:
          name: cnpg-minio-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-minio-s3-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
    retentionPolicy: 7d
  # externalClusters: enables restore_command on replicas so pg_rewind can fetch WAL from MinIO
  externalClusters:
    - name: postgres-apps-ha
      barmanObjectStore:
        endpointURL: http://platform-backup-minio.minio-system.svc.cluster.local:9000
        destinationPath: s3://cnpg-wal/postgres-apps-ha/
        s3Credentials:
          accessKeyId:
            name: cnpg-minio-s3-credentials
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: cnpg-minio-s3-credentials
            key: ACCESS_SECRET_KEY
        wal:
          compression: gzip
  # Resource limits: reduced to allow scheduling on memory-pressured workers
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Affinity: tolerate storage-only and llm-inference nodes; single instance so no anti-affinity needed
  affinity:
    tolerations:
      - key: cryptophys.io/storage-only
        operator: Exists
        effect: NoSchedule
      - key: cryptophys.io/role
        operator: Exists
        effect: NoSchedule
