apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-apps-ha
  namespace: postgresql-system
spec:
  # Stabilize the Gitea control-plane database on a single primary until the
  # Longhorn replica path and Vault-backed CNPG archive credentials are healthy
  # again. This restores the rw service Gitea depends on without waiting for the
  # replica join PVC path to recover.
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  monitoring:
    enablePodMonitor: false
    disableDefaultQueries: true
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser-secret
  storage:
    size: 10Gi
    storageClass: longhorn-single
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  bootstrap:
    initdb:
      database: gitea
      owner: gitea
      encoding: UTF8
      localeCType: C
      localeCollate: C
  # Resource limits: reduced to allow scheduling on memory-pressured workers
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  affinity:
    nodeSelector:
      platform-ha: "true"
    podAntiAffinityType: required
    tolerations:
    - effect: NoSchedule
      key: cryptophys.io/pool
      operator: Equal
      value: platform-ha
    - effect: NoSchedule
      key: cryptophys.io/node-class
      operator: Equal
      value: nexus-hpc
