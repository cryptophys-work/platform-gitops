apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-security-ha
  namespace: postgresql-system
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  monitoring:
    enablePodMonitor: false
    disableDefaultQueries: true
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser-secret
  storage:
    size: 5Gi
    storageClass: longhorn
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  bootstrap:
    initdb:
      database: spire
      owner: spire
      secret:
        name: spire-postgres-secret
  # WAL archiving: prevents pg_rewind loop on replica restart
  backup:
    barmanObjectStore:
      endpointURL: http://platform-backup-minio.minio-system.svc.cluster.local:9000
      destinationPath: s3://cnpg-wal/postgres-security-ha/
      s3Credentials:
        accessKeyId:
          name: cnpg-minio-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-minio-s3-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
    retentionPolicy: 7d
  # externalClusters: enables restore_command on replicas so pg_rewind can fetch WAL from MinIO
  externalClusters:
    - name: postgres-security-ha
      barmanObjectStore:
        endpointURL: http://platform-backup-minio.minio-system.svc.cluster.local:9000
        destinationPath: s3://cnpg-wal/postgres-security-ha/
        s3Credentials:
          accessKeyId:
            name: cnpg-minio-s3-credentials
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: cnpg-minio-s3-credentials
            key: ACCESS_SECRET_KEY
        wal:
          compression: gzip
  # Resource limits: explicit to prevent Kyverno mutation of running pod specs
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  # HA Architecture: Security databases on application workers
  affinity:
    tolerations:
      - key: cryptophys.io/storage-only
        operator: Exists
        effect: NoSchedule
    podAntiAffinityType: required
