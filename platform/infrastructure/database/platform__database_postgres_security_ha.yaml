apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-security-ha
  namespace: postgresql-system
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser-secret
  storage:
    size: 5Gi
    storageClass: longhorn
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  bootstrap:
    initdb:
      database: spire
      owner: spire
      secret:
        name: spire-postgres-secret
  # HA Architecture: Security databases on application workers
  affinity:
    nodeSelector:
      cryptophys.io/tier: application
    tolerations: []
    podAntiAffinityType: required
