---
# ExternalSecret: MinIO S3 credentials for CNPG WAL archiving
# Vault path: secret/apps/cnpg/minio
# Used by: CNPG barmanObjectStore backup spec in all postgres-*-ha clusters
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-minio-s3-credentials
  namespace: postgresql-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: cnpg-wal-archive
    cryptophys.io/managed-by: flux
    cryptophys.io/contract: contract.platform.database.v1
    cryptophys.io/anti-regression: "true"
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cnpg-minio-s3-credentials
    creationPolicy: Owner
    template:
      data:
        ACCESS_KEY_ID: "{{ .access_key_id }}"
        ACCESS_SECRET_KEY: "{{ .secret_access_key }}"
  data:
    - secretKey: access_key_id
      remoteRef:
        key: apps/cnpg/minio
        property: access_key_id
    - secretKey: secret_access_key
      remoteRef:
        key: apps/cnpg/minio
        property: secret_access_key
