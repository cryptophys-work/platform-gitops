---
# ExternalSecret: MinIO S3 credentials for CNPG WAL archiving
# Vault path: secret/platform/backup/minio
# Used by: CNPG barmanObjectStore backup spec in all postgres-*-ha clusters
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cnpg-minio-s3-credentials
  namespace: postgresql-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: cnpg-wal-archive
    cryptophys.io/managed-by: flux
    cryptophys.io/contract: contract.platform.database.v1
    cryptophys.io/anti-regression: "true"
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cnpg-minio-s3-credentials
    creationPolicy: Owner
    template:
      data:
        ACCESS_KEY_ID: "{{ .rootUser }}"
        ACCESS_SECRET_KEY: "{{ .rootPassword }}"
  data:
    - secretKey: rootUser
      remoteRef:
        key: platform/backup/minio
        property: rootUser
    - secretKey: rootPassword
      remoteRef:
        key: platform/backup/minio
        property: rootPassword
