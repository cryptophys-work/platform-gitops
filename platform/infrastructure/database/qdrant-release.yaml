apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: qdrant
  namespace: database
spec:
  interval: 1h
  timeout: 10m
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    cleanupOnFail: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: qdrant
      version: "1.17.0"
      sourceRef:
        kind: HelmRepository
        name: qdrant-charts
        namespace: flux-system
  values:
    replicaCount: 1

    image:
      repository: qdrant/qdrant
      tag: "v1.7.4"
    
    # Storage configuration for long-term AI memory
    persistence:
      enabled: true
      storageClassName: longhorn
      size: 20Gi
    
    # Resources for vector search — actual usage ~13Mi idle, burst to ~256Mi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 1Gi
    
    # Keep Qdrant on compute-class workers while allowing scheduler flexibility.
    nodeSelector:
      cryptophys.io/tier: compute

    # Scheduling hardening for nexus-hpc and ray-cluster taints.
    tolerations:
      - key: cryptophys.io/pool
        operator: Equal
        value: platform-ha
        effect: NoSchedule
      - key: ray-cluster
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: cryptophys.io/node-class
        operator: Equal
        value: nexus-hpc
        effect: NoSchedule

    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: qdrant
              topologyKey: kubernetes.io/hostname

    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: qdrant
