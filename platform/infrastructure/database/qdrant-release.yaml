apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: qdrant
  namespace: database
spec:
  interval: 1h
  timeout: 10m
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    cleanupOnFail: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: qdrant
      version: "1.17.0"
      sourceRef:
        kind: HelmRepository
        name: qdrant-charts
        namespace: flux-system
  values:
    image:
      repository: qdrant/qdrant
      tag: "v1.7.4"
    
    # Storage configuration for long-term AI memory
    persistence:
      enabled: true
      storageClassName: longhorn
      size: 20Gi
    
    # Resources for vector search — actual usage ~13Mi idle, burst to ~256Mi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 1Gi
    
    # Schedule on compute worker nodes — exclude thalamus (stale iSCSI sessions from quanta outage)
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: cryptophys.io/tier
              operator: In
              values:
              - compute
            - key: kubernetes.io/hostname
              operator: NotIn
              values:
              - thalamus-217-76-59-241
