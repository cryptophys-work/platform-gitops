apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: qdrant
  namespace: database
spec:
  interval: 1h
  timeout: 10m
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    cleanupOnFail: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: qdrant
      version: "1.17.0"
      sourceRef:
        kind: HelmRepository
        name: qdrant-charts
        namespace: flux-system
  values:
    image:
      repository: qdrant/qdrant
      tag: "v1.7.4"
    
    # Storage configuration for long-term AI memory
    persistence:
      enabled: true
      storageClassName: longhorn
      size: 20Gi
    
    # Resources for fast vector search
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    
    # Schedule on compute worker nodes (quanta/synapse/thalamus)
    nodeSelector:
      cryptophys.io/tier: compute
