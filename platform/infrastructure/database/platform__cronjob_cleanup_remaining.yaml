apiVersion: v1
kind: ServiceAccount
metadata:
  name: cronjob-cleanup-remaining
  namespace: postgresql-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: cronjob-cleanup
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cronjob-cleanup-remaining
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: cronjob-cleanup
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cronjob-cleanup-remaining
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: cronjob-cleanup
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cronjob-cleanup-remaining
subjects:
  - kind: ServiceAccount
    name: cronjob-cleanup-remaining
    namespace: postgresql-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cronjob-cleanup-remaining-v2
  namespace: postgresql-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: cronjob-cleanup
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        cryptophys.io/domain: platform
        cryptophys.io/component: cronjob-cleanup
    spec:
      serviceAccountName: cronjob-cleanup-remaining
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: cerebellum-161-97-117-96
      tolerations:
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cleanup
          image: registry.cryptophys.work/docker-proxy/bitnami/kubectl@sha256:a0fa7201b97239cdbcb2777465710201c7eb5676ffa646ec8466b417bf479196
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          command:
            - /bin/sh
            - -ec
            - |
              cleanup_one() {
                ns="$1"
                cj="$2"
                echo "=== cleaning ${ns}/${cj} ==="
                jobs="$(kubectl get jobs -n "${ns}" -o jsonpath="{range .items[?(@.metadata.ownerReferences[0].kind=='CronJob' && @.metadata.ownerReferences[0].name=='${cj}')]}{.metadata.name}{'\n'}{end}" 2>/dev/null || true)"
                if [ -n "${jobs}" ]; then
                  for job in ${jobs}; do
                    kubectl delete pod -n "${ns}" -l "job-name=${job}" --ignore-not-found=true --wait=false || true
                    kubectl delete job "${job}" -n "${ns}" --ignore-not-found=true --wait=false || true
                  done
                fi
                kubectl delete cronjob "${cj}" -n "${ns}" --ignore-not-found=true --wait=false || true
              }

              cleanup_one automation policyreport-cleanup
              cleanup_one observability-system observability.synthetic.checker
              cleanup_one tekton-system pipelinerun-gc
