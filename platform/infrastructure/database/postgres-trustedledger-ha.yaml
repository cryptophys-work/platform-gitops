apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-trustedledger-ha
  namespace: postgresql-system
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser-secret
  storage:
    size: 10Gi
    storageClass: longhorn
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  bootstrap:
    initdb:
      database: trustedledger
      owner: trustedledger
  # HA architecture: allow storage-worker fallback during worker saturation.
  affinity:
    tolerations:
      - key: cryptophys.io/storage-only
        operator: Exists
        effect: NoSchedule
    podAntiAffinityType: required
