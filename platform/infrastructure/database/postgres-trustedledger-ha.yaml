apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-trustedledger-ha
  namespace: postgresql-system
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  logLevel: info
  # Disable ALL monitoring: monitoring.coreos.com/v1 API times out during reconcile
  # blocking cluster object creation (primary pod never recreated).
  # disableDefaultQueries skips the API group discovery call entirely.
  monitoring:
    enablePodMonitor: false
    disableDefaultQueries: true
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser-secret
  storage:
    size: 10Gi
    storageClass: longhorn
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  bootstrap:
    initdb:
      database: trustedledger
      owner: trustedledger
  # WAL archiving: prevents pg_rewind loop on replica restart
  backup:
    barmanObjectStore:
      endpointURL: http://platform-backup-minio.minio-system.svc.cluster.local:9000
      destinationPath: s3://cnpg-wal/postgres-trustedledger-ha/
      s3Credentials:
        accessKeyId:
          name: cnpg-minio-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-minio-s3-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
    retentionPolicy: 7d
  # externalClusters: enables restore_command on replicas so pg_rewind can fetch WAL from MinIO
  # without this, replicas fail pg_rewind with "restore_command is not set"
  externalClusters:
    - name: postgres-trustedledger-ha
      barmanObjectStore:
        endpointURL: http://platform-backup-minio.minio-system.svc.cluster.local:9000
        destinationPath: s3://cnpg-wal/postgres-trustedledger-ha/
        s3Credentials:
          accessKeyId:
            name: cnpg-minio-s3-credentials
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: cnpg-minio-s3-credentials
            key: ACCESS_SECRET_KEY
        wal:
          compression: gzip
  # Resource limits: reduced to allow scheduling on memory-pressured workers
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Affinity: keep TrustedLedger DB off the degraded campus storage node.
  affinity:
    nodeSelector:
      kubernetes.io/hostname: quanta-194-163-186-222
