apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-trustedledger-ha
  namespace: postgresql-system
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  # Disable ALL monitoring: monitoring.coreos.com/v1 API times out during reconcile
  # blocking cluster object creation (primary pod never recreated).
  # disableDefaultQueries skips the API group discovery call entirely.
  monitoring:
    enablePodMonitor: false
    disableDefaultQueries: true
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser-secret
  storage:
    size: 10Gi
    storageClass: longhorn
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  bootstrap:
    initdb:
      database: trustedledger
      owner: trustedledger
  # WAL archiving: prevents pg_rewind loop on replica restart
  backup:
    barmanObjectStore:
      endpointURL: http://platform-backup-minio.minio-system.svc.cluster.local:9000
      destinationPath: s3://cnpg-wal/postgres-trustedledger-ha/
      s3Credentials:
        accessKeyId:
          name: cnpg-minio-s3-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-minio-s3-credentials
          key: ACCESS_SECRET_KEY
      wal:
        compression: gzip
    retentionPolicy: 7d
  # HA architecture: allow storage-worker fallback during worker saturation.
  affinity:
    tolerations:
      - key: cryptophys.io/storage-only
        operator: Exists
        effect: NoSchedule
    podAntiAffinityType: required
