apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ray-cluster
  namespace: flux-system
spec:
  targetNamespace: cqls-compute
  interval: 1h
  dependsOn:
    - name: kuberay-operator
  chart:
    spec:
      chart: ray-cluster
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: kuberay-charts
        namespace: flux-system
      interval: 1h
  values:
    image:
      repository: rayproject/ray
      tag: "2.9.0"
      pullPolicy: IfNotPresent

    # Head node - GCS metadata store, autoscaler, dashboard
    # CRITICAL: Head must have enough memory for cluster state
    head:
      rayStartParams:
        dashboard-host: '0.0.0.0'
        num-cpus: '2'
        object-store-memory: '1000000000'  # 1GB object store
      labels:
        kagenti.io/type: platform
        kagenti.io/role: compute-orchestrator
        kagenti.io/ray: "true"
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: cryptophys.io/node-class
                operator: In
                values:
                - nexus-hpc
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
      # FITS IN QUOTA: limits.cpu=8 total for namespace
      # Head: 2 CPU / 4Gi (was 1 CPU / 2G)
      resources:
        limits: { cpu: "2", memory: "4Gi" }
        requests: { cpu: "1", memory: "2Gi" }
      volumes:
        - name: ray-logs
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: ray-spill
          emptyDir:
            sizeLimit: 10Gi
      volumeMounts:
        - mountPath: /tmp/ray
          name: ray-logs
        - mountPath: /tmp/spill
          name: ray-spill
      # Enable autoscaling with security-hardened sidecar
      enableInTreeAutoscaling: true
      autoscalerOptions:
        upscalingMode: Default
        idleTimeoutSeconds: 60
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: RuntimeDefault

    # General compute workers
    worker:
      groupName: general-workers
      replicas: 2
      minReplicas: 2
      maxReplicas: 3
      rayStartParams:
        num-cpus: '4'
      labels:
        kagenti.io/type: platform
        kagenti.io/role: compute-worker
        kagenti.io/ray: "true"
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: cryptophys.io/node-class
                operator: In
                values:
                - nexus-hpc
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
      # FITS IN QUOTA: 2 workers × 2 CPU = 4 CPU limit
      # Workers: 2 CPU / 4Gi each (was 1 CPU / 2Gi)
      resources:
        limits: { cpu: "2", memory: "4Gi" }
        requests: { cpu: "1", memory: "2Gi" }
      volumes:
        - name: ray-logs
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: ray-spill
          emptyDir:
            sizeLimit: 20Gi
      volumeMounts:
        - mountPath: /tmp/ray
          name: ray-logs
        - mountPath: /tmp/spill
          name: ray-spill

    # AI/GPU workers - constrained by quota
    additionalWorkerGroups:
      ai-workers:
        disabled: false
        replicas: 1
        minReplicas: 1
        maxReplicas: 2
        rayStartParams:
          num-cpus: '4'
          num-gpus: '1'
        labels:
          kagenti.io/type: platform
          kagenti.io/role: ai-worker
          kagenti.io/ray: "true"
        podSecurityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: cryptophys.io/node-class
                  operator: In
                  values:
                  - nexus-hpc
        tolerations:
          - key: cryptophys.io/node-class
            operator: Equal
            value: nexus-hpc
            effect: NoSchedule
          - key: "cryptophys.io/ai-workload"
            operator: "Exists"
            effect: "NoSchedule"
        # FITS IN QUOTA: 1 AI worker × 2 CPU = 2 CPU limit
        # Total: head(2) + workers(4) + ai(2) = 8 CPU ✓
        resources:
          limits:
            cpu: "2"
            memory: "8Gi"
            nvidia.com/gpu: "1"
          requests:
            cpu: "1"
            memory: "4Gi"
            nvidia.com/gpu: "1"
        volumes:
          - name: ray-logs
            emptyDir:
              medium: Memory
              sizeLimit: 1Gi
          - name: ray-spill
            emptyDir:
              sizeLimit: 30Gi
          - name: shared-memory
            emptyDir:
              medium: Memory
              sizeLimit: 4Gi
        volumeMounts:
          - mountPath: /tmp/ray
            name: ray-logs
          - mountPath: /tmp/spill
            name: ray-spill
          - mountPath: /dev/shm
            name: shared-memory