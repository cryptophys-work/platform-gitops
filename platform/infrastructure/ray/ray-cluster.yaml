apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ray-cluster
  namespace: flux-system
spec:
  targetNamespace: cqls-compute
  interval: 1h
  dependsOn:
    - name: kuberay-operator
  chart:
    spec:
      chart: ray-cluster
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: kuberay-charts
        namespace: flux-system
      interval: 1h
  values:
    image:
      repository: rayproject/ray
      tag: "2.9.0"
      pullPolicy: IfNotPresent
    head:
      rayStartParams:
        dashboard-host: '0.0.0.0'
        num-cpus: '0' # Head node is for scheduling only
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - synapse-161-97-136-251
              - key: nexus-tower
                operator: NotIn
                values:
                - "true"
      resources:
        limits: { cpu: "1", memory: "2G" }
        requests: { cpu: "500m", memory: "1G" }
      # ... (rest of head config)
    worker:
      # This block is now a template, we will define specific groups
      replicas: 0
    workerGroupSpecs:
    # --- AI Worker Group (Medulla) ---
    - groupName: ai-workers
      replicas: 1
      minReplicas: 1
      maxReplicas: 2 # Can scale up on the same node
      rayStartParams:
        num-cpus: '4' # Allocate more CPUs for AI tasks
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nexus-tower
                operator: In
                values:
                - "true"
      tolerations:
        - key: "cryptophys.io/ai-workload"
          operator: "Exists"
          effect: "NoSchedule"
      resources:
        limits: { cpu: "6", memory: "16Gi" } # High resource allocation for LLMs
        requests: { cpu: "4", memory: "8Gi" }
    # --- General Worker Group (Other Workers) ---
    - groupName: general-workers
      replicas: 2
      minReplicas: 2
      maxReplicas: 5 # Can scale across multiple nodes
      rayStartParams:
        num-cpus: '1'
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nexus-tower
                operator: In
                values:
                - "true"
      resources:
        limits: { cpu: "1", memory: "2Gi" }
        requests: { cpu: "500m", memory: "1Gi" }
