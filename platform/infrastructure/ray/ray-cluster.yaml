apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ray-cluster
  namespace: flux-system
spec:
  targetNamespace: cqls-compute
  interval: 1h
  dependsOn:
    - name: kuberay-operator
  chart:
    spec:
      chart: ray-cluster
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: kuberay-charts
        namespace: flux-system
      interval: 1h
  values:
    image:
      repository: rayproject/ray
      tag: "2.9.0"
      pullPolicy: IfNotPresent

    # Head node - GCS metadata store, autoscaler, dashboard
    # CRITICAL: Head must have enough memory for cluster state
    head:
      rayStartParams:
        dashboard-host: '0.0.0.0'
        num-cpus: '2'              # Allow head to run small tasks
        object-store-memory: '1000000000'  # 1GB object store
      labels:
        kagenti.io/type: platform
        kagenti.io/role: compute-orchestrator
        kagenti.io/ray: "true"
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: cryptophys.io/node-class
                operator: In
                values:
                - nexus-hpc
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
      # PERFORMANCE: Head node resources increased
      # GCS requires significant memory for cluster metadata
      resources:
        limits: { cpu: "4", memory: "8Gi" }
        requests: { cpu: "2", memory: "4Gi" }
      # PERFORMANCE: Persistent storage for logs and plasma store
      volumes:
        - name: ray-logs
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        - name: ray-spill
          emptyDir:
            sizeLimit: 10Gi
      volumeMounts:
        - mountPath: /tmp/ray
          name: ray-logs
        - mountPath: /tmp/spill
          name: ray-spill
      # PERFORMANCE: Enable in-tree autoscaling
      enableInTreeAutoscaling: true
      autoscalerOptions:
        upscalingMode: Default
        idleTimeoutSeconds: 60
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"

    # General compute workers
    worker:
      groupName: general-workers
      replicas: 3
      minReplicas: 3
      maxReplicas: 10
      rayStartParams:
        num-cpus: '4'
      labels:
        kagenti.io/type: platform
        kagenti.io/role: compute-worker
        kagenti.io/ray: "true"
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: cryptophys.io/node-class
                operator: In
                values:
                - nexus-hpc
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
      # PERFORMANCE: Increased worker resources for actual compute
      resources:
        limits: { cpu: "4", memory: "8Gi" }
        requests: { cpu: "2", memory: "4Gi" }
      # PERFORMANCE: Memory-backed volumes for performance
      volumes:
        - name: ray-logs
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: ray-spill
          emptyDir:
            sizeLimit: 20Gi
      volumeMounts:
        - mountPath: /tmp/ray
          name: ray-logs
        - mountPath: /tmp/spill
          name: ray-spill

    # AI/GPU workers - dedicated to ML workloads
    additionalWorkerGroups:
      ai-workers:
        disabled: false
        replicas: 2
        minReplicas: 2
        maxReplicas: 6
        rayStartParams:
          num-cpus: '8'
          num-gpus: '1'
        labels:
          kagenti.io/type: platform
          kagenti.io/role: ai-worker
          kagenti.io/ray: "true"
        podSecurityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: cryptophys.io/node-class
                  operator: In
                  values:
                  - nexus-hpc
        tolerations:
          - key: cryptophys.io/node-class
            operator: Equal
            value: nexus-hpc
            effect: NoSchedule
          - key: "cryptophys.io/ai-workload"
            operator: "Exists"
            effect: "NoSchedule"
        # PERFORMANCE: High-memory + GPU for AI workloads
        resources:
          limits:
            cpu: "8"
            memory: "32Gi"
            nvidia.com/gpu: "1"
          requests:
            cpu: "4"
            memory: "16Gi"
            nvidia.com/gpu: "1"
        # PERFORMANCE: Large memory volumes for AI datasets
        volumes:
          - name: ray-logs
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
          - name: ray-spill
            emptyDir:
              sizeLimit: 50Gi
          - name: shared-memory
            emptyDir:
              medium: Memory
              sizeLimit: 8Gi
        volumeMounts:
          - mountPath: /tmp/ray
            name: ray-logs
          - mountPath: /tmp/spill
            name: ray-spill
          - mountPath: /dev/shm
            name: shared-memory