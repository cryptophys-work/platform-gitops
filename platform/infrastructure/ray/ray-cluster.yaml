apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ray-cluster
  namespace: flux-system
spec:
  targetNamespace: cqls-compute
  interval: 1h
  dependsOn:
    - name: kuberay-operator
  chart:
    spec:
      chart: ray-cluster
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: kuberay-charts
        namespace: flux-system
      interval: 1h
  values:
    image:
      repository: rayproject/ray
      tag: "2.9.0"
      pullPolicy: IfNotPresent
    head:
      rayStartParams:
        dashboard-host: '0.0.0.0'
        num-cpus: '0' # Head node is for scheduling only
      labels:
        kagenti.io/type: platform
        kagenti.io/role: compute-orchestrator
        kagenti.io/ray: "true"
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: cryptophys.io/node-class
                operator: In
                values:
                - nexus-hpc
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
      resources:
        limits: { cpu: "1", memory: "2G" }
        requests: { cpu: "500m", memory: "1G" }

    worker:
      groupName: general-workers
      replicas: 2
      minReplicas: 2
      maxReplicas: 5
      rayStartParams: {}
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: cryptophys.io/node-class
                operator: In
                values:
                - nexus-hpc
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
      resources:
        limits: { cpu: "1", memory: "2Gi" }
        requests: { cpu: "500m", memory: "1Gi" }

    additionalWorkerGroups:
      ai-workers:
        disabled: false
        replicas: 1
        minReplicas: 1
        maxReplicas: 2
        rayStartParams:
          num-cpus: '4'
        podSecurityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: cryptophys.io/node-class
                  operator: In
                  values:
                  - nexus-hpc
        tolerations:
          - key: cryptophys.io/node-class
            operator: Equal
            value: nexus-hpc
            effect: NoSchedule
          - key: "cryptophys.io/ai-workload"
            operator: "Exists"
            effect: "NoSchedule"
        resources:
          limits: { cpu: "4", memory: "8Gi" }
          requests: { cpu: "1500m", memory: "4Gi" }
