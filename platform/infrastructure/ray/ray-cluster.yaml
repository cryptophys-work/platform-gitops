apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ray-cluster
  namespace: flux-system
spec:
  targetNamespace: cqls-compute
  interval: 1h
  dependsOn:
    - name: kuberay-operator
  chart:
    spec:
      chart: ray-cluster
      version: 1.2.2
      sourceRef:
        kind: HelmRepository
        name: kuberay-charts
        namespace: flux-system
      interval: 1h
  values:
    image:
      repository: rayproject/ray
      tag: "2.9.0"
    # Head node
    head:
      rayStartParams:
        dashboard-host: '0.0.0.0'
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    # Worker group
    workerGroupSpecs:
      - groupName: small-group
        replicas: 2
        minReplicas: 1
        maxReplicas: 5
        rayStartParams: {}
        template:
          spec:
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
