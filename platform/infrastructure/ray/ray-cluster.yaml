apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ray-cluster
  namespace: flux-system
spec:
  targetNamespace: cqls-compute
  interval: 1h
  dependsOn:
    - name: kuberay-operator
  chart:
    spec:
      chart: ray-cluster
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: kuberay-charts
        namespace: flux-system
      interval: 1h
  values:
    image:
      repository: quay.io/rayproject/ray
      tag: "2.9.0"
      pullPolicy: IfNotPresent
    head:
      rayStartParams:
        dashboard-host: '0.0.0.0'
        num-cpus: '0'
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      resources:
        limits:
          cpu: "1"
          memory: "2G"
        requests:
          cpu: "500m"
          memory: "1G"
    worker:
      replicas: 2
      minReplicas: 1
      maxReplicas: 5
      rayStartParams:
        num-cpus: '1'
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      resources:
        limits:
          cpu: "1"
          memory: "1G"
        requests:
          cpu: "500m"
          memory: "512M"
