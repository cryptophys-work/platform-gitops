apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: ray-cluster
  namespace: flux-system
spec:
  targetNamespace: cqls-compute
  interval: 1h
  dependsOn:
    - name: kuberay-operator
  chart:
    spec:
      chart: ray-cluster
      version: 1.2.2
      sourceRef:
        kind: HelmRepository
        name: kuberay-charts
        namespace: flux-system
      interval: 1h
  values:
    image:
      repository: rayproject/ray
      tag: "2.9.0"
    head:
      rayStartParams:
        dashboard-host: '0.0.0.0'
    workerGroupSpecs:
      - groupName: small-group
        replicas: 2
        minReplicas: 1
        maxReplicas: 5
        rayStartParams: {}
