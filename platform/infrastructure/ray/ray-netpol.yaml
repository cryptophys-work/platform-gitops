---
# Fix: KubeRay operator leader election lease renewal timeout
# Root cause: Cilium global policy + intermittent connectivity
# Fix: Add explicit K8s NetworkPolicy egress for API access + resource limits via HelmRelease patch
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kuberay-operator-api-egress
  namespace: cqls-compute
  labels:
    app.kubernetes.io/part-of: cqls-compute
    cryptophys.work/component: kuberay
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kuberay-operator
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 443
      protocol: TCP
    - port: 6443
      protocol: TCP
