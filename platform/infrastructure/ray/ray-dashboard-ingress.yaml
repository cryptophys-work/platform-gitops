apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ray-dashboard
  namespace: cqls-compute
  labels:
    app.kubernetes.io/part-of: cqls-compute
    cryptophys.work/component: kuberay
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - ray.cryptophys.work
    secretName: platform-wildcard-tls
  rules:
  - host: ray.cryptophys.work
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cqls-compute-ray-cluster-kuberay-head-svc
            port:
              number: 8265
