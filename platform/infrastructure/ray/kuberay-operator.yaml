apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kuberay-operator
  namespace: flux-system
spec:
  targetNamespace: cqls-compute
  interval: 1h
  chart:
    spec:
      chart: kuberay-operator
      version: 1.5.1
      sourceRef:
        kind: HelmRepository
        name: kuberay-charts
        namespace: flux-system
      interval: 1h
  values:
    image:
      repository: quay.io/kuberay/operator
      tag: v1.5.1
      pullPolicy: IfNotPresent
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
