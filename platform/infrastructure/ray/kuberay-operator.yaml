apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kuberay-operator
  namespace: flux-system
spec:
  targetNamespace: cqls-compute
  interval: 1h
  chart:
    spec:
      chart: kuberay-operator
      version: 1.2.2
      sourceRef:
        kind: HelmRepository
        name: kuberay-charts
        namespace: flux-system
      interval: 1h
  values:
    # Correct image repository (rayproject not kuberay)
    image:
      repository: quay.io/rayproject/kuberay-operator
      tag: v1.2.2
      pullPolicy: IfNotPresent
    # Tolerate control-plane taint
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
