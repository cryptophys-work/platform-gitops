---
# Kyverno ClusterPolicy: Pin Tekton helper images to ghcr.io v1.10.2
#
# Tekton Pipelines v1.10.2 installed from upstream release YAML.
# This policy ensures controller args always point to the official ghcr.io
# digest-pinned images from the v1.10.2 release, preventing drift.
#
# Idempotent: precondition checks if correct ghcr.io entrypoint is already
# present; if so, mutation is skipped. mutateExistingOnPolicyUpdate ensures
# the existing deployment is also patched when this policy changes.
#
# WARNING: Do NOT revert to Harbor v0.68.0 — those images no longer exist
# after Harbor PVC replacement. ghcr.io is in the approved registry list.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: tekton-controller-harbor-images
  annotations:
    policies.kyverno.io/title: Pin Tekton helper images to ghcr.io v1.10.2
    policies.kyverno.io/category: Platform
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Intercepts CREATE/UPDATE on tekton-pipelines-controller Deployment and
      pins helper image args to ghcr.io v1.10.2 digest-pinned references.
      Idempotent — skips mutation if correct refs already present.
      Remutates existing controller on policy update.
      DO NOT revert to Harbor v0.68.0 — those blobs were lost.
    cryptophys.io/domain: platform
    cryptophys.io/component: tekton
    cryptophys.io/contract: contract.platform.tekton.v1
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
    cryptophys.io/layer: platform
spec:
  background: true
  rules:
    - name: enforce-pinned-images
      match:
        any:
          - resources:
              kinds:
                - Deployment
              names:
                - tekton-pipelines-controller
              namespaces:
                - tekton-pipelines
      preconditions:
        all:
          - key: "{{ request.object.spec.template.spec.containers[0].args[0] }}"
            operator: Equals
            value: "-entrypoint-image"
          - key: "ghcr.io/tektoncd/pipeline/entrypoint-bff0a22da108bc2f16c818c97641a296:v1.10.2@sha256:bcf235d0a193551e9307a3270d878c5ffa9a4f199c924f39c3fe5a17276c9670"
            operator: NotIn
            value: "{{ request.object.spec.template.spec.containers[0].args }}"
      mutate:
        mutateExistingOnPolicyUpdate: true
        targets:
          - apiVersion: apps/v1
            kind: Deployment
            name: tekton-pipelines-controller
            namespace: tekton-pipelines
        # Deterministic arg positions from Tekton v1.10.2 release.yaml:
        # [0]="-entrypoint-image"        [1]=<entrypoint-img>
        # [2]="-nop-image"               [3]=<nop-img>
        # [4]="-sidecarlogresults-image"  [5]=<sidecarlogresults-img>
        # [6]="-workingdirinit-image"     [7]=<workingdirinit-img>
        patchesJson6902: |-
          - op: replace
            path: /spec/template/spec/containers/0/args/1
            value: "ghcr.io/tektoncd/pipeline/entrypoint-bff0a22da108bc2f16c818c97641a296:v1.10.2@sha256:bcf235d0a193551e9307a3270d878c5ffa9a4f199c924f39c3fe5a17276c9670"
          - op: replace
            path: /spec/template/spec/containers/0/args/3
            value: "ghcr.io/tektoncd/pipeline/nop-8eac7c133edad5df719dc37b36b62482:v1.10.2@sha256:a1bd0d95587a9a8ea7d9f0b4925d7abfaf3dffcbda9be72ee44288bfd68f9506"
          - op: replace
            path: /spec/template/spec/containers/0/args/5
            value: "ghcr.io/tektoncd/pipeline/sidecarlogresults-7501c6a20d741631510a448b48ab098f:v1.10.2@sha256:119609ce431a41c30101ad1d8c35393c79b24c6192b3cdf16aa01f3c7725715a"
          - op: replace
            path: /spec/template/spec/containers/0/args/7
            value: "ghcr.io/tektoncd/pipeline/workingdirinit-0c558922ec6a1b739e550e349f2d5fc1:v1.10.2@sha256:2c4f7e78e01d337b4d1710c94ecabf23b460ebd1d5a6c82de5de64bd889ff112"
