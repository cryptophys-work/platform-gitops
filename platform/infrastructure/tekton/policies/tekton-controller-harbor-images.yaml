---
# Kyverno ClusterPolicy: Replace Tekton gcr.io images with Harbor
#
# Problem: Tekton Operator reconcile loop always resets controller Deployment
# args to gcr.io images (from kodata). gcr.io is blocked in this cluster.
#
# Solution: This policy intercepts every CREATE/UPDATE on the
# tekton-pipelines-controller Deployment and atomically replaces gcr.io
# arg values with Harbor-hosted equivalents at their deterministic positions.
#
# The operator reconcile loop CANNOT win: after every reconcile, the Kyverno
# admission webhook fires and overwrites gcr.io refs with Harbor refs before
# the resource is committed to etcd.
#
# background: true — Kyverno also reconciles existing resources periodically,
# ensuring the override persists even without a triggering mutation event.
#
# Precondition: only apply when args[1] contains gcr.io (idempotent — skip
# if Harbor refs are already in place).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: tekton-controller-harbor-images
  annotations:
    policies.kyverno.io/title: Replace Tekton gcr.io images with Harbor registry
    policies.kyverno.io/category: Platform
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Intercepts CREATE/UPDATE on tekton-pipelines-controller Deployment and
      replaces gcr.io image references with Harbor-hosted equivalents.
      Runs atomically on every operator reconcile cycle. Permanent override.
    cryptophys.io/domain: platform
    cryptophys.io/component: tekton
    cryptophys.io/contract: contract.platform.tekton.v1
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
    cryptophys.io/layer: platform
spec:
  background: true
  rules:
    - name: replace-gcrio-with-harbor
      match:
        any:
          - resources:
              kinds:
                - Deployment
              names:
                - tekton-pipelines-controller
              namespaces:
                - tekton-pipelines
      # Idempotency guard: only apply when Harbor ref is NOT already present in args.
      # - Operator reconciles → resets to gcr.io → Harbor ref absent → rule fires → Harbor restored.
      # - After first apply → Harbor ref in args → rule skips → no spurious reconcile loop.
      preconditions:
        all:
          - key: "{{ request.object.spec.template.spec.containers[0].args[0] }}"
            operator: Equals
            value: "-entrypoint-image"
          - key: "registry.cryptophys.work/library/tekton-pipeline-entrypoint:v0.59.0"
            operator: NotIn
            value: "{{ request.object.spec.template.spec.containers[0].args }}"
      mutate:
        # Deterministic: operator always generates args in this order:
        # [0]="-entrypoint-image"  [1]=<entrypoint-img>
        # [2]="-nop-image"         [3]=<nop-img>
        # [4]="-sidecarlogresults-image" [5]=<sidecarlogresults-img>
        # [6]="-workingdirinit-image"    [7]=<workingdirinit-img>
        patchesJson6902: |-
          - op: replace
            path: /spec/template/spec/containers/0/args/1
            value: "registry.cryptophys.work/library/tekton-pipeline-entrypoint:v0.59.0"
          - op: replace
            path: /spec/template/spec/containers/0/args/3
            value: "registry.cryptophys.work/library/tekton-pipeline-nop:v0.59.0"
          - op: replace
            path: /spec/template/spec/containers/0/args/5
            value: "registry.cryptophys.work/library/tekton-pipeline-sidecarlogresults:v0.59.0"
          - op: replace
            path: /spec/template/spec/containers/0/args/7
            value: "registry.cryptophys.work/library/tekton-pipeline-workingdirinit:v0.59.0"
