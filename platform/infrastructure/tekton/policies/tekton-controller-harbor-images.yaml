---
# Kyverno ClusterPolicy: Enforce Harbor-local Tekton helper images
#
# Problem: Tekton Operator injects helper image args (entrypoint, nop,
# sidecarlogresults, workingdirinit) pointing to gcr.io/ghcr.io.
# Both upstream registries are unreachable (403 / deleted images).
#
# Solution: This policy intercepts every CREATE/UPDATE on the
# tekton-pipelines-controller Deployment and atomically replaces
# helper image args with Harbor-local copies at deterministic positions.
#
# Idempotent: precondition checks if Harbor refs are already present;
# if so, mutation is skipped. mutateExistingOnPolicyUpdate ensures
# the existing deployment is also patched when this policy changes.
#
# Images mirrored to Harbor: registry.cryptophys.work/library/tekton-pipeline-*:v0.68.0
# Source: ghcr.io/tektoncd/pipeline v0.68.0 (verified 2026-03-29)
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: tekton-controller-harbor-images
  annotations:
    policies.kyverno.io/title: Enforce Harbor-local Tekton helper images
    policies.kyverno.io/category: Platform
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Intercepts CREATE/UPDATE on tekton-pipelines-controller Deployment and
      replaces upstream image references (gcr.io/ghcr.io) with Harbor-local
      copies. Idempotent — skips mutation if Harbor refs already present.
      Remutates existing controller on policy update.
    cryptophys.io/domain: platform
    cryptophys.io/component: tekton
    cryptophys.io/contract: contract.platform.tekton.v1
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
    cryptophys.io/layer: platform
spec:
  background: true
  rules:
    - name: enforce-harbor-images
      match:
        any:
          - resources:
              kinds:
                - Deployment
              names:
                - tekton-pipelines-controller
              namespaces:
                - tekton-pipelines
      preconditions:
        all:
          - key: "{{ request.object.spec.template.spec.containers[0].args[0] }}"
            operator: Equals
            value: "-entrypoint-image"
          - key: "registry.cryptophys.work/library/tekton-pipeline-entrypoint:v0.68.0"
            operator: NotIn
            value: "{{ request.object.spec.template.spec.containers[0].args }}"
      mutate:
        mutateExistingOnPolicyUpdate: true
        targets:
          - apiVersion: apps/v1
            kind: Deployment
            name: tekton-pipelines-controller
            namespace: tekton-pipelines
        # Deterministic arg positions (operator-generated):
        # [0]="-entrypoint-image"        [1]=<entrypoint-img>
        # [2]="-nop-image"               [3]=<nop-img>
        # [4]="-sidecarlogresults-image"  [5]=<sidecarlogresults-img>
        # [6]="-workingdirinit-image"     [7]=<workingdirinit-img>
        patchesJson6902: |-
          - op: replace
            path: /spec/template/spec/containers/0/args/1
            value: "registry.cryptophys.work/library/tekton-pipeline-entrypoint:v0.68.0"
          - op: replace
            path: /spec/template/spec/containers/0/args/3
            value: "registry.cryptophys.work/library/tekton-pipeline-nop:v0.68.0"
          - op: replace
            path: /spec/template/spec/containers/0/args/5
            value: "registry.cryptophys.work/library/tekton-pipeline-sidecarlogresults:v0.68.0"
          - op: replace
            path: /spec/template/spec/containers/0/args/7
            value: "registry.cryptophys.work/library/tekton-pipeline-workingdirinit:v0.68.0"
