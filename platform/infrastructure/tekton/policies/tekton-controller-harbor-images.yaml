---
# Kyverno ClusterPolicy: Replace Tekton gcr.io images with GHCR
#
# Problem: Tekton Pipelines v0.59.0 controller still injects gcr.io sidecar
# images. gcr.io pulls are failing in-cluster, while ghcr.io is allowed and
# already used successfully by other Tekton components.
#
# Solution: This policy intercepts every CREATE/UPDATE on the
# tekton-pipelines-controller Deployment and atomically replaces gcr.io
# arg values with ghcr.io equivalents at their deterministic positions.
#
# The operator reconcile loop CANNOT win: after every reconcile, the Kyverno
# admission webhook fires and overwrites gcr.io refs with ghcr.io refs before
# the resource is committed to etcd.
#
# mutateExistingOnPolicyUpdate: true — updating this policy also mutates the
# existing controller Deployment immediately, so the current v0.59.0 controller
# stops injecting gcr.io sidecars without waiting for another reconcile.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: tekton-controller-harbor-images
  annotations:
    policies.kyverno.io/title: Replace Tekton gcr.io images with GHCR
    policies.kyverno.io/category: Platform
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Intercepts CREATE/UPDATE on tekton-pipelines-controller Deployment and
      replaces gcr.io image references with ghcr.io equivalents that are
      reachable from-cluster. Also remutates the existing controller on policy
      update so the override becomes effective immediately.
    cryptophys.io/domain: platform
    cryptophys.io/component: tekton
    cryptophys.io/contract: contract.platform.tekton.v1
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
    cryptophys.io/layer: platform
spec:
  background: true
  rules:
    - name: replace-gcrio-with-ghcr
      match:
        any:
          - resources:
              kinds:
                - Deployment
              names:
                - tekton-pipelines-controller
              namespaces:
                - tekton-pipelines
      preconditions:
        all:
          - key: "{{ request.object.spec.template.spec.containers[0].args[0] }}"
            operator: Equals
            value: "-entrypoint-image"
          - key: "ghcr.io/tektoncd/pipeline/entrypoint:v0.59.0"
            operator: NotIn
            value: "{{ request.object.spec.template.spec.containers[0].args }}"
      mutate:
        mutateExistingOnPolicyUpdate: true
        targets:
          - apiVersion: apps/v1
            kind: Deployment
            name: tekton-pipelines-controller
            namespace: tekton-pipelines
        # Deterministic: operator always generates args in this order:
        # [0]="-entrypoint-image"  [1]=<entrypoint-img>
        # [2]="-nop-image"         [3]=<nop-img>
        # [4]="-sidecarlogresults-image" [5]=<sidecarlogresults-img>
        # [6]="-workingdirinit-image"    [7]=<workingdirinit-img>
        patchesJson6902: |-
          - op: replace
            path: /spec/template/spec/containers/0/args/1
            value: "ghcr.io/tektoncd/pipeline/entrypoint:v0.59.0"
          - op: replace
            path: /spec/template/spec/containers/0/args/3
            value: "ghcr.io/tektoncd/pipeline/nop:v0.59.0"
          - op: replace
            path: /spec/template/spec/containers/0/args/5
            value: "ghcr.io/tektoncd/pipeline/sidecarlogresults:v0.59.0"
          - op: replace
            path: /spec/template/spec/containers/0/args/7
            value: "ghcr.io/tektoncd/pipeline/workingdirinit:v0.59.0"
