apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kustomize-validate
  namespace: tekton-system
  annotations:
    cryptophys.io/domain: tekton
    cryptophys.io/managed-by: argocd
spec:
  workspaces:
    - name: source
  steps:
  - name: validate
    image: alpine/kustomize:latest
    script: |
      kustomize build /workspace/source > /tmp/output.yaml
      echo "Validation passed"