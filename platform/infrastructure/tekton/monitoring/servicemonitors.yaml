---
apiVersion: v1
kind: Service
metadata:
  name: tekton-pipelines-controller-metrics
  namespace: tekton-pipelines
  labels:
    app: tekton-pipelines-controller
spec:
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
  selector:
    app.kubernetes.io/name: controller
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tekton-pipelines-controller
  namespace: tekton-pipelines
  labels:
    cryptophys.io/monitoring: enabled
spec:
  selector:
    matchLabels:
      app: tekton-pipelines-controller
  endpoints:
    - port: metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tekton-chains-controller
  namespace: tekton-chains
  labels:
    cryptophys.io/monitoring: enabled
spec:
  selector:
    matchLabels:
      app: tekton-chains-controller
  endpoints:
    - port: metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tekton-triggers-controller
  namespace: tekton-pipelines
  labels:
    cryptophys.io/monitoring: enabled
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: controller
      app.kubernetes.io/component: triggers-controller
  endpoints:
    - port: metrics
      interval: 30s
