apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tekton-system
resources:
  # Configuration
  - chains/chains-config.yaml
  
  # Tasks
  - tasks/buildah-build-push-sbom.yaml
  - tasks/upload-sbom-artifact.yaml
  - tasks/buildx-multiarch.yaml
  
  # Pipelines
  - pipelines/go/pipeline.yaml
  - pipelines/python/pipeline.yaml
  - pipelines/nodejs/pipeline.yaml
  - pipelines/rust/pipeline.yaml
  
  # RBAC
  - rbac/pipeline-rbac.yaml
  
  # Quotas
  - quotas/resource-quotas.yaml
  
  # Monitoring
  - monitoring/servicemonitors.yaml
