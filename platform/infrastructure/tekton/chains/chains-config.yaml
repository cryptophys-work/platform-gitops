---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chains-config
  namespace: tekton-chains
  labels:
    cryptophys.io/tier: security
    cryptophys.io/managed-by: flux
spec:
  data:
    artifacts.oci.format: simplesigning
    artifacts.oci.signer: x509
    artifacts.oci.storage: oci
    artifacts.pipelinerun.format: in-toto
    artifacts.pipelinerun.signer: x509
    artifacts.pipelinerun.storage: tekton,oci
    artifacts.taskrun.format: in-toto
    artifacts.taskrun.signer: x509
    artifacts.taskrun.storage: tekton,oci
    signers.x509.fulcio.enabled: "false"
    storage.oci.repository: registry.cryptophys.work/signatures
    storage.oci.repository.insecure: "false"
    transparency.enabled: "true"
    transparency.url: https://rekor.sigstore.dev
