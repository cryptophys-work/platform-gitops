---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: nodejs-application-build
  namespace: tekton-system
  labels:
    cryptophys.io/language: nodejs
spec:
  description: Build, test, and sign Node.js applications
  params:
    - name: repo-url
      type: string
    - name: image-name
      type: string
    - name: image-tag
      type: string
      default: latest
  workspaces:
    - name: shared-data
  tasks:
    - name: fetch-source
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-data
      params:
        - name: url
          value: $(params.repo-url)
    
    - name: test
      runAfter: [fetch-source]
      workspaces:
        - name: source
          workspace: shared-data
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: test
            image: node:20-alpine
            script: |
              #!/bin/sh
              cd $(workspaces.source.path)
              npm install || yarn install
              npm test || echo "No tests configured"
    
    - name: build-push
      runAfter: [test]
      taskRef:
        name: buildkit-build-push
      workspaces:
        - name: source
          workspace: shared-data
      params:
        - name: image
          value: "registry.cryptophys.work/$(params.image-name)"
        - name: tag
          value: "$(params.image-tag)"
        - name: context_dir
          value: "."
        - name: dockerfile
          value: "./Dockerfile"

    - name: generate-sbom
      runAfter: [build-push]
      workspaces:
        - name: source
          workspace: shared-data
      taskSpec:
        params:
          - name: image_ref
            type: string
        workspaces:
          - name: source
        steps:
          - name: trivy-sbom
            image: aquasec/trivy:latest
            script: |
              #!/bin/sh
              set -e
              IMAGE_REF="$(params.image_ref)"
              echo "Generating SBOM for ${IMAGE_REF}"
              trivy image --format cyclonedx \
                --output /workspace/sbom.json \
                --insecure \
                "${IMAGE_REF}" || true
      params:
        - name: image_ref
          value: "$(tasks.build-push.results.image_url)@$(tasks.build-push.results.digest)"

    - name: upload-sbom
      runAfter: [generate-sbom]
      taskRef:
        name: upload-sbom-artifact
      workspaces:
        - name: source
          workspace: shared-data
      params:
        - name: IMAGE_REF
          value: "$(tasks.build-push.results.image_url)@$(tasks.build-push.results.digest)"
