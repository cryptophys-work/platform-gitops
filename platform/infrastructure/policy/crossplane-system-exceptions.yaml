apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: crossplane-system-exceptions
  namespace: kyverno-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: crossplane
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
  annotations:
    cryptophys.work/exception-owner: "platform-sre"
    cryptophys.work/exception-reason: >-
      Crossplane uses images from xpkg.upbound.io (external image registry) and
      requires privilege escalation for provider webhooks and pod security policy
      enforcement. These are essential for platform infrastructure orchestration
      and cannot be satisfied by internal registry mirroring without breaking
      upstream Crossplane provider compatibility.
    cryptophys.work/exception-ticket: "OPS-CROSSPLANE-REGISTRY-001"
    cryptophys.work/exception-expires-at: "2027-01-01T00:00:00Z"
spec:
  exceptions:
    - policyName: cp-supplychain-registry-v1
      ruleNames:
        - restrict-image-registries
        - autogen-restrict-image-registries
    - policyName: cp-security-hardening-v1
      ruleNames:
        - restrict-pod-security-standard
        - autogen-restrict-pod-security-standard
  match:
    any:
      - resources:
          kinds:
            - Pod
            - Deployment
          namespaces:
            - crossplane-system
