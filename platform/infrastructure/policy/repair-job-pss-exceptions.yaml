apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: repair-job-pss-exceptions
  namespace: kyverno-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: repair-jobs
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
  annotations:
    cryptophys.work/exception-owner: "platform-sre"
    cryptophys.work/exception-reason: >-
      One-shot platform repair Jobs repeatedly trigger cp-pss audit pass/error
      events even though they are tightly scoped, non-privileged maintenance
      workloads. Keep the exception narrow to the known repair Jobs only.
    cryptophys.work/exception-ticket: "OPS-POSTGRES-HARBOR-REPAIR-001"
    cryptophys.work/exception-expires-at: "2027-01-01T00:00:00Z"
spec:
  exceptions:
    - policyName: cp-pss-restricted-v1
      ruleNames:
        - autogen-deny-privileged-containers
        - autogen-deny-host-namespaces
        - autogen-deny-hostpath-volumes
        - autogen-deny-capabilities-added
  match:
    any:
      - resources:
          kinds:
            - Job
          names:
            - postgres-apps-primary-realign-v1
            - postgres-apps-stale-pvc-repair-v8
            - postgres-security-stale-pvc-repair-v1
          namespaces:
            - postgresql-system
      - resources:
          kinds:
            - Job
          names:
            - harbor-migration-repair-v2
            - harbor-migration-repair-v3
          namespaces:
            - registry-system
