# Crossplane applies ValidatingWebhookConfiguration objects from its init
# container (not from Helm templates). Helm post-renders therefore never see
# those manifests and cannot tune timeout/failurePolicy. This policy keeps the
# apiserver-facing settings idempotent on CREATE/UPDATE (admission), on policy
# updates (mutateExistingOnPolicyUpdate + targets), and via background scans
# (background: true).
#
# Note: Kyverno's resource mutating webhook does not register rules for
# ValidatingWebhookConfiguration, so Crossplane init would otherwise reset these
# fields without tripping admission-time mutation. Primary desired state is
# GitOps-owned manifests mounted at /webhookconfigurations on the Crossplane init
# container (controllers/crossplane__webhook_admission_profile.yaml). This
# ClusterPolicy still re-applies on policy updates via mutateExisting for
# defense in depth.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: crossplane-validating-webhook-tuning
  annotations:
    policies.kyverno.io/title: Tune Crossplane validating webhooks
    policies.kyverno.io/category: Availability
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >
      Enforce maximum admission timeout (30s) and Ignore failure policy on
      Crossplane's validating webhooks so slow validation or webhook outages do
      not hard-block the API server or GitOps dry-runs. Re-applies to existing
      VWCs when this ClusterPolicy changes so drift after Crossplane restarts is
      corrected without Helm post-renderers.
    cryptophys.io/domain: platform
    cryptophys.io/component: crossplane
    cryptophys.io/managed-by: flux
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: tune-crossplane-primary
      match:
        any:
          - resources:
              kinds:
                - ValidatingWebhookConfiguration
              names:
                - crossplane
      mutate:
        mutateExistingOnPolicyUpdate: true
        targets:
          - apiVersion: admissionregistration.k8s.io/v1
            kind: ValidatingWebhookConfiguration
            name: crossplane
        foreach:
          - list: "request.object.webhooks || `[]`"
            patchesJson6902: |-
              - op: replace
                path: /webhooks/{{elementIndex}}/timeoutSeconds
                value: 30
              - op: replace
                path: /webhooks/{{elementIndex}}/failurePolicy
                value: Ignore
    - name: tune-crossplane-no-usages
      match:
        any:
          - resources:
              kinds:
                - ValidatingWebhookConfiguration
              names:
                - crossplane-no-usages
      mutate:
        mutateExistingOnPolicyUpdate: true
        targets:
          - apiVersion: admissionregistration.k8s.io/v1
            kind: ValidatingWebhookConfiguration
            name: crossplane-no-usages
        foreach:
          - list: "request.object.webhooks || `[]`"
            patchesJson6902: |-
              - op: replace
                path: /webhooks/{{elementIndex}}/timeoutSeconds
                value: 30
              - op: replace
                path: /webhooks/{{elementIndex}}/failurePolicy
                value: Ignore
