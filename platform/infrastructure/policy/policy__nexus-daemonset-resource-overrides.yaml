apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: mutate-nexus-daemonset-resource-overrides
  annotations:
    policies.kyverno.io/title: Nexus DaemonSet Resource Overrides
    policies.kyverno.io/category: Node Placement
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Increase DaemonSet requests on Nexus where per-node pod density is much
      higher than other workers. This keeps system DaemonSets from starving on
      the densest platform node while leaving baseline requests unchanged
      elsewhere.
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  validationFailureAction: Audit
  background: false
  rules:
    - name: cilium-agent-nexus-double-request
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - kube-system
              selector:
                matchLabels:
                  k8s-app: cilium
      preconditions:
        all:
          - key: "{{ request.object.spec.nodeName }}"
            operator: Equals
            value: nexus-144-91-103-10
      mutate:
        patchStrategicMerge:
          spec:
            containers:
              - name: cilium-agent
                resources:
                  requests:
                    cpu: 200m
                    memory: 2Gi
    - name: node-local-dns-nexus-double-request
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - kube-system
              selector:
                matchLabels:
                  k8s-app: node-local-dns
      preconditions:
        all:
          - key: "{{ request.object.spec.nodeName }}"
            operator: Equals
            value: nexus-144-91-103-10
      mutate:
        patchStrategicMerge:
          spec:
            containers:
              - name: node-cache
                resources:
                  requests:
                    cpu: 50m
                    memory: 10Mi
