apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: kyverno-policy-validating-webhook-cfg
  labels:
    app.kubernetes.io/managed-by: kyverno
    cryptophys.io/domain: platform
    cryptophys.io/anti-regression: "true"
  annotations:
    cryptophys.io/contract: contract.platform.kyverno.v1
    # forceFailurePolicyIgnore does not propagate to policy-validation webhook in Kyverno 3.5.x.
    # This patch ensures Flux dry-runs succeed even when Kyverno is transiently overloaded.
webhooks:
  - name: validate-policy.kyverno.svc
    failurePolicy: Ignore
