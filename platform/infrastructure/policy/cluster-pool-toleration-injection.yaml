---
# ClusterPool-Driven Toleration Injection Policies
#
# These policies inject pool-specific taints tolerations for pods based on their
# namespace's cryptophys.io/pool label. This replaces hardcoded namespace lists
# in previous policies.
#
# Benefits:
# - Single source of truth: ClusterPool definitions drive policies
# - Dynamic membership: Label namespace → policy auto-applies
# - Audit trail: All pool membership in git
# - No duplication: Policies read labels, not hardcoded lists

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: mutate-pool-tolerations-apps-ha
  namespace: kyverno-system
  annotations:
    policies.kyverno.io/title: "Mutate Apps HA Pool Tolerations"
    policies.kyverno.io/category: "Node Placement"
    policies.kyverno.io/severity: "medium"
    cryptophys.io/source: "ClusterPool (apps-ha)"
    cryptophys.io/description: >
      Inject apps-ha pool taint toleration for all namespaces labeled
      cryptophys.io/pool=apps-ha. Enables dynamic membership without
      hardcoded namespace lists.
spec:
  validationFailureAction: audit
  background: true
  rules:
  - name: inject-apps-ha-toleration
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaceSelector:
            matchLabels:
              cryptophys.io/pool: apps-ha
    mutate:
      patchStrategicMerge:
        spec:
          tolerations:
          - key: cryptophys.io/pool
            operator: Equal
            value: apps-ha
            effect: NoSchedule

