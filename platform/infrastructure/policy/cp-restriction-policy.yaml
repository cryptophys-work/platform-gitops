---
# ClusterPolicy: Deny CP toleration for non-platform namespaces
# Enforces that only platform-gitops managed workloads can tolerate control-plane taint.
# Non-platform namespaces are blocked from scheduling on CP nodes.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-cp-toleration-non-platform
  annotations:
    policies.kyverno.io/title: Deny CP Toleration for Non-Platform Workloads
    policies.kyverno.io/category: Node Placement
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Control plane nodes are reserved for platform-gitops managed workloads only.
      Application, AI, storage, and user namespaces MUST NOT tolerate the
      control-plane taint. This policy is in Audit mode — violations are reported
      but not blocked. Set failurePolicy and validationFailureAction to Enforce
      after migration is complete.
spec:
  validationFailureAction: Audit
  background: false
  rules:
    - name: check-cp-toleration
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: NotIn
                    values:
                      # Platform namespaces allowed to tolerate CP taint
                      - kube-system
                      - flux-system
                      - longhorn-system
                      - kyverno-system
                      - cert-manager
                      - metallb-system
                      - ingress-system
                      - spire-system
                      - vault-system
                      - external-secrets
                      - observability-system
                      - registry-system
                      - gitops-system
                      - gatekeeper-system
                      - security-system
                      - facilitator
                      - envoy-gateway-system
                      - tetragon-system
                      - falco-system
                      - postgresql-system
      validate:
        message: >
          Namespace '{{ request.object.metadata.namespace }}' is not a platform namespace
          and MUST NOT use control-plane toleration. Remove the toleration:
          key=node-role.kubernetes.io/control-plane from this workload.
          See: https://docs.cryptophys.work/node-topology
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.tolerations[].key | contains(@, 'node-role.kubernetes.io/control-plane') }}"
                operator: Equals
                value: true
---
# ClusterPolicy: Deny CP nodeSelector for non-platform namespaces
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-cp-nodeselector-non-platform
  annotations:
    policies.kyverno.io/title: Deny CP NodeSelector for Non-Platform Workloads
    policies.kyverno.io/category: Node Placement
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Pods in non-platform namespaces must not use cryptophys.io/tier=platform
      as nodeSelector, as this would pin them to control plane nodes.
spec:
  validationFailureAction: Audit
  background: false
  rules:
    - name: check-cp-nodeselector
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: NotIn
                    values:
                      - kube-system
                      - flux-system
                      - longhorn-system
                      - kyverno-system
                      - cert-manager
                      - metallb-system
                      - ingress-system
                      - spire-system
                      - vault-system
                      - external-secrets
                      - observability-system
                      - registry-system
                      - gitops-system
                      - gatekeeper-system
                      - security-system
                      - facilitator
                      - envoy-gateway-system
                      - tetragon-system
                      - falco-system
                      - postgresql-system
      validate:
        message: >
          Namespace '{{ request.object.metadata.namespace }}' is not a platform namespace.
          nodeSelector 'cryptophys.io/tier: platform' is reserved for CP nodes only.
          Use 'cryptophys.io/tier: application', 'workload.cryptophys.work/apps-core: true',
          'workload.cryptophys.work/ai-engine: true', etc. instead.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.nodeSelector.\"cryptophys.io/tier\" || '' }}"
                operator: Equals
                value: platform
