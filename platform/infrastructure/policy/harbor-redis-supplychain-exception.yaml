# Narrow exception: external Redis still pulls from docker.io (digest-pinned) and cannot satisfy
# cp-mutate-supplychain-registry-v1 without mirroring into registry.cryptophys.work.
# Pod Security Standard is no longer relaxed for this workload (see edge-and-harbor-exceptions).
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: harbor-redis-supplychain-exception
  namespace: kyverno-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-external-redis
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
  annotations:
    cryptophys.work/exception-owner: "platform-sre"
    cryptophys.work/exception-reason: >-
      Harbor sidecar Redis uses upstream docker.io/library/redis digest-pinned until replicated to Harbor.
    cryptophys.work/exception-ticket: "OPS-EDGE-REGISTRY-001"
    cryptophys.work/exception-expires-at: "2027-01-01T00:00:00Z"
spec:
  exceptions:
    - policyName: cp-mutate-supplychain-registry-v1
      ruleNames:
        - "*"
  match:
    any:
      - resources:
          kinds:
            - Deployment
            - Pod
            - Service
          names:
            - registry-harbor-redis-external
          namespaces:
            - registry-system
