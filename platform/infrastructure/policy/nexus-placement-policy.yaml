apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: mutate-apps-ha-toleration
  annotations:
    policies.kyverno.io/title: Allow Apps HA Toleration
    policies.kyverno.io/category: Node Placement
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >
      Argo-managed application namespaces are allowed onto the apps-ha lane,
      which spans nexus, quanta, and synapse.
    pod-policies.kyverno.io/autogen-controllers: none
    cryptophys.io/domain: platform
    cryptophys.io/contract: contract.infrastructure.talos_topology.v1
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: allow-apps-ha
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: In
                    values:
                      - aide
                      - cerebrum
                      - apps-core
                      - apps-dash
                      - apps-user
                      - bridge
                      - automation
                      - apps-automation
                      - apps-gateway
                      - navigator
                      - platform-ui
      exclude:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - apps-user
              selector:
                matchLabels:
                  app.kubernetes.io/name: signal-engine
          - resources:
              kinds:
                - Pod
              namespaces:
                - platform-ui
          - resources:
              kinds:
                - Pod
              namespaces:
                - apps-dash
              selector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - dash-nexus
                      - nexus-oauth2-proxy
                      - synapse-oauth2-proxy
          - resources:
              kinds:
                - Pod
              namespaces:
                - apps-core
              selector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - mcp-github
                      - mcp-brave-search
                      - mcp-postgres
                      - mcp-fetch
                      - mcp-prometheus
                      - mcp-crypto
      mutate:
        patchStrategicMerge:
          spec:
            tolerations:
              - key: cryptophys.io/pool
                operator: Equal
                value: apps-ha
                effect: NoSchedule
    - name: allow-cerebrum-ray-cluster
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: In
                    values:
                      - cerebrum
      mutate:
        patchStrategicMerge:
          spec:
            tolerations:
              - key: cryptophys.io/pool
                operator: Equal
                value: apps-ha
                effect: NoSchedule
              - key: ray-cluster
                operator: Equal
                value: "true"
                effect: NoSchedule
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: mutate-platform-ha-toleration
  annotations:
    policies.kyverno.io/title: Allow Platform HA Toleration
    policies.kyverno.io/category: Node Placement
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Flux-managed platform namespaces are allowed onto the platform-ha lane,
      which spans nexus, thalamus, and cerebellum.
    pod-policies.kyverno.io/autogen-controllers: none
    cryptophys.io/domain: platform
    cryptophys.io/contract: contract.infrastructure.talos_topology.v1
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: allow-platform-ha
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: In
                    values:
                      - kube-system
                      - flux-system
                      - cnpg-system
                      - gitops-system
                      - ingress-system
                      - registry-system
                      - kyverno-system
                      - cert-manager
                      - metallb-system
                      - external-secrets
                      - spire-system
                      - vault-system
                      - observability-system
                      - security-system
                      - security-observability
                      - gatekeeper-system
                      - falco-system
                      - tetragon-system
                      - mesh-system
                      - database
                      - minio-system
                      - trustedledger
                      - image-factory
                      - orchestrator
                      - facilitator
                      - tekton-pipelines
                      - tekton-pipelines-resolvers
                      - tekton-dashboard
                      - kueue-system
                      - cloudflare-tunnel
                      - longhorn-system
      exclude:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: In
                    values:
                      - ingress-system
                      - longhorn-system
                      - metallb-system
                      - falco-system
                      - tetragon-system
      mutate:
        patchStrategicMerge:
          spec:
            tolerations:
              - key: cryptophys.io/pool
                operator: Equal
                value: platform-ha
                effect: NoSchedule
    - name: allow-qdrant-ray-cluster
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: In
                    values:
                      - database
              selector:
                matchLabels:
                  app: qdrant
      mutate:
        patchStrategicMerge:
          spec:
            tolerations:
              - key: cryptophys.io/pool
                operator: Equal
                value: platform-ha
                effect: NoSchedule
              - key: ray-cluster
                operator: Equal
                value: "true"
                effect: NoSchedule
    - name: allow-longhorn-share-manager-platform-ha
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - longhorn-system
              selector:
                matchLabels:
                  longhorn.io/component: share-manager
      mutate:
        patchStrategicMerge:
          spec:
            tolerations:
              - key: cryptophys.io/pool
                operator: Equal
                value: platform-ha
                effect: NoSchedule
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-platform-ha-toleration-outside-platform
  annotations:
    policies.kyverno.io/title: Deny Platform HA Toleration Outside Platform
    policies.kyverno.io/category: Node Placement
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Prevents non-platform namespaces from tolerating the platform-ha taint.
    cryptophys.io/domain: platform
    cryptophys.io/contract: contract.infrastructure.talos_topology.v1
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: block-platform-ha
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: NotIn
                    values:
                      - kube-system
                      - flux-system
                      - gitops-system
                      - ingress-system
                      - registry-system
                      - kyverno-system
                      - cert-manager
                      - metallb-system
                      - external-secrets
                      - spire-system
                      - vault-system
                      - observability-system
                      - security-system
                      - security-observability
                      - gatekeeper-system
                      - falco-system
                      - tetragon-system
                      - mesh-system
                      - database
                      - minio-system
                      - trustedledger
                      - image-factory
                      - orchestrator
                      - facilitator
                      - tekton-system
                      - tekton-pipelines
                      - tekton-pipelines-resolvers
                      - tekton-dashboard
                      - kueue-system
                      - cloudflare-tunnel
                      - longhorn-system
                      - cnpg-system
                      - postgresql-system
                      - crossplane-system
      validate:
        message: >
          Namespace '{{ request.object.metadata.namespace }}' is not allowed to
          tolerate cryptophys.io/pool=platform-ha. Platform HA capacity is
          reserved for Flux-managed infrastructure workloads.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.tolerations[?key=='cryptophys.io/pool' && value=='platform-ha'] | length(@) }}"
                operator: GreaterThan
                value: 0
---
