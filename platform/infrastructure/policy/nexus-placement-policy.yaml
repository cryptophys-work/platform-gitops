apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: mutate-apps-ha-toleration
  annotations:
    policies.kyverno.io/title: Allow Apps HA Toleration
    policies.kyverno.io/category: Node Placement
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >
      Argo-managed application namespaces are allowed onto the apps-ha lane,
      which spans nexus, quanta, and synapse.
    pod-policies.kyverno.io/autogen-controllers: none
    cryptophys.io/domain: platform
    cryptophys.io/contract: contract.infrastructure.talos_topology.v1
spec:
  validationFailureAction: Audit
  background: true
   rules:
  - name: allow-apps-ha
      match:
        any:
          - resources:
               kinds:
                 - Pod
               namespaceSelector:
                 matchLabels:
                   cryptophys.io/pool: apps-ha
       exclude:
         any:
           - resources:
               kinds:
                 - Pod
               namespaces:
                 - apps-user
               selector:
                 matchLabels:
                   app.kubernetes.io/name: signal-engine
           - resources:
               kinds:
                 - Pod
               namespaces:
                 - platform-ui
           - resources:
               kinds:
                 - Pod
               namespaces:
                 - apps-dash
               selector:
                 matchExpressions:
                   - key: app
                     operator: In
                     values:
                       - nexus-oauth2-proxy
                       - synapse-oauth2-proxy
           - resources:
               kinds:
                 - Pod
               namespaces:
                 - apps-core
               selector:
                 matchExpressions:
                   - key: app
                     operator: In
                     values:
                       - mcp-github
                       - mcp-brave-search
                       - mcp-postgres
                       - mcp-fetch
                       - mcp-prometheus
                       - mcp-crypto
      preconditions:
        all:
          - key: "{{ request.object.spec.tolerations || '' }}"
            operator: Equals
             value: ""
    mutate:
      patchesJson6902: |-
          - op: add
            path: /spec/tolerations
            value:
              - key: cryptophys.io/pool
                operator: Equal
                value: apps-ha
                 effect: NoSchedule
  - name: append-apps-ha
      match:
         any:
           - resources:
               kinds:
                 - Pod
               namespaceSelector:
                 matchLabels:
                   cryptophys.io/pool: apps-ha
       exclude:
         any:
           - resources:
               kinds:
                 - Pod
               namespaces:
                 - apps-user
               selector:
                 matchLabels:
                   app.kubernetes.io/name: signal-engine
           - resources:
               kinds:
                 - Pod
               namespaces:
                 - platform-ui
           - resources:
               kinds:
                 - Pod
               namespaces:
                 - apps-dash
               selector:
                 matchExpressions:
                   - key: app
                     operator: In
                     values:
                       - nexus-oauth2-proxy
                       - synapse-oauth2-proxy
           - resources:
               kinds:
                 - Pod
               namespaces:
                 - apps-core
               selector:
                 matchExpressions:
                   - key: app
                     operator: In
                     values:
                       - mcp-github
                       - mcp-brave-search
                       - mcp-postgres
                       - mcp-fetch
                       - mcp-prometheus
                       - mcp-crypto
      preconditions:
        all:
          - key: "{{ request.object.spec.tolerations || '' }}"
            operator: NotEquals
            value: ""
          - key: "{{ request.object.spec.tolerations[?key=='cryptophys.io/pool' && value=='apps-ha'] | length(@) }}"
            operator: Equals
            value: 0
      mutate:
        patchesJson6902: |-
          - op: add
            path: /spec/tolerations/-
            value:
              key: cryptophys.io/pool
              operator: Equal
              value: apps-ha
              effect: NoSchedule
  - name: allow-cerebrum-ray-cluster
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: In
                    values:
                      - cerebrum
      mutate:
        patchStrategicMerge:
          spec:
            tolerations:
              - key: cryptophys.io/pool
                operator: Equal
                value: apps-ha
                effect: NoSchedule
              - key: ray-cluster
                operator: Equal
                value: "true"
                effect: NoSchedule
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: mutate-platform-ha-toleration
  annotations:
    policies.kyverno.io/title: Allow Platform HA Toleration
    policies.kyverno.io/category: Node Placement
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Flux-managed platform namespaces are allowed onto the platform-ha lane,
      which spans nexus, thalamus, and cerebellum.
    pod-policies.kyverno.io/autogen-controllers: none
    cryptophys.io/domain: platform
    cryptophys.io/contract: contract.infrastructure.talos_topology.v1
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: allow-platform-ha
        match:
          any:
            - resources:
                kinds:
                  - Pod
                namespaceSelector:
                  matchLabels:
                    cryptophys.io/pool: platform-ha
        exclude:
          any:
            - resources:
                kinds:
                  - Pod
                namespaceSelector:
                  matchExpressions:
                    - key: kubernetes.io/metadata.name
                      operator: In
                      values:
                        - ingress-system
                        - longhorn-system
                        - metallb-system
                        - cognitive-risk
                        - falco-system
                        - tetragon-system
        preconditions:
        all:
          - key: "{{ (request.object.spec.tolerations || []) | length(@) }}"
            operator: Equals
            value: 0
      mutate:
        patchesJson6902: |-
          - op: add
            path: /spec/tolerations
            value:
              - key: cryptophys.io/pool
                operator: Equal
                value: platform-ha
                 effect: NoSchedule
    - name: append-platform-ha
      match:
          any:
            - resources:
                kinds:
                  - Pod
                namespaceSelector:
                  matchLabels:
                    cryptophys.io/pool: platform-ha
        exclude:
          any:
            - resources:
                kinds:
                  - Pod
                namespaceSelector:
                  matchExpressions:
                    - key: kubernetes.io/metadata.name
                      operator: In
                      values:
                        - ingress-system
                        - longhorn-system
                        - metallb-system
                        - cognitive-risk
                        - falco-system
                        - tetragon-system
        preconditions:
        all:
          - key: "{{ request.object.spec.tolerations || '' }}"
            operator: NotEquals
            value: ""
          - key: "{{ request.object.spec.tolerations[?key=='cryptophys.io/pool' && value=='platform-ha'] | length(@) }}"
            operator: Equals
            value: 0
      mutate:
        patchesJson6902: |-
          - op: add
            path: /spec/tolerations/-
            value:
              key: cryptophys.io/pool
              operator: Equal
              value: platform-ha
              effect: NoSchedule
  - name: allow-tekton-migrator-ray-head
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - tekton-pipelines
              selector:
                matchLabels:
                  app.kubernetes.io/name: tekton-crd-migrator
      mutate:
        patchStrategicMerge:
          spec:
            tolerations:
              - key: cryptophys.io/pool
                operator: Equal
                value: platform-ha
                effect: NoSchedule
              - key: ray-head
                operator: Equal
                value: "true"
                effect: NoSchedule
  - name: allow-qdrant-ray-cluster
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchExpressions:
                  - key: kubernetes.io/metadata.name
                    operator: In
                    values:
                      - database
              selector:
                matchLabels:
                  app: qdrant
      mutate:
        patchStrategicMerge:
          spec:
            tolerations:
              - key: cryptophys.io/pool
                operator: Equal
                value: platform-ha
                effect: NoSchedule
              - key: ray-cluster
                operator: Equal
                value: "true"
                effect: NoSchedule
  - name: allow-longhorn-share-manager-platform-ha
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - longhorn-system
              selector:
                matchLabels:
                  longhorn.io/component: share-manager
      mutate:
        patchStrategicMerge:
          spec:
            tolerations:
              - key: cryptophys.io/pool
                operator: Equal
                value: platform-ha
                effect: NoSchedule
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: mutate-platform-ha-nexus-hard-priority
  annotations:
    policies.kyverno.io/title: Enforce Nexus Hard Priority For Platform HA
    policies.kyverno.io/category: Node Placement
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Enforce hard hostname priority to Nexus for platform-ha workloads with
      platform-ha lane fallback during Nexus maintenance or outage windows.
    pod-policies.kyverno.io/autogen-controllers: none
    cryptophys.io/domain: platform
    cryptophys.io/contract: contract.infrastructure.talos_topology.v1
spec:
  validationFailureAction: Audit
  background: true
   rules:
  - name: enforce-platform-ha-nexus-hard-priority
      match:
        any:
          - resources:
              kinds:
                - Pod
                namespaceSelector:
                  matchLabels:
                    cryptophys.io/pool: platform-ha
    preconditions:
        all:
          - key: "{{ request.object.metadata.ownerReferences[0].kind || '' }}"
            operator: NotEquals
             value: DaemonSet
    mutate:
      patchStrategicMerge:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: In
                          values:
                            - nexus-144-91-103-10
                    - matchExpressions:
                        - key: platform-ha
                          operator: In
                          values:
                            - "true"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-platform-ha-toleration-outside-platform
  annotations:
    policies.kyverno.io/title: Deny Platform HA Toleration Outside Platform
    policies.kyverno.io/category: Node Placement
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Prevents non-platform namespaces from tolerating the platform-ha taint.
    cryptophys.io/domain: platform
    cryptophys.io/contract: contract.infrastructure.talos_topology.v1
spec:
  validationFailureAction: Enforce
  background: true
   rules:
  - name: block-platform-ha
        match:
          any:
            - resources:
                kinds:
                  - Pod
                namespaceSelector:
                  matchExpressions:
                    - key: kubernetes.io/metadata.name
                      operator: NotIn
                      values:
                        - kube-system
                        - flux-system
                        - gitops-system
                        - ingress-system
                        - envoy-gateway-system
                        - registry-system
                        - kyverno-system
                        - cert-manager
                        - metallb-system
                        - cognitive-risk
                        - external-secrets
                        - spire-system
                        - vault-system
                        - observability-system
                        - security-system
                        - security-observability
                        - gatekeeper-system
                        - falco-system
                        - tetragon-system
                        - mesh-system
                        - database
                        - minio-system
                        - trustedledger
                        - image-factory
                        - orchestrator
                        - facilitator
                        - tekton-system
                        - tekton-pipelines
                        - tekton-pipelines-resolvers
                        - tekton-dashboard
                        - kueue-system
                        - cloudflare-tunnel
                        - longhorn-system
                        - cnpg-system
                        - postgresql-system
                        - crossplane-system
                        - cqls-compute
                        - apps-system
                         - kagenti-system
                         - kagenti-webhook-system
    preconditions:
        all:
          - key: "{{ request.operation || 'BACKGROUND' }}"
            operator: NotEquals
            value: DELETE
      validate:
        message: >
          Namespace '{{ request.object.metadata.namespace }}' is not allowed to
          tolerate cryptophys.io/pool=platform-ha. Platform HA capacity is
          reserved for Flux-managed infrastructure workloads.
        deny:
          conditions:
            any:
              - key: "{{ (request.object.spec.tolerations || `[]`)[?key=='cryptophys.io/pool' && value=='platform-ha'] | length(@) }}"
                operator: GreaterThan
                value: 0
---
