apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno-system
spec:
  interval: 1h
  releaseName: kyverno
  chart:
    spec:
      chart: kyverno
      version: "3.5.3"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  values:
    features:
      policyExceptions:
        enabled: true
    config:
      exceptionNamespace: kyverno-system
      resourceFilters:
        # Skip entire namespaces that generate null-kind dry-run requests (Kyverno 3.x webhook parse bug)
        - "[*/*,vault-system,*]"
        - "[*/*,gitops-system,*]"
        - "[*/*,security-system,*]"
        - "[*/*,kueue-system,*]"
        - "[*/*,spire-system,*]"
        - "[*/*,apps-system,*]"
        - "[*/*,observability-system,*]"
    admissionController:
      createSelfSignedCert: true
      replicas: 2
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      container:
        extraArgs:
          forceFailurePolicyIgnore: "true"
      serviceWebhook:
        failurePolicy: Ignore
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"
    backgroundController:
      replicas: 1
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      serviceWebhook:
        failurePolicy: Ignore
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"
    cleanupController:
      createSelfSignedCert: true
      replicas: 1
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      serviceWebhook:
        failurePolicy: Ignore
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"
    reportsController:
      replicas: 1
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      extraArgs:
        backgroundScanInterval: "12h"
        backgroundScanWorkers: "1"
        enableReporting: "validate"
