apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno-system
spec:
  interval: 1h
  releaseName: kyverno
  chart:
    spec:
      chart: kyverno
      version: "3.5.3"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 15m
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    timeout: 15m
    remediation:
      retries: 3
    crds: CreateReplace
  values:
    features:
      policyExceptions:
        enabled: true
    config:
      exceptionNamespace: kyverno-system
      resourceFilters:
        # Skip entire namespaces that generate null-kind dry-run requests (Kyverno 3.x webhook parse bug)
        - "[*/*,vault-system,*]"
        - "[*/*,gitops-system,*]"
        - "[*/*,security-system,*]"
        - "[*/*,kueue-system,*]"
        - "[*/*,spire-system,*]"
        - "[*/*,apps-system,*]"
        - "[*/*,observability-system,*]"
    admissionController:
      createSelfSignedCert: true
      replicas: 2
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      container:
        extraArgs:
          forceFailurePolicyIgnore: "true"
      serviceWebhook:
        failurePolicy: Ignore
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"
    backgroundController:
      replicas: 1
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      serviceWebhook:
        failurePolicy: Ignore
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"
    cleanupController:
      createSelfSignedCert: true
      replicas: 1
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        # Allow scheduling on medulla (LLM inference node) — only viable node with free resources
        # when cerebellum and quanta are at capacity
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - thalamus-217-76-59-241
                - synapse-161-97-136-251
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
      serviceWebhook:
        failurePolicy: Ignore
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
    reportsController:
      replicas: 1
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      extraArgs:
        backgroundScanInterval: "12h"
        backgroundScanWorkers: "1"
        enableReporting: "validate"
  postRenderers:
    - kustomize:
        patches:
          # kyverno-cleanup-validating-webhook-cfg failurePolicy is hardcoded to Fail in the
          # chart (not exposed via serviceWebhook.failurePolicy). Change to Ignore so that
          # ClusterCleanupPolicy dry-run succeeds even when the cleanup controller pod is
          # temporarily unavailable (e.g., rescheduling after node eviction on thalamus).
          - target:
              kind: ValidatingWebhookConfiguration
              name: kyverno-cleanup-validating-webhook-cfg
            patch: |-
              - op: replace
                path: /webhooks/0/failurePolicy
                value: Ignore
          - target:
              kind: ValidatingWebhookConfiguration
              name: kyverno-cel-exception-validating-webhook-cfg
            patch: |-
              - op: replace
                path: /webhooks/0/failurePolicy
                value: Ignore
          - target:
              kind: ValidatingWebhookConfiguration
              name: kyverno-exception-validating-webhook-cfg
            patch: |-
              - op: replace
                path: /webhooks/0/failurePolicy
                value: Ignore
          - target:
              kind: ValidatingWebhookConfiguration
              name: kyverno-global-context-validating-webhook-cfg
            patch: |-
              - op: replace
                path: /webhooks/0/failurePolicy
                value: Ignore
          - target:
              kind: ValidatingWebhookConfiguration
              name: kyverno-policy-validating-webhook-cfg
            patch: |-
              - op: replace
                path: /webhooks/0/failurePolicy
                value: Ignore
