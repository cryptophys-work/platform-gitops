apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno-system
spec:
  interval: 1h
  releaseName: kyverno
  chart:
    spec:
      chart: kyverno
      version: "3.5.3"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 15m
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    timeout: 15m
    disableWait: true
    remediation:
      retries: 3
    crds: CreateReplace
  postRenderers:
  - kustomize:
      patches:
      - target:
          kind: Job
          name: kyverno-migrate-resources
        patch: |
          - op: add
            path: /spec/template/spec/nodeSelector
            value:
              kubernetes.io/os: linux
              workload.cryptophys.work/apps-core: "true"
          - op: add
            path: /spec/template/spec/tolerations
            value:
              - key: node.kubernetes.io/not-ready
                operator: Exists
                effect: NoExecute
                tolerationSeconds: 300
              - key: node.kubernetes.io/unreachable
                operator: Exists
                effect: NoExecute
                tolerationSeconds: 300
              - key: cryptophys.io/role
                operator: Equal
                value: llm-inference
                effect: NoSchedule
              - key: cryptophys.io/storage-only
                operator: Exists
                effect: NoSchedule
  values:
    # imagePullSecrets removed to fix type mismatch error
    global:
      imagePullSecrets:
        - name: registry-cryptophys-work-auth
    crds:
      migration:
        # Keep CRD migration hook enabled, but allow scheduling on tainted worker pools.
        enabled: true
        nodeSelector:
          kubernetes.io/os: linux
        tolerations:
          - key: cryptophys.io/role
            operator: Equal
            value: llm-inference
            effect: NoSchedule
          - key: cryptophys.io/storage-only
            operator: Exists
            effect: NoSchedule
    features:
      policyExceptions:
        enabled: true
      forceFailurePolicyIgnore:
        enabled: true
    webhookConfiguration:
      failurePolicy: Ignore
    config:
      exceptionNamespace: kyverno-system
      resourceFilters:
        # Skip entire namespaces that generate null-kind dry-run requests (Kyverno 3.x webhook parse bug)
        - "[*/*,vault-system,*]"
        - "[*/*,gitops-system,*]"
        - "[*/*,security-system,*]"
        - "[*/*,kueue-system,*]"
        - "[*/*,spire-system,*]"
        - "[*/*,apps-system,*]"
        - "[*/*,observability-system,*]"
        # Skip Velero CRDs — kyverno-reports-controller SA lacks velero.io RBAC, causing restart loops
        - "[backup.velero.io/*,*,*]"
        - "[velero.io/*,*,*]"
    admissionController:
      createSelfSignedCert: true
      replicas: 1
      # Increase probe timeouts to prevent crashloops during high load or network latency
      livenessProbe:
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 15
        failureThreshold: 4
      readinessProbe:
        initialDelaySeconds: 15
        periodSeconds: 10
        timeoutSeconds: 15
        failureThreshold: 6
      updateStrategy:
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      nodeSelector:
        kubernetes.io/os: linux
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - thalamus-217-76-59-241
                - cerebellum-161-97-117-96
                - synapse-161-97-136-251
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/storage-only
          operator: Exists
          effect: NoSchedule
      container:
        extraArgs:
          exceptionNamespace: "kyverno-system"
          forceFailurePolicyIgnore: "true"
          maxAdmissionReports: "200"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
    backgroundController:
      replicas: 1
      extraArgs:
        exceptionNamespace: kyverno-system
      updateStrategy:
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      nodeSelector:
        kubernetes.io/os: linux
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - thalamus-217-76-59-241
                - cerebellum-161-97-117-96
                - synapse-161-97-136-251
      # backgroundController uses top-level resources (not container.resources)
      resources:
        requests:
          cpu: "10m"
          memory: "96Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/storage-only
          operator: Exists
          effect: NoSchedule
    cleanupController:
      createSelfSignedCert: true
      replicas: 1
      # extraArgs: only leaderElectionRetryPeriod is supported by cleanup-controller binary
      # forceFailurePolicyIgnore and leaseDuration/renewDeadline are NOT valid flags here
      extraArgs:
        leaderElectionRetryPeriod: "15s"
      updateStrategy:
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      nodeSelector:
        kubernetes.io/os: linux
      # cleanupController uses top-level resources (not container.resources)
      resources:
        requests:
          cpu: "10m"
          memory: "96Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/storage-only
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - thalamus-217-76-59-241
                - cerebellum-161-97-117-96
                - synapse-161-97-136-251
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
      # Increase startup tolerance — medulla (LLM node) is CPU-contended;
      # cleanup controller needs 3+ minutes to warm up (cache sync + webhook registration)
      startupProbe:
        initialDelaySeconds: 30
        failureThreshold: 50
        periodSeconds: 6
    reportsController:
      enabled: false  # Disabled — crashes trying to watch 100+ CRD kinds at startup (context timeout)
      # Re-enable once Kyverno 3.6+ fixes CRD discovery throttling or cluster CRD count reduces
      imagePullSecrets:
        - name: registry-cryptophys-work-auth
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      # reportsController uses top-level resources (consistent with other non-admission controllers)
      resources:
        requests:
          cpu: "100m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"
      container:
        extraArgs:
          forceFailurePolicyIgnore: "true"
          backgroundScanInterval: "24h"
          backgroundScanWorkers: "1"
          enableReporting: "validate"
          # skipResourceFilters removed — allows velero.io filter to take effect
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
  # Note: Kyverno webhook configurations (ValidatingWebhookConfiguration) are managed
  # dynamically by the Kyverno admission controller at runtime — they are NOT part of the
  # Helm chart's rendered manifest. postRenderers patches targeting them have no effect.
  # Resource limits are now correctly specified under container.resources (Kyverno v3.5.x path).
