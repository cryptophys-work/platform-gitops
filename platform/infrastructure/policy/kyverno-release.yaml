apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno-system
spec:
  interval: 1h
  releaseName: kyverno
  chart:
    spec:
      chart: kyverno
      version: "3.5.3"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 15m
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    timeout: 15m
    disableWait: true
    disableHooks: true
    force: true
    remediation:
      retries: 3
    crds: CreateReplace
  postRenderers:
  - kustomize:
      patches:
      - target:
          kind: Job
          name: kyverno-migrate-resources
        patch: |
          - op: add
            path: /spec/template/spec/nodeSelector
            value:
              kubernetes.io/os: linux
              workload.cryptophys.work/platform: "true"
          - op: add
            path: /spec/template/spec/tolerations
            value:
              - key: node.kubernetes.io/not-ready
                operator: Exists
                effect: NoExecute
                tolerationSeconds: 300
              - key: node.kubernetes.io/unreachable
                operator: Exists
                effect: NoExecute
                tolerationSeconds: 300
              - key: cryptophys.io/pool
                operator: Exists
                effect: NoSchedule
              - key: node.cilium.io/agent-not-ready
                operator: Exists
                effect: NoSchedule
      - target:
          kind: Deployment
          name: kyverno-command-center
        patch: |
          - op: add
            path: /spec/replicas
            value: 1
          - op: add
            path: /spec/template/spec/nodeSelector
            value:
              kubernetes.io/os: linux
              workload.cryptophys.work/platform: "true"
          - op: add
            path: /spec/template/spec/tolerations
            value:
              - key: cryptophys.io/pool
                operator: Exists
                effect: NoSchedule
              - key: node.cilium.io/agent-not-ready
                operator: Exists
                effect: NoSchedule
  values:
    # imagePullSecrets removed to fix type mismatch error
    global:
      imagePullSecrets:
        - name: registry-cryptophys-work-auth
    crds:
      migration:
        enabled: true
        nodeSelector:
          kubernetes.io/os: linux
          workload.cryptophys.work/platform: "true"
        tolerations:
          - key: cryptophys.io/pool
            operator: Exists
            effect: NoSchedule
          - key: node.cilium.io/agent-not-ready
            operator: Exists
            effect: NoSchedule
    features:
      policyExceptions:
        enabled: true
      forceFailurePolicyIgnore:
        enabled: true
    webhookConfiguration:
      failurePolicy: Ignore
    config:
      exceptionNamespace: kyverno-system
      resourceFilters:
        # Skip entire namespaces that generate null-kind dry-run requests (Kyverno 3.x webhook parse bug)
        - "[*/*,vault-system,*]"
        - "[*/*,gitops-system,*]"
        - "[*/*,security-system,*]"
        - "[*/*,kueue-system,*]"
        - "[*/*,spire-system,*]"
        - "[*/*,apps-system,*]"
        - "[*/*,observability-system,*]"
        # Skip Velero CRDs — kyverno-reports-controller SA lacks velero.io RBAC, causing restart loops
        - "[backup.velero.io/*,*,*]"
        - "[velero.io/*,*,*]"
    admissionController:
      createSelfSignedCert: true
      replicas: 2
      livenessProbe:
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 15
        failureThreshold: 4
      readinessProbe:
        initialDelaySeconds: 15
        periodSeconds: 10
        timeoutSeconds: 15
        failureThreshold: 6
      updateStrategy:
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      nodeSelector:
        cryptophys.io/platform-ha: "true"
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/component: admission-controller
              topologyKey: kubernetes.io/hostname
      tolerations:
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
      container:
        extraArgs:
          exceptionNamespace: "kyverno-system"
          forceFailurePolicyIgnore: "true"
          maxAdmissionReports: "200"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
    backgroundController:
      replicas: 2
      extraArgs:
        exceptionNamespace: kyverno-system
      updateStrategy:
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      nodeSelector:
        cryptophys.io/platform-ha: "true"
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/component: background-controller
              topologyKey: kubernetes.io/hostname
      resources:
        requests:
          cpu: "10m"
          memory: "96Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      tolerations:
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
    cleanupController:
      createSelfSignedCert: true
      replicas: 2
      extraArgs:
        leaderElectionRetryPeriod: "15s"
      updateStrategy:
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      nodeSelector:
        cryptophys.io/platform-ha: "true"
      resources:
        requests:
          cpu: "10m"
          memory: "96Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      tolerations:
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/component: cleanup-controller
              topologyKey: kubernetes.io/hostname
      startupProbe:
        initialDelaySeconds: 30
        failureThreshold: 50
        periodSeconds: 6
    reportsController:
      enabled: false
      imagePullSecrets:
        - name: registry-cryptophys-work-auth
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/platform: "true"
      # reportsController uses top-level resources (consistent with other non-admission controllers)
      resources:
        requests:
          cpu: "100m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"
      container:
        extraArgs:
          forceFailurePolicyIgnore: "true"
          backgroundScanInterval: "24h"
          backgroundScanWorkers: "1"
          enableReporting: "validate"
          # skipResourceFilters removed — allows velero.io filter to take effect
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
  # Note: Kyverno webhook configurations (ValidatingWebhookConfiguration) are managed
  # dynamically by the Kyverno admission controller at runtime — they are NOT part of the
  # Helm chart's rendered manifest. postRenderers patches targeting them have no effect.
  # Resource limits are now correctly specified under container.resources (Kyverno v3.5.x path).
