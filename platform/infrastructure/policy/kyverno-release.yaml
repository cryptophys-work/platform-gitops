apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno-system
spec:
  interval: 1h
  releaseName: kyverno
  chart:
    spec:
      chart: kyverno
      version: "3.5.3"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  install:
    createNamespace: true
    timeout: 15m
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    timeout: 15m
    remediation:
      retries: 3
    crds: CreateReplace
  values:
    imagePullSecrets:
      - name: harbor-pull-secret
    global:
      imagePullSecrets:
        - name: harbor-pull-secret
    features:
      policyExceptions:
        enabled: true
      forceFailurePolicyIgnore:
        enabled: true
    config:
      exceptionNamespace: kyverno-system
      resourceFilters:
        # Skip entire namespaces that generate null-kind dry-run requests (Kyverno 3.x webhook parse bug)
        - "[*/*,vault-system,*]"
        - "[*/*,gitops-system,*]"
        - "[*/*,security-system,*]"
        - "[*/*,kueue-system,*]"
        - "[*/*,spire-system,*]"
        - "[*/*,apps-system,*]"
        - "[*/*,observability-system,*]"
    admissionController:
      createSelfSignedCert: true
      replicas: 2
      # Increase probe timeouts to prevent crashloops during high load or network latency
      livenessProbe:
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 15
        failureThreshold: 4
      readinessProbe:
        initialDelaySeconds: 15
        periodSeconds: 10
        timeoutSeconds: 15
        failureThreshold: 6
      updateStrategy:
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - thalamus-217-76-59-241
      container:
        extraArgs:
          forceFailurePolicyIgnore: "true"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
    backgroundController:
      replicas: 1
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - thalamus-217-76-59-241
      # backgroundController uses top-level resources (not container.resources)
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"
      tolerations:
        # Allow scheduling on medulla (LLM inference node) — only viable node with free RAM
        # when cerebellum and quanta are at 99% memory request capacity
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
    cleanupController:
      createSelfSignedCert: true
      replicas: 1
      # extraArgs: only leaderElectionRetryPeriod is supported by cleanup-controller binary
      # forceFailurePolicyIgnore and leaseDuration/renewDeadline are NOT valid flags here
      extraArgs:
        leaderElectionRetryPeriod: "15s"
      nodeSelector:
        kubernetes.io/os: linux
      # cleanupController uses top-level resources (not container.resources)
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      tolerations:
        # Allow scheduling on medulla (LLM inference node) — only viable node with free resources
        # when cerebellum and quanta are at capacity
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - thalamus-217-76-59-241
                - synapse-161-97-136-251
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
      # Increase startup tolerance — medulla (LLM node) is CPU-contended;
      # cleanup controller needs 3+ minutes to warm up (cache sync + webhook registration)
      startupProbe:
        initialDelaySeconds: 30
        failureThreshold: 50
        periodSeconds: 6
    reportsController:
      imagePullSecrets:
        - name: harbor-pull-secret
      replicas: 1
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      # reportsController uses top-level resources (consistent with other non-admission controllers)
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      container:
        extraArgs:
          forceFailurePolicyIgnore: "true"
          backgroundScanInterval: "12h"
          backgroundScanWorkers: "1"
          enableReporting: "validate"
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
  # Note: Kyverno webhook configurations (ValidatingWebhookConfiguration) are managed
  # dynamically by the Kyverno admission controller at runtime — they are NOT part of the
  # Helm chart's rendered manifest. postRenderers patches targeting them have no effect.
  # Resource limits are now correctly specified under container.resources (Kyverno v3.5.x path).
