apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno-system
spec:
  interval: 1h
  releaseName: kyverno
  chart:
    spec:
      chart: kyverno
      version: "3.5.3"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  values:
    features:
      policyExceptions:
        enabled: true
    admissionController:
      createSelfSignedCert: true
      replicas: 1
      nodeSelector:
        kubernetes.io/hostname: campus-173-212-221-185
    backgroundController:
      replicas: 1
      nodeSelector:
        kubernetes.io/hostname: campus-173-212-221-185
    cleanupController:
      createSelfSignedCert: true
      replicas: 1
      nodeSelector:
        kubernetes.io/hostname: campus-173-212-221-185
    reportsController:
      replicas: 1
      nodeSelector:
        kubernetes.io/hostname: campus-173-212-221-185
