apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: mutate-pool-tolerations-platform-ha
  annotations:
    policies.kyverno.io/title: Mutate Platform HA Pool Tolerations
    policies.kyverno.io/category: Node Placement
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >
      Inject platform-ha toleration for pods in namespaces labeled
      cryptophys.io/pool=platform-ha.
    cryptophys.io/source: ClusterPool (platform-ha)
    cryptophys.io/component: cluster-pool-policy
    cryptophys.io/managed-by: crossplane
spec:
  validationFailureAction: Audit
  background: true
  rules:
  - name: inject-platform-ha-toleration
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaceSelector:
            matchLabels:
              cryptophys.io/pool: platform-ha
    # Tekton CRD migrator Jobs declare full platform-ha pool tolerations (nexus-hpc, cilium, …).
    # Strategic merge here would replace that list with only pool — do not touch those Pods.
    exclude:
      any:
      - resources:
          kinds:
          - Pod
          selector:
            matchLabels:
              app.kubernetes.io/name: tekton-crd-migrator
    mutate:
      patchStrategicMerge:
        spec:
          tolerations:
          - key: cryptophys.io/pool
            operator: Equal
            value: platform-ha
            effect: NoSchedule
  - name: inject-platform-ha-ray-head-for-tekton-migrator
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - tekton-pipelines
          selector:
            matchLabels:
              app.kubernetes.io/name: tekton-crd-migrator
    mutate:
      patchStrategicMerge:
        spec:
          tolerations:
          - key: cryptophys.io/pool
            operator: Equal
            value: platform-ha
            effect: NoSchedule
          - key: cryptophys.io/node-class
            operator: Equal
            value: nexus-hpc
            effect: NoSchedule
          - key: ray-head
            operator: Equal
            value: "true"
            effect: NoSchedule
          - key: node.cilium.io/agent-not-ready
            operator: Exists
            effect: NoSchedule
