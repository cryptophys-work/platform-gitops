apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: edge-and-harbor-exceptions
  namespace: kyverno-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: edge-gateway
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
  annotations:
    cryptophys.work/exception-owner: "platform-sre"
    cryptophys.work/exception-reason: >-
      Cloudflared and the Harbor external Redis sidecar are explicitly
      platform-managed integrations that cannot satisfy canonical naming,
      registry mirroring, and provenance policies without breaking upstream
      compatibility.
    cryptophys.work/exception-ticket: "OPS-EDGE-REGISTRY-001"
    cryptophys.work/exception-expires-at: "2027-01-01T00:00:00Z"
spec:
  exceptions:
    - policyName: cp-mutate-supplychain-registry-v1
      ruleNames:
        - "*"
    - policyName: cp-security-hardening-v1
      ruleNames:
        - restrict-pod-security-standard
  match:
    any:
      - resources:
          kinds:
            - Deployment
            - Pod
            - ServiceAccount
            - ConfigMap
          names:
            - cloudflared
          namespaces:
            - cloudflare-tunnel
      - resources:
          kinds:
            - Deployment
            - Pod
            - Service
          names:
            - registry-harbor-redis-external
          namespaces:
            - registry-system
