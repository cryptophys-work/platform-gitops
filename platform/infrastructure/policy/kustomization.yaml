apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - baseline.yaml
  - cilium-baseline.yaml
  - kyverno-release.yaml
  - nexus-placement-policy.yaml
  - pdbs-critical-services.yaml
  - ../tekton
  # cp-restriction-policy.yaml moved to 15-policy-crs (Kyverno CRDs not ready at dry-run time)
  # kyverno-cleanup-rbac.yaml and kyverno-background-rbac.yaml moved to
  # ../policy-rbac/ (stage 14-policy-rbac) to break chicken-and-egg:
  # RBAC must exist before ClusterPolicy dry-run triggers webhook validation
patches:
  # forceFailurePolicyIgnore does not apply to policy-validation webhook in Kyverno 3.5.x;
  # patch it to Ignore so Flux dry-runs succeed during transient Kyverno overload.
  - path: kyverno-policy-webhook-patch.yaml
    target:
      kind: ValidatingWebhookConfiguration
      name: kyverno-policy-validating-webhook-cfg
