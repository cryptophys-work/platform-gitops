apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - edge-and-harbor-exceptions.yaml
  - crossplane-system-exceptions.yaml
  - kyverno-release.yaml
  - policy__cluster-pool-platform-ha-toleration.yaml
  - cluster-pool-workload-restrictions.yaml
  - rayservice-pool-toleration-injection.yaml
  - pdb-generation.yaml
  - rbac-generation.yaml
  - nexus-placement-policy.yaml
  - pdbs-critical-services.yaml
  - ../tekton
  # Existing ClusterPolicy resources remain live because the Flux kustomization has prune=false.
  # Keep this stage focused on restoring the Kyverno control plane first; policy CR reapplication
  # can resume once kyverno-svc has healthy endpoints again.
  # cp-restriction-policy.yaml moved to 15-policy-crs (Kyverno CRDs not ready at dry-run time)
  # kyverno-cleanup-rbac.yaml and kyverno-background-rbac.yaml moved to
  # ../policy-rbac/ (stage 14-policy-rbac) to break chicken-and-egg:
  # RBAC must exist before ClusterPolicy dry-run triggers webhook validation
