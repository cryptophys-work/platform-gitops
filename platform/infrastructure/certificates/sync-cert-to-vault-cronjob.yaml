# CronJob to sync the LE wildcard cert from cert-manager to Vault.
# Runs daily - picks up renewed certs automatically and pushes to Vault
# so all ExternalSecrets get the latest valid cert.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cert-vault-syncer
  namespace: cert-manager
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: cert-vault-syncer
    cryptophys.io/managed-by: flux
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-vault-syncer
  namespace: cert-manager
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["platform-wildcard-tls"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-vault-syncer
  namespace: cert-manager
subjects:
- kind: ServiceAccount
  name: cert-vault-syncer
  namespace: cert-manager
roleRef:
  kind: Role
  name: cert-vault-syncer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cert-vault-syncer
  namespace: cert-manager
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: cert-vault-syncer
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
spec:
  schedule: "0 6 * * *"
  suspend: true
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: cert-vault-syncer
          restartPolicy: OnFailure
          containers:
          - name: syncer
            image: bitnami/kubectl:6e2cdb22d6ab7264ea198c717f555e30536b54029d26c8781b9f25f78951b564
            command:
            - /bin/sh
            - -c
            - |
              set -e
              TLS_CRT=$(kubectl get secret platform-wildcard-tls -n cert-manager -o jsonpath='{.data.tls\.crt}')
              TLS_KEY=$(kubectl get secret platform-wildcard-tls -n cert-manager -o jsonpath='{.data.tls\.key}')
              VAULT_TOKEN=$(cat /vault/token)
              curl -sf -X POST \
                -H "X-Vault-Token: ${VAULT_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"data\":{\"tls.crt\":\"${TLS_CRT}\",\"tls.key\":\"${TLS_KEY}\"}}" \
                http://vault.vault-system.svc:8200/v1/secret/data/platform/tls/cryptophys-wildcard
              echo "Cert synced to Vault OK"
            volumeMounts:
            - name: vault-token
              mountPath: /vault
              readOnly: true
          volumes:
          - name: vault-token
            secret:
              secretName: vault-eso-token
              items:
              - key: token
                path: token
