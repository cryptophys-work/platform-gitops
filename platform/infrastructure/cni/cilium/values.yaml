cluster:
  id: 1
  name: cryptophys-genesis
clustermesh:
  useAPIServer: true
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
ipam:
  mode: kubernetes
k8sServiceHost: 127.0.0.1
k8sServicePort: 7445
kubeProxyReplacement: true
svcSourceRangeCheck: false
hostServices:
  enabled: true
socketLB:
  enabled: true
  hostNamespaceOnly: true
extraConfig: {}
operator:
  replicas: 2
  priorityClassName: system-cluster-critical
encryption:
  enabled: true
  type: wireguard
  nodeEncryption: true
priorityClassName: system-node-critical
bpf:
  policyMapMax: 262144
  # 0.005 caused per-endpoint policy BPF maps to fill ("no space left on device") on
  # high-density platform-ha nodes; raise fraction of node RAM reserved for BPF maps.
  mapDynamicSizeRatio: 0.08
resources:
  requests:
    cpu: 100m
    memory: 1Gi
  limits:
    memory: 4Gi
securityContext:
  privileged: true
  capabilities:
    ciliumAgent:
    - CHOWN
    - KILL
    - NET_ADMIN
    - NET_RAW
    - IPC_LOCK
    - SYS_ADMIN
    - SYS_RESOURCE
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    cleanCiliumState:
    - NET_ADMIN
    - SYS_ADMIN
    - SYS_RESOURCE
