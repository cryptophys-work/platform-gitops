apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  releaseName: cilium
  interval: 1h
  suspend: false
  timeout: 15m
  chart:
    spec:
      chart: cilium
      version: 1.16.1
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    cni:
      exclusive: false
    cluster:
      name: cryptophys-genesis
      id: 1
    clustermesh:
      useAPIServer: true
      apiserver:
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
    kubeProxyReplacement: "true"
    hostServices:
      enabled: true
    externalIPs:
      enabled: true
    nodePort:
      enabled: true
    hostPort:
      enabled: true
    # devices: "wg0"
    l7Proxy: true
    routingMode: tunnel
    tunnelProtocol: vxlan
    autoDirectNodeRoutes: false
    ipv4NativeRoutingCIDR: 10.244.0.0/16
    enableIPv4Masquerade: true
    encryption:
      enabled: true
      type: wireguard
      nodeEncryption: true
    # Mutual authentication via SPIRE — makes SPIFFE/SVID fundamental
    authentication:
      mutual:
        spire:
          enabled: true
          install:
            enabled: false   # We manage SPIRE ourselves (35-spire stage)
          serverAddress: spire-server-api.spire-system.svc.cluster.local:8081
          trustDomain: cryptophys.work
          agentSocketPath: /run/spire/sockets/agent/agent.sock
          adminSocketPath: /run/spire/sockets/admin.sock
    mtu: 1370
    # KubePrism local LB (127.0.0.1:7445) — HA across all 3 CP nodes
    # Avoids SPOF from hardcoding a single CP node IP (was 10.8.0.2/cortex only)
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 7445
    extraEnv:
      - name: CRYPTOPHYS_CILIUM_ROLLOUT_AT
        value: "2026-03-31T14:17:56Z"
    hubble:
      enabled: true
      relay:
        enabled: true
        nodeSelector:
          workload.cryptophys.work/apps-core: "true"
        tolerations:
          - key: cryptophys.io/role
            operator: Equal
            value: llm-inference
            effect: NoSchedule
      ui:
        enabled: true
        nodeSelector:
          workload.cryptophys.work/apps-core: "true"
        tolerations:
          - key: cryptophys.io/role
            operator: Equal
            value: llm-inference
            effect: NoSchedule
    bpf:
      policyMapMax: 65536
      mapDynamicSizeRatio: 0.005
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        memory: 4Gi
    ipam:
      mode: kubernetes
    operator:
      replicas: 2
      nodeSelector:
        kubernetes.io/hostname: nexus-144-91-103-10
      tolerations:
        - key: ray-cluster
          operator: Equal
          value: "true"
          effect: NoSchedule
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
