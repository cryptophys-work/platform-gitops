apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  releaseName: cilium
  interval: 1h
  suspend: false
  timeout: 15m
  chart:
    spec:
      chart: cilium
      version: 1.16.1
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    remediation:
      retries: 3
  values:
    cni:
      exclusive: false
    cluster:
      name: cryptophys-genesis
      id: 1
    clustermesh:
      useAPIServer: true
      apiserver:
        nodeSelector:
          cryptophys.io/platform-ha: "true"
        tolerations:
          - key: cryptophys.io/pool
            operator: Equal
            value: platform-ha
            effect: NoSchedule
          - key: node.cilium.io/agent-not-ready
            operator: Exists
            effect: NoSchedule
    kubeProxyReplacement: "true"
    hostServices:
      enabled: true
    externalIPs:
      enabled: true
    nodePort:
      enabled: true
    hostPort:
      enabled: true
    # devices: "wg0"
    l7Proxy: true
    routingMode: tunnel
    tunnelProtocol: vxlan
    autoDirectNodeRoutes: false
    ipv4NativeRoutingCIDR: 10.244.0.0/16
    enableIPv4Masquerade: true
    encryption:
      enabled: true
      type: wireguard
      nodeEncryption: true
    # Mutual authentication via SPIRE — makes SPIFFE/SVID fundamental
    authentication:
      mutual:
        spire:
          enabled: true
          install:
            enabled: false   # We manage SPIRE ourselves (35-spire stage)
          serverAddress: spire-server-api.spire-system.svc.cluster.local:8081
          trustDomain: cryptophys.work
          agentSocketPath: /run/spire/sockets/agent/agent.sock
          adminSocketPath: /run/spire/sockets/admin.sock
    mtu: 1370
    # Route Cilium directly to the apiserver while node-local KubePrism is unstable.
    k8sServiceHost: 157.173.120.200
    k8sServicePort: 6443
    extraEnv:
      - name: CRYPTOPHYS_CILIUM_ROLLOUT_AT
        value: "2026-04-10T07:45:31Z"
    rollOutCiliumPods: true
    hubble:
      enabled: true
      relay:
        enabled: true
        nodeSelector:
          cryptophys.io/platform-ha: "true"
        tolerations:
          - key: cryptophys.io/pool
            operator: Equal
            value: platform-ha
            effect: NoSchedule
          - key: node.cilium.io/agent-not-ready
            operator: Exists
            effect: NoSchedule
      ui:
        enabled: true
        nodeSelector:
          cryptophys.io/platform-ha: "true"
        tolerations:
          - key: cryptophys.io/pool
            operator: Equal
            value: platform-ha
            effect: NoSchedule
          - key: node.cilium.io/agent-not-ready
            operator: Exists
            effect: NoSchedule
    bpf:
      policyMapMax: 65536
      mapDynamicSizeRatio: 0.005
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        memory: 6Gi
    ipam:
      mode: kubernetes
    k8s:
      requireIPv4PodCIDR: true
    operator:
      replicas: 2
      rollOutPods: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - thalamus-217-76-59-241
                      - cerebellum-161-97-117-96
      tolerations:
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
        - key: ray-cluster
          operator: Equal
          value: "true"
          effect: NoSchedule
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
