apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  releaseName: cilium
  interval: 1h
  suspend: false
  timeout: 15m
  chart:
    spec:
      chart: cilium
      version: 1.16.1
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    preserveValues: false
    remediation:
      retries: 3
  values:
    cni:
      exclusive: false
    cluster:
      name: cryptophys-genesis
      id: 1
    clustermesh:
      useAPIServer: true
      apiserver:
        nodeSelector:
          cryptophys.io/platform-ha: "true"
        tolerations:
          - operator: Exists
    kubeProxyReplacement: "true"
    hostServices:
      enabled: true
    socketLB:
      enabled: true
      hostNamespaceOnly: true
    # Disable high-volume BPF event streams that are useful for deep tracing but
    # expensive on memory/CPU under sustained control-plane churn.
    extraConfig:
      bpf-events-drop-enabled: "false"
      bpf-events-policy-verdict-enabled: "false"
      bpf-events-trace-enabled: "false"
    externalIPs:
      enabled: true
    nodePort:
      enabled: true
    hostPort:
      enabled: true
    # devices: "wg0"
    l7Proxy: true
    routingMode: tunnel
    tunnelProtocol: vxlan
    autoDirectNodeRoutes: false
    ipv4NativeRoutingCIDR: 10.244.0.0/16
    enableIPv4Masquerade: true
    encryption:
      enabled: true
      type: wireguard
      nodeEncryption: true
    svcSourceRangeCheck: false
    # SPIRE mutual auth: re-enable when spire-server is Ready and agents are healthy (reduces agent crash pressure on dense nodes).
    authentication:
      mutual:
        spire:
          enabled: false
          install:
            enabled: false   # We manage SPIRE ourselves (35-spire stage)
          serverAddress: spire-server-api.spire-system.svc.cluster.local:8081
          trustDomain: cryptophys.work
          agentSocketPath: /run/spire/sockets/agent/agent.sock
          adminSocketPath: /run/spire/sockets/admin.sock
    mtu: 1370
    # Use Talos KubePrism local HA proxy on every node instead of an external control-plane endpoint.
    # reachable from all nodes.
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 7445
    extraEnv:
      - name: CRYPTOPHYS_CILIUM_ROLLOUT_AT
        value: "2026-04-10T07:45:31Z"
    rollOutCiliumPods: true
    hubble:
      enabled: true
      relay:
        enabled: true
        nodeSelector:
          cryptophys.io/platform-ha: "true"
        tolerations:
          - operator: Exists
      ui:
        enabled: true
        nodeSelector:
          cryptophys.io/platform-ha: "true"
        tolerations:
          - operator: Exists
    bpf:
      policyMapMax: 262144
      mapDynamicSizeRatio: 0.08
    # Dense platform-ha nodes: BPF restore + many endpoints can exceed default liveness window.
    startupProbe:
      failureThreshold: 180
      periodSeconds: 2
    livenessProbe:
      failureThreshold: 20
      periodSeconds: 45
    readinessProbe:
      failureThreshold: 6
      periodSeconds: 15
    resources:
      requests:
        cpu: 100m
        memory: 1Gi
      limits:
        memory: 6Gi
    ipam:
      mode: kubernetes
    k8s:
      requireIPv4PodCIDR: true
    operator:
      replicas: 2
      rollOutPods: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
      tolerations:
        - operator: Exists
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
