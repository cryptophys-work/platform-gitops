apiVersion: cilium.io/v2
kind: CiliumNodeConfig
metadata:
  name: nexus-bpf-map-ratio
  namespace: kube-system
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/hostname: nexus-144-91-103-10
  defaults:
    # Nexus is the highest-density worker. Keep the per-node override smaller than
    # the cluster default, but raise it enough to avoid local policy-map exhaustion.
    bpf-map-dynamic-size-ratio: "0.0002"
    bpf-policy-map-max: "32768"
