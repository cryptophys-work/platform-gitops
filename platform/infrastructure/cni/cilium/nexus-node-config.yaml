apiVersion: cilium.io/v2
kind: CiliumNodeConfig
metadata:
  name: nexus-bpf-map-ratio
  namespace: kube-system
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/hostname: nexus-144-91-103-10
  defaults:
    # Nexus is the highest-density worker (220 max-pods, kube-proxy replacement,
    # WireGuard). Match cluster Helm bpf.mapDynamicSizeRatio so BPF maps scale with RAM.
    bpf-map-dynamic-size-ratio: "0.08"
    bpf-policy-map-max: "262144"
