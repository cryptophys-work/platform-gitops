apiVersion: cilium.io/v2
kind: CiliumNodeConfig
metadata:
  name: nexus-bpf-map-ratio
  namespace: kube-system
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/hostname: nexus-144-91-103-10
  defaults:
    # Nexus is the highest-density worker and still exhausts local policy maps.
    # Pin it to the cluster-wide ceiling instead of a smaller per-node override.
    bpf-map-dynamic-size-ratio: "0.005"
    bpf-policy-map-max: "65536"
