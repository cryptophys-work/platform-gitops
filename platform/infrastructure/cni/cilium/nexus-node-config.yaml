apiVersion: cilium.io/v2
kind: CiliumNodeConfig
metadata:
  name: nexus-bpf-map-ratio
  namespace: kube-system
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/hostname: nexus-144-91-103-10
  defaults:
    # Nexus is the highest-density worker and its cilium-agent is still OOMKilled
    # under the previous per-node override. Shrink dynamic map sizing further and
    # lower the per-node policy-map ceiling so the agent can actually become Ready
    # and clear node.cilium.io/agent-not-ready on this node.
    bpf-map-dynamic-size-ratio: "0.0001"
    bpf-policy-map-max: "16384"
