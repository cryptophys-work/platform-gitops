apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: apps-system
data:
  resource.customizations.health.apps_Deployment: |
    hs = {}
    if obj.status == nil then
      hs.status = "Healthy"
      hs.message = "Status not cached"
      return hs
    end
    local replicas = 1
    if obj.spec ~= nil and obj.spec.replicas ~= nil then
      replicas = obj.spec.replicas
    end
    if replicas == 0 then
      hs.status = "Healthy"
      hs.message = "Scaled to zero"
      return hs
    end
    local ready = obj.status.readyReplicas or 0
    local available = obj.status.availableReplicas or 0
    if ready >= replicas and available >= replicas then
      hs.status = "Healthy"
      hs.message = tostring(ready) .. "/" .. tostring(replicas) .. " replicas ready"
      return hs
    end
    hs.status = "Progressing"
    hs.message = tostring(ready) .. "/" .. tostring(replicas) .. " replicas ready"
    return hs
