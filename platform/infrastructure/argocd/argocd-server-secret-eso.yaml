apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-server-secret
  namespace: apps-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: argocd
    cryptophys.io/anti-regression: "true"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: server.secretkey
      remoteRef:
        key: apps/argocd/server
        property: server_secretkey
