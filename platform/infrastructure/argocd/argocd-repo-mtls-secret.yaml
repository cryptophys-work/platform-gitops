# ArgoCD repository secret — mTLS via SPIRE SVIDs (no username/password)
# Git client cert is provided by GIT_SSL_CERT/KEY env vars in repo-server (from spiffe-helper sidecar)
# nginx auth-tls-verify-client: required validates the SPIFFE cert and injects X-Forwarded-User
apiVersion: v1
kind: Secret
metadata:
  name: apps-gitops-repo-mtls
  namespace: apps-system
  labels:
    argocd.argoproj.io/secret-type: repository
    cryptophys.io/flux-managed: "true"
stringData:
  type: git
  url: https://gitea-internal.cryptophys.work/cryptophys-work/apps-gitops.git
  insecure: "false"
  # No username/password — mTLS via SPIRE-issued X.509 SVID (GIT_SSL_CERT/KEY env vars)
  # TLS verification uses GIT_SSL_CAINFO=/tmp/spiffe-certs/bundle.pem
