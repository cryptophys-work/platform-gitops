apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: apps-gitops-repo-internal
  namespace: apps-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: apps-gitops-repo-internal
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: "https://giteainternal.cryptophys.work/cryptophys-work/apps-gitops.git"
        insecure: "false"
        forceHttpBasicAuth: "true"
        username: "{{ .username }}" # gitleaks:allow
        password: "{{ .password }}" # gitleaks:allow
  data:
    - secretKey: username
      remoteRef:
        key: apps/gitea/admin
        property: username
    - secretKey: password
      remoteRef:
        key: apps/gitea/admin
        property: password
