apiVersion: batch/v1
kind: CronJob
metadata:
  name: argocd-repo-auth-preflight
  namespace: apps-system
  labels:
    app.kubernetes.io/name: argocd-repo-auth-preflight
    app.kubernetes.io/instance: argocd-repo-auth-preflight
    app.kubernetes.io/managed-by: flux
    cryptophys.io/domain: platform
    cryptophys.io/component: argocd
    cryptophys.io/layer: platform
    cryptophys.io/managed-by: flux
  annotations:
    cryptophys.io/anti-regression: "true"
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: argocd-repo-auth-preflight
            app.kubernetes.io/instance: argocd-repo-auth-preflight
            app.kubernetes.io/managed-by: flux
            cryptophys.io/domain: platform
            cryptophys.io/component: argocd
            cryptophys.io/layer: platform
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: verify-repo-auth
              image: docker.io/curlimages/curl:8.11.0
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  check_repo() {
                    name="$1"
                    url="$2"
                    user="$3"
                    pass="$4"
                    headers_file="/tmp/${name}.headers"
                    body_file="/tmp/${name}.body"

                    code="$(curl -sS -o "${body_file}" -D "${headers_file}" \
                      -w '%{http_code}' \
                      -u "${user}:${pass}" \
                      "${url}/info/refs?service=git-upload-pack")"

                    location="$(awk 'BEGIN{IGNORECASE=1} /^location:/ {sub(/\r$/, "", $2); print $2; exit}' "${headers_file}")"

                    if [ "${code}" != "200" ]; then
                      echo "[argocd-repo-auth-preflight] ${name}: unexpected status ${code}"
                      if [ -n "${location}" ]; then
                        echo "[argocd-repo-auth-preflight] ${name}: redirect location ${location}"
                      fi
                      return 1
                    fi

                    if grep -qi '^location: .*change_password' "${headers_file}" || grep -qi '^location: .*user/login' "${headers_file}"; then
                      echo "[argocd-repo-auth-preflight] ${name}: interactive redirect detected"
                      cat "${headers_file}"
                      return 1
                    fi

                    echo "[argocd-repo-auth-preflight] ${name}: OK (${code})"
                  }

                  check_repo "headless" "${HEADLESS_URL}" "${HEADLESS_USERNAME}" "${HEADLESS_PASSWORD}"
                  check_repo "internal" "${INTERNAL_URL}" "${INTERNAL_USERNAME}" "${INTERNAL_PASSWORD}"
              env:
                - name: HEADLESS_URL
                  valueFrom:
                    secretKeyRef:
                      name: apps-gitops-repo-headless
                      key: url
                - name: HEADLESS_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: apps-gitops-repo-headless
                      key: username
                - name: HEADLESS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: apps-gitops-repo-headless
                      key: password
                - name: INTERNAL_URL
                  valueFrom:
                    secretKeyRef:
                      name: apps-gitops-repo-internal
                      key: url
                - name: INTERNAL_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: apps-gitops-repo-internal
                      key: username
                - name: INTERNAL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: apps-gitops-repo-internal
                      key: password
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                privileged: false
                readOnlyRootFilesystem: false
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop:
                    - ALL
