apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apps-system
resources:
  - apps-bootstrap.yaml
  - argocd-repo-credentials-eso.yaml
  - argocd-server-secret-eso.yaml
  - redis-ha/
  - spiffe-helper-config.yaml
  - release.yaml
patches:
  - path: argocd-cm-health-patch.yaml
    target:
      kind: ConfigMap
      name: argocd-cm
