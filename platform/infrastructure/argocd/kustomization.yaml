apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apps-system
resources:
  - argocd-repo-credentials-eso.yaml
  - argocd-server-secret-eso.yaml
  - argocd-admin-password-hash-secret.yaml
  - argocd-secret-base.yaml
  - argocd__pv_retain_job.yaml
  - redis-ha
  - storageclass-longhorn-retain.yaml
  - spiffe-helper-config.yaml
  - release.yaml
patches:
  - path: argocd-cm-health-patch.yaml
    target:
      kind: ConfigMap
      name: argocd-cm
  - path: argocd-secret-bcrypt-merge-patch.yaml
    target:
      kind: Secret
      name: argocd-secret
