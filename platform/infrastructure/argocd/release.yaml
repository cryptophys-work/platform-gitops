apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: argocd
  namespace: apps-system
spec:
  releaseName: argocd
  interval: 1h
  timeout: 20m
  chart:
    spec:
      chart: argo-cd
      version: 9.4.1
      sourceRef:
        kind: HelmRepository
        name: argoproj
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    crds:
      install: false
    configs:
      params:
        server.insecure: "true"
    global:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        cryptophys.io/tier: platform
    controller:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
    server:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
    repoServer:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      # SPIRE-based certificate authentication for Git operations
      env:
        - name: GIT_SSL_CERT
          value: /certs/svid.pem
        - name: GIT_SSL_KEY
          value: /certs/svid_key.pem
        - name: GIT_SSL_CAINFO
          value: /certs/bundle.pem
      volumes:
        - name: spiffe-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
        - name: git-certs
          emptyDir: {}
      volumeMounts:
        - name: git-certs
          mountPath: /certs
          readOnly: true
      # Sidecar to extract certificates from SPIRE Workload API socket
      extraContainers:
        - name: spiffe-helper
          image: ghcr.io/spiffe/spiffe-helper:0.9.0
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
            - name: git-certs
              mountPath: /certs
          env:
            - name: SPIFFE_ENDPOINT_SOCKET
              value: unix:///spiffe-workload-api/agent/agent.sock
          command:
            - /bin/sh
            - -c
            - |
              # Create spiffe-helper config inline
              cat > /tmp/helper.conf <<'EOF'
              agent_address = "/spiffe-workload-api/agent/agent.sock"
              cmd = ""
              cmd_args = ""
              cert_dir = "/certs"
              renew_signal = ""
              svid_file_name = "svid.pem"
              svid_key_file_name = "svid_key.pem"
              svid_bundle_file_name = "bundle.pem"
              EOF
              echo "$(date): Starting SPIFFE helper with Workload API socket"
              exec /usr/bin/spiffe-helper -config /tmp/helper.conf
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
    applicationSet:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
    redis:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
    notifications:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
    dex:
      enabled: false
