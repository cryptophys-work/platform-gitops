apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: argocd
  namespace: apps-system
spec:
  releaseName: argocd
  interval: 1h
  timeout: 20m
  chart:
    spec:
      chart: argo-cd
      version: 9.4.1
      sourceRef:
        kind: HelmRepository
        name: argoproj
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    crds:
      install: false
    configs:
      params:
        server.insecure: "true"
    global:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        cryptophys.io/tier: platform
    controller:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
    server:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
    repoServer:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      # SPIRE-based certificate authentication for Git operations
      env:
        - name: GIT_SSL_CERT
          value: /certs/svid.pem
        - name: GIT_SSL_KEY
          value: /certs/svid_key.pem
        - name: GIT_SSL_CAINFO
          value: /certs/bundle.pem
      volumes:
        - name: spiffe-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
        - name: git-certs
          emptyDir: {}
      volumeMounts:
        - name: git-certs
          mountPath: /certs
          readOnly: true
      # Sidecar to extract certificates from SPIRE CSI volume to emptyDir
      extraContainers:
        - name: spiffe-helper
          image: busybox:1.36
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
            - name: git-certs
              mountPath: /certs
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "SPIRE certificate extraction sidecar started"
              while true; do
                if [ -f /spiffe-workload-api/svid.pem ]; then
                  cp /spiffe-workload-api/svid.pem /certs/svid.pem
                  cp /spiffe-workload-api/svid_key.pem /certs/svid_key.pem
                  cp /spiffe-workload-api/bundle.pem /certs/bundle.pem
                  echo "$(date): Certificates updated"
                else
                  echo "$(date): Waiting for SPIRE certificates..."
                fi
                sleep 60
              done
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 20m
              memory: 32Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
    applicationSet:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
    redis:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
    notifications:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
    dex:
      enabled: false
