apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: argocd
  namespace: apps-system
spec:
  releaseName: argocd
  interval: 1h
  timeout: 30m
  chart:
    spec:
      chart: argo-cd
      version: 9.4.1
      sourceRef:
        kind: HelmRepository
        name: argoproj
        namespace: flux-system
  install:
    timeout: 30m
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    timeout: 30m
    disableWait: true
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    crds:
      install: true
      keep: true
    configs:
      params:
        server.insecure: "true"
      cm:
        # Enable non-expiring API token for drift-sentinel + automation tooling
        accounts.admin: "apiKey, login"
        cluster.inClusterEnabled: "true"
        # Exclude high-churn Trivy report CRDs from ArgoCD cache/diff to avoid
        # intermittent cache sync timeouts on large report sets.
        resource.exclusions: |
          - apiGroups:
              - aquasecurity.github.io
            kinds:
              - SbomReport
              - VulnerabilityReport
              - ClusterSbomReport
              - ClusterVulnerabilityReport
            clusters:
              - "*"
        resource.customizations.ignoreDifferences.all: |
          jsonPointers:
            - /metadata/annotations/argocd.argoproj.io~1tracking-id
            - /metadata/annotations/cryptophys.io~1gitops-source
        resource.customizations.ignoreDifferences.apps_Deployment: |
          jsonPointers:
            - /metadata/annotations/argocd.argoproj.io~1tracking-id
            - /metadata/annotations/cryptophys.io~1gitops-source
            - /metadata/annotations/kyverno.io~1verify-images
        resource.customizations.health.apps_Deployment: |
          hs = {}
          if obj.status == nil then
            hs.status = "Healthy"
            hs.message = "Status not cached (ignoreResourceUpdates)"
            return hs
          end
          if obj.status.observedGeneration ~= nil and obj.metadata ~= nil and obj.metadata.generation ~= nil then
            if obj.status.observedGeneration < obj.metadata.generation then
              hs.status = "Progressing"
              hs.message = "Waiting for rollout"
              return hs
            end
          end
          if obj.spec ~= nil and obj.spec.replicas ~= nil and obj.spec.replicas == 0 then
            hs.status = "Healthy"
            hs.message = "Scaled to zero"
            return hs
          end
          local replicas = obj.spec and obj.spec.replicas or 1
          local ready = obj.status.readyReplicas or 0
          local available = obj.status.availableReplicas or 0
          if ready >= replicas and available >= replicas then
            hs.status = "Healthy"
            hs.message = tostring(ready) .. "/" .. tostring(replicas) .. " replicas ready"
            return hs
          end
          hs.status = "Progressing"
          hs.message = tostring(ready) .. "/" .. tostring(replicas) .. " replicas ready"
          return hs
        resource.customizations.health.gateway.envoyproxy.io_SecurityPolicy: |
          hs = {}
          hs.status = "Healthy"
          if obj.status ~= nil then
            for _, c in ipairs(obj.status.ancestors or {}) do
              for _, condition in ipairs(c.conditions or {}) do
                if condition.type == "Accepted" and condition.status == "False" then
                  hs.status = "Degraded"
                  hs.message = condition.message
                  return hs
                end
              end
            end
          end
          hs.message = "Policy accepted"
          return hs
    global:
      tolerations:
        - key: "cryptophys.io/role"
          operator: "Equal"
          value: "llm-inference"
          effect: "NoSchedule"
        - key: "cryptophys.io/storage-only"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node.cilium.io/agent-not-ready"
          operator: "Exists"
          effect: "NoSchedule"
    controller:
      dynamicClusterDistribution: true
      tolerations:
        # Allow controller to schedule on medulla (llm-inference taint) when compute nodes are full
        - key: "cryptophys.io/role"
          operator: "Equal"
          value: "llm-inference"
          effect: "NoSchedule"
      pdb:
        enabled: true
        minAvailable: 1
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - nexus-144-91-103-10
                - thalamus-217-76-59-241
                - cerebellum-161-97-117-96
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: argocd-application-controller
              topologyKey: kubernetes.io/hostname
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 2000m
          memory: 4Gi
    server:
      replicas: 3
      pdb:
        enabled: true
        minAvailable: 2
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - nexus-144-91-103-10
                - thalamus-217-76-59-241
                - cerebellum-161-97-117-96
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: argocd-server
              topologyKey: kubernetes.io/hostname
      resources:
        requests:
          cpu: 50m
          memory: 16Mi
        limits:
          cpu: 250m
          memory: 256Mi
    repoServer:
      replicas: 3
      pdb:
        enabled: true
        minAvailable: 2
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - nexus-144-91-103-10
                - thalamus-217-76-59-241
                - cerebellum-161-97-117-96
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: argocd-repo-server
              topologyKey: kubernetes.io/hostname
      resources:
        requests:
          cpu: 50m
          memory: 16Mi
        limits:
          cpu: 500m
          memory: 512Mi
      # Certificate-based Git authentication using SPIRE-issued certificates
      env:
        - name: GIT_SSL_CERT
          value: /tmp/spiffe-certs/svid.pem
        - name: GIT_SSL_KEY
          value: /tmp/spiffe-certs/svid_key.pem
        - name: GIT_SSL_CAINFO
          value: /tmp/spiffe-certs/svid_bundle.pem
        - name: GIT_SSL_NO_VERIFY
          value: "false"
      volumes:
        - name: spiffe-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
        - name: spiffe-certs
          emptyDir:
            medium: Memory
            sizeLimit: 10Mi
        - name: spiffe-helper-config
          configMap:
            name: argocd-spiffe-helper-config
      volumeMounts:
        - name: spiffe-workload-api
          mountPath: /spiffe-workload-api
          readOnly: true
        - name: spiffe-certs
          mountPath: /tmp/spiffe-certs
      # Sidecar: spiffe-helper extracts certs from CSI volume to filesystem for Git client
      extraContainers:
        - name: spiffe-helper
          image: ghcr.io/spiffe/spiffe-helper:0.11.0
          imagePullPolicy: IfNotPresent
          args:
            - -config
            - /etc/spiffe-helper/helper.conf
          resources:
            requests:
              cpu: 10m
              memory: 8Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
            - name: spiffe-certs
              mountPath: /tmp/spiffe-certs
            - name: spiffe-helper-config
              mountPath: /etc/spiffe-helper
              readOnly: true
    applicationSet:
      replicas: 1
      pdb:
        enabled: true
        minAvailable: 1
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - nexus-144-91-103-10
                - thalamus-217-76-59-241
                - cerebellum-161-97-117-96
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: argocd-applicationset-controller
              topologyKey: kubernetes.io/hostname
      resources:
        requests:
          cpu: 50m
          memory: 16Mi
        limits:
          cpu: 250m
          memory: 256Mi
    redis:
      enabled: true
    redis-ha:
      enabled: false
    notifications:
      pdb:
        enabled: true
        minAvailable: 1
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - nexus-144-91-103-10
                - thalamus-217-76-59-241
                - cerebellum-161-97-117-96
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: argocd-notifications-controller
                topologyKey: kubernetes.io/hostname
      resources:
        requests:
          cpu: 25m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 128Mi
    redisSecretInit:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      tolerations:
        - key: "cryptophys.io/role"
          operator: "Equal"
          value: "llm-inference"
          effect: "NoSchedule"
        - key: "cryptophys.io/storage-only"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node.cilium.io/agent-not-ready"
          operator: "Exists"
          effect: "NoSchedule"
    dex:
      enabled: false
