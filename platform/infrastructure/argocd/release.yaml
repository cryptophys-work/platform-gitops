apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argocd
  namespace: apps-system
spec:
  releaseName: argocd
  interval: 1h
  timeout: 30m
  chart:
    spec:
      chart: argo-cd
      version: 9.4.1
      sourceRef:
        kind: HelmRepository
        name: argoproj
        namespace: flux-system
  install:
    timeout: 30m
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    timeout: 30m
    disableWait: true
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    imagePullSecrets:
      - registry-cryptophys-work-auth
    crds:
      install: true
      keep: true
    configs:
      params:
        server.insecure: "true"
        # Keep Argo's live-state fan-out modest while the apiserver is still
        # recovering from watch/list timeout bursts.
        controller.status.processors: "5"
        controller.operation.processors: "2"
        controller.kubectl.parallelism.limit: "4"
      cm:
        # Enable non-expiring API token for drift-sentinel + automation tooling
        accounts.admin: "apiKey, login"
        cluster.inClusterEnabled: "true"
        timeout.reconciliation: 300s
        # Exclude high-churn Trivy report CRDs from ArgoCD cache/diff to avoid
        # intermittent cache sync timeouts on large report sets.
        resource.exclusions: |
          - apiGroups:
              - aquasecurity.github.io
            kinds:
              - SbomReport
              - VulnerabilityReport
              - ClusterSbomReport
              - ClusterVulnerabilityReport
            clusters:
              - "*"
          - apiGroups:
              - reports.kyverno.io
            kinds:
              - AdmissionReport
              - BackgroundScanReport
              - ClusterAdmissionReport
              - ClusterBackgroundScanReport
              - EphemeralReport
              - ClusterEphemeralReport
            clusters:
              - "*"
          - apiGroups:
              - wgpolicyk8s.io
            kinds:
              - PolicyReport
              - ClusterPolicyReport
            clusters:
              - "*"
          - apiGroups:
              - kyverno.io
            kinds:
              - UpdateRequest
            clusters:
              - "*"
        resource.customizations.ignoreDifferences.all: |
          jsonPointers:
            - /metadata/annotations/argocd.argoproj.io~1tracking-id
            - /metadata/annotations/cryptophys.io~1gitops-source
        resource.customizations.ignoreDifferences.apps_Deployment: |
          jsonPointers:
            - /metadata/annotations/argocd.argoproj.io~1tracking-id
            - /metadata/annotations/cryptophys.io~1gitops-source
            - /metadata/annotations/kyverno.io~1verify-images
        resource.customizations.health.apps_Deployment: |
          hs = {}
          if obj.status == nil then
            hs.status = "Healthy"
            hs.message = "Status not cached (ignoreResourceUpdates)"
            return hs
          end
          if obj.status.observedGeneration ~= nil and obj.metadata ~= nil and obj.metadata.generation ~= nil then
            if obj.status.observedGeneration < obj.metadata.generation then
              hs.status = "Progressing"
              hs.message = "Waiting for rollout"
              return hs
            end
          end
          if obj.spec ~= nil and obj.spec.replicas ~= nil and obj.spec.replicas == 0 then
            hs.status = "Healthy"
            hs.message = "Scaled to zero"
            return hs
          end
          local replicas = obj.spec and obj.spec.replicas or 1
          local ready = obj.status.readyReplicas or 0
          local available = obj.status.availableReplicas or 0
          if ready >= replicas and available >= replicas then
            hs.status = "Healthy"
            hs.message = tostring(ready) .. "/" .. tostring(replicas) .. " replicas ready"
            return hs
          end
          hs.status = "Progressing"
          hs.message = tostring(ready) .. "/" .. tostring(replicas) .. " replicas ready"
          return hs
        resource.customizations.health.gateway.envoyproxy.io_SecurityPolicy: |
          hs = {}
          hs.status = "Healthy"
          if obj.status ~= nil then
            for _, c in ipairs(obj.status.ancestors or {}) do
              for _, condition in ipairs(c.conditions or {}) do
                if condition.type == "Accepted" and condition.status == "False" then
                  hs.status = "Degraded"
                  hs.message = condition.message
                  return hs
                end
              end
            end
          end
          hs.message = "Policy accepted"
          return hs

    controller:
      # The v3 dynamic shard heartbeat makes /healthz depend on writes to the
      # shard ConfigMap. Under apiserver transport resets that keeps both
      # replicas perpetually unready and blocks fresh syncs from becoming current.
      dynamicClusterDistribution: false
      tolerations:
         - key: "node.cilium.io/agent-not-ready"
           operator: "Exists"
           effect: "NoSchedule"
         - key: "ray-head"
           operator: "Equal"
           value: "true"
           effect: "NoSchedule"
         - key: "ray-cluster"
           operator: "Equal"
           value: "true"
           effect: "NoSchedule"
         - key: "cryptophys.io/pool"
           operator: "Equal"
           value: "platform-ha"
           effect: "NoSchedule"
         - key: "cryptophys.io/pool"
           operator: "Equal"
           value: "apps-ha"
           effect: "NoSchedule"
         - key: "daemonset"
           operator: "Equal"
           value: "true"
           effect: "NoSchedule"
         - key: "bridge-system"
           operator: "Equal"
           value: "true"
           effect: "NoSchedule"
         - key: "dao-system"
           operator: "Equal"
           value: "true"
           effect: "NoSchedule"
      pdb:
        enabled: true
        minAvailable: 1
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - cerebellum-161-97-117-96
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - thalamus-217-76-59-241
            - weight: 20
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - nexus-144-91-103-10
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: argocd-application-controller
              topologyKey: kubernetes.io/hostname
      # Prefer one stable controller over two perpetually unready replicas until
      # control-plane/API latency is consistently back within Argo probe budgets.
      replicas: 1
      resources:
        requests:
          cpu: 250m
          memory: 768Mi
        limits:
          cpu: 2000m
          memory: 4Gi
    server:
      replicas: 2
      nodeSelector: {}
      deploymentStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      tolerations:
        - key: "ray-cluster"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "cryptophys.io/pool"
          operator: "Equal"
          value: "platform-ha"
          effect: "NoSchedule"
        - key: "ray-head"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "node.cilium.io/agent-not-ready"
          operator: "Exists"
          effect: "NoSchedule"
      pdb:
        enabled: true
        minAvailable: 1
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - cerebellum-161-97-117-96
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - thalamus-217-76-59-241
            - weight: 20
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - nexus-144-91-103-10
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: argocd-server
              topologyKey: kubernetes.io/hostname
      resources:
        requests:
          cpu: 50m
          memory: 4Mi
        limits:
          cpu: 250m
          memory: 256Mi
    repoServer:
      replicas: 2
      nodeSelector: {}
      deploymentStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      tolerations:
        - key: "ray-cluster"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "cryptophys.io/pool"
          operator: "Equal"
          value: "platform-ha"
          effect: "NoSchedule"
        - key: "ray-head"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "node.cilium.io/agent-not-ready"
          operator: "Exists"
          effect: "NoSchedule"
      pdb:
        enabled: true
        minAvailable: 1
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - cerebellum-161-97-117-96
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - thalamus-217-76-59-241
            - weight: 20
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - nexus-144-91-103-10
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: argocd-repo-server
              topologyKey: kubernetes.io/hostname
      resources:
        requests:
          cpu: 50m
          memory: 4Mi
        limits:
          cpu: 500m
          memory: 512Mi
      # Certificate-based Git authentication using SPIRE-issued certificates
      env:
        - name: GIT_SSL_CERT
          value: /tmp/spiffe-certs/svid.pem
        - name: GIT_SSL_KEY
          value: /tmp/spiffe-certs/svid_key.pem
        - name: GIT_SSL_CAINFO
          value: /tmp/spiffe-certs/svid_bundle.pem
        - name: GIT_SSL_NO_VERIFY
          value: "false"
      volumes:
        - name: spiffe-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
        - name: spiffe-certs
          emptyDir:
            medium: Memory
            sizeLimit: 10Mi
        - name: spiffe-helper-config
          configMap:
            name: argocd-spiffe-helper-config
      volumeMounts:
        - name: spiffe-workload-api
          mountPath: /spiffe-workload-api
          readOnly: true
        - name: spiffe-certs
          mountPath: /tmp/spiffe-certs
      # Sidecar: spiffe-helper extracts certs from CSI volume to filesystem for Git client
      extraContainers:
        - name: spiffe-helper
          image: registry.cryptophys.work/docker-proxy/spiffe/spiffe-helper:0.11.0
          imagePullPolicy: IfNotPresent
          args:
            - -config
            - /etc/spiffe-helper/helper.conf
          resources:
            requests:
              cpu: 10m
              memory: 4Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
            - name: spiffe-certs
              mountPath: /tmp/spiffe-certs
            - name: spiffe-helper-config
              mountPath: /etc/spiffe-helper
              readOnly: true
    applicationSet:
      replicas: 2
      nodeSelector: {}
      tolerations:
        - key: "ray-cluster"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "cryptophys.io/pool"
          operator: "Equal"
          value: "platform-ha"
          effect: "NoSchedule"
      pdb:
        enabled: true
        minAvailable: 1
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - cerebellum-161-97-117-96
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - thalamus-217-76-59-241
            - weight: 20
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - nexus-144-91-103-10
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: argocd-applicationset-controller
              topologyKey: kubernetes.io/hostname
      resources:
        requests:
          cpu: 50m
          memory: 4Mi
        limits:
          cpu: 250m
          memory: 256Mi
    redis:
      enabled: true
    redis-ha:
      enabled: false
    notifications:
      replicas: 2
      nodeSelector: {}
      tolerations:
        - key: "ray-cluster"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "cryptophys.io/pool"
          operator: "Equal"
          value: "platform-ha"
          effect: "NoSchedule"
      pdb:
        enabled: true
        minAvailable: 1
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - cerebellum-161-97-117-96
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - thalamus-217-76-59-241
            - weight: 20
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - nexus-144-91-103-10
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: argocd-notifications-controller
                topologyKey: kubernetes.io/hostname
      resources:
        requests:
          cpu: 25m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 128Mi
    redisSecretInit:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      tolerations:
        - key: "node.cilium.io/agent-not-ready"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "ray-head"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "ray-cluster"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "cryptophys.io/pool"
          operator: "Equal"
          value: "platform-ha"
          effect: "NoSchedule"
        - key: "cryptophys.io/pool"
          operator: "Equal"
          value: "apps-ha"
          effect: "NoSchedule"
        - key: "daemonset"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "bridge-system"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
        - key: "dao-system"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
    dex:
      enabled: false
