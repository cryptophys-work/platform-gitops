apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: argocd
  namespace: apps-system
spec:
  releaseName: argocd
  interval: 1h
  timeout: 30m
  chart:
    spec:
      chart: argo-cd
      version: 9.4.1
      sourceRef:
        kind: HelmRepository
        name: argoproj
        namespace: flux-system
  install:
    timeout: 30m
    remediation:
      retries: 3
  upgrade:
    timeout: 30m
    cleanupOnFail: true
    remediation:
      retries: 3
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: argocd-repo-server
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: argocd-repo-server
              spec:
                template:
                  spec:
                    volumes:
                      - name: picoclaw-guard-script
                        configMap:
                          name: argocd-picoclaw-guard-script
                          defaultMode: 0444
                    containers:
                      - name: picoclaw-sentinel
                        image: registry.cryptophys.work/core/picoclaw@sha256:a10dbeb63111757550b121e34299776fa165f92339d1e946d122765f7b3fa071
                        imagePullPolicy: IfNotPresent
                        env:
                          - name: TARGET_NAME
                            value: argocd-repo-server
                          - name: MEM_THRESHOLD_MB
                            value: "512"
                          - name: CHECK_INTERVAL
                            value: "20"
                          - name: HEALTH_PORT
                            value: "8088"
                          - name: PROBE_TIMEOUT_SECONDS
                            value: "5"
                          - name: PROBE_FAILURE_THRESHOLD
                            value: "3"
                          - name: PROBE_URLS
                            value: http://127.0.0.1:8084/metrics,http://gitops-gitea-http.gitops-system.svc.cluster.local:3000/cryptophys-work/apps-gitops.git/info/refs?service=git-upload-pack,http://gitea-http-internal.gitops-system.svc.cluster.local:3000/cryptophys-work/apps-gitops.git/info/refs?service=git-upload-pack
                          - name: NATS_URL
                            value: nats://mesh-agent:Pss3IVGahHalq9x6VmGBjq3u@mesh-broker-client.mesh-system.svc.cluster.local:4222
                        ports:
                          - name: picoclaw-http
                            containerPort: 8088
                        readinessProbe:
                          httpGet:
                            path: /readyz
                            port: 8088
                          initialDelaySeconds: 15
                          periodSeconds: 15
                          timeoutSeconds: 3
                          failureThreshold: 3
                        livenessProbe:
                          httpGet:
                            path: /healthz
                            port: 8088
                          initialDelaySeconds: 20
                          periodSeconds: 20
                          timeoutSeconds: 3
                          failureThreshold: 3
                        resources:
                          requests:
                            cpu: 50m
                            memory: 64Mi
                          limits:
                            cpu: 100m
                            memory: 128Mi
                        securityContext:
                          allowPrivilegeEscalation: false
                          capabilities:
                            drop:
                              - ALL
                          readOnlyRootFilesystem: true
                          runAsNonRoot: true
                          runAsUser: 1000
                          seccompProfile:
                            type: RuntimeDefault
                        volumeMounts:
                          - name: picoclaw-guard-script
                            mountPath: /app/guardian.py
                            subPath: guardian.py
                            readOnly: true
  values:
    crds:
      install: true
      keep: true
    configs:
      params:
        server.insecure: "true"
      cm:
        # Enable non-expiring API token for drift-sentinel + automation tooling
        accounts.admin: "apiKey, login"
        cluster.inClusterEnabled: "true"
        # Exclude high-churn Trivy report CRDs from ArgoCD cache/diff to avoid
        # intermittent cache sync timeouts on large report sets.
        resource.exclusions: |
          - apiGroups:
              - aquasecurity.github.io
            kinds:
              - SbomReport
              - VulnerabilityReport
              - ClusterSbomReport
              - ClusterVulnerabilityReport
            clusters:
              - "*"
        resource.customizations.ignoreDifferences.all: |
          jsonPointers:
            - /metadata/annotations/argocd.argoproj.io~1tracking-id
            - /metadata/annotations/cryptophys.io~1gitops-source
        resource.customizations.ignoreDifferences.apps_Deployment: |
          jsonPointers:
            - /metadata/annotations/argocd.argoproj.io~1tracking-id
            - /metadata/annotations/cryptophys.io~1gitops-source
            - /metadata/annotations/kyverno.io~1verify-images
        resource.customizations.health.apps_Deployment: |
          hs = {}
          if obj.status == nil then
            hs.status = "Healthy"
            hs.message = "Status not cached (ignoreResourceUpdates)"
            return hs
          end
          if obj.status.observedGeneration ~= nil and obj.metadata ~= nil and obj.metadata.generation ~= nil then
            if obj.status.observedGeneration < obj.metadata.generation then
              hs.status = "Progressing"
              hs.message = "Waiting for rollout"
              return hs
            end
          end
          if obj.spec ~= nil and obj.spec.replicas ~= nil and obj.spec.replicas == 0 then
            hs.status = "Healthy"
            hs.message = "Scaled to zero"
            return hs
          end
          local replicas = obj.spec and obj.spec.replicas or 1
          local ready = obj.status.readyReplicas or 0
          local available = obj.status.availableReplicas or 0
          if ready >= replicas and available >= replicas then
            hs.status = "Healthy"
            hs.message = tostring(ready) .. "/" .. tostring(replicas) .. " replicas ready"
            return hs
          end
          hs.status = "Progressing"
          hs.message = tostring(ready) .. "/" .. tostring(replicas) .. " replicas ready"
          return hs
        resource.customizations.health.gateway.envoyproxy.io_SecurityPolicy: |
          hs = {}
          hs.status = "Healthy"
          if obj.status ~= nil then
            for _, c in ipairs(obj.status.ancestors or {}) do
              for _, condition in ipairs(c.conditions or {}) do
                if condition.type == "Accepted" and condition.status == "False" then
                  hs.status = "Degraded"
                  hs.message = condition.message
                  return hs
                end
              end
            end
          end
          hs.message = "Policy accepted"
          return hs
    global:
      tolerations: []
    controller:
      tolerations:
        # Allow controller to schedule on medulla (llm-inference taint) when compute nodes are full
        - key: "cryptophys.io/role"
          operator: "Equal"
          value: "llm-inference"
          effect: "NoSchedule"
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 1Gi  # peak 2460Mi during cascade; steady ~1Gi; burstable to 4Gi
        limits:
          cpu: 2000m
          memory: 4Gi
    server:
      replicas: 2
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
    repoServer:
      replicas: 2
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - cerebellum-161-97-117-96
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      # Certificate-based Git authentication using SPIRE-issued certificates
      env:
        - name: GIT_SSL_CERT
          value: /tmp/spiffe-certs/svid.pem
        - name: GIT_SSL_KEY
          value: /tmp/spiffe-certs/svid_key.pem
        - name: GIT_SSL_CAINFO
          value: /tmp/spiffe-certs/svid_bundle.pem
        - name: GIT_SSL_NO_VERIFY
          value: "false"
      volumes:
        - name: spiffe-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
        - name: spiffe-certs
          emptyDir:
            medium: Memory
            sizeLimit: 10Mi
        - name: spiffe-helper-config
          configMap:
            name: argocd-spiffe-helper-config
      volumeMounts:
        - name: spiffe-workload-api
          mountPath: /spiffe-workload-api
          readOnly: true
        - name: spiffe-certs
          mountPath: /tmp/spiffe-certs
      # Sidecar: spiffe-helper extracts certs from CSI volume to filesystem for Git client
      extraContainers:
        - name: spiffe-helper
          image: ghcr.io/spiffe/spiffe-helper:0.11.0
          imagePullPolicy: IfNotPresent
          args:
            - -config
            - /etc/spiffe-helper/helper.conf
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
            - name: spiffe-certs
              mountPath: /tmp/spiffe-certs
            - name: spiffe-helper-config
              mountPath: /etc/spiffe-helper
              readOnly: true
    applicationSet:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
    redis:
      # Disable built-in Redis - using external HA cluster
      enabled: false
    externalRedis:
      host: argocd-redis-ha.apps-system.svc.cluster.local
      port: 6379
    notifications:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
    redisSecretInit:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    dex:
      enabled: false
