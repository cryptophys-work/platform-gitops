apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: argocd
  namespace: apps-system
spec:
  releaseName: argocd
  interval: 1h
  timeout: 30m
  chart:
    spec:
      chart: argo-cd
      version: 9.4.1
      sourceRef:
        kind: HelmRepository
        name: argoproj
        namespace: flux-system
  install:
    timeout: 30m
    remediation:
      retries: 3
  upgrade:
    timeout: 30m
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    crds:
      install: true
      keep: true
    configs:
      params:
        server.insecure: "true"
      cm:
        # Enable non-expiring API token for drift-sentinel + automation tooling
        accounts.admin: "apiKey, login"
        resource.customizations.ignoreDifferences.all: |
          jsonPointers:
            - /metadata/annotations/argocd.argoproj.io~1tracking-id
            - /metadata/annotations/cryptophys.io~1gitops-source
        resource.customizations.ignoreDifferences.apps_Deployment: |
          jsonPointers:
            - /metadata/annotations/argocd.argoproj.io~1tracking-id
            - /metadata/annotations/cryptophys.io~1gitops-source
            - /metadata/annotations/kyverno.io~1verify-images
        resource.customizations.health.gateway.envoyproxy.io_SecurityPolicy: |
          hs = {}
          hs.status = "Healthy"
          if obj.status ~= nil then
            for _, c in ipairs(obj.status.ancestors or {}) do
              for _, condition in ipairs(c.conditions or {}) do
                if condition.type == "Accepted" and condition.status == "False" then
                  hs.status = "Degraded"
                  hs.message = condition.message
                  return hs
                end
              end
            end
          end
          hs.message = "Policy accepted"
          return hs
    global:
      tolerations: []
    controller:
      tolerations:
        # Allow controller to schedule on medulla (llm-inference taint) when compute nodes are full
        - key: "cryptophys.io/role"
          operator: "Equal"
          value: "llm-inference"
          effect: "NoSchedule"
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 1Gi  # peak 2460Mi during cascade; steady ~1Gi; burstable to 4Gi
        limits:
          cpu: 2000m
          memory: 4Gi
    server:
      replicas: 2
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
    repoServer:
      replicas: 2
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - cerebellum-161-97-117-96
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      # Certificate-based Git authentication using SPIRE-issued certificates
      env:
        - name: GIT_SSL_CERT
          value: /tmp/spiffe-certs/svid.pem
        - name: GIT_SSL_KEY
          value: /tmp/spiffe-certs/svid_key.pem
        - name: GIT_SSL_CAINFO
          value: /tmp/spiffe-certs/svid_bundle.pem
        - name: GIT_SSL_NO_VERIFY
          value: "false"
      volumes:
        - name: spiffe-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
        - name: spiffe-certs
          emptyDir:
            medium: Memory
            sizeLimit: 10Mi
        - name: spiffe-helper-config
          configMap:
            name: argocd-spiffe-helper-config
      volumeMounts:
        - name: spiffe-workload-api
          mountPath: /spiffe-workload-api
          readOnly: true
        - name: spiffe-certs
          mountPath: /tmp/spiffe-certs
      # Sidecar: spiffe-helper extracts certs from CSI volume to filesystem for Git client
      extraContainers:
        - name: spiffe-helper
          image: ghcr.io/spiffe/spiffe-helper:0.11.0
          imagePullPolicy: IfNotPresent
          args:
            - -config
            - /etc/spiffe-helper/helper.conf
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
            - name: spiffe-certs
              mountPath: /tmp/spiffe-certs
            - name: spiffe-helper-config
              mountPath: /etc/spiffe-helper
              readOnly: true
    applicationSet:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
    redis:
      # Disable built-in Redis - using external HA cluster
      enabled: false
    externalRedis:
      host: argocd-redis-ha.apps-system.svc.cluster.local
      port: 6379
    notifications:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
    redisSecretInit:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    dex:
      enabled: false
