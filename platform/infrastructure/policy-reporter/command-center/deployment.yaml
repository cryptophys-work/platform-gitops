apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyverno-command-center
  namespace: kyverno-system
  labels:
    app.kubernetes.io/name: kyverno-command-center
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: kyverno-command-center
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kyverno-command-center
    spec:
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:stable-alpine
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: web
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true
            - name: nginx
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: web
          configMap:
            name: kyverno-command-center
            items:
              - key: index.html
                path: index.html
        - name: nginx
          configMap:
            name: kyverno-command-center
            items:
              - key: default.conf
                path: default.conf
