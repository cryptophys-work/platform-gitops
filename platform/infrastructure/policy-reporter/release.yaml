apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: policy-reporter
  namespace: kyverno
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: policy-reporter
      version: 2.19.0
      sourceRef:
        kind: HelmRepository
        name: policy-reporter
        namespace: flux-system
  values:
    replicaCount: 2
    logging:
      server: true
      encoding: json
      logLevel: 1
    rest:
      enabled: true
    metrics:
      enabled: true
      mode: detailed
    worker: 10
    ui:
      enabled: true
      replicaCount: 1
      displayMode: dark
      banner: "Kyverno Policy Reporter"
      logging:
        api: true
        server: true
        encoding: json
        logLevel: 1
      sources:
        - name: kyverno
          type: severity
          exceptions: true
        - name: Kyverno Event
          type: result
          exceptions: false
      clusters:
        - name: talos-prod
          host: http://policy-reporter:8080
          plugins:
            - name: kyverno
              host: http://policy-reporter-kyverno-plugin:8080
      ingress:
        enabled: true
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/auth-type: basic
          nginx.ingress.kubernetes.io/auth-secret: policy-reporter-ui-basic-auth
          nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
        hosts:
          - host: kyverno.cryptophys.work
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: cryptophys-wildcard-tls
            hosts:
              - kyverno.cryptophys.work
    plugin:
      kyverno:
        enabled: true
        replicaCount: 2
        logging:
          api: true
          server: true
          encoding: json
          logLevel: 1
        blockReports:
          enabled: true
          eventNamespace: kyverno
          source: Kyverno Event
          results:
            maxPerReport: 500
            keepOnlyLatest: true
    monitoring:
      enabled: true
      grafana:
        dashboards:
          enabled: true
          multicluster:
            enabled: false
          enable:
            overview: true
            policyReportDetails: true
            clusterPolicyReportDetails: true
