apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: security-policy-reporter
  namespace: kyverno-system
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    force: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: policy-reporter
      version: 2.19.0
      sourceRef:
        kind: HelmRepository
        name: policy-reporter
        namespace: flux-system
  values:
    replicaCount: 0
    rest:
      enabled: true
    metrics:
      enabled: true
      mode: detailed
    worker: 10
    nodeSelector:
      kubernetes.io/os: linux
      workload.cryptophys.work/apps-core: "true"
    tolerations: []
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    ui:
      enabled: true
      replicaCount: 0
      displayMode: dark
      banner: "Cryptophys Policy Control Center"
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      tolerations: []
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      sources:
        - name: kyverno
          type: severity
          exceptions: true
        - name: Kyverno Event
          type: result
          exceptions: false
        - name: gatekeeper
          type: severity
          exceptions: true
      clusters:
        - name: talos-prod
          host: http://security-policy-reporter:8080
          plugins:
            - name: kyverno
              host: http://security-policy-reporter-kyverno-plugin:8080
            - name: gatekeeper
              host: http://security-policy-reporter-gatekeeper-plugin:8080
      ingress:
        enabled: true
        className: nginx
        annotations:
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/auth-type: basic
          nginx.ingress.kubernetes.io/auth-secret: policy-reporter-ui-basic-auth
          nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
        hosts:
          - host: policy.cryptophys.work
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: platform-wildcard-tls
            hosts:
              - policy.cryptophys.work
    global:
      plugins:
        kyverno: true
        gatekeeper: true
    kyvernoPlugin:
      enabled: true
      replicaCount: 0
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      tolerations: []
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      blockReports:
        enabled: true
        eventNamespace: kyverno-system
        source: Kyverno Event
        results:
          maxPerReport: 50
          keepOnlyLatest: true
    gatekeeperPlugin:
      enabled: true
      replicaCount: 0
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      tolerations: []
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

    monitoring:
      enabled: false
