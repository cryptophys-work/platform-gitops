# Note: app-namespace quotas (cerebrum, apps-core, tekton-*) moved to apps-gitops overlays
---
apiVersion: v1
kind: ResourceQuota
metadata:
  annotations:
    cryptophys.io/domain: cerebrum
    cryptophys.io/tier: ai-workload
  name: cqls-compute-quota
  namespace: cqls-compute
spec:
  hard:
    count/pods: '20'
    limits.cpu: '8'
    limits.memory: 22Gi
    requests.cpu: '6'
    requests.memory: 18Gi
---
apiVersion: v1
kind: ResourceQuota
metadata:
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/tier: platform-critical
  name: vault-quota
  namespace: vault-system
spec:
  hard:
    count/pods: '10'
    limits.cpu: '2'
    limits.memory: 3Gi
    requests.cpu: '1'
    requests.memory: 1Gi
---
apiVersion: v1
kind: ResourceQuota
metadata:
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/tier: platform-critical
  name: gitops-quota
  namespace: gitops-system
spec:
  hard:
    count/pods: '10'
    limits.cpu: '2'
    limits.memory: 2Gi
    requests.cpu: 500m
    requests.memory: 512Mi
