# Bootstrap Job: applies node labels and taints for the cryptophys-genesis cluster
# Runs once at 02-scheduling stage. Safe to re-run (idempotent kubectl label --overwrite).
# Node role assignment:
#   medulla   → storage-support only; general workloads drained to nexus
#   synapse   → apps-ha compute pool (6CPU/11.5GB)
#   thalamus  → platform-ha compute pool (6CPU/11.5GB)
#   quanta    → apps-ha lightweight pool (4CPU/7.4GB)
#   campus    → storage-only (4CPU/7.4GB) + NoSchedule taint
#   nexus     → shared HA node for both platform-ha and apps-ha (40CPU/256GB)

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-labeler
  namespace: kube-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/contract: contract.infrastructure.talos_topology.v1

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-labeler
  annotations:
    cryptophys.io/domain: platform
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-labeler
  annotations:
    cryptophys.io/domain: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-labeler
subjects:
  - kind: ServiceAccount
    name: node-labeler
    namespace: kube-system

---
apiVersion: batch/v1
kind: Job
metadata:
  name: node-labeler-nexus-placement-v7
  namespace: kube-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/contract: contract.infrastructure.talos_topology.v1
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: node-labeler
      restartPolicy: OnFailure
      priorityClassName: cryptophys-platform-critical
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: labeler
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              k() {
                if ! kubectl --request-timeout=10s "$@"; then
                  echo "WARN: kubectl failed: $*" >&2
                fi
              }
              echo "=== cryptophys-genesis node labeler ==="

              # medulla: drain general workloads away; keep available for storage/system support
              k label node medulla-82-208-20-242 \
                node-role.kubernetes.io/worker= \
                cryptophys.io/tier=storage \
                cryptophys.io/node-role=storage-worker \
                --overwrite
              k label node medulla-82-208-20-242 \
                apps-core-target- \
                cryptophys.io/apps-ha- \
                cryptophys.io/role- \
                workload.cryptophys.work/apps-core- \
                workload.cryptophys.work/compute- \
                workload.cryptophys.work/llm- \
                --overwrite 2>/dev/null || true
              k taint node medulla-82-208-20-242 \
                cryptophys.io/storage-only=true:NoSchedule \
                --overwrite 2>/dev/null || true
              k taint node medulla-82-208-20-242 \
                cryptophys.io/role=llm-inference:NoSchedule- \
                --overwrite 2>/dev/null || true
              echo "medulla: labelled + tainted (storage-only, apps-core removed)"

              # synapse: apps-ha compute pool (6CPU/11.5GB)
              k label node synapse-161-97-136-251 \
                apps-core-target=apps-core \
                cryptophys.io/apps-ha=true \
                node-role.kubernetes.io/worker= \
                cryptophys.io/tier=compute \
                ray-head=true \
                workload.cryptophys.work/apps-core=true \
                --overwrite
              k label node synapse-161-97-136-251 \
                cryptophys.io/platform-ha- \
                cryptophys.io/pool- \
                --overwrite 2>/dev/null || true
              k taint node synapse-161-97-136-251 \
                cryptophys.io/pool=apps-ha:NoSchedule \
                --overwrite 2>/dev/null || true
              k taint node synapse-161-97-136-251 \
                ray-head=true:NoSchedule \
                --overwrite 2>/dev/null || true
              echo "synapse: labelled + tainted (apps-ha)"

              # thalamus: platform-ha compute pool
              k label node thalamus-217-76-59-241 \
                node-role.kubernetes.io/worker= \
                cryptophys.io/platform-ha=true \
                cryptophys.io/tier=compute \
                --overwrite
              k label node thalamus-217-76-59-241 \
                apps-core-target- \
                workload.cryptophys.work/apps-core- \
                cryptophys.io/apps-ha- \
                cryptophys.io/pool- \
                --overwrite 2>/dev/null || true
              k taint node thalamus-217-76-59-241 \
                cryptophys.io/pool=platform-ha:NoSchedule \
                --overwrite 2>/dev/null || true
              echo "thalamus: labelled + tainted (platform-ha)"

              # quanta: dedicated bridge/dao pool
              k label node quanta-194-163-186-222 \
                bridge-system=true \
                dao-system=true \
                node-role.kubernetes.io/worker= \
                cryptophys.io/tier=compute \
                ray-head=true \
                workload.cryptophys.work/apps-core=true \
                --overwrite
              k label node quanta-194-163-186-222 \
                cryptophys.io/platform-ha- \
                cryptophys.io/apps-ha- \
                cryptophys.io/pool- \
                --overwrite 2>/dev/null || true
              k taint node quanta-194-163-186-222 \
                bridge-system=true:NoSchedule \
                --overwrite 2>/dev/null || true
              k taint node quanta-194-163-186-222 \
                dao-system=true:NoSchedule \
                --overwrite 2>/dev/null || true
              k taint node quanta-194-163-186-222 \
                ray-head=true:NoSchedule \
                --overwrite 2>/dev/null || true
              echo "quanta: labelled + tainted (bridge-system + dao-system dedicated pool)"

              # corpus: control-plane node that also accepts apps-core workloads
              k label node corpus-207-180-206-69 \
                workload.cryptophys.work/apps-core=true \
                --overwrite 2>/dev/null || true
              echo "corpus: labelled (apps-core)"

              # cerebellum: platform-ha compute pool
              k label node cerebellum-161-97-117-96 \
                node-role.kubernetes.io/worker= \
                cryptophys.io/platform-ha=true \
                cryptophys.io/tier=compute \
                workload.cryptophys.work/compute=true \
                --overwrite 2>/dev/null || true
              k label node cerebellum-161-97-117-96 \
                apps-core-target- \
                workload.cryptophys.work/apps-core- \
                cryptophys.io/apps-ha- \
                cryptophys.io/pool- \
                --overwrite 2>/dev/null || true
              k taint node cerebellum-161-97-117-96 \
                cryptophys.io/pool=platform-ha:NoSchedule \
                --overwrite 2>/dev/null || true
              echo "cerebellum: labelled + tainted (platform-ha)"

              # nexus: shared HA node for both lanes
              k label node nexus-144-91-103-10 \
                node-role.kubernetes.io/worker= \
                apps-core-target=apps-core \
                cryptophys.io/apps-ha=true \
                cryptophys.io/platform-ha=true \
                cryptophys.io/role=llm-inference \
                cryptophys.io/tier=compute \
                nexus-tower=true \
                ray-cluster=true \
                storage=storage \
                workload.cryptophys.work/apps-core=true \
                workload.cryptophys.work/compute=true \
                workload.cryptophys.work/llm=true \
                workload.cryptophys.work/storage=true \
                --overwrite 2>/dev/null || true
              k label node nexus-144-91-103-10 \
                cryptophys.io/pool- \
                --overwrite 2>/dev/null || true
              k taint node nexus-144-91-103-10 \
                cryptophys.io/pool=nexus-hub:NoSchedule- \
                --overwrite 2>/dev/null || true
              k taint node nexus-144-91-103-10 \
                ray-cluster=true:NoSchedule \
                --overwrite 2>/dev/null || true
              echo "nexus: labelled (shared apps-ha + platform-ha)"

              # campus: drain storage workloads away; keep taint but remove storage attraction labels
              k label node campus-212-47-66-101 \
                node-role.kubernetes.io/worker= \
                cryptophys.io/tier=storage \
                cryptophys.io/node-role=storage-worker \
                --overwrite
              k label node campus-212-47-66-101 \
                workload.cryptophys.work/storage- \
                storage- \
                --overwrite 2>/dev/null || true
              k taint node campus-212-47-66-101 \
                cryptophys.io/storage-only=true:NoSchedule \
                --overwrite 2>/dev/null || true
              echo "campus: labelled + tainted (draining storage-only)"

              echo "=== Node labeling complete ==="
              k get nodes --show-labels | grep -E "NAME|medulla|synapse|thalamus|quanta|campus|cerebellum|nexus" || true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
