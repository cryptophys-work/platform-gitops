# Bootstrap Job: applies node labels and taints for the cryptophys-genesis cluster
# Runs once at 02-scheduling stage. Safe to re-run (idempotent kubectl label --overwrite).
# Node role assignment:
#   medulla   → general compute worker
#   synapse   → apps-core general compute (6CPU/11.5GB)
#   thalamus  → apps-core general compute (6CPU/11.5GB)
#   quanta    → apps-core lightweight (4CPU/7.4GB)
#   campus    → storage-only (4CPU/7.4GB) + NoSchedule taint
#   nexus     → llm-inference + nexus tower for Ray workers (40CPU/256GB)

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-labeler
  namespace: kube-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/contract: contract.infrastructure.talos_topology.v1

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-labeler
  annotations:
    cryptophys.io/domain: platform
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-labeler
  annotations:
    cryptophys.io/domain: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-labeler
subjects:
  - kind: ServiceAccount
    name: node-labeler
    namespace: kube-system

---
apiVersion: batch/v1
kind: Job
metadata:
  name: node-labeler
  namespace: kube-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/contract: contract.infrastructure.talos_topology.v1
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: node-labeler
      restartPolicy: OnFailure
      priorityClassName: cryptophys-platform-critical
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: labeler
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== cryptophys-genesis node labeler ==="

              # medulla: general compute worker
              kubectl label node medulla-82-208-20-242 \
                node-role.kubernetes.io/worker= \
                cryptophys.io/tier=compute \
                workload.cryptophys.work/apps-core=true \
                --overwrite
              kubectl label node medulla-82-208-20-242 \
                cryptophys.io/role- \
                workload.cryptophys.work/llm- \
                --overwrite 2>/dev/null || true
              kubectl taint node medulla-82-208-20-242 \
                cryptophys.io/role=llm-inference:NoSchedule- \
                --overwrite 2>/dev/null || true
              echo "medulla: labelled (apps-core compute, llm-inference removed)"

              # synapse: apps-core general compute (6CPU/11.5GB)
              kubectl label node synapse-161-97-136-251 \
                node-role.kubernetes.io/worker= \
                cryptophys.io/tier=compute \
                workload.cryptophys.work/apps-core=true \
                --overwrite
              echo "synapse: labelled (apps-core)"

              # thalamus: apps-core general compute (6CPU/11.5GB)
              kubectl label node thalamus-217-76-59-241 \
                node-role.kubernetes.io/worker= \
                cryptophys.io/tier=compute \
                workload.cryptophys.work/apps-core=true \
                --overwrite
              echo "thalamus: labelled (apps-core)"

              # quanta: apps-core lightweight (4CPU/7.4GB)
              kubectl label node quanta-194-163-186-222 \
                node-role.kubernetes.io/worker= \
                cryptophys.io/tier=compute \
                workload.cryptophys.work/apps-core=true \
                --overwrite
              echo "quanta: labelled (apps-core lightweight)"

              # corpus: control-plane node that also accepts apps-core workloads
              kubectl label node corpus-207-180-206-69 \
                workload.cryptophys.work/apps-core=true \
                --overwrite 2>/dev/null || true
              echo "corpus: labelled (apps-core)"

              # cerebellum: extra worker node
              kubectl label node cerebellum-161-97-117-96 \
                node-role.kubernetes.io/worker= \
                cryptophys.io/tier=compute \
                workload.cryptophys.work/apps-core=true \
                workload.cryptophys.work/compute=true \
                --overwrite 2>/dev/null || true
              echo "cerebellum: labelled (apps-core)"

              # nexus: heavy apps-core worker + LLM inference tier (40CPU/256GB)
              kubectl label node nexus-144-91-103-10 \
                node-role.kubernetes.io/worker= \
                apps-core-target=apps-core \
                cryptophys.io/role=llm-inference \
                cryptophys.io/tier=compute \
                nexus-tower=true \
                workload.cryptophys.work/apps-core=true \
                workload.cryptophys.work/compute=true \
                workload.cryptophys.work/llm=true \
                --overwrite 2>/dev/null || true
              kubectl taint node nexus-144-91-103-10 \
                cryptophys.io/role=llm-inference:NoSchedule \
                --overwrite 2>/dev/null || true
              echo "nexus: labelled + tainted (apps-core heavy worker, nexus tower, llm-inference)"

              # campus: storage-only (4CPU/7.4GB) + NoSchedule taint
              kubectl label node campus-212-47-66-101 \
                node-role.kubernetes.io/worker= \
                cryptophys.io/tier=storage \
                cryptophys.io/node-role=storage-worker \
                workload.cryptophys.work/storage=true \
                --overwrite
              kubectl taint node campus-212-47-66-101 \
                cryptophys.io/storage-only=true:NoSchedule \
                --overwrite 2>/dev/null || true
              echo "campus: labelled + tainted (storage-only)"

              echo "=== Node labeling complete ==="
              kubectl get nodes --show-labels | grep -E "NAME|medulla|synapse|thalamus|quanta|campus|cerebellum|nexus"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
