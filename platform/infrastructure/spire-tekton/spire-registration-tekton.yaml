# SPIRE Registration for Tekton Service Accounts
# Enables SPIFFE/SVID issuance for image factory workloads
# Ref: https://www.kimi.com/preview/19debede-19c2-8350-8000-054af3a3a146
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: tekton-pipeline-sa
  namespace: tekton-system
spec:
  spiffeIDTemplate: spiffe://cryptophys.work/ns/tekton-system/sa/tekton-pipeline-sa
  selector:
    - type: k8s
      value: "ns:tekton-system"
    - type: k8s
      value: "sa:tekton-pipeline-sa"
---
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: tekton-chains-sa
  namespace: tekton-chains
spec:
  spiffeIDTemplate: spiffe://cryptophys.work/ns/tekton-chains/sa/tekton-chains
  selector:
    - type: k8s
      value: "ns:tekton-chains"
    - type: k8s
      value: "sa:tekton-chains"
---
# SPIRE Registration for image-factory namespace
# Allows BuildKit and Ray workers to get SVIDs
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: buildkit-sa
  namespace: image-factory
spec:
  spiffeIDTemplate: spiffe://cryptophys.work/ns/image-factory/sa/buildkit-sa
  selector:
    - type: k8s
      value: "ns:image-factory"
    - type: k8s
      value: "sa:buildkit-sa"
---
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: ray-build-sa
  namespace: image-factory
spec:
  spiffeIDTemplate: spiffe://cryptophys.work/ns/image-factory/sa/ray-build-sa
  selector:
    - type: k8s
      value: "ns:image-factory"
    - type: k8s
      value: "sa:ray-build-sa"
