apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-metallb
  namespace: metallb-system
spec:
  releaseName: platform-metallb
  interval: 1h
  timeout: 15m
  suspend: false
  chart:
    spec:
      chart: metallb
      version: 0.13.12
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    disableWait: true
    preserveValues: false
    remediation:
      retries: 3
  postRenderers:
  - kustomize:
      patches:
      - target:
          kind: ValidatingWebhookConfiguration
          name: metallb-webhook-configuration
        patch: |
          - op: replace
            path: /webhooks/0/failurePolicy
            value: Ignore
          - op: replace
            path: /webhooks/1/failurePolicy
            value: Ignore
          - op: replace
            path: /webhooks/2/failurePolicy
            value: Ignore
          - op: replace
            path: /webhooks/3/failurePolicy
            value: Ignore
          - op: replace
            path: /webhooks/4/failurePolicy
            value: Ignore
          - op: replace
            path: /webhooks/5/failurePolicy
            value: Ignore
          - op: replace
            path: /webhooks/6/failurePolicy
            value: Ignore
      - target:
          kind: DaemonSet
          name: platform-metallb-speaker
        patch: |
          apiVersion: apps/v1
          kind: DaemonSet
          metadata:
            name: platform-metallb-speaker
          spec:
            updateStrategy:
              rollingUpdate:
                maxUnavailable: 10
            template:
              metadata:
                annotations:
                  cryptophys.io/daemonset-refresh: "2026-04-18T15:00:00Z"
              spec:
                affinity: {}
                tolerations:
                  - effect: NoSchedule
                    key: node-role.kubernetes.io/master
                    operator: Exists
                  - effect: NoSchedule
                    key: node-role.kubernetes.io/control-plane
                    operator: Exists
                  - operator: Exists
  values:
    crds:
      enabled: true
    # Chart hardcodes nodeSelector.kubernetes.io/os=linux (quoted key) and merges
    # .Values.*.nodeSelector via toYaml. If values also set kubernetes.io/os (even from Helm
    # merge drift), the rendered manifest contains two os keys and strict YAML unmarshal fails.
    # Explicit null clears stale merged nodeSelector maps from Helm history (otherwise
    # kubernetes.io/os is merged with the chart's hardcoded os key and YAML unmarshal fails).
    controller:
      nodeSelector: null
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload.cryptophys.work/apps-core
                    operator: In
                    values:
                      - "true"
      tolerations:
        - operator: Exists
    speaker:
      nodeSelector: null
      # Explicit null: Flux/K8s SSA merge keeps nested keys if omitted; must clear old affinity.
      affinity: null
      # No required nodeAffinity: the prior OR (platform-ha | apps-core-target) only matched
      # ~5 nodes, so the DaemonSet never reached full cluster coverage. L2 speaker should
      # run on every Linux node; tolerateMaster + tolerations Exists cover CP/worker taints.
      excludeInterfaces:
        enabled: true
      frr:
        enabled: false
      tolerateMaster: true
      tolerations:
        - operator: Exists
