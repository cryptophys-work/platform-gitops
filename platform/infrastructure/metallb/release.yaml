apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-metallb
  namespace: metallb-system
spec:
  releaseName: platform-metallb
  interval: 1h
  timeout: 15m
  suspend: false
  chart:
    spec:
      chart: metallb
      version: 0.13.12
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    disableWait: true
    preserveValues: false
    remediation:
      retries: 3
  postRenderers:
  - kustomize:
      patches:
      - target:
          kind: ValidatingWebhookConfiguration
          name: metallb-webhook-configuration
        patch: |
          - op: replace
            path: /webhooks/0/failurePolicy
            value: Ignore
          - op: replace
            path: /webhooks/1/failurePolicy
            value: Ignore
          - op: replace
            path: /webhooks/2/failurePolicy
            value: Ignore
          - op: replace
            path: /webhooks/3/failurePolicy
            value: Ignore
          - op: replace
            path: /webhooks/4/failurePolicy
            value: Ignore
          - op: replace
            path: /webhooks/5/failurePolicy
            value: Ignore
          - op: replace
            path: /webhooks/6/failurePolicy
            value: Ignore
      - target:
          kind: DaemonSet
          name: platform-metallb-speaker
        patch: |
          apiVersion: apps/v1
          kind: DaemonSet
          metadata:
            name: platform-metallb-speaker
          spec:
            updateStrategy:
              rollingUpdate:
                maxUnavailable: 10
            template:
              metadata:
                annotations:
                  cryptophys.io/daemonset-refresh: "2026-04-16T19:15:00Z"
  values:
    crds:
      enabled: true
    # Chart templates inject kubernetes.io/os=linux for controller and speaker; never
    # repeat that key under values or Helm renders duplicate YAML keys (post-render fails).
    # Keep full placement here so SSA replaces stale merged values in the HelmRelease.
    controller:
      nodeSelector:
        workload.cryptophys.work/apps-core: "true"
      tolerations:
        - operator: Exists
    speaker:
      # Null clears the key in Helm's merged values (empty {} can be ignored); required so the
      # chart's hardcoded kubernetes.io/os is not duplicated by a stale merged value.
      nodeSelector: null
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: cryptophys.io/platform-ha
                    operator: In
                    values:
                      - "true"
              - matchExpressions:
                  - key: apps-core-target
                    operator: In
                    values:
                      - apps-core
      excludeInterfaces:
        enabled: true
      frr:
        enabled: false
      tolerateMaster: true
      tolerations:
        - operator: Exists
