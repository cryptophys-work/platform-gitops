apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-kubernetes-a3cbbe355fa7
  namespace: crossplane-system
  labels:
    pkg.crossplane.io/provider: provider-kubernetes
    pkg.crossplane.io/revision: provider-kubernetes-a3cbbe355fa7
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      pkg.crossplane.io/provider: provider-kubernetes
      pkg.crossplane.io/revision: provider-kubernetes-a3cbbe355fa7
  template:
    metadata:
      labels:
        pkg.crossplane.io/provider: provider-kubernetes
        pkg.crossplane.io/revision: provider-kubernetes-a3cbbe355fa7
    spec:
      serviceAccountName: provider-kubernetes-a3cbbe355fa7
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: package-runtime
        image: xpkg.upbound.io/crossplane-contrib/provider-kubernetes:v0.13.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9443
          name: webhook
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 65534
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: webhook-certs
          mountPath: /tls/server
          readOnly: true
      volumes:
      - name: webhook-certs
        secret:
          secretName: provider-kubernetes-tls-server
      # Node affinity: worker nodes only
      # - exclude control-planes (node-role.kubernetes.io/control-plane doesn't exist)
      # - exclude medulla (reserved for other workloads)
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - medulla-82-208-20-242
        # Pod anti-affinity: prefer spreading across nodes for HA
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: pkg.crossplane.io/provider
                  operator: In
                  values:
                  - provider-kubernetes
              topologyKey: kubernetes.io/hostname
      # Tolerate all cluster taints to ensure provider runs everywhere
      # This is required for the webhook to be available during cluster recovery
      tolerations:
      # Cilium bootstrap taint (blocks pod scheduling until Cilium ready)
      - key: node.cilium.io/agent-not-ready
        operator: Exists
        effect: NoSchedule
      # Platform HA pool taint
      - key: cryptophys.io/pool
        operator: Equal
        value: platform-ha
        effect: NoSchedule
      # Storage-only node taint
      - key: cryptophys.io/storage-only
        operator: Exists
        effect: NoSchedule
      # LLM inference node taint (cerebrum-specific workloads)
      - key: cryptophys.io/role
        operator: Equal
        value: llm-inference
        effect: NoSchedule
      # Ray head node taint
      - key: ray-head
        operator: Exists
        effect: NoSchedule
      # DAO system node taint
      - key: dao-system
        operator: Exists
        effect: NoSchedule
      # Bridge system node taint
      - key: bridge-system
        operator: Exists
        effect: NoSchedule
      # Control plane taint
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      # Memory pressure (temporary)
      - key: node.kubernetes.io/memory-pressure
        operator: Exists
        effect: NoExecute
      # Disk pressure (temporary)
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
        effect: NoExecute
      # PID pressure (temporary)
      - key: node.kubernetes.io/pid-pressure
        operator: Exists
        effect: NoExecute
      # Node not ready
      - key: node.kubernetes.io/not-ready
        operator: Exists
        effect: NoExecute
