apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: longhorn-release.helm.cryptophys.work
spec:
  compositeTypeRef:
    apiVersion: cryptophys.work/v1alpha1
    kind: XLonghornRelease
  resources:
  - name: longhorn-helmrelease
    base:
      apiVersion: kubernetes.crossplane.io/v1alpha1
      kind: Object
      spec:
        forProvider:
          manifest:
            apiVersion: helm.toolkit.fluxcd.io/v2
            kind: HelmRelease
            metadata:
              name: longhorn
              namespace: longhorn-system
              annotations:
                cryptophys.io/domain: platform
                cryptophys.io/component: storage
                cryptophys.io/managed-by: flux
                cryptophys.io/anti-regression: "true"
            spec:
              interval: 1h
              timeout: 30m
              suspend: false
              postRenderers:
                - kustomize:
                    patches:
                       - target:
                           kind: Deployment
                           name: csi-attacher
                         patch: |
                           - op: replace
                             path: /spec/template/spec/tolerations
                             value:
                               - key: node-role.kubernetes.io/control-plane
                                 operator: Exists
                                 effect: NoSchedule
                               - key: cryptophys.io/storage-only
                                 operator: Exists
                                 effect: NoSchedule
                               - key: cryptophys.io/role
                                 operator: Exists
                                 effect: NoSchedule
                           - op: replace
                             path: /spec/template/spec/affinity
                            value:
                              podAntiAffinity:
                                preferredDuringSchedulingIgnoredDuringExecution:
                                  - weight: 100
                                    podAffinityTerm:
                                      labelSelector:
                                        matchExpressions:
                                          - key: app
                                            operator: In
                                            values:
                                              - csi-attacher
                                      topologyKey: kubernetes.io/hostname
                       - target:
                           kind: Deployment
                           name: csi-provisioner
                         patch: |
                           - op: replace
                             path: /spec/template/spec/tolerations
                             value:
                               - key: node-role.kubernetes.io/control-plane
                                 operator: Exists
                                 effect: NoSchedule
                               - key: cryptophys.io/storage-only
                                 operator: Exists
                                 effect: NoSchedule
                               - key: cryptophys.io/role
                                 operator: Exists
                                 effect: NoSchedule
                           - op: replace
                             path: /spec/template/spec/affinity
                            value:
                              podAntiAffinity:
                                preferredDuringSchedulingIgnoredDuringExecution:
                                  - weight: 100
                                    podAffinityTerm:
                                      labelSelector:
                                        matchExpressions:
                                          - key: app
                                            operator: In
                                            values:
                                              - csi-provisioner
                                      topologyKey: kubernetes.io/hostname
                       - target:
                           kind: Deployment
                           name: csi-resizer
                         patch: |
                           - op: replace
                             path: /spec/template/spec/tolerations
                             value:
                               - key: node-role.kubernetes.io/control-plane
                                 operator: Exists
                                 effect: NoSchedule
                               - key: cryptophys.io/storage-only
                                 operator: Exists
                                 effect: NoSchedule
                               - key: cryptophys.io/role
                                 operator: Exists
                                 effect: NoSchedule
                           - op: replace
                             path: /spec/template/spec/affinity
                            value:
                              podAntiAffinity:
                                preferredDuringSchedulingIgnoredDuringExecution:
                                  - weight: 100
                                    podAffinityTerm:
                                      labelSelector:
                                        matchExpressions:
                                          - key: app
                                            operator: In
                                            values:
                                              - csi-resizer
                                      topologyKey: kubernetes.io/hostname
                       - target:
                           kind: Deployment
                           name: csi-snapshotter
                         patch: |
                           - op: replace
                             path: /spec/template/spec/tolerations
                             value:
                               - key: node-role.kubernetes.io/control-plane
                                 operator: Exists
                                 effect: NoSchedule
                               - key: cryptophys.io/storage-only
                                 operator: Exists
                                 effect: NoSchedule
                               - key: cryptophys.io/role
                                 operator: Exists
                                 effect: NoSchedule
                           - op: replace
                             path: /spec/template/spec/affinity
                            value:
                              podAntiAffinity:
                                preferredDuringSchedulingIgnoredDuringExecution:
                                  - weight: 100
                                    podAffinityTerm:
                                      labelSelector:
                                        matchExpressions:
                                          - key: app
                                            operator: In
                                            values:
                                              - csi-snapshotter
                                      topologyKey: kubernetes.io/hostname
                       - target:
                           kind: DaemonSet
                           name: longhorn-csi-plugin
                         patch: |
                           - op: replace
                             path: /spec/template/spec/tolerations
                             value:
                               - key: node-role.kubernetes.io/control-plane
                                 operator: Exists
                                 effect: NoSchedule
                               - key: cryptophys.io/storage-only
                                 operator: Exists
                                 effect: NoSchedule
                               - key: cryptophys.io/role
                                 operator: Exists
                                 effect: NoSchedule
                           - op: replace
                             path: /spec/template/spec/containers/0/resources
                            value:
                              requests:
                                cpu: "50m"
                                memory: "128Mi"
                              limits:
                                cpu: "500m"
                                memory: "512Mi"
                       - target:
                           kind: DaemonSet
                           name: longhorn-manager
                         patch: |
                           - op: replace
                             path: /spec/template/spec/tolerations
                             value:
                               - key: node-role.kubernetes.io/control-plane
                                 operator: Exists
                                 effect: NoSchedule
                               - key: node-role.kubernetes.io/master
                                 operator: Exists
                                 effect: NoSchedule
                               - key: cryptophys.io/storage-only
                                 operator: Exists
                                 effect: NoSchedule
                               - key: cryptophys.io/role
                                 operator: Exists
                                 effect: NoSchedule
                            - op: replace
                              path: /spec/template/spec/containers/0/resources
                              value:
                                requests:
                                  cpu: "200m"
                                  memory: "256Mi"
                                limits:
                                  cpu: "500m"
                                  memory: "512Mi"
                           - op: replace
                             path: /spec/template/spec/containers/1/resources
                             value:
                               requests:
                                cpu: "50m"
                                memory: "128Mi"
                              limits:
                                cpu: "200m"
                                memory: "256Mi"
                       - target:
                           kind: Deployment
                           name: longhorn-driver-deployer
                         patch: |
                           - op: replace
                             path: /spec/template/spec/nodeSelector
                             value:
                               workload.cryptophys.work/compute: "true"
                       - target:
                           kind: Deployment
                           name: longhorn-ui
                         patch: |
                           - op: replace
                             path: /spec/template/spec/nodeSelector
                             value:
                               workload.cryptophys.work/compute: "true"
              chart:
                spec:
                  chart: longhorn
                  version: v1.11.1
                  sourceRef:
                    kind: HelmRepository
                    name: longhorn
                    namespace: flux-system
              install:
                remediation:
                  retries: 5
              upgrade:
                remediation:
                  retries: 5
              values:
                persistence:
                  defaultClass: true
                  defaultClassReplicaCount: 2
                defaultSettings:
                  defaultReplicaCount: 2
                  systemManagedComponentsNodeSelector: ""
                  taintToleration: "node-role.kubernetes.io/control-plane:NoSchedule;cryptophys.io/storage-only=true:NoSchedule;cryptophys.io/role=llm-inference:NoSchedule;node.kubernetes.io/memory-pressure:NoSchedule"
                  storageReservedPercentageForDefaultDisk: 10
                  storageOverProvisioningPercentage: 50
                  storageMinimalAvailablePercentage: 50
                  replicaSoftAntiAffinity: true
                  replicaAutoBalance: best-effort
                  concurrentReplicaRebuildPerNodeLimit: 2
                  concurrentVolumeBackupRestorePerNodeLimit: 2
                  replicaReplenishmentWaitInterval: 900
                  autoCleanupSystemGeneratedSnapshot: true
                  autoDeletePodWhenVolumeDetachedUnexpectedly: true
                  orphanAutoDeletion: true
                  orphanResourceAutoDeletion: replica-data;instance
                  orphanResourceAutoDeletionGracePeriod: 1200
                longhornManager:
                  tolerations:
                    - key: node-role.kubernetes.io/control-plane
                      operator: Exists
                      effect: NoSchedule
                    - key: cryptophys.io/storage-only
                      operator: Exists
                      effect: NoSchedule
                    - key: cryptophys.io/role
                      operator: Exists
                      effect: NoSchedule
                  resources:
                    requests:
                      cpu: "200m"
                      memory: "512Mi"
                    limits:
                      cpu: "1"
                      memory: "512Mi"
                longhornDriver:
                  nodeSelector:
                    workload.cryptophys.work/compute: "true"
                  tolerations:
                    - key: cryptophys.io/role
                      operator: Equal
                      value: llm-inference
                      effect: NoSchedule
                    - key: cryptophys.io/storage-only
                      operator: Exists
                      effect: NoSchedule
                  resources:
                    requests:
                      cpu: "20m"
                      memory: "64Mi"
                    limits:
                      cpu: "500m"
                      memory: "512Mi"
                longhornUI:
                  nodeSelector:
                    workload.cryptophys.work/compute: "true"
                  tolerations:
                    - key: cryptophys.io/role
                      operator: Equal
                      value: llm-inference
                      effect: NoSchedule
                    - key: cryptophys.io/storage-only
                      operator: Exists
                      effect: NoSchedule
                csi:
                  attacherReplicaCount: 2
                  provisionerReplicaCount: 2
                  resizerReplicaCount: 2
                  snapshotterReplicaCount: 2
                  longhornCSI:
                    tolerations:
                      - key: node-role.kubernetes.io/control-plane
                        operator: Exists
                        effect: NoSchedule
                      - key: cryptophys.io/storage-only
                        operator: Exists
                        effect: NoSchedule
                      - key: cryptophys.io/role
                        operator: Equal
                        value: llm-inference
                        effect: NoSchedule
        providerConfigRef:
          name: local-kubernetes-provider
    patches:
    - fromFieldPath: spec.defaultReplicaCount
      toFieldPath: spec.forProvider.manifest.spec.values.defaultSettings.defaultReplicaCount
    - fromFieldPath: spec.defaultReplicaCount
      toFieldPath: spec.forProvider.manifest.spec.values.persistence.defaultClassReplicaCount
    - fromFieldPath: spec.taintToleration
      toFieldPath: spec.forProvider.manifest.spec.values.defaultSettings.taintToleration
      policy:
        fromFieldPath: Optional
    - fromFieldPath: spec.storageOverProvisioningPercentage
      toFieldPath: spec.forProvider.manifest.spec.values.defaultSettings.storageOverProvisioningPercentage
      policy:
        fromFieldPath: Optional
    - fromFieldPath: spec.storageMinimalAvailablePercentage
      toFieldPath: spec.forProvider.manifest.spec.values.defaultSettings.storageMinimalAvailablePercentage
      policy:
        fromFieldPath: Optional
    - fromFieldPath: spec.systemManagedComponentsNodeSelector
      toFieldPath: spec.forProvider.manifest.spec.values.defaultSettings.systemManagedComponentsNodeSelector
      policy:
        fromFieldPath: Optional
    - fromFieldPath: spec.managerResources.requests.cpu
      toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.requests.cpu
    - fromFieldPath: spec.managerResources.requests.memory
      toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.requests.memory
    - fromFieldPath: spec.managerResources.limits.cpu
      toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.limits.cpu
    - fromFieldPath: spec.managerResources.limits.memory
      toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.limits.memory
