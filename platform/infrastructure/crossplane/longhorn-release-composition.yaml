apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: longhorn-release.helm.cryptophys.work
spec:
  compositeTypeRef:
    apiVersion: cryptophys.work/v1alpha1
    kind: XLonghornRelease
  resources:
  - name: longhorn-helmrelease
    base:
      apiVersion: kubernetes.crossplane.io/v1alpha1
      kind: Object
      spec:
        deletionPolicy: Orphan
        managementPolicies:
          - Observe
          - Create
          - Update
          - LateInitialize
        forProvider:
          manifest:
            apiVersion: helm.toolkit.fluxcd.io/v2
            kind: HelmRelease
            metadata:
              name: longhorn
              namespace: longhorn-system
              annotations:
                cryptophys.io/domain: platform
                cryptophys.io/component: storage
                cryptophys.io/managed-by: flux
                cryptophys.io/anti-regression: "true"
            spec:
              interval: 1h
              timeout: 30m
              suspend: false
              uninstall:
                disableHooks: true
              postRenderers:
                - kustomize:
                    patches:
                      - target:
                          kind: Deployment
                          name: csi-attacher
                        patch: |
                          - op: replace
                            path: /spec/template/spec/tolerations
                            value:
                              - operator: Exists
                          - op: replace
                            path: /spec/template/spec/affinity
                            value:
                              podAntiAffinity:
                                preferredDuringSchedulingIgnoredDuringExecution:
                                  - weight: 100
                                    podAffinityTerm:
                                      labelSelector:
                                        matchExpressions:
                                          - key: app
                                            operator: In
                                            values:
                                              - csi-attacher
                                      topologyKey: kubernetes.io/hostname
                      - target:
                          kind: Deployment
                          name: csi-provisioner
                        patch: |
                          - op: replace
                            path: /spec/template/spec/tolerations
                            value:
                              - operator: Exists
                          - op: replace
                            path: /spec/template/spec/affinity
                            value:
                              podAntiAffinity:
                                preferredDuringSchedulingIgnoredDuringExecution:
                                  - weight: 100
                                    podAffinityTerm:
                                      labelSelector:
                                        matchExpressions:
                                          - key: app
                                            operator: In
                                            values:
                                              - csi-provisioner
                                      topologyKey: kubernetes.io/hostname
                      - target:
                          kind: Deployment
                          name: csi-resizer
                        patch: |
                          - op: replace
                            path: /spec/template/spec/tolerations
                            value:
                              - operator: Exists
                          - op: replace
                            path: /spec/template/spec/affinity
                            value:
                              podAntiAffinity:
                                preferredDuringSchedulingIgnoredDuringExecution:
                                  - weight: 100
                                    podAffinityTerm:
                                      labelSelector:
                                        matchExpressions:
                                          - key: app
                                            operator: In
                                            values:
                                              - csi-resizer
                                      topologyKey: kubernetes.io/hostname
                      - target:
                          kind: Deployment
                          name: csi-snapshotter
                        patch: |
                          - op: replace
                            path: /spec/template/spec/tolerations
                            value:
                              - operator: Exists
                          - op: replace
                            path: /spec/template/spec/affinity
                            value:
                              podAntiAffinity:
                                preferredDuringSchedulingIgnoredDuringExecution:
                                  - weight: 100
                                    podAffinityTerm:
                                      labelSelector:
                                        matchExpressions:
                                          - key: app
                                            operator: In
                                            values:
                                              - csi-snapshotter
                                      topologyKey: kubernetes.io/hostname
                      - target:
                          kind: DaemonSet
                          name: longhorn-csi-plugin
                        patch: |
                          - op: add
                            path: /spec/template/spec/affinity
                            value: {}
                          - op: replace
                            path: /spec/template/spec/tolerations
                            value:
                              - operator: Exists
                          - op: replace
                            path: /spec/template/spec/containers/0/resources
                            value:
                              requests:
                                cpu: "50m"
                                memory: "128Mi"
                              limits:
                                cpu: "500m"
                                memory: "512Mi"
                      - target:
                          kind: DaemonSet
                          name: longhorn-manager
                        patch: |
                          - op: add
                            path: /spec/template/spec/affinity
                            value: {}
                          - op: replace
                            path: /spec/template/spec/tolerations
                            value:
                              - operator: Exists
                          - op: replace
                            path: /spec/template/spec/containers/0/resources
                            value:
                              requests:
                                cpu: "200m"
                                memory: "256Mi"
                              limits:
                                cpu: "500m"
                                memory: "512Mi"
                          - op: replace
                            path: /spec/template/spec/containers/1/resources
                            value:
                              requests:
                                cpu: "50m"
                                memory: "128Mi"
                              limits:
                                cpu: "200m"
                                memory: "256Mi"
                      - target:
                          kind: Deployment
                          name: longhorn-driver-deployer
                        patch: |
                          - op: add
                            path: /spec/template/spec/tolerations
                            value:
                              - operator: Exists
                          - op: add
                            path: /spec/template/spec/containers/0/resources
                            value:
                              requests:
                                cpu: "50m"
                                memory: "256Mi"
                              limits:
                                cpu: "500m"
                                memory: "512Mi"
                      - target:
                          kind: Deployment
                          name: longhorn-ui
                        patch: |
                          - op: replace
                            path: /spec/template/spec/tolerations
                            value:
                              - operator: Exists
              chart:
                spec:
                  chart: longhorn
                  version: v1.11.1
                  sourceRef:
                    kind: HelmRepository
                    name: longhorn
                    namespace: flux-system
              install:
                replace: true
                remediation:
                  retries: 5
              upgrade:
                preserveValues: false
                remediation:
                  retries: 5
                values:
                  defaultSettings:
                    taintToleration: "node-role.kubernetes.io/control-plane:NoSchedule;daemonset:NoSchedule;cplane-guardian:NoSchedule;worker-guardian:NoSchedule;cryptophys.io/pool=platform-ha:NoSchedule;cryptophys.io/pool=apps-ha:NoSchedule;cryptophys.io/node-class=nexus-hpc:NoSchedule;ray-cluster:NoSchedule;ray-head:NoSchedule;bridge-system:NoSchedule;dao-system:NoSchedule;node.kubernetes.io/memory-pressure:NoSchedule;node.kubernetes.io/disk-pressure:NoSchedule;node.kubernetes.io/pid-pressure:NoSchedule;node.kubernetes.io/not-ready:NoSchedule;node.kubernetes.io/unreachable:NoSchedule;node.kubernetes.io/network-unavailable:NoSchedule"
                  persistence:
                    defaultClass: true
                    defaultClassReplicaCount: 2
                  longhornManager:
                    tolerations:
                      - operator: Exists
                    resources:
                      requests:
                        cpu: "200m"
                        memory: "512Mi"
                      limits:
                        cpu: "1"
                        memory: "512Mi"
                longhornDriver:
                  nodeSelector:
                    kubernetes.io/os: linux
                  tolerations:
                    - key: daemonset
                      operator: Exists
                      effect: NoSchedule
                  resources:
                    requests:
                      cpu: "20m"
                      memory: "64Mi"
                    limits:
                      cpu: "500m"
                      memory: "512Mi"
                longhornUI:
                  tolerations:
                    - operator: Exists
                      effect: NoSchedule
                  csi:
                    attacherReplicaCount: 2
                    provisionerReplicaCount: 2
                    resizerReplicaCount: 2
                    snapshotterReplicaCount: 2
                    longhornCSI:
                      tolerations:
                        - key: daemonset
                          operator: Exists
                          effect: NoSchedule
                        - key: cryptophys.io/pool
                          operator: Equal
                          value: platform-ha
                          effect: NoSchedule
                        - key: cryptophys.io/pool
                          operator: Equal
                          value: apps-ha
                          effect: NoSchedule
                        - key: cryptophys.io/node-class
                          operator: Equal
                          value: nexus-hpc
                          effect: NoSchedule
                        - key: ray-cluster
                          operator: Exists
                          effect: NoSchedule
                        - key: ray-head
                          operator: Exists
                          effect: NoSchedule
                        - key: bridge-system
                          operator: Exists
                          effect: NoSchedule
                        - key: dao-system
                          operator: Exists
                          effect: NoSchedule
        providerConfigRef:
          name: local-kubernetes-provider
    patches:
    - fromFieldPath: spec.defaultReplicaCount
      toFieldPath: spec.forProvider.manifest.spec.values.persistence.defaultClassReplicaCount
    - fromFieldPath: spec.managerResources.requests.cpu
      toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.requests.cpu
    - fromFieldPath: spec.managerResources.requests.memory
      toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.requests.memory
    - fromFieldPath: spec.managerResources.limits.cpu
      toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.limits.cpu
    - fromFieldPath: spec.managerResources.limits.memory
      toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.limits.memory
