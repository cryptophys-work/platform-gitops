apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: longhorn-release.helm.cryptophys.work
spec:
  compositeTypeRef:
    apiVersion: cryptophys.work/v1alpha1
    kind: XLonghornRelease
  resources:
    - name: longhorn-helm
      base:
        apiVersion: helm.toolkit.fluxcd.io/v2
        kind: HelmRelease
        spec:
          interval: 1h
          releaseName: longhorn
          targetNamespace: longhorn-system
          storageNamespace: longhorn-system
          install:
            createNamespace: true
            remediation:
              retries: 5
          upgrade:
            preserveValues: false
            remediation:
              retries: 5
          chart:
            spec:
              chart: longhorn
              version: v1.11.1
              sourceRef:
                kind: HelmRepository
                name: longhorn
                namespace: flux-system
          values:
            defaultSettings:
              taintToleration: "*"
              systemManagedComponentsNodeSelector: "kubernetes.io/os: linux"
            longhornManager:
              tolerations:
                - operator: Exists
            longhornDriver:
              nodeSelector:
                kubernetes.io/os: linux
              tolerations:
                - operator: Exists
            longhornUI:
              tolerations:
                - operator: Exists
            csi:
              tolerations:
                - operator: Exists
        providerConfigRef:
          name: local-kubernetes-provider
      patches:
        - fromFieldPath: spec.namespace
          toFieldPath: spec.forProvider.manifest.metadata.namespace
        - fromFieldPath: spec.managerResources.requests.cpu
          toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.requests.cpu
        - fromFieldPath: spec.managerResources.requests.memory
          toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.requests.memory
        - fromFieldPath: spec.managerResources.limits.cpu
          toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.limits.cpu
        - fromFieldPath: spec.managerResources.limits.memory
          toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.limits.memory
