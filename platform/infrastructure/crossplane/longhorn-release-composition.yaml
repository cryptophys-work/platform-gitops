apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: longhorn-release.helm.cryptophys.work
spec:
  compositeTypeRef:
    apiVersion: cryptophys.work/v1alpha1
    kind: XLonghornRelease
  resources:
  - name: longhorn-helmrelease
    base:
      apiVersion: kubernetes.crossplane.io/v1alpha1
      kind: Object
      spec:
        forProvider:
          manifest:
            apiVersion: helm.toolkit.fluxcd.io/v2beta2
            kind: HelmRelease
            metadata:
              name: longhorn
              namespace: longhorn-system
            spec:
              interval: 1h
              timeout: 15m
              chart:
                spec:
                  chart: longhorn
                  version: v1.11.1
                  sourceRef:
                    kind: HelmRepository
                    name: longhorn
                    namespace: flux-system
              install:
                remediation:
                  retries: 3
              upgrade:
                remediation:
                  retries: 3
              values:
                persistence:
                  defaultClass: true
                  defaultClassReplicaCount: 2
                defaultSettings:
                  defaultReplicaCount: 2
                  systemManagedComponentsNodeSelector: ""
                  taintToleration: node-role.kubernetes.io/control-plane:NoSchedule;cryptophys.io/storage-only=true:NoSchedule;cryptophys.io/role=llm-inference:NoSchedule;cryptophys.io/pool=platform-ha:NoSchedule;ray-cluster=true:NoSchedule;ray-head=true:NoSchedule;bridge-system=true:NoSchedule;dao-system=true:NoSchedule;node.kubernetes.io/memory-pressure:NoSchedule
                  storageReservedPercentageForDefaultDisk: 10
                  replicaSoftAntiAffinity: true
                  replicaAutoBalance: best-effort
                  orphanResourceAutoDeletion: replica-data;instance
                  orphanResourceAutoDeletionGracePeriod: 1200
                  concurrentReplicaRebuildPerNodeLimit: 2
                  concurrentVolumeBackupRestorePerNodeLimit: 2
                  replicaReplenishmentWaitInterval: 900
                  autoCleanupSystemGeneratedSnapshot: true
                  storageOverProvisioningPercentage: 200
                  autoDeletePodWhenVolumeDetachedUnexpectedly: true
                longhornManager:
                  resources:
                    requests:
                      cpu: 200m
                      memory: 512Mi
                    limits:
                      cpu: 1000m
                      memory: 2Gi
                  tolerations:
                  # Control plane taints (DaemonSet must run on control planes)
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
                    effect: NoSchedule
                  - key: node-role.kubernetes.io/master
                    operator: Exists
                    effect: NoSchedule
                  # Cilium bootstrap taint
                  - key: node.cilium.io/agent-not-ready
                    operator: Exists
                    effect: NoSchedule
                  # Platform HA pool taint
                  - key: cryptophys.io/pool
                    operator: Equal
                    value: platform-ha
                    effect: NoSchedule
                  # Storage-only taint
                  - key: cryptophys.io/storage-only
                    operator: Exists
                    effect: NoSchedule
                  # LLM inference node taint
                  - key: cryptophys.io/role
                    operator: Exists
                    effect: NoSchedule
                  # Ray head taint
                  - key: ray-head
                    operator: Exists
                    effect: NoSchedule
                  # DAO system taint
                  - key: dao-system
                    operator: Exists
                    effect: NoSchedule
                  # Bridge system taint
                  - key: bridge-system
                    operator: Exists
                    effect: NoSchedule
                  # Temporary taints
                  - key: node.kubernetes.io/not-ready
                    operator: Exists
                    effect: NoExecute
                    tolerationSeconds: 300
                  - key: node.kubernetes.io/memory-pressure
                    operator: Exists
                    effect: NoExecute
                    tolerationSeconds: 300
                  - key: node.kubernetes.io/disk-pressure
                    operator: Exists
                    effect: NoExecute
                    tolerationSeconds: 300
                  - key: node.kubernetes.io/pid-pressure
                    operator: Exists
                    effect: NoExecute
                    tolerationSeconds: 300
                longhornDriver:
                  nodeSelector:
                    workload.cryptophys.work/storage: "true"
                  tolerations:
                  # Cilium bootstrap taint
                  - key: node.cilium.io/agent-not-ready
                    operator: Exists
                    effect: NoSchedule
                  # Platform HA pool taint
                  - key: cryptophys.io/pool
                    operator: Equal
                    value: platform-ha
                    effect: NoSchedule
                  # Storage-only taint (for dedicated storage nodes)
                  - key: cryptophys.io/storage-only
                    operator: Exists
                    effect: NoSchedule
                  # LLM inference node taint
                  - key: cryptophys.io/role
                    operator: Equal
                    value: llm-inference
                    effect: NoSchedule
                  # Temporary taints (memory/disk/pid pressure)
                  - key: node.kubernetes.io/not-ready
                    operator: Exists
                    effect: NoExecute
                    tolerationSeconds: 300
                  - key: node.kubernetes.io/disk-pressure
                    operator: Exists
                    effect: NoExecute
                    tolerationSeconds: 300
                longhornUI:
                  nodeSelector:
                    workload.cryptophys.work/compute: "true"
                  tolerations:
                  # Cilium bootstrap taint
                  - key: node.cilium.io/agent-not-ready
                    operator: Exists
                    effect: NoSchedule
                  # Platform HA pool taint
                  - key: cryptophys.io/pool
                    operator: Equal
                    value: platform-ha
                    effect: NoSchedule
                  # Storage-only taint
                  - key: cryptophys.io/storage-only
                    operator: Exists
                    effect: NoSchedule
                  # LLM inference node taint
                  - key: cryptophys.io/role
                    operator: Equal
                    value: llm-inference
                    effect: NoSchedule
                  # Ray head taint
                  - key: ray-head
                    operator: Exists
                    effect: NoSchedule
                  # DAO system taint
                  - key: dao-system
                    operator: Exists
                    effect: NoSchedule
                  # Bridge system taint
                  - key: bridge-system
                    operator: Exists
                    effect: NoSchedule
                  # Temporary taints
                  - key: node.kubernetes.io/not-ready
                    operator: Exists
                    effect: NoExecute
                    tolerationSeconds: 300
                  - key: node.kubernetes.io/disk-pressure
                    operator: Exists
                    effect: NoExecute
                    tolerationSeconds: 300
                csi:
                  attacherReplicaCount: 2
                  provisionerReplicaCount: 2
                  resizerReplicaCount: 2
                  snapshotterReplicaCount: 2
        providerConfigRef:
          name: local-kubernetes-provider
    patches:
    - fromFieldPath: spec.defaultReplicaCount
      toFieldPath: spec.forProvider.manifest.spec.values.defaultSettings.defaultReplicaCount
    - fromFieldPath: spec.defaultReplicaCount
      toFieldPath: spec.forProvider.manifest.spec.values.persistence.defaultClassReplicaCount
    - fromFieldPath: spec.managerResources.requests.cpu
      toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.requests.cpu
    - fromFieldPath: spec.managerResources.requests.memory
      toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.requests.memory
    - fromFieldPath: spec.managerResources.limits.cpu
      toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.limits.cpu
    - fromFieldPath: spec.managerResources.limits.memory
      toFieldPath: spec.forProvider.manifest.spec.values.longhornManager.resources.limits.memory
