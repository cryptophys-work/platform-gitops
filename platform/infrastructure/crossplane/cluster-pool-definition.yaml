apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xclusterpools.cryptophys.work
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: crossplane
    cryptophys.io/managed-by: flux
spec:
  group: cryptophys.work
  names:
    kind: XClusterPool
    plural: xclusterpools
  claimNames:
    kind: ClusterPool
    plural: clusterpools
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            description: "ClusterPool specification defining node membership and namespace allowlist"
            properties:
              description:
                type: string
                description: "Human-readable pool description"
              nodes:
                type: array
                description: "List of node hostnames in this pool"
                items:
                  type: string
              namespaces:
                type: array
                description: "List of namespaces allowed in this pool"
                items:
                  type: string
            required:
            - nodes
            - namespaces
