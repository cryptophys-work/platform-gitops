apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterpools.cryptophys.work
spec:
  group: cryptophys.work
  names:
    kind: ClusterPool
    plural: clusterpools
    singular: clusterpool
  scope: Cluster
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            description: "ClusterPool specification defining node membership and namespace allowlist"
            properties:
              description:
                type: string
                description: "Human-readable pool description"
              nodes:
                type: array
                description: "List of node hostnames in this pool"
                items:
                  type: string
              namespaces:
                type: array
                description: "List of namespaces allowed in this pool"
                items:
                  type: string
            required:
            - nodes
            - namespaces
