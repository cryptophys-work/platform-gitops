apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: workload-placement.kubernetes.cryptophys.work
  namespace: crossplane-system
spec:
  compositeTypeRef:
    apiVersion: cryptophys.work/v1alpha1
    kind: XWorkloadPlacement
  resources:
  # Main resource: patches deployment with node selectors and tolerations
  - name: patch-deployment-placement
    base:
      apiVersion: kubernetes.crossplane.io/v1alpha1
      kind: Object
      metadata:
        name: placement-patch
      spec:
        forProvider:
          manifest:
            apiVersion: apps/v1
            kind: Deployment # Default, patched below
            metadata:
              name: any
              namespace: any
            spec:
              template:
                spec:
                  # Keep only short-lived node-state tolerations by default.
                  # Dedicated pools and bootstrap taints must be opt-in per workload.
                  tolerations:
                  # Tolerate not-ready briefly during node transitions
                  - key: node.kubernetes.io/not-ready
                    operator: Exists
                    effect: NoExecute
                    tolerationSeconds: 300
                  # Tolerate disk pressure briefly during recovery churn
                  - key: node.kubernetes.io/disk-pressure
                    operator: Exists
                    effect: NoExecute
                    tolerationSeconds: 300
        providerConfigRef:
          name: local-kubernetes-provider
    patches:
    # Target workload metadata
    - fromFieldPath: "spec.targetWorkload.name"
      toFieldPath: "spec.forProvider.manifest.metadata.name"
    - fromFieldPath: "spec.targetWorkload.namespace"
      toFieldPath: "spec.forProvider.manifest.metadata.namespace"
    - fromFieldPath: "spec.targetWorkload.kind"
      toFieldPath: "spec.forProvider.manifest.kind"
    # Node selection: both old and new label schemes for compatibility
    - fromFieldPath: "spec.placement.tier"
      toFieldPath: "spec.forProvider.manifest.spec.template.spec.nodeSelector[cryptophys.io/tier]"
    # New workload domain labels (idempotent: only set if tier is worker/compute/storage/platform)
    - fromFieldPath: "spec.placement.tier"
      toFieldPath: "spec.forProvider.manifest.spec.template.spec.nodeSelector[workload.cryptophys.work/compute]"
      transforms:
      - type: match
        match:
          patterns:
          - type: literal
            literal: compute
            result: "true"
          - type: literal
            literal: worker
            result: "true"
    - fromFieldPath: "spec.placement.tier"
      toFieldPath: "spec.forProvider.manifest.spec.template.spec.nodeSelector[workload.cryptophys.work/storage]"
      transforms:
      - type: match
        match:
          patterns:
          - type: literal
            literal: storage
            result: "true"
    - fromFieldPath: "spec.placement.tier"
      toFieldPath: "spec.forProvider.manifest.spec.template.spec.nodeSelector[workload.cryptophys.work/platform]"
      transforms:
      - type: match
        match:
          patterns:
          - type: literal
            literal: platform
            result: "true"
    # Optional: preferred node affinity for specific hostname placement
    - fromFieldPath: "spec.placement.preferredNode"
      toFieldPath: "spec.forProvider.manifest.spec.template.spec.affinity.nodeAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].preference.matchExpressions[0].values[0]"
      policy:
        fromFieldPath: Optional

  # RayService head group placement (in addition to generic Deployment patches)
  - name: patch-rayservice-head
    base:
      apiVersion: kubernetes.crossplane.io/v1alpha1
      kind: Object
      metadata:
        name: rayservice-head-patch
      spec:
        forProvider:
          manifest:
            apiVersion: ray.io/v1
            kind: RayService
            metadata:
              name: any
              namespace: any
            spec:
              rayClusterConfig:
                headGroupSpec:
                  template:
                    spec:
                      nodeSelector: {}
        providerConfigRef:
          name: local-kubernetes-provider
    patches:
    - fromFieldPath: "spec.targetWorkload.name"
      toFieldPath: "spec.forProvider.manifest.metadata.name"
    - fromFieldPath: "spec.targetWorkload.namespace"
      toFieldPath: "spec.forProvider.manifest.metadata.namespace"
    - fromFieldPath: "spec.placement.tier"
      toFieldPath: "spec.forProvider.manifest.spec.rayClusterConfig.headGroupSpec.template.spec.nodeSelector[cryptophys.io/tier]"
    # Node affinity for preferred node (Ray head)
    - fromFieldPath: "spec.placement.preferredNode"
      toFieldPath: "spec.forProvider.manifest.spec.rayClusterConfig.headGroupSpec.template.spec.affinity.nodeAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].preference.matchExpressions[0].values[0]"
      policy:
        fromFieldPath: Optional

  # RayService worker group placement (optional, for scaling hints)
  - name: patch-rayservice-workers
    base:
      apiVersion: kubernetes.crossplane.io/v1alpha1
      kind: Object
      metadata:
        name: rayservice-worker-patch
      spec:
        forProvider:
          manifest:
            apiVersion: ray.io/v1
            kind: RayService
            metadata:
              name: any
              namespace: any
            spec:
              rayClusterConfig:
                workerGroupSpecs:
                - template:
                    spec:
                      nodeSelector: {}
        providerConfigRef:
          name: local-kubernetes-provider
    patches:
    - fromFieldPath: "spec.targetWorkload.name"
      toFieldPath: "spec.forProvider.manifest.metadata.name"
    - fromFieldPath: "spec.targetWorkload.namespace"
      toFieldPath: "spec.forProvider.manifest.metadata.namespace"
    - fromFieldPath: "spec.placement.tier"
      toFieldPath: "spec.forProvider.manifest.spec.rayClusterConfig.workerGroupSpecs[0].template.spec.nodeSelector[cryptophys.io/tier]"
