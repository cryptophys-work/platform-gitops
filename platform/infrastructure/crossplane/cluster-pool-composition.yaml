apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: clusterpool.kyverno.cryptophys.work
  labels:
    tier: platform
spec:
  compositeTypeRef:
    apiVersion: cryptophys.work/v1alpha1
    kind: XClusterPool
  resources:
  - name: kyverno-pool-policy
    base:
      apiVersion: kubernetes.crossplane.io/v1alpha1
      kind: Object
      spec:
        forProvider:
          manifest:
            apiVersion: kyverno.io/v1
            kind: ClusterPolicy
            metadata:
              name: ""
              annotations:
                policies.kyverno.io/category: "Node Placement"
                policies.kyverno.io/severity: "medium"
                cryptophys.io/managed-by: crossplane
                cryptophys.io/component: cluster-pool-policy
                pod-policies.kyverno.io/autogen-controllers: "none"
            spec:
              validationFailureAction: audit
              background: true
              # Append-only mutations: patchStrategicMerge on tolerations replaces broad
              # entries (e.g. operator Exists on ingress / Falco DaemonSets) and breaks 8/8.
              rules:
              - name: inject-pool-toleration
                match:
                  any:
                  - resources:
                      kinds: [Pod]
                      namespaceSelector:
                        matchLabels:
                          cryptophys.io/pool: ""
                preconditions:
                  all:
                  - key: "{{ (request.object.spec.tolerations || []) | length(@) }}"
                    operator: Equals
                    value: 0
                mutate:
                  patchesJson6902: |
                    - op: add
                      path: /spec/tolerations
                      value:
                        - key: cryptophys.io/pool
                          operator: Equal
                          value: pool-placeholder
                          effect: NoSchedule
              - name: append-pool-toleration
                match:
                  any:
                  - resources:
                      kinds: [Pod]
                      namespaceSelector:
                        matchLabels:
                          cryptophys.io/pool: ""
                preconditions:
                  all:
                  - key: "{{ request.object.spec.tolerations || '' }}"
                    operator: NotEquals
                    value: ""
                  - key: "{{ request.object.spec.tolerations[?key=='cryptophys.io/pool' && value=='pool-placeholder'] | length(@) }}"
                    operator: Equals
                    value: 0
                mutate:
                  patchesJson6902: |
                    - op: add
                      path: /spec/tolerations/-
                      value:
                        key: cryptophys.io/pool
                        operator: Equal
                        value: pool-placeholder
                        effect: NoSchedule
        providerConfigRef:
          name: local-kubernetes-provider
    patches:
    # Policy name: "mutate-pool-tolerations-<pool-name>"
    - fromFieldPath: "metadata.labels[crossplane.io/claim-name]"
      toFieldPath: "spec.forProvider.manifest.metadata.name"
      transforms:
      - type: string
        string:
          fmt: "mutate-pool-tolerations-%s"
    - fromFieldPath: "metadata.labels[crossplane.io/claim-name]"
      toFieldPath: "spec.forProvider.manifest.spec.rules[0].name"
      transforms:
      - type: string
        string:
          fmt: "inject-%s-toleration"
    - fromFieldPath: "metadata.labels[crossplane.io/claim-name]"
      toFieldPath: "spec.forProvider.manifest.spec.rules[1].name"
      transforms:
      - type: string
        string:
          fmt: "append-%s-toleration"
    - fromFieldPath: "metadata.labels[crossplane.io/claim-name]"
      toFieldPath: "spec.forProvider.manifest.spec.rules[0].match.any[0].resources.namespaceSelector.matchLabels[cryptophys.io/pool]"
    - fromFieldPath: "metadata.labels[crossplane.io/claim-name]"
      toFieldPath: "spec.forProvider.manifest.spec.rules[1].match.any[0].resources.namespaceSelector.matchLabels[cryptophys.io/pool]"
    - fromFieldPath: "metadata.labels[crossplane.io/claim-name]"
      toFieldPath: "spec.forProvider.manifest.spec.rules[1].preconditions.all[1].key"
      transforms:
      - type: string
        string:
          fmt: "{{ request.object.spec.tolerations[?key=='cryptophys.io/pool' && value=='%s'] | length(@) }}"
    - fromFieldPath: "metadata.labels[crossplane.io/claim-name]"
      toFieldPath: "spec.forProvider.manifest.spec.rules[0].mutate.patchesJson6902"
      transforms:
      - type: string
        string:
          fmt: |
            - op: add
              path: /spec/tolerations
              value:
                - key: cryptophys.io/pool
                  operator: Equal
                  value: %s
                  effect: NoSchedule
    - fromFieldPath: "metadata.labels[crossplane.io/claim-name]"
      toFieldPath: "spec.forProvider.manifest.spec.rules[1].mutate.patchesJson6902"
      transforms:
      - type: string
        string:
          fmt: |
            - op: add
              path: /spec/tolerations/-
              value:
                key: cryptophys.io/pool
                operator: Equal
                value: %s
                effect: NoSchedule
  - name: pool-namespace-object
    base:
      apiVersion: kubernetes.crossplane.io/v1alpha1
      kind: Object
      spec:
        forProvider:
          manifest:
            apiVersion: v1
            kind: Namespace
            metadata:
              name: ""
              labels:
                cryptophys.io/pool: ""
                cryptophys.io/synced-by: crossplane
                cryptophys.io/managed-by: flux
        providerConfigRef:
          name: local-kubernetes-provider
    patches:
    # Namespace name matches pool name (for reference/audit)
    - fromFieldPath: "metadata.labels[crossplane.io/claim-name]"
      toFieldPath: "spec.forProvider.manifest.metadata.name"
    # Pool label value matches pool name
    - fromFieldPath: "metadata.labels[crossplane.io/claim-name]"
      toFieldPath: "spec.forProvider.manifest.metadata.labels[cryptophys.io/pool]"
