apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xmanagednodes.cryptophys.work
spec:
  group: cryptophys.work
  names:
    kind: XManagedNode
    plural: xmanagednodes
  claimNames:
    kind: ManagedNode
    plural: managednodes
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              tier:
                type: string
                description: "The tier of the node (e.g., platform, compute, storage)."
              resourceLimitMultiplier:
                type: number
                description: "Multiplier for resource limits (e.g., 0.65 for 65%)."
              taints:
                type: array
                description: "Node taints to apply."
                items:
                  type: object
                  properties:
                    key:
                      type: string
                    value:
                      type: string
                    effect:
                      type: string
                      enum: [NoSchedule, NoExecute, PreferNoSchedule]
                  required:
                  - key
                  - effect
              customLabels:
                type: object
                description: "Custom labels to apply to the node."
                x-kubernetes-preserve-unknown-fields: true
              longhornNode:
                type: object
                description: "Longhorn node configuration."
                properties:
                  allowScheduling:
                    type: boolean
                  evictionRequested:
                    type: boolean
                  disks:
                    type: object
                    description: "Longhorn disks by name (map)."
                    x-kubernetes-preserve-unknown-fields: true
                    additionalProperties:
                      type: object
                      properties:
                        path:
                          type: string
                        allowScheduling:
                          type: boolean
                        storageReserved:
                          type: integer
                        evictionRequested:
                          type: boolean
                      required:
                      - path
            required:
            - tier
