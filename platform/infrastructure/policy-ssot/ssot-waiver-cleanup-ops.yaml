apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ssot-waiver-cleanup-ops
  namespace: flux-system
spec:
  suspend: true
  interval: 10m
  prune: true
  wait: true
  timeout: 2m
  path: ./ops/waiver-cleanup
  sourceRef:
    kind: GitRepository
    name: ssot-core-repo
  dependsOn:
    - name: ssot-kyverno-exception-governance
