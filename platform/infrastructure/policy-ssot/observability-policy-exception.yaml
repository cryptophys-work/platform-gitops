apiVersion: kyverno.io/v2beta1
kind: PolicyException
metadata:
  name: observability-system-exception
  namespace: observability-system
spec:
  exceptions:
    - policyName: cp-security-hardening-v1
      ruleNames:
        - restrict-pod-security-standard
    - policyName: cp-standard-resources-limits-v1
      ruleNames:
        - require-limits-requests
    - policyName: cp-enforce-business
      ruleNames:
        - require-resources
  match:
    any:
      - resources:
          namespaces:
            - observability-system
