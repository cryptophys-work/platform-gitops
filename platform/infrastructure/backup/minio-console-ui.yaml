apiVersion: v1
kind: Service
metadata:
  name: platform-backup-minio-console-ui
  namespace: minio-system
  labels:
    app.kubernetes.io/name: minio-console
    app.kubernetes.io/component: console
    cryptophys.io/domain: platform
    cryptophys.io/component: minio-console
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: minio-console
  ports:
    - name: http
      port: 9090
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-backup-minio-console-ui
  namespace: minio-system
  labels:
    app.kubernetes.io/name: minio-console
    app.kubernetes.io/component: console
    cryptophys.io/domain: platform
    cryptophys.io/component: minio-console
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-console
        app.kubernetes.io/component: console
        cryptophys.io/domain: platform
        cryptophys.io/component: minio-console
        cryptophys.io/managed-by: flux
        cryptophys.io/layer: platform
    spec:
      nodeSelector:
        workload.cryptophys.work/platform: "true"
        accepts-platform-workloads: "true"
        cryptophys.io/node-class: nexus-hpc
      tolerations:
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
        - key: ray-head
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: ray-cluster
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: console
          image: docker.io/minio/console:v1.7.6
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9090
          env:
            - name: CONSOLE_PORT
              value: "9090"
            - name: CONSOLE_MINIO_SERVER
              value: http://platform-backup-minio.minio-system.svc.cluster.local:9000
            - name: CONSOLE_MINIO_SERVER_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-backup-minio-credentials
                  key: rootUser
            - name: CONSOLE_MINIO_SERVER_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-backup-minio-credentials
                  key: rootPassword
            - name: CONSOLE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-backup-minio-credentials
                  key: rootUser
            - name: CONSOLE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-backup-minio-credentials
                  key: rootPassword
            - name: CONSOLE_PBKDF_PASSPHRASE
              valueFrom:
                secretKeyRef:
                  name: platform-backup-minio-credentials
                  key: rootPassword
            - name: CONSOLE_PBKDF_SALT
              valueFrom:
                secretKeyRef:
                  name: platform-backup-minio-credentials
                  key: rootUser
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
