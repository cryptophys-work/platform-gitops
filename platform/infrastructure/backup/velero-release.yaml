apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-backup-velero
  namespace: velero-system
spec:
  interval: 1h
  timeout: 20m
  install:
    timeout: 20m
    remediation:
      retries: 3
  upgrade:
    timeout: 20m
    remediation:
      retries: 3
  chart:
    spec:
      chart: velero
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
  values:
    upgradeCRDs: false
    credentials:
      useSecret: true
      existingSecret: platform-backup-velero-credentials
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.11.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - name: plugins
            mountPath: /target
    configuration:
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: velero
          default: true
          accessMode: ReadWrite
          config:
            region: us-east-1
            s3ForcePathStyle: "true"
            s3Url: http://platform-backup-minio.minio-system.svc.cluster.local:9000
    snapshotsEnabled: false
    deployNodeAgent: false
    tolerations:
      - key: cryptophys.io/storage-only
        operator: Exists
        effect: NoSchedule
    nodeSelector:
      cryptophys.io/node-role: storage-worker
      kubernetes.io/hostname: campus-212-47-66-101
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
