apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: platform-gitops-system
spec:
  interval: 1h
  chart:
    spec:
      chart: velero
      version: 7.1.5
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: platform-gitops-system
  values:
    configuration:
      backupStorageLocation:
      - name: default
        provider: aws
        bucket: velero
        config:
          region: minio
          s3ForcePathStyle: true
          s3Url: http://platform-backup-minio.platform-backup.svc.cluster.local:9000
    initContainers:
    - name: velero-plugin-for-aws
      image: velero/velero-plugin-for-aws:v1.9.0
      volumeMounts:
      - mountPath: /plugins
        name: plugins
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    credentials:
      secretContents:
        cloud: |
          [default]
          aws_access_key_id=velero
          aws_secret_access_key=CryptophysBackup2026!
    deployNodeAgent: true
