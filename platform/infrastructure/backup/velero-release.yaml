apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: platform-backup-velero
  namespace: velero-system
spec:
  interval: 1h
  timeout: 20m
  install:
    timeout: 20m
    remediation:
      retries: 3
  upgrade:
    timeout: 20m
    remediation:
      retries: 3
  chart:
    spec:
      chart: velero
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
  values:
    configuration:
      backupStorageLocation:
      - name: default
        provider: aws
        bucket: velero
        default: true
        accessMode: ReadWrite
        config:
          region: us-east-1
          s3ForcePathStyle: true
          s3Url: http://platform-backup-minio.minio-system.svc.cluster.local:9000
      uploaderType: kopia
      defaultVolumesToFsBackup: false
    initContainers:
    - name: velero-plugin-for-aws
      image: velero/velero-plugin-for-aws:v1.11.0
      imagePullPolicy: IfNotPresent
      volumeMounts:
      - mountPath: /target
        name: plugins
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    credentials:
      existingSecret: platform-backup-velero-credentials
      useSecret: true
    deployNodeAgent: true
    nodeAgent:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
    snapshotsEnabled: false
    upgradeCRDs: false
    replicas: 2
    nodeSelector:
      workload.cryptophys.work/platform: "true"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: velero
              topologyKey: kubernetes.io/hostname
    tolerations:
      - key: cryptophys.io/role
        operator: Equal
        value: llm-inference
        effect: NoSchedule
      - key: node.cilium.io/agent-not-ready
        operator: Exists
        effect: NoSchedule
      - key: bridge-system
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: dao-system
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: ray-head
        operator: Equal
        value: "true"
        effect: NoSchedule
    livenessProbe:
      httpGet:
        path: /metrics
        port: 8085
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /metrics
        port: 8085
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
