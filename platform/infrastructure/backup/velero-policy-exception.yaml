apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: platform-backup-velero
  namespace: velero-system
  labels:
    cryptophys.io/contract: contract.platform.component.velero.v1
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
  annotations:
    owner: platform-team
    reason: velero-backup-service-requires-security-exceptions
    ticket: PLATFORM-001
    expiry: "2026-12-31"
    cryptophys.work/exception-expires-at: "2026-12-31T23:59:59Z"
spec:
  exceptions:
    - policyName: cp-security-hardening-v1
      ruleNames:
        - restrict-pod-security-standard
        - autogen-restrict-pod-security-standard
    - policyName: cp-standard-naming-canonical-v1
      ruleNames:
        - validate-resource-name
        - autogen-validate-resource-name
    - policyName: cp-standard-naming-v1
      ruleNames:
        - validate-resource-name
        - autogen-validate-resource-name
    - policyName: cp-standard-resources-limits-v1
      ruleNames:
        - require-limits-requests
        - autogen-require-limits-requests
    - policyName: cp-integrity-provenance-v1
      ruleNames:
        - enforce-helm-provenance
        - check-canonical-release-name
    - policyName: cp-supplychain-registry-v1
      ruleNames:
        - restrict-image-registries
        - autogen-restrict-image-registries
  match:
    any:
      - resources:
          kinds:
            - Pod
            - Job
            - DaemonSet
            - Deployment
            - ReplicaSet
          names:
            - velero*
            - platform-backup-velero*
            - node-agent*
            - "*-default-kopia-maintain-job*"
          namespaces:
            - velero-system
