apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-console
  namespace: minio-system
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* "^/browser(/.*)?$") {
        return 308 /;
      }
      sub_filter_once off;
      sub_filter_types text/html;
      sub_filter '</head>' '<script>try{localStorage.removeItem("redirect-path");if(location.hash&&location.hash.indexOf("#/browser")===0){history.replaceState(null,"","/");location.hash="";}}catch(e){}</script></head>';
    # Longer timeouts during PVC attach / pod restart (avoids nginx closing early while upstream is down)
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: minio.cryptophys.work
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-backup-minio-console
                port:
                  number: 9001
  tls:
    - secretName: platform-wildcard-tls
      hosts:
        - minio.cryptophys.work
