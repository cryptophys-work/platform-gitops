apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-backup-minio
  namespace: minio-system
spec:
  interval: 1h
  timeout: 20m
  install:
    timeout: 20m
    remediation:
      retries: 3
  upgrade:
    timeout: 20m
    remediation:
      retries: 3
  chart:
    spec:
      chart: minio
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: flux-system
  values:
    mode: standalone
    replicas: 1
    existingSecret: platform-backup-minio-credentials
    buckets:
      - name: velero
      - name: ai-models
    makeBucketJob:
      tolerations:
        - key: cryptophys.io/storage-only
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        cryptophys.io/node-role: storage-worker
        kubernetes.io/hostname: campus-212-47-66-101
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
    postJob:
      tolerations:
        - key: cryptophys.io/storage-only
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        cryptophys.io/node-role: storage-worker
        kubernetes.io/hostname: campus-212-47-66-101
    deploymentUpdate:
      type: Recreate
    persistence:
      enabled: true
      storageClass: longhorn
      size: 20Gi
    tolerations:
      - key: cryptophys.io/storage-only
        operator: Exists
        effect: NoSchedule
    nodeSelector:
      cryptophys.io/node-role: storage-worker
      kubernetes.io/hostname: campus-212-47-66-101
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
