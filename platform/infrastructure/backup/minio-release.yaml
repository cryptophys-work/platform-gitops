apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-backup-minio
  namespace: minio-system
spec:
  interval: 1h
  timeout: 35m
  install:
    timeout: 35m
    # Must be false so the MinIO Deployment is Ready before post-install mc jobs run
    disableWait: false
    remediation:
      retries: 3
  upgrade:
    timeout: 35m
    disableWait: false
    remediation:
      retries: 3
  chart:
    spec:
      chart: minio
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: flux-system
  values:
    commonLabels:
      app.kubernetes.io/instance: platform-backup-minio
    mode: standalone
    replicas: 1
    existingSecret: platform-backup-minio-credentials
    image:
      repository: quay.io/minio/minio
      # Required to read xl.meta v3 files written by the accidental newer MinIO pod.
      tag: RELEASE.2025-09-07T16-13-09Z
    users: []
    buckets:
      - name: velero
      - name: models
      # Loki boltdb-shipper chunk + index offload (HelmRelease platform-observability-loki)
      - name: loki
    makeBucketJob:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
    postJob: {}
    containerSecurityContext:
      allowPrivilegeEscalation: false
      privileged: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      enabled: true
      runAsUser: 1000
      runAsGroup: 1000
    deploymentUpdate:
      type: Recreate
    persistence:
      enabled: true
      storageClass: longhorn-backup
      # 180Gi keeps Longhorn 15% minimal-available headroom on nexus backup disks
      size: 200Gi
    nodeSelector:
      workload.cryptophys.work/platform: "true"
      accepts-platform-workloads: "true"
      cryptophys.io/node-class: nexus-hpc
    affinity: {}
    tolerations:
      # Minio runs on nexus-hpc node which has large storage for models
      - key: cryptophys.io/pool
        operator: Equal
        value: platform-ha
        effect: NoSchedule
      - key: ray-head
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: ray-cluster
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: node.cilium.io/agent-not-ready
        operator: Exists
        effect: NoSchedule
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
