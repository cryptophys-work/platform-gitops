apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-backup-minio
  namespace: minio-system
spec:
  interval: 1h
  timeout: 20m
  install:
    timeout: 20m
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    timeout: 20m
    disableWait: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: minio
      sourceRef:
        kind: HelmRepository
        name: minio
        namespace: flux-system
  values:
    mode: standalone
    replicas: 1
    # Hardcoded fix for Talos storage permissions
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: Always
      runAsUser: 1000
      runAsGroup: 1000
    initContainers:
      - name: fix-permissions
        image: busybox:1.36.1
        command: ["sh", "-c", "chown -R 1000:1000 /data && chmod -R 775 /data"]
        securityContext:
          runAsUser: 0
        volumeMounts:
          - name: data
            mountPath: /data
    existingSecret: minio-static-creds
    users: []
    buckets:
      - name: velero
      - name: models
    makeBucketJob:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
    postJob: {}
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      enabled: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    deploymentUpdate:
      type: Recreate
    persistence:
      enabled: true
      storageClass: longhorn
      size: 50Gi
    nodeSelector:
      workload.cryptophys.work/platform: "true"
      accepts-platform-workloads: "true"
    tolerations:
      - key: ray-cluster
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: node.cilium.io/agent-not-ready
        operator: Exists
        effect: NoSchedule
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
