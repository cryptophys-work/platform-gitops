    identity:
      externalCA: true
      issuer:
        scheme: kubernetes.io/tls
        tls:
          crtPEM: ""
          keyPEM: ""

    # Scheduling on Platform Nodes
    # deploymentStrategy: maxSurge=0 to avoid anti-affinity deadlock on 3 platform nodes
    deploymentStrategy:
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    nodeSelector:
      cryptophys.io/tier: platform
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
