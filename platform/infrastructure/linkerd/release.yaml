apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: linkerd-control-plane
  namespace: linkerd-system
spec:
  interval: 1h
  timeout: 30m
  install:
    timeout: 30m
    remediation:
      retries: 3
  upgrade:
    timeout: 30m
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: linkerd-control-plane
      version: "1.16.11" # HA stable version
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system
  values:
    # High Availability Configuration
    replicas: 3
    enablePodAntiAffinity: true
    
    # Talos Linux: use CNI plugin mode (no iptables init container)
    cniEnabled: true
    
    # Talos/Cilium: disable network validator (iptables check not applicable with CNI mode)
    networkValidator:
      enabled: false
    
    # Talos: network validator can't use iptables; CNI handles traffic routing
    # Disable the network-validator connectAddr external probe (CNI mode workaround)
    proxyInit:
      runAsRoot: false
      ignoreOutboundPorts: "4567,4568"
    
    # SPIRE/SPIFFE Integration (External Identity)
    identity:
      externalCA: true
      issuer:
        scheme: linkerd.io/spiffe
    
    # Scheduling on Platform Nodes
    nodeSelector:
      cryptophys.io/tier: platform
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
