apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: linkerd-control-plane
  namespace: linkerd-system
spec:
  interval: 1h
  timeout: 30m
  install:
    timeout: 30m
    remediation:
      retries: 3
  upgrade:
    timeout: 30m
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: linkerd-control-plane
      version: "1.16.11" # HA stable version
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system
  values:
    # High Availability Configuration
    replicas: 3
    enablePodAntiAffinity: true
    
    # Talos Linux: use proxy-init container mode (not CNI chaining)
    # Talos host does NOT have nsenter, so CNI plugin mode cannot work
    cniEnabled: false
    
    proxyInit:
      runAsRoot: true
      iptablesMode: nft
      ignoreOutboundPorts: "4567,4568"
    
    # Identity: self-managed CA (linkerd-identity-issuer Secret + trust-roots ConfigMap)
    # linkerd-identity-issuer Secret created manually with issuer CA cert/key
    # linkerd-identity-trust-roots ConfigMap created manually with trust anchor
    # ECDSA P-256 trust anchor (matches linkerd proxy cert algorithm)
    identityTrustAnchorsPEM: |
      -----BEGIN CERTIFICATE-----
      MIIB8jCCAZmgAwIBAgIUUbYNsjs97D+S5Rb/kR9sr1xQhCcwCgYIKoZIzj0EAwIw
      RzELMAkGA1UEBhMCVVMxEzARBgNVBAoMCmNyeXB0b3BoeXMxIzAhBgNVBAMMGnJv
      b3QubGlua2VyZC5jbHVzdGVyLmxvY2FsMB4XDTI2MDMwMzExMjkyMVoXDTM2MDIy
      OTExMjkyMVowRzELMAkGA1UEBhMCVVMxEzARBgNVBAoMCmNyeXB0b3BoeXMxIzAh
      BgNVBAMMGnJvb3QubGlua2VyZC5jbHVzdGVyLmxvY2FsMFkwEwYHKoZIzj0CAQYI
      KoZIzj0DAQcDQgAEh6GWqHJC/gbtOQ0xf+IaNMrka3SRx2QNkxw5C1mQbd05R9tw
      //zcGOfF7LLajtf/2luCsqw5l5eDcJsneBdaRqNjMGEwHQYDVR0OBBYEFNiI1ZhD
      oQHtpNqq/xgso4ipoGvYMB8GA1UdIwQYMBaAFNiI1ZhDoQHtpNqq/xgso4ipoGvY
      MA8GA1UdEwEB/wQFMAMBAf8wDgYDVR0PAQH/BAQDAgEGMAoGCCqGSM49BAMCA0cA
      MEQCIGwy3/SdHupbTFCMg9LBGXL5WZZ8GGLWNxcKpkkYrJECAiAwUjkGaIvGwLem
      Fi2i9MTeiycVENTtURP+D680zaIgAA==
      -----END CERTIFICATE-----
    identity:
      externalCA: true
      issuer:
        scheme: kubernetes.io/tls
        tls:
          crtPEM: ""
          keyPEM: ""

    # Scheduling on Platform Nodes
    # deploymentStrategy: maxSurge=0 to avoid anti-affinity deadlock on 3 platform nodes
    deploymentStrategy:
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    nodeSelector:
      cryptophys.io/tier: platform
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
