apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: linkerd-control-plane
  namespace: linkerd-system
spec:
  interval: 1h
  timeout: 30m
  install:
    timeout: 30m
    remediation:
      retries: 3
  upgrade:
    timeout: 30m
    force: true
    cleanupOnFail: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: linkerd-control-plane
      version: "1.16.11" # HA stable version
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system
  values:
    # High Availability Configuration
    replicas: 3
    enablePodAntiAffinity: true
    
    # Talos Linux: use CNI plugin mode (no iptables init container)
    cniEnabled: true
    
    # Talos/Cilium: network validator init container is injected when cniEnabled=true
    # It tests iptables interception by connecting to 1.1.1.1:20001
    # Cilium uses eBPF not iptables, so we point connectAddr to itself (loopback)
    networkValidator:
      enabled: true
      connectAddr: "127.0.0.1:4140"
      listenAddr: "0.0.0.0:4140"
      timeout: "10s"
    proxyInit:
      runAsRoot: false
      ignoreOutboundPorts: "4567,4568"
    
    # Identity: self-managed CA (linkerd-identity-issuer Secret + trust-roots ConfigMap)
    # linkerd-identity-issuer Secret created manually with issuer CA cert/key
    # linkerd-identity-trust-roots ConfigMap created manually with trust anchor
