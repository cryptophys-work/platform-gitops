apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: linkerd-control-plane
  namespace: linkerd-system
spec:
  interval: 1h
  timeout: 20m
  install:
    timeout: 20m
  upgrade:
    timeout: 20m
  chart:
    spec:
      chart: linkerd-control-plane
      version: "1.16.11" # HA stable version
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system
  values:
    # High Availability Configuration
    replicas: 3
    enablePodAntiAffinity: true
    
    # SPIRE/SPIFFE Integration (External Identity)
    identity:
      externalCA: true
      issuer:
        scheme: linkerd.io/spiffe
    
    # Scheduling on Platform Nodes
    nodeSelector:
      cryptophys.io/tier: platform
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
