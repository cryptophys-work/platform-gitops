apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: linkerd-cni
  namespace: linkerd-system
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: linkerd2-cni
      version: "30.12.2"
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system
  values:
    # Talos Linux: use CNI plugin instead of init container (no iptables)
    destCNINetDir: /etc/cni/net.d
    destCNIBinDir: /opt/cni/bin
    # hostNetwork=true breaks the bootstrap deadlock:
    # without it, the CNI DaemonSet pod needs CNI to create its own network → Unauthorized loop
    useHostNetwork: true
    # Run on all nodes
    tolerations:
      - operator: Exists
