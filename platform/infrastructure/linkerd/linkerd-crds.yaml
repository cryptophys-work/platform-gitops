apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: linkerd-crds
  namespace: linkerd
spec:
  releaseName: linkerd-crds
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: linkerd-crds
      version: 1.8.0
      sourceRef:
        kind: HelmRepository
        name: linkerd
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
