apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: stale-apps-ha-pods-delete-exception
  namespace: kyverno-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: policy-exception
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
  annotations:
    cryptophys.work/exception-owner: "platform-sre"
    cryptophys.work/exception-reason: >-
      Allow deletion and one-time recreation of pre-/23 pods that still retain a
      legacy apps-ha toleration in non-app namespaces after the worker PodCIDR migration.
    cryptophys.work/exception-ticket: "OPS-PODCIDR23-STALE-PODS-001"
    cryptophys.work/exception-expires-at: "2026-04-30T00:00:00Z"
spec:
  exceptions:
    - policyName: deny-apps-ha-toleration-outside-apps
      ruleNames:
        - block-apps-ha
  match:
    any:
      - resources:
          kinds:
            - Pod
          namespaces:
            - image-factory
          names:
            - buildkit-warm-head-4pb6q
      - resources:
          kinds:
            - Pod
          namespaces:
            - monitoring-core
          names:
            - monitoring-mesh-mfshb-head-s4qkd
