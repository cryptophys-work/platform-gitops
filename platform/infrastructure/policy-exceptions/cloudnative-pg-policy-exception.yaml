apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: cloudnative-pg-platform-ha-exception
  namespace: kyverno-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: cnpg
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
  annotations:
    cryptophys.work/exception-owner: "platform-sre"
    cryptophys.work/exception-reason: >-
      Allow the CloudNativePG operator rollout to replace legacy pods that still
      carry the old platform-ha toleration while the operator is moved onto the
      current apps-core-capable node pool.
    cryptophys.work/exception-ticket: "OPS-CNPG-001"
    cryptophys.work/exception-expires-at: "2026-06-30T00:00:00Z"
  spec:
    exceptions:
      - policyName: deny-platform-ha-toleration-outside-platform
        ruleNames:
          - autogen-block-platform-ha
          - block-platform-ha
      - policyName: cp-security-hardening-v1
        ruleNames:
          - restrict-pod-security-standard
          - autogen-restrict-pod-security-standard
    match:
      any:
      - resources:
          kinds:
            - Deployment
            - ReplicaSet
            - Pod
          namespaces:
            - cnpg-system
          names:
            - cloudnative-pg
            - cloudnative-pg-*
