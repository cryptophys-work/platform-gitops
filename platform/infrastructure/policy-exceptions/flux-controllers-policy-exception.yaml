apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: flux-controllers-exception
  namespace: flux-system
  annotations:
    cryptophys.work/exception-owner: "platform-sre"
    cryptophys.work/exception-reason: "Allow Flux controllers to run while policy baseline for platform controllers is aligned."
    cryptophys.work/exception-ticket: "OPS-147"
    cryptophys.work/exception-expires-at: "2026-06-30T00:00:00Z"
spec:
  exceptions:
    - policyName: cp-integrity-provenance-v1
      ruleNames:
        - enforce-helm-provenance
        - check-canonical-release-name
    - policyName: cp-security-hardening-v1
      ruleNames:
        - autogen-restrict-pod-security-standard
  match:
    any:
      - resources:
          kinds:
            - Deployment
            - Pod
            - Service
            - ServiceAccount
          namespaces:
            - flux-system
          names:
            - "*-controller*"
