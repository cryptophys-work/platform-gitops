apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: longhorn-system-exception
  namespace: longhorn-system
spec:
  exceptions:
    - policyName: deny-cp-toleration-non-platform
      ruleNames:
        - check-cp-toleration
        - autogen-check-cp-toleration
    - policyName: deny-cp-nodeselector-non-platform
      ruleNames:
        - check-cp-nodeselector
        - autogen-check-cp-nodeselector
    - policyName: cp-pss-restricted-v1
      ruleNames:
        - autogen-deny-privileged-containers
    - policyName: cp-supplychain-registry-v1
      ruleNames:
        - autogen-restrict-image-registries
    - policyName: cp-platform-baseline
      ruleNames:
        - require-standard-labels
    - policyName: cp-enforce-business
      ruleNames:
        - autogen-require-resources
    - policyName: cp-standard-resources-limits-v1
      ruleNames:
        - autogen-require-limits-requests
  match:
    any:
      - resources:
          kinds:
            - ConfigMap
            - Pod
            - DaemonSet
            - Deployment
            - StatefulSet
          namespaces:
            - longhorn-system
