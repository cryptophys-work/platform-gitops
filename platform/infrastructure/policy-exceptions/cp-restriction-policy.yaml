---
# ClusterPolicy: Deny control-plane toleration except kube-system and DaemonSet pods
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-cp-toleration-non-platform
  annotations:
    pod-policies.kyverno.io/autogen-controllers: none
    policies.kyverno.io/title: Deny CP Toleration Outside kube-system and DaemonSet
    policies.kyverno.io/category: Node Placement
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Control-plane nodes are reserved for kube-system and node-level daemons only.
      Any non-DaemonSet workload outside kube-system MUST NOT tolerate
      node-role.kubernetes.io/control-plane taint.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-cp-toleration
      match:
        any:
          - resources:
              kinds:
                - Pod
      preconditions:
        all:
          - key: "{{ request.object.metadata.namespace || '' }}"
            operator: NotIn
            value:
              - kube-system
              - longhorn-system
              - cilium-system
          - key: "{{ request.object.metadata.ownerReferences[0].kind || '' }}"
            operator: NotEquals
            value: DaemonSet
      validate:
        message: >
          Only kube-system or DaemonSet pods may tolerate control-plane taints.
          Remove toleration key=node-role.kubernetes.io/control-plane.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.tolerations[].key | contains(@, 'node-role.kubernetes.io/control-plane') }}"
                operator: Equals
                value: true
---
# ClusterPolicy: Deny direct control-plane node selectors except kube-system and DaemonSet pods
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-cp-nodeselector-non-platform
  annotations:
    policies.kyverno.io/title: Deny CP NodeSelector Outside kube-system and DaemonSet
    policies.kyverno.io/category: Node Placement
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Any non-DaemonSet workload outside kube-system must not target
      control-plane labels in nodeSelector.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-cp-nodeselector
      match:
        any:
          - resources:
              kinds:
                - Pod
      preconditions:
        all:
          - key: "{{ request.object.metadata.namespace || '' }}"
            operator: NotIn
            value:
              - kube-system
              - longhorn-system
              - cilium-system
          - key: "{{ request.object.metadata.ownerReferences[0].kind || '' }}"
            operator: NotEquals
            value: DaemonSet
      validate:
        message: >
          Only kube-system or DaemonSet pods may target control-plane nodes.
          Remove nodeSelector using control-plane labels.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.nodeSelector.\"node-role.kubernetes.io/control-plane\" || '' }}"
                operator: NotEquals
                value: ""
              - key: "{{ request.object.spec.nodeSelector.\"node-role.kubernetes.io/master\" || '' }}"
                operator: NotEquals
                value: ""
              - key: "{{ request.object.spec.nodeSelector.\"cryptophys.io/tier\" || '' }}"
                operator: Equals
                value: platform
