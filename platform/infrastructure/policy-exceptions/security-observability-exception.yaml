apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: security-observability-exception
  namespace: kyverno-system
  annotations:
    cryptophys.io/contract: contract.platform.policy.v1
    cryptophys.io/reason: "Falco/Tetragon/Gatekeeper are security DaemonSets; legitimately run on all nodes including control-plane"
spec:
  exceptions:
    - policyName: deny-cp-toleration-non-platform
      ruleNames:
        - check-cp-toleration
    - policyName: deny-cp-nodeselector-non-platform
      ruleNames:
        - check-cp-nodeselector
    - policyName: cp-pss-restricted-v1
      ruleNames:
        - deny-privileged-containers
        - deny-host-namespaces
        - deny-hostpath-volumes
    - policyName: cp-security-hardening-v1
      ruleNames:
        - restrict-pod-security-standard
    - policyName: cp-integrity-ssot-boundary-v1
      ruleNames:
        - restrict-ssot-mount-boundary
  match:
    any:
      - resources:
          kinds:
            - Pod
            - DaemonSet
          namespaces:
            - falco-system
            - tetragon-system
            - gatekeeper-system
