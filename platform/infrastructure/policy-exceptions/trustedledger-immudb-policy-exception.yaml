---
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: trustedledger-immudb-platform-ha-exception
  namespace: kyverno-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: trustedledger
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
  annotations:
    cryptophys.work/exception-owner: "platform-sre"
    cryptophys.work/exception-reason: >-
      Allow trustedledger-omega-immudb StatefulSet pod under platform-ha tolerations.
      The core-memory namespace is labeled platform-ha but the pod needs to
      tolerate the pool taint to schedule on platform-ha nodes.
    cryptophys.work/exception-ticket: "OPS-IMMUDB-001"
    cryptophys.work/exception-expires-at: "2026-05-27T00:00:00Z"
spec:
  exceptions:
    - policyName: deny-platform-ha-toleration-outside-platform
      ruleNames:
        - block-platform-ha
  match:
    any:
      - resources:
          kinds:
            - Pod
          namespaces:
            - core-memory
          names:
            - trustedledger-omega-immudb-0
