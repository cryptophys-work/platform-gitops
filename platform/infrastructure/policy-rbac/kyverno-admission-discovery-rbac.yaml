apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:admission-controller:longhorn-discovery
  labels:
    app.kubernetes.io/component: admission-controller
    app.kubernetes.io/part-of: kyverno
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
    rbac.kyverno.io/aggregate-to-admission-controller: "true"
  annotations:
    cryptophys.io/contract: contract.platform.policy.v1
rules:
  # Allow admission webhook to resolve Longhorn GVR/GVK during request enrichment.
  - apiGroups: ["longhorn.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
