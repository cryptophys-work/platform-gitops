# WorkloadPlacement claims for cerebrum and Ray cluster head pods
# These ensure workloads are pinned to appropriate nodes via Crossplane patches

apiVersion: cryptophys.work/v1alpha1
kind: WorkloadPlacement
metadata:
  name: cerebrum-core
  namespace: crossplane-system
spec:
  targetWorkload:
    kind: Deployment
    name: cerebrum-core
    namespace: cerebrum
  placement:
    tier: compute
    preferredNode: nexus-144-91-103-10
    tolerations:
    - key: cryptophys.io/role
      operator: Equal
      value: llm-inference
      effect: NoSchedule

---
apiVersion: cryptophys.work/v1alpha1
