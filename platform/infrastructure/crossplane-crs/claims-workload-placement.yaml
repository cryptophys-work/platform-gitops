---
# Ray cluster head placements
# These pin RayService heads to appropriate ray-head nodes based on their tolerations

apiVersion: cryptophys.work/v1alpha1
kind: WorkloadPlacement
metadata:
  name: aide-mesh-ray-head
  namespace: crossplane-system
spec:
  targetWorkload:
    kind: RayService
    name: aide-mesh
    namespace: aide
  placement:
    tier: compute
    preferredNode: quanta-194-163-186-222
    tolerations:
    - key: bridge-system
      operator: Exists
      effect: NoSchedule
    - key: dao-system
      operator: Exists
      effect: NoSchedule
    - key: ray-head
      operator: Exists
      effect: NoSchedule

---
apiVersion: cryptophys.work/v1alpha1
kind: WorkloadPlacement
metadata:
  name: cerebrum-llm-ray-head
  namespace: crossplane-system
spec:
  targetWorkload:
    kind: RayService
    name: cerebrum-llm
    namespace: cqls-compute
  placement:
    tier: compute
    preferredNode: synapse-161-97-136-251
    tolerations:
    - key: cryptophys.io/pool
      operator: Equal
      value: apps-ha
      effect: NoSchedule
    - key: ray-head
      operator: Exists
      effect: NoSchedule

---
apiVersion: cryptophys.work/v1alpha1
kind: WorkloadPlacement
metadata:
  name: mcp-mesh-ray-head
  namespace: crossplane-system
spec:
  targetWorkload:
    kind: RayService
    name: mcp-mesh
    namespace: apps-core
  placement:
    tier: compute
    preferredNode: quanta-194-163-186-222
    tolerations:
    - key: bridge-system
      operator: Exists
      effect: NoSchedule
    - key: dao-system
      operator: Exists
      effect: NoSchedule
    - key: ray-head
      operator: Exists
      effect: NoSchedule
