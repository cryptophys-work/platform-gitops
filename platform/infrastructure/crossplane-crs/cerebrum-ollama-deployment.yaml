# LLM Provider for Kagenti - Cognitive Brain Integration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cerebrum-ollama
  namespace: cognitive-brain
  labels:
    app: cerebrum-ollama
    kagenti.io/type: platform
    kagenti.io/role: llm-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cerebrum-ollama
  template:
    metadata:
      labels:
        app: cerebrum-ollama
        kagenti.io/type: platform
        kagenti.io/role: llm-inference
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
              name: api
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_MODELS
              value: "/models"
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            limits:
              cpu: "2"
              memory: "8Gi"
            requests:
              cpu: "1"
              memory: "4Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: models
          emptyDir:
            medium: Memory
            sizeLimit: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cerebrum-ollama
  namespace: cognitive-brain
  labels:
    app: cerebrum-ollama
spec:
  selector:
    app: cerebrum-ollama
  ports:
    - port: 11434
      targetPort: 11434
      name: api
  type: ClusterIP
