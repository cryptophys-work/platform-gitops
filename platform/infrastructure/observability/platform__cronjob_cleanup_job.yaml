apiVersion: v1
kind: ServiceAccount
metadata:
  name: cronjob-cleanup
  namespace: observability-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: cronjob-cleanup
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cronjob-cleanup
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: cronjob-cleanup
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cronjob-cleanup
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: cronjob-cleanup
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cronjob-cleanup
subjects:
  - kind: ServiceAccount
    name: cronjob-cleanup
    namespace: observability-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cronjob-cleanup
  namespace: observability-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: cronjob-cleanup
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        cryptophys.io/domain: platform
        cryptophys.io/component: cronjob-cleanup
    spec:
      serviceAccountName: cronjob-cleanup
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cleanup
          image: registry.cryptophys.work/docker-proxy/bitnami/kubectl@sha256:a0fa7201b97239cdbcb2777465710201c7eb5676ffa646ec8466b417bf479196
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              cleanup_one() {
                ns="$1"
                cj="$2"
                echo "=== cleaning ${ns}/${cj} ==="

                jobs=$(kubectl get jobs -n "${ns}" -o jsonpath="{range .items[?(@.metadata.ownerReferences[0].kind=='CronJob' && @.metadata.ownerReferences[0].name=='${cj}')]}{.metadata.name}{'\n'}{end}" 2>/dev/null || true)
                if [ -n "${jobs}" ]; then
                  for job in ${jobs}; do
                    echo "deleting pods for ${ns}/${job}"
                    kubectl delete pod -n "${ns}" -l "job-name=${job}" --ignore-not-found=true --wait=false || true
                    echo "deleting job ${ns}/${job}"
                    kubectl delete job "${job}" -n "${ns}" --ignore-not-found=true --wait=false || true
                  done
                fi

                echo "deleting cronjob ${ns}/${cj}"
                kubectl delete cronjob "${cj}" -n "${ns}" --ignore-not-found=true --wait=false || true
              }

              cleanup_one apps-system argocd-repo-auth-preflight
              cleanup_one automation policyreport-cleanup
              cleanup_one cert-manager cert-vault-syncer
              cleanup_one gitops-system github-repo-auth-sync
              cleanup_one observability-system observability.synthetic.checker
              cleanup_one tekton-system pipelinerun-gc
              cleanup_one vault-system vault-auto-unseal
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
