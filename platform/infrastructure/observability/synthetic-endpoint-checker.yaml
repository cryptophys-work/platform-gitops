apiVersion: v1
kind: ServiceAccount
metadata:
  name: observability.synthetic.checker
  namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: observability.synthetic.targets
  namespace: observability
data:
  check.sh: |
    #!/bin/sh
    set -eu
    now="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
    fail=0
    while IFS='|' read -r name url expected; do
      [ -n "${name}" ] || continue
      [ "${name#\#}" = "${name}" ] || continue
      code="$(curl -k -sS -o /dev/null -m 20 -w "%{http_code}" "${url}" || true)"
      if [ "${code}" != "${expected}" ]; then
        echo "${now} FAIL ${name} url=${url} expected=${expected} got=${code}"
        fail=1
      else
        echo "${now} OK   ${name} url=${url} code=${code}"
      fi
    done <<'EOF'
    gitea|https://gitea.cryptophys.work|200
    harbor|https://registry.cryptophys.work|200
    argocd|https://argocd.cryptophys.work|200
    kyverno|https://kyverno.cryptophys.work|200
    vault|https://vault.cryptophys.work|307
    EOF
    exit "${fail}"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: observability.synthetic.checker
  namespace: observability
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: observability.synthetic.checker
        spec:
          serviceAccountName: observability.synthetic.checker
          restartPolicy: Never
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: checker
              image: ghcr.io/go-gitea/gitea:1.25.4-rootless
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /config/check.sh
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: config
              configMap:
                name: observability.synthetic.targets
                defaultMode: 0555
