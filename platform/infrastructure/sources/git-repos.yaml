apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: platform-repo
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  secretRef:
    name: github-repo-auth
  url: https://github.com/cryptophys-work/platform-gitops.git
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: ssot-core-repo
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  secretRef:
    name: github-repo-auth
  url: https://github.com/cryptophys-work/ssot-core.git
