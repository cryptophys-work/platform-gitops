apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: platform-repo
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  secretRef:
    name: github-ssh-key
  url: ssh://git@github.com/cryptophys-work/platform-gitops.git
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: ssot-core-repo
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  secretRef:
    name: github-ssh-key
  url: ssh://git@github.com/cryptophys-work/ssot-core.git
