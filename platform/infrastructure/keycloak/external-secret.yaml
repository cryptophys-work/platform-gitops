apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-admin-credentials
  namespace: keycloak-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    template:
      type: Opaque
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/keycloak/admin
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/keycloak/admin
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-db-credentials
  namespace: keycloak-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    template:
      type: Opaque
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
        database: "{{ .database }}"
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/keycloak/postgresql
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/keycloak/postgresql
        property: password
    - secretKey: database
      remoteRef:
        key: secret/data/keycloak/postgresql
        property: database
