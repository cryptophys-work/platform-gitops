apiVersion: v1
kind: ConfigMap
metadata:
  name: longhorn-default-setting
  namespace: longhorn-system
  labels:
    app.kubernetes.io/instance: longhorn
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: longhorn
    app.kubernetes.io/version: v1.11.1
    cryptophys.io/component: longhorn
    cryptophys.io/domain: platform
    cryptophys.io/layer: platform
    cryptophys.io/managed-by: flux
    helm.sh/chart: longhorn-1.11.1
data:
  default-setting.yaml: |-
    replica-soft-anti-affinity: true
    replica-auto-balance: "best-effort"
    storage-over-provisioning-percentage: "50"
    storage-minimal-available-percentage: "50"
    storage-reserved-percentage-for-default-disk: "10"
    default-replica-count: "2"
    taint-toleration: "node-role.kubernetes.io/control-plane:NoSchedule;cryptophys.io/storage-only=true:NoSchedule;cryptophys.io/role=llm-inference:NoSchedule;cryptophys.io/pool=platform-ha:NoSchedule;ray-cluster=true:NoSchedule;ray-head=true:NoSchedule;bridge-system=true:NoSchedule;dao-system=true:NoSchedule;node.kubernetes.io/memory-pressure:NoSchedule"
    system-managed-components-node-selector: ""
    priority-class: "longhorn-critical"
    auto-delete-pod-when-volume-detached-unexpectedly: true
    replica-replenishment-wait-interval: "900"
    concurrent-replica-rebuild-per-node-limit: "2"
    concurrent-volume-backup-restore-per-node-limit: "2"
    disable-revision-counter: "{\"v1\":\"true\"}"
    auto-cleanup-system-generated-snapshot: true
    deleting-confirmation-flag: true
    orphan-resource-auto-deletion: "replica-data;instance"
    orphan-resource-auto-deletion-grace-period: "1200"
