USER-SUPPLIED VALUES:
defaultSettings:
  defaultReplicaCount: 3
persistence:
  defaultClass: true
  defaultClassReplicaCount: 3
# Allow CSI plugin to run on campus (cryptophys.io/storage-only taint)
csi:
  kubeletRootDir: /var/lib/kubelet
longhornCSI:
  tolerations:
    - key: cryptophys.io/storage-only
      operator: Exists
      effect: NoSchedule
# Optimized resource requests based on actual usage audit (2026-03-19)
longhornUI:
  replicas: 1
  nodeSelector:
    nexus-tower: "true"
  tolerations:
    - key: cryptophys.io/storage-only
      operator: Exists
      effect: NoSchedule
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi
longhornManager:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 768Mi
longhornDriver:
  nodeSelector:
    nexus-tower: "true"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi
