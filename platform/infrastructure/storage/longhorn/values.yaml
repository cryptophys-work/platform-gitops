USER-SUPPLIED VALUES:
defaultSettings:
  defaultReplicaCount: 3
  systemManagedComponentsNodeSelector: ""
  taintToleration: "node-role.kubernetes.io/control-plane:NoSchedule;cryptophys.io/storage-only=true:NoSchedule;cryptophys.io/role=llm-inference:NoSchedule;cryptophys.io/pool=platform-ha:NoSchedule;ray-cluster=true:NoSchedule;ray-head=true:NoSchedule;bridge-system=true:NoSchedule;dao-system=true:NoSchedule;node.kubernetes.io/memory-pressure:NoSchedule"
persistence:
  defaultClass: true
  defaultClassReplicaCount: 3
# Allow CSI plugin to run on campus (cryptophys.io/storage-only taint)
csi:
  kubeletRootDir: /var/lib/kubelet
longhornCSI:
  tolerations:
    - key: cryptophys.io/storage-only
      operator: Exists
      effect: NoSchedule
# Optimized resource requests based on actual usage audit (2026-03-19)
longhornUI:
  replicas: 1
  nodeSelector:
    cryptophys.io/tier: compute
    nexus-workload-hub: "true"
  tolerations:
    - key: cryptophys.io/role
      operator: Equal
      value: llm-inference
      effect: NoSchedule
    - key: cryptophys.io/storage-only
      operator: Exists
      effect: NoSchedule
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi
longhornManager:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 768Mi
longhornDriver:
  nodeSelector:
    cryptophys.io/tier: compute
    nexus-workload-hub: "true"
  tolerations:
    - key: cryptophys.io/role
      operator: Equal
      value: llm-inference
      effect: NoSchedule
    - key: cryptophys.io/storage-only
      operator: Exists
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi
