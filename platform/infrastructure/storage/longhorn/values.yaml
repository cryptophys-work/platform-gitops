USER-SUPPLIED VALUES:
defaultSettings:
  defaultReplicaCount: 3
  systemManagedComponentsNodeSelector: ""
  taintToleration: "daemonset:NoSchedule;cryptophys.io/pool=platform-ha:NoSchedule;cryptophys.io/pool=apps-ha:NoSchedule;ray-cluster=true:NoSchedule;ray-head=true:NoSchedule;bridge-system=true:NoSchedule;dao-system=true:NoSchedule"
persistence:
  defaultClass: true
  defaultClassReplicaCount: 3
# Allow CSI plugin on storage lane nodes.
csi:
  kubeletRootDir: /var/lib/kubelet
longhornCSI:
  tolerations:
    - key: daemonset
      operator: Exists
      effect: NoSchedule
    - key: cryptophys.io/pool
      operator: Equal
      value: platform-ha
      effect: NoSchedule
    - key: cryptophys.io/pool
      operator: Equal
      value: apps-ha
      effect: NoSchedule
    - key: ray-cluster
      operator: Exists
      effect: NoSchedule
    - key: ray-head
      operator: Exists
      effect: NoSchedule
    - key: bridge-system
      operator: Exists
      effect: NoSchedule
    - key: dao-system
      operator: Exists
      effect: NoSchedule
# Optimized resource requests based on actual usage audit (2026-03-19)
longhornUI:
  replicas: 1
  nodeSelector:
    cryptophys.io/tier: compute
    nexus-workload-hub: "true"
  tolerations:
    - operator: Exists
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi
longhornManager:
  tolerations:
    - key: daemonset
      operator: Exists
      effect: NoSchedule
    - key: cryptophys.io/pool
      operator: Equal
      value: platform-ha
      effect: NoSchedule
    - key: cryptophys.io/pool
      operator: Equal
      value: apps-ha
      effect: NoSchedule
    - key: ray-cluster
      operator: Exists
      effect: NoSchedule
    - key: ray-head
      operator: Exists
      effect: NoSchedule
    - key: bridge-system
      operator: Exists
      effect: NoSchedule
    - key: dao-system
      operator: Exists
      effect: NoSchedule
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 768Mi
longhornDriver:
  nodeSelector:
    cryptophys.io/tier: compute
    nexus-workload-hub: "true"
  tolerations:
    - key: daemonset
      operator: Exists
      effect: NoSchedule
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi
