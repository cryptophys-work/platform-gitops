# =============================================================================
# Longhorn Memory Governance — v1.0
# Applied via: 30-storage kustomization
# Purpose: Prevent instance-manager and engine-manager pods from consuming
#          unbounded memory while leaving enough headroom for busy instance-manager
#          pods on large storage nodes to avoid repeated crash/recreate loops.
# =============================================================================
---
# LimitRange enforces a default memory limit on ALL pods in longhorn-system.
# This applies to NEW pods created after this manifest is applied.
# Existing pods (e.g. instance-manager-b2b26...) are NOT affected until restarted.
apiVersion: v1
kind: LimitRange
metadata:
  name: longhorn-memory-limits
  namespace: longhorn-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: storage
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
    cryptophys.io/contract: contract.platform.storage.v1
spec:
  limits:
    # ── Per-container defaults — applies to any container that omits resources ──
    - type: Container
      default:
        memory: "2Gi"     # Give instance-manager enough headroom under rebuild/attach pressure
        cpu: "2"
      defaultRequest:
        memory: "512Mi"   # Prevent underscheduling without returning to unbounded defaults
        cpu: "250m"
      max:
        memory: "4Gi"     # Keep namespace bounded while allowing larger instance-manager spikes
        cpu: "4"
    # ── Per-pod defaults ──
    - type: Pod
      max:
        memory: "4Gi"     # Allow a single busy instance-manager pod to stay below the container cap
