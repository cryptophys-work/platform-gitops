# =============================================================================
# Longhorn Memory Governance — v1.0
# Applied via: 30-storage kustomization
# Purpose: Prevent instance-manager and engine-manager pods from consuming
#          unbounded memory. Root cause: prior analysis showed instance-manager
#          on medulla consumed 5.9Gi (of 7.7Gi allocatable) with no limit set.
# =============================================================================
---
# LimitRange enforces a default memory limit on ALL pods in longhorn-system.
# This applies to NEW pods created after this manifest is applied.
# Existing pods (e.g. instance-manager-b2b26...) are NOT affected until restarted.
apiVersion: v1
kind: LimitRange
metadata:
  name: longhorn-memory-limits
  namespace: longhorn-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: storage
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
    cryptophys.io/contract: contract.platform.storage.v1
spec:
  limits:
    # ── Per-container defaults — applies to any container that omits resources ──
    - type: Container
      default:
        memory: "512Mi"   # Default limit — reduced from 2Gi to prevent control-plane OOMKill
        cpu: "1"
      defaultRequest:
        memory: "256Mi"   # Default request — ensures scheduler sees realistic footprint
        cpu: "50m"
      max:
        memory: "1Gi"     # Hard cap — reduced from 4Gi to fit control-plane capacity (corpus 9.2Gi allocatable)
        cpu: "4"
    # ── Per-pod defaults ──
    - type: Pod
      max:
        memory: "2Gi"     # One instance-manager pod max = 2Gi (reduced from 8Gi for control-plane stability)
