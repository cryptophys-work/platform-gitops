apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: storage
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
spec:
  interval: 1h
  timeout: 30m
  suspend: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: csi-attacher
            patch: |
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/storage-only
                    operator: Exists
                    effect: NoSchedule
                  - key: cryptophys.io/role
                    operator: Equal
                    value: llm-inference
                    effect: NoSchedule
                  - key: ray-cluster
                    operator: Exists
                    effect: NoSchedule
                  - key: ray-head
                    operator: Exists
                    effect: NoSchedule
                  - key: bridge-system
                    operator: Exists
                    effect: NoSchedule
                  - key: dao-system
                    operator: Exists
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Exists
                    effect: NoSchedule
                  - key: node.cilium.io/agent-not-ready
                    operator: Exists
                    effect: NoSchedule
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                      - weight: 100
                        podAffinityTerm:
                          labelSelector:
                            matchExpressions:
                              - key: app
                                operator: In
                                values:
                                  - csi-attacher
                          topologyKey: kubernetes.io/hostname
          - target:
              kind: Deployment
              name: csi-provisioner
            patch: |
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/storage-only
                    operator: Exists
                    effect: NoSchedule
                  - key: cryptophys.io/role
                    operator: Equal
                    value: llm-inference
                    effect: NoSchedule
                  - key: ray-cluster
                    operator: Exists
                    effect: NoSchedule
                  - key: ray-head
                    operator: Exists
                    effect: NoSchedule
                  - key: bridge-system
                    operator: Exists
                    effect: NoSchedule
                  - key: dao-system
                    operator: Exists
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Exists
                    effect: NoSchedule
                  - key: node.cilium.io/agent-not-ready
                    operator: Exists
                    effect: NoSchedule
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                      - weight: 100
                        podAffinityTerm:
                          labelSelector:
                            matchExpressions:
                              - key: app
                                operator: In
                                values:
                                  - csi-provisioner
                          topologyKey: kubernetes.io/hostname
          - target:
              kind: Deployment
              name: csi-resizer
            patch: |
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/storage-only
                    operator: Exists
                    effect: NoSchedule
                  - key: cryptophys.io/role
                    operator: Equal
                    value: llm-inference
                    effect: NoSchedule
                  - key: ray-cluster
                    operator: Exists
                    effect: NoSchedule
                  - key: ray-head
                    operator: Exists
                    effect: NoSchedule
                  - key: bridge-system
                    operator: Exists
                    effect: NoSchedule
                  - key: dao-system
                    operator: Exists
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Exists
                    effect: NoSchedule
                  - key: node.cilium.io/agent-not-ready
                    operator: Exists
                    effect: NoSchedule
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                      - weight: 100
                        podAffinityTerm:
                          labelSelector:
                            matchExpressions:
                              - key: app
                                operator: In
                                values:
                                  - csi-resizer
                          topologyKey: kubernetes.io/hostname
          - target:
              kind: Deployment
              name: csi-snapshotter
            patch: |
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/storage-only
                    operator: Exists
                    effect: NoSchedule
                  - key: cryptophys.io/role
                    operator: Equal
                    value: llm-inference
                    effect: NoSchedule
                  - key: ray-cluster
                    operator: Exists
                    effect: NoSchedule
                  - key: ray-head
                    operator: Exists
                    effect: NoSchedule
                  - key: bridge-system
                    operator: Exists
                    effect: NoSchedule
                  - key: dao-system
                    operator: Exists
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Exists
                    effect: NoSchedule
                  - key: node.cilium.io/agent-not-ready
                    operator: Exists
                    effect: NoSchedule
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  podAntiAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                      - weight: 100
                        podAffinityTerm:
                          labelSelector:
                            matchExpressions:
                              - key: app
                                operator: In
                                values:
                                  - csi-snapshotter
                          topologyKey: kubernetes.io/hostname
          - target:
              kind: DaemonSet
              name: longhorn-csi-plugin
            patch: |
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/storage-only
                    operator: Exists
                    effect: NoSchedule
                  - key: cryptophys.io/role
                    operator: Equal
                    value: llm-inference
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Exists
                    effect: NoSchedule
                  - key: ray-cluster
                    operator: Exists
                    effect: NoSchedule
                  - key: ray-head
                    operator: Exists
                    effect: NoSchedule
                  - key: bridge-system
                    operator: Exists
                    effect: NoSchedule
                  - key: dao-system
                    operator: Exists
                    effect: NoSchedule
                  - key: node.cilium.io/agent-not-ready
                    operator: Exists
                    effect: NoSchedule
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
                    effect: NoSchedule
                  - key: node.kubernetes.io/memory-pressure
                    operator: Exists
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/containers/0/resources
                value:
                  requests:
                    cpu: "50m"
                    memory: "128Mi"
                  limits:
                    cpu: "500m"
                    memory: "512Mi"
          - target:
              kind: DaemonSet
              name: longhorn-manager
            patch: |
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
                    effect: NoSchedule
                  - key: node-role.kubernetes.io/master
                    operator: Exists
                    effect: NoSchedule
                  - key: cryptophys.io/storage-only
                    operator: Exists
                    effect: NoSchedule
                  - key: cryptophys.io/role
                    operator: Exists
                    effect: NoSchedule
                  - key: ray-cluster
                    operator: Exists
                    effect: NoSchedule
                  - key: ray-head
                    operator: Exists
                    effect: NoSchedule
                  - key: bridge-system
                    operator: Exists
                    effect: NoSchedule
                  - key: dao-system
                    operator: Exists
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Exists
                    effect: NoSchedule
                  - key: node.cilium.io/agent-not-ready
                    operator: Exists
                    effect: NoSchedule
                  - key: node.kubernetes.io/memory-pressure
                    operator: Exists
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/containers/0/resources
                value:
                  requests:
                    cpu: "200m"
                    memory: "256Mi"
                  limits:
                    cpu: "500m"
                    memory: "512Mi"
              - op: replace
                path: /spec/template/spec/containers/1/resources
                value:
                  requests:
                    cpu: "50m"
                    memory: "128Mi"
                  limits:
                    cpu: "200m"
                    memory: "256Mi"
          - target:
              kind: Deployment
              name: longhorn-driver-deployer
            patch: |
              - op: replace
                path: /spec/template/spec/nodeSelector
                value:
                  cryptophys.io/tier: compute
                  nexus-workload-hub: "true"
          - target:
              kind: Deployment
              name: longhorn-ui
            patch: |
              - op: replace
                path: /spec/template/spec/nodeSelector
                value:
                  cryptophys.io/tier: compute
                  nexus-workload-hub: "true"
  chart:
    spec:
      chart: longhorn
      version: v1.11.1
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
    defaultSettings:
      defaultReplicaCount: 2
      # Instance-managers must run on ALL nodes that host volume replicas,
      # including control-plane nodes. Restricting to platform-ha caused
      # data stranding on CP nodes (cortex/cerebrum/corpus).
      systemManagedComponentsNodeSelector: ""
      # Tolerate all custom taints so IMs can schedule everywhere.
      taintToleration: "node-role.kubernetes.io/control-plane:NoSchedule;cryptophys.io/storage-only=true:NoSchedule;cryptophys.io/role=llm-inference:NoSchedule;cryptophys.io/pool=platform-ha:NoSchedule;ray-cluster=true:NoSchedule;ray-head=true:NoSchedule;bridge-system=true:NoSchedule;dao-system=true:NoSchedule;node.kubernetes.io/memory-pressure:NoSchedule"
      # Fallback reserve for nodes without an explicit per-node disk override.
      storageReservedPercentageForDefaultDisk: 10
      # Cap new scheduled allocation aggressively while the cluster is being
      # rebalanced; this does not shrink existing PVCs in place.
      storageOverProvisioningPercentage: 50
      storageMinimalAvailablePercentage: 50
      replicaSoftAntiAffinity: true
      replicaAutoBalance: best-effort
      concurrentReplicaRebuildPerNodeLimit: 2
      concurrentVolumeBackupRestorePerNodeLimit: 2
      replicaReplenishmentWaitInterval: 900
      autoCleanupSystemGeneratedSnapshot: true
      autoDeletePodWhenVolumeDetachedUnexpectedly: true
      orphanAutoDeletion: true
      orphanResourceAutoDeletion: replica-data;instance
      orphanResourceAutoDeletionGracePeriod: 1200
    # ── Manager runs everywhere (needs to coordinate volumes on all nodes) ──
    longhornManager:
      tolerations:
        - key: cryptophys.io/storage-only
          operator: Exists
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Exists
          effect: NoSchedule
        - key: ray-cluster
          operator: Exists
          effect: NoSchedule
        - key: ray-head
          operator: Exists
          effect: NoSchedule
        - key: bridge-system
          operator: Exists
          effect: NoSchedule
        - key: dao-system
          operator: Exists
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/memory-pressure
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "512Mi"      # Reduced from 2Gi to enforce LimitRange (512Mi default, 1Gi max per container)
    # ── Driver/UI control components: target nexus workload hub ──
    longhornDriver:
      nodeSelector:
        cryptophys.io/tier: compute
        nexus-workload-hub: "true"
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/storage-only
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          cpu: "20m"
          memory: "64Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
    longhornUI:
      nodeSelector:
        cryptophys.io/tier: compute
        nexus-workload-hub: "true"
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/storage-only
          operator: Exists
          effect: NoSchedule
    csi:
      attacherReplicaCount: 2
      provisionerReplicaCount: 2
      resizerReplicaCount: 2
      snapshotterReplicaCount: 2
      longhornCSI:
        tolerations:
          - key: cryptophys.io/storage-only
            operator: Exists
            effect: NoSchedule
          - key: cryptophys.io/role
            operator: Equal
            value: llm-inference
            effect: NoSchedule
          - key: ray-cluster
            operator: Exists
            effect: NoSchedule
          - key: ray-head
            operator: Exists
            effect: NoSchedule
          - key: bridge-system
            operator: Exists
            effect: NoSchedule
          - key: dao-system
            operator: Exists
            effect: NoSchedule
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
