apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: storage
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
spec:
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: longhorn
      version: v1.11.1
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
    defaultSettings:
      defaultReplicaCount: 2
      # System-managed components include instance-managers and engine helpers
      # that must run on the nodes hosting Longhorn replicas, including storage
      # workers like campus.
      systemManagedComponentsNodeSelector: ""
      # Keep replicas off control-plane nodes under memory pressure; Longhorn
      # managers/CSI may still run there, but data placement should prefer workers.
      taintToleration: "cryptophys.io/storage-only=true:NoSchedule;cryptophys.io/role=llm-inference:NoSchedule;node-role.kubernetes.io/control-plane:NoSchedule"
      # Fallback reserve for nodes without an explicit per-node disk override.
      storageReservedPercentageForDefaultDisk: 10
      storageOverProvisioningPercentage: 200
      replicaSoftAntiAffinity: true
      replicaAutoBalance: best-effort
      concurrentReplicaRebuildPerNodeLimit: 2
      concurrentVolumeBackupRestorePerNodeLimit: 2
      replicaReplenishmentWaitInterval: 900
      autoCleanupSystemGeneratedSnapshot: true
      autoDeletePodWhenVolumeDetachedUnexpectedly: true
      orphanAutoDeletion: true
      orphanResourceAutoDeletion: replica-data;instance
      orphanResourceAutoDeletionGracePeriod: 1200
    # ── Manager runs everywhere (needs to coordinate volumes on all nodes) ──
    longhornManager:
      tolerations:
        - key: cryptophys.io/storage-only
          operator: Exists
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Exists
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "2Gi"      # Keep aligned with Crossplane LonghornRelease claim
    # ── Driver/UI control components: target nexus workload hub ──
    longhornDriver:
      nodeSelector:
        nexus-workload-hub: "true"
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/storage-only
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          cpu: "20m"
          memory: "64Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
    longhornUI:
      nodeSelector:
        nexus-workload-hub: "true"
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/storage-only
          operator: Exists
          effect: NoSchedule
    csi:
      attacherReplicaCount: 2
      provisionerReplicaCount: 2
      resizerReplicaCount: 2
      snapshotterReplicaCount: 2
      longhornCSI:
        tolerations:
          - key: cryptophys.io/storage-only
            operator: Exists
            effect: NoSchedule
          - key: cryptophys.io/role
            operator: Equal
            value: llm-inference
            effect: NoSchedule
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
