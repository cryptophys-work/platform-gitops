# Tier A / HA workloads: 3 Longhorn replicas, Retain reclaim, WaitForFirstConsumer binding.
# Use for databases, stateful services, and any workload requiring HA and data durability.
# WaitForFirstConsumer ensures PVCs bind to the same zone as the pod, preventing
# scheduling failures during node failover.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-ha
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: longhorn
    cryptophys.io/layer: platform
    cryptophys.io/managed-by: flux
    cryptophys.io/storage-tier: ha
    storageclass.kubernetes.io/description: "Longhorn HA tier with 3 replicas and zone-aware binding"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "30"
  fromBackup: ""
  fsType: "ext4"
  dataLocality: "best-effort"
  unmapMarkSnapChainRemoved: "ignored"
  disableRevisionCounter: "true"
  dataEngine: "v1"
  backupTargetName: "default"
