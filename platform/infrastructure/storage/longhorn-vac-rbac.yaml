apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longhorn-volumeattributesclass-reader
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: longhorn-rbac
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
rules:
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattributesclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longhorn-volumeattributesclass-reader
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: longhorn-rbac
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longhorn-volumeattributesclass-reader
subjects:
  - kind: ServiceAccount
    name: longhorn-service-account
    namespace: longhorn-system
