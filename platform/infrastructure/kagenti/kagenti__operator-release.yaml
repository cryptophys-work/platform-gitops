apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagenti-operator
  namespace: flux-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: kagenti-operator
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
  annotations:
    cryptophys.io/contract: contract.platform.primitives.v1
    cryptophys.io/anti-regression: "true"
spec:
  releaseName: kagenti-op
  targetNamespace: apps-system
  interval: 1h
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Certificate
              name: serving-cert-kagenti-op
            patch: |
              - op: replace
                path: /spec/secretName
                value: kagenti-op-webhook-server-cert
          - target:
              kind: Certificate
              name: metrics-certs-kagenti-op
            patch: |
              - op: replace
                path: /spec/secretName
                value: kagenti-op-metrics-server-cert
          - target:
              kind: Deployment
              name: kagenti-controller-manager
            patch: |
              - op: replace
                path: /spec/template/spec/volumes/0/secret/secretName
                value: kagenti-op-webhook-server-cert
              - op: replace
                path: /spec/template/spec/volumes/1/secret/secretName
                value: kagenti-op-metrics-server-cert
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: kagenti-operator-chart
      version: 0.2.0-alpha.21
      sourceRef:
        kind: HelmRepository
        name: kagenti-operator
        namespace: flux-system
      interval: 1h
  values:
    controllerManager:
      container:
        image:
          tag: 0.2.0-alpha.26
    prometheus:
      enable: false
