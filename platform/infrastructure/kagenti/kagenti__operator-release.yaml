apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagenti-operator
  namespace: flux-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: kagenti-operator
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
  annotations:
    cryptophys.io/contract: contract.platform.primitives.v1
    cryptophys.io/anti-regression: "true"
spec:
  targetNamespace: apps-system
  interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: kagenti-operator-chart
      version: 0.2.0-alpha.21
      sourceRef:
        kind: HelmRepository
        name: kagenti-operator
        namespace: flux-system
      interval: 1h
  values:
    controllerManager:
      container:
        image:
          tag: 0.2.0-alpha.26
    prometheus:
      enable: false
