# =============================================================================
# cryptophys — Explicit LimitRanges for High-Memory Namespaces
# These cover EXISTING namespaces created before the generate policy was active.
# Sorted by memory request (highest first per kubectl top analysis).
# =============================================================================

# ── tekton-system (10944Mi requested) ──
---
apiVersion: v1
kind: LimitRange
metadata:
  name: cryptophys-default-limits
  namespace: tekton-system
  annotations:
    cryptophys.io/managed-by: flux
    cryptophys.io/component: resource-governance
spec:
  limits:
    - type: Container
      default:
        memory: "512Mi"
        cpu: "2"
      defaultRequest:
        memory: "256Mi"
        cpu: "100m"
      max:
        memory: "8Gi"
        cpu: "8"
      min:
        memory: "4Mi"
        cpu: "10m"

