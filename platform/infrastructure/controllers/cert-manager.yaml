apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: cert-manager
      version: v1.14.0
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  values:
    installCRDs: true
    replicaCount: 2
    nodeSelector:
      kubernetes.io/os: linux
      workload.cryptophys.work/apps-core: "true"
    tolerations:
      - operator: Exists
    webhook:
      replicaCount: 2
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      tolerations:
        - operator: Exists
    cainjector:
      replicaCount: 2
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      tolerations:
        - operator: Exists
    startupapicheck:
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      tolerations:
        - operator: Exists
