apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: cert-manager
      version: v1.14.0
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  values:
    installCRDs: true
    replicaCount: 2
    nodeSelector:
      kubernetes.io/os: linux
      workload.cryptophys.work/apps-core: "true"
    tolerations:
      - key: daemonset
        operator: Exists
        effect: NoSchedule
      - key: cplane-guardian
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: worker-guardian
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: cryptophys.io/role
        operator: Equal
        value: llm-inference
        effect: NoSchedule
    webhook:
      replicaCount: 2
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      tolerations:
        - key: daemonset
          operator: Exists
          effect: NoSchedule
        - key: cplane-guardian
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: worker-guardian
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
    cainjector:
      replicaCount: 2
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      tolerations:
        - key: daemonset
          operator: Exists
          effect: NoSchedule
        - key: cplane-guardian
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: worker-guardian
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
    startupapicheck:
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      tolerations:
        - key: daemonset
          operator: Exists
          effect: NoSchedule
        - key: cplane-guardian
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: worker-guardian
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
