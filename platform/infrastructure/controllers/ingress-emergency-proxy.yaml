apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ingress-emergency-proxy
  namespace: ingress-system
  labels:
    app.kubernetes.io/name: ingress-emergency-proxy
    cryptophys.io/domain: platform
    cryptophys.io/component: ingress-emergency-proxy
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ingress-emergency-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingress-emergency-proxy
        cryptophys.io/domain: platform
        cryptophys.io/component: ingress-emergency-proxy
        cryptophys.io/managed-by: flux
        cryptophys.io/layer: platform
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      priorityClassName: system-node-critical
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - cortex-178-18-250-39
                      - cerebrum-157-173-120-200
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/memory-pressure
          operator: Exists
          effect: NoSchedule
      containers:
        - name: socat
          image: docker.io/alpine/socat:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              socat TCP-LISTEN:80,fork,reuseaddr TCP:10.8.0.3:80 &
              socat TCP-LISTEN:443,fork,reuseaddr TCP:10.8.0.3:443 &
              wait
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
            seccompProfile:
              type: RuntimeDefault
