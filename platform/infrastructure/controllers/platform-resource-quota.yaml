apiVersion: v1
kind: ResourceQuota
metadata:
  name: platform-safety-limit
  namespace: flux-system
spec:
  hard:
    requests.cpu: "4000m"
    requests.memory: "6Gi"
    limits.cpu: "12000m"
    limits.memory: "12Gi"
