apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: database-operator
    cryptophys.io/managed-by: flux
spec:
  interval: 1h
  install:
    timeout: 15m
    crds: CreateReplace
  upgrade:
    preserveValues: false
    timeout: 15m
    crds: CreateReplace
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.23.0"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: cloudnative-pg
              namespace: cnpg-system
            patch: |
              - op: replace
                path: /spec/strategy
                value:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 0
                    maxUnavailable: 1
  values:
    replicaCount: 2
    priorityClassName: cryptophys-platform-critical
    nodeSelector:
      kubernetes.io/os: linux
      workload.cryptophys.work/platform: "true"
    tolerations:
    - key: cryptophys.io/pool
      operator: Equal
      value: platform-ha
      effect: NoSchedule
    - key: ray-head
      operator: Exists
      effect: NoSchedule
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: platform-ha
                  operator: In
                  values:
                    - "true"
                # Third platform-ha node: allows scheduling when only two hostnames would
                # deadlock with required anti-affinity + default maxSurge (rollout also pinned maxSurge:0 below).
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - cerebellum-161-97-117-96
                    - thalamus-217-76-59-241
                    - nexus-144-91-103-10
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: cloudnative-pg
            topologyKey: kubernetes.io/hostname
    webhook:
      livenessProbe:
        initialDelaySeconds: 10
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 6
      readinessProbe:
        initialDelaySeconds: 10
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 6
    config:
      maxConcurrentReconciles: 5
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1536Mi
