apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: database-operator
    cryptophys.io/managed-by: flux
spec:
  interval: 1h
  install:
    timeout: 15m
    crds: CreateReplace
  upgrade:
    preserveValues: false
    timeout: 15m
    crds: CreateReplace
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.23.0"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  values:
    replicaCount: 2
    priorityClassName: cryptophys-platform-critical
    nodeSelector:
      kubernetes.io/os: linux
      workload.cryptophys.work/platform: "true"
    tolerations:
    - key: cryptophys.io/pool
      operator: Equal
      value: platform-ha
      effect: NoSchedule
    - key: cryptophys.io/node-class
      operator: Equal
      value: nexus-hpc
      effect: NoSchedule
    - key: ray-head
      operator: Exists
      effect: NoSchedule
    affinity:
      # nexus-hpc nodes carry heavy GPU/IO and have shown Longhorn attach + webhook flakes;
      # keep the operator on general platform workers only (label absent on cerebellum/quanta/thalamus).
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: cryptophys.io/node-class
                  operator: NotIn
                  values:
                    - nexus-hpc
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: cloudnative-pg
              topologyKey: kubernetes.io/hostname
    config:
      maxConcurrentReconciles: 5
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1536Mi
