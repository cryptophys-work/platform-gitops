apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: database-operator
    cryptophys.io/managed-by: flux
spec:
  interval: 1h
  install:
    timeout: 8m
    crds: CreateReplace
  upgrade:
    timeout: 8m
    crds: CreateReplace
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.23.0"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  values:
    replicaCount: 1
    nodeSelector:
      kubernetes.io/os: linux
      workload.cryptophys.work/apps-core: "true"
    tolerations:
    - key: cryptophys.io/role
      operator: Equal
      value: llm-inference
      effect: NoSchedule
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
              - medulla-82-208-20-242
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 768Mi
