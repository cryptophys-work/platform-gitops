apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault-secrets
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    force: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: vault
      version: 0.27.0
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
  values:
    injector:
      replicas: 2
    server:
      dev:
        enabled: false
      standalone:
        enabled: false
      ha:
        enabled: true
        replicas: 3
        raft:
          enabled: true
          setNodeId: true
      dataStorage:
        enabled: true
        size: 20Gi
        storageClass: longhorn
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
    ui:
      enabled: true
