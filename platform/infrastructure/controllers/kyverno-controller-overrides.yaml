# Kyverno controller placement overrides.
# All three controllers MUST run on platform-HA nodes (cerebellum, thalamus, nexus).
# This file is applied by kustomize-controller via SSA and WINS over the Helm chart render.
# Anti-affinity ensures each replica spreads across different platform-HA nodes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyverno-admission-controller
  namespace: kyverno-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: admission-controller
      app.kubernetes.io/instance: kyverno
      app.kubernetes.io/part-of: kyverno
  template:
    metadata:
      labels:
        app.kubernetes.io/component: admission-controller
        app.kubernetes.io/instance: kyverno
        app.kubernetes.io/part-of: kyverno
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        cryptophys.io/platform-ha: "true"
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/component: admission-controller
                  app.kubernetes.io/instance: kyverno
              topologyKey: kubernetes.io/hostname
      tolerations:
        - operator: Exists
