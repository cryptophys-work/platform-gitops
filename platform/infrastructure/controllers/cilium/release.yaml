apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  releaseName: cilium
  interval: 1h
  suspend: false
  timeout: 15m
  chart:
    spec:
      chart: cilium
      version: 1.16.1
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    cluster:
      name: cryptophys-genesis
      id: 1
    clustermesh:
      useAPIServer: true
      apiserver:
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
        nodeSelector:
          cryptophys.io/tier: platform
    kubeProxyReplacement: strict
    devices: "wg0"
    l7Proxy: true
    routingMode: native
    autoDirectNodeRoutes: true
    ipv4NativeRoutingCIDR: 10.244.0.0/16
    enableIPv4Masquerade: true
    encryption:
      enabled: true
      type: wireguard
      nodeEncryption: true
    mtu: 1370
    # KubePrism local LB (127.0.0.1:7445) — HA across all 3 CP nodes
    # Avoids SPOF from hardcoding a single CP node IP (was 10.8.0.2/cortex only)
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 7445
    hubble:
      enabled: true
      relay:
        enabled: true
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
        nodeSelector:
          cryptophys.io/tier: platform
      ui:
        enabled: true
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
        nodeSelector:
          cryptophys.io/tier: platform
    ipam:
      mode: kubernetes
    operator:
      replicas: 1
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
