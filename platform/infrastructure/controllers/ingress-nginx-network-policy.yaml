apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: ingress-nginx-baseline
  namespace: ingress
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: controller
  ingress:
    - fromEntities: [world]
  egress:
    - toEntities: [cluster, host, kube-apiserver]
