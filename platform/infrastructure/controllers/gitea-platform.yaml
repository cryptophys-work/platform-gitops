apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-code-forge-gitea
  namespace: gitea
spec:
  interval: 30m
  releaseName: platform-code-forge-gitea
  valuesFrom:
    - kind: Secret
      name: platform-code-forge-gitea-values
      valuesKey: values.yaml
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: gitea
      version: 12.5.0
      sourceRef:
        kind: HelmRepository
        name: gitea-charts
        namespace: flux-system
  values:
    replicaCount: 2
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
    image:
      registry: ghcr.io
      repository: go-gitea/gitea
      tag: "1.25.4"
      rootless: true
      pullPolicy: IfNotPresent
    gitea:
      admin:
        email: admin@cryptophys.work
        existingSecret: gitea-admin-secret
      config:
        security:
          INSTALL_LOCK: true
        server:
          DOMAIN: gitea.cryptophys.work
          ROOT_URL: https://gitea.cryptophys.work/
          SSH_DOMAIN: gitea.cryptophys.work
          SSH_PORT: 2222
        database:
          DB_TYPE: postgres
          HOST: platform-code-forge-gitea-postgresql-ha-pgpool.gitea.svc.cluster.local:5432
          NAME: gitea
          USER: gitea
          PASSWD: changeme
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: redis+cluster://:@platform-code-forge-gitea-valkey-cluster-headless.gitea.svc.cluster.local:6379/0
        queue:
          TYPE: redis
          CONN_STR: redis+cluster://:@platform-code-forge-gitea-valkey-cluster-headless.gitea.svc.cluster.local:6379/0
        cache:
          ADAPTER: redis
          HOST: redis+cluster://:@platform-code-forge-gitea-valkey-cluster-headless.gitea.svc.cluster.local:6379/0
        webhook:
          ALLOWED_HOST_LIST: "*"
        service:
          DISABLE_REGISTRATION: true
          SHOW_REGISTRATION_BUTTON: false
          ALLOW_ONLY_EXTERNAL_REGISTRATION: false
    ingress:
      enabled: true
      className: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/proxy-body-size: 512m
      hosts:
        - host: gitea.cryptophys.work
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: cryptophys-wildcard-tls
          hosts:
            - gitea.cryptophys.work
    persistence:
      enabled: true
      create: false
      claimName: gitea-shared-storage-rwx
      accessModes:
        - ReadWriteMany
      mount: true
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: true
    valkey-cluster:
      enabled: true
      usePassword: false
      cluster:
        nodes: 3
        replicas: 0
    memcached:
      enabled: false
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 55Mi
      limits:
        cpu: 500m
        memory: 1Gi
    podSecurityContext:
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      privileged: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    initContainers:
      resources:
        requests:
          cpu: 50m
          memory: 55Mi
        limits:
          cpu: 200m
          memory: 256Mi
    commonLabels:
      cryptophys.work/domain: gitea
    commonAnnotations:
      cryptophys.io/anti-regression: "true"
      cryptophys.io/contract: contract.platform.code_forge.v1
      cryptophys.io/ssot-ref: ssot/gitea/deployment.yaml
    global:
      security:
        allowInsecureImages: true
