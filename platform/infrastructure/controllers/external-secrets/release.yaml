apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 1h
  chart:
    spec:
      chart: external-secrets
      version: 0.9.11
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  values:
    installCRDs: true
    nodeSelector:
      kubernetes.io/os: linux
      workload.cryptophys.work/apps-core: "true"
    tolerations:
    - key: cryptophys.io/role
      operator: Equal
      value: llm-inference
      effect: NoSchedule
    webhook:
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      tolerations:
      - key: cryptophys.io/role
        operator: Equal
        value: llm-inference
        effect: NoSchedule
    certController:
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      tolerations:
      - key: cryptophys.io/role
        operator: Equal
        value: llm-inference
        effect: NoSchedule
