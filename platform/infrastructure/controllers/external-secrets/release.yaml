apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 1h
  chart:
    spec:
      chart: external-secrets
      version: 0.9.11
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  values:
    installCRDs: true
      workload.cryptophys.work/apps-core: "true"
    webhook:
        workload.cryptophys.work/apps-core: "true"
    certController:
        workload.cryptophys.work/apps-core: "true"
