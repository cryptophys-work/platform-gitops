apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 1h
  chart:
    spec:
      chart: external-secrets
      version: 0.9.11
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  values:
    installCRDs: true
    nodeSelector:
      kubernetes.io/os: linux
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
    tolerations:
    - key: cryptophys.io/role
      operator: Equal
      value: llm-inference
      effect: NoSchedule
    - key: cryptophys.io/storage-only
      operator: Equal
      value: "true"
      effect: NoSchedule
    webhook:
      nodeSelector:
        kubernetes.io/os: linux
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      tolerations:
      - key: cryptophys.io/role
        operator: Equal
        value: llm-inference
        effect: NoSchedule
      - key: cryptophys.io/storage-only
        operator: Equal
        value: "true"
        effect: NoSchedule
    certController:
      nodeSelector:
        kubernetes.io/os: linux
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      tolerations:
      - key: cryptophys.io/role
        operator: Equal
        value: llm-inference
        effect: NoSchedule
      - key: cryptophys.io/storage-only
        operator: Equal
        value: "true"
        effect: NoSchedule
