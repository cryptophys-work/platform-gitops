apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: metrics-server
      version: 3.13.0
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: flux-system
  values:
    replicas: 2
    nodeSelector:
      kubernetes.io/hostname: nexus-144-91-103-10
    args:
      - --kubelet-insecure-tls
      - --kubelet-preferred-address-types=InternalIP
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    tolerations:
      - key: ray-cluster
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: cryptophys.io/storage-only
        operator: Exists
        effect: NoSchedule
