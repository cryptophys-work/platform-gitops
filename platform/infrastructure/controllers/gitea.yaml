apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: gitea
  namespace: gitea
spec:
  releaseName: gitea
  interval: 1h
  suspend: true
  chart:
    spec:
      chart: gitea
      version: 12.5.0
      sourceRef:
        kind: HelmRepository
        name: gitea-charts
        namespace: flux-system
  values:
    replicaCount: 2
    podDisruptionBudget:
      minAvailable: 1
    image:
      registry: docker.gitea.com
      repository: gitea
      tag: "1.25.4"
      rootless: true
    gitea:
      admin:
        username: cryptophys.adm
        password: Lgtv@2020
        email: cryptophys.adm@gmail.com
      config:
        database:
          DB_TYPE: postgres
          HOST: gitea-postgresql-ha-pgpool.gitea.svc.cluster.local:5432
          NAME: gitea
          USER: gitea
          PASSWD: gitea
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: redis+cluster://:@gitea-valkey-cluster-headless.gitea.svc.cluster.local:6379/0
    persistence:
      enabled: true
      create: false
      claimName: gitea-shared-storage-rwx
      accessModes:
        - ReadWriteMany
      mount: true
    serviceAccount:
      create: true
      name: gitea
    nodeSelector:
      node-role.kubernetes.io/control-plane: ""
