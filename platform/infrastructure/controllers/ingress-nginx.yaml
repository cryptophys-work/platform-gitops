apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: ingress-gateway
  namespace: ingress-system
spec:
  interval: 1h
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ingress-gateway-ingress-nginx-controller
                namespace: ingress-system
              spec:
                replicas: 1
                strategy:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 0
                    maxUnavailable: 1
                template:
                  spec:
                    nodeSelector:
                      kubernetes.io/os: linux
                      workload.cryptophys.work/apps-core: "true"
                    containers:
                      - name: controller
                        resources:
                          requests:
                            cpu: 50m
                            memory: 64Mi
                          limits:
                            cpu: 250m
                            memory: 192Mi
            target:
              group: apps
              version: v1
              kind: Deployment
              name: ingress-gateway-ingress-nginx-controller
  chart:
    spec:
      chart: ingress-nginx
      version: 4.14.1
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  values:
    controller:
      kind: Deployment
      replicaCount: 1
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      extraArgs:
        default-ssl-certificate: ingress-system/platform-wildcard-tls
        healthz-port: "11054"
        profiling: "false"
        profiler-port: "0"
      livenessProbe:
        httpGet:
          port: 11054
      readinessProbe:
        httpGet:
          port: 11054
      metrics:
        port: 11054
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 192Mi
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      service:
        type: LoadBalancer
    admissionWebhooks:
        enabled: false
      patch:
        nodeSelector:
          kubernetes.io/os: linux
          workload.cryptophys.work/apps-core: "true"
