apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: ingress-gateway
  namespace: ingress-system
  annotations:
    reconcile.fluxcd.io/requestedAt: "2026-04-11T13:49:06Z"
spec:
  interval: 1h
  chart:
    spec:
      chart: ingress-nginx
      version: 4.14.1
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  values:
    controller:
      kind: DaemonSet
      priorityClassName: cryptophys-platform-critical
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      extraEnvs:
        - name: CRYPTOPHYS_INGRESS_ROLLOUT_AT
          value: "2026-04-16T11:00:00Z"
      extraArgs:
        default-ssl-certificate: ingress-system/platform-wildcard-tls
        healthz-port: "11054"
        profiling: "false"
        profiler-port: "0"
      livenessProbe:
        httpGet:
          port: 11054
      readinessProbe:
        httpGet:
          port: 11054
      metrics:
        port: 11054
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      nodeSelector:
        kubernetes.io/os: linux
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 10
      admissionWebhooks:
        enabled: false
      service:
        type: LoadBalancer
        loadBalancerIP: "10.8.0.240"
