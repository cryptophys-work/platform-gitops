apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: crossplane
  namespace: crossplane-system
spec:
  interval: 1h
  releaseName: crossplane
  chart:
    spec:
      chart: crossplane
      version: 1.18.2
      sourceRef:
        kind: HelmRepository
        name: crossplane
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  # ValidatingWebhookConfiguration objects are applied by the Crossplane init
  # container from /webhookconfigurations inside the image. We mount
  # crossplane-webhook-admission-profile (ConfigMap) at that path so
  # timeoutSeconds/failurePolicy are GitOps-owned. Kyverno policy remains a
  # secondary mutateExisting backstop (see policy/crossplane-validating-webhook-tuning.yaml).
  postRenderers:
  - kustomize:
      patches:
      # Single JSON6902 document for Deployment/crossplane: Flux+kustomize may not
      # reliably apply multiple patch entries targeting the same object; keep scheduling
      # and webhook ConfigMap mount in one patch list.
      - target:
          kind: Deployment
          name: crossplane
        patch: |
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --max-reconcile-rate=2
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --poll-interval=5m
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --sync-interval=2h
          - op: replace
            path: /spec/template/spec/containers/0/resources
            value:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: 1000m
                memory: 1Gi
          - op: replace
            path: /spec/template/spec/nodeSelector
            value:
              kubernetes.io/os: linux
          - op: replace
            path: /spec/template/spec/tolerations
            value:
              - key: cryptophys.io/role
                operator: Equal
                value: llm-inference
                effect: NoSchedule
              - key: bridge-system
                operator: Exists
                effect: NoSchedule
              - key: dao-system
                operator: Exists
                effect: NoSchedule
              - key: ray-head
                operator: Exists
                effect: NoSchedule
              - key: cryptophys.io/pool
                operator: Equal
                value: platform-ha
                effect: NoSchedule
          - op: replace
            path: /spec/template/spec/affinity
            value:
              nodeAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    preference:
                      matchExpressions:
                        - key: accepts-platform-workloads
                          operator: In
                          values:
                            - "true"
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: workload.cryptophys.work/platform
                          operator: In
                          values:
                            - "true"
          - op: add
            path: /spec/template/spec/volumes/-
            value:
              name: crossplane-webhook-admission-profile
              configMap:
                name: crossplane-webhook-admission-profile
                defaultMode: 420
          - op: add
            path: /spec/template/spec/initContainers/0/volumeMounts
            value:
              - name: crossplane-webhook-admission-profile
                mountPath: /webhookconfigurations
                readOnly: true
      - target:
          kind: Deployment
          name: crossplane-rbac-manager
        patch: |
          - op: replace
            path: /spec/template/spec/containers/0/resources
            value:
              requests:
                cpu: 200m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
          - op: replace
            path: /spec/template/spec/nodeSelector
            value:
              kubernetes.io/os: linux
          - op: replace
            path: /spec/template/spec/tolerations
            value:
              - key: cryptophys.io/role
                operator: Equal
                value: llm-inference
                effect: NoSchedule
              - key: bridge-system
                operator: Exists
                effect: NoSchedule
              - key: dao-system
                operator: Exists
                effect: NoSchedule
              - key: ray-head
                operator: Exists
                effect: NoSchedule
              - key: cryptophys.io/pool
                operator: Equal
                value: platform-ha
                effect: NoSchedule
          - op: replace
            path: /spec/template/spec/affinity
            value:
              nodeAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    preference:
                      matchExpressions:
                        - key: accepts-platform-workloads
                          operator: In
                          values:
                            - "true"
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: workload.cryptophys.work/platform
                          operator: In
                          values:
                            - "true"
  values:
    replicas: 1
    deploymentStrategy: RollingUpdate
    nodeSelector:
      kubernetes.io/os: linux
    tolerations:
      - key: cryptophys.io/role
        operator: Equal
        value: llm-inference
        effect: NoSchedule
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: accepts-platform-workloads
              operator: In
              values:
              - "true"
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: workload.cryptophys.work/platform
              operator: In
              values:
              - "true"
    resources:
      requests:
        cpu: 10m
        memory: 96Mi
      limits:
        cpu: 500m
        memory: 512Mi
