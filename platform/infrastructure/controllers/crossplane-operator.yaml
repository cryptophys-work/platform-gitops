apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: crossplane
  namespace: crossplane-system
spec:
  interval: 1h
  releaseName: crossplane
  chart:
    spec:
      chart: crossplane
      version: 1.18.2
      sourceRef:
        kind: HelmRepository
        name: crossplane
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  # ValidatingWebhookConfiguration objects are applied at runtime by the
  # Crossplane init container, not rendered by this chart — Helm post-renders
  # never affect them. Tune timeout/failurePolicy via Kyverno instead:
  # policy/crossplane-validating-webhook-tuning.yaml
  postRenderers:
  - kustomize:
      patches:
      - target:
          kind: Deployment
          name: crossplane
        patch: |
          - op: replace
            path: /spec/template/spec/nodeSelector
            value:
              kubernetes.io/os: linux
          - op: replace
            path: /spec/template/spec/tolerations
            value:
              - key: cryptophys.io/role
                operator: Equal
                value: llm-inference
                effect: NoSchedule
              - key: bridge-system
                operator: Exists
                effect: NoSchedule
              - key: dao-system
                operator: Exists
                effect: NoSchedule
              - key: ray-head
                operator: Exists
                effect: NoSchedule
              - key: cryptophys.io/pool
                operator: Equal
                value: platform-ha
                effect: NoSchedule
          - op: replace
            path: /spec/template/spec/affinity
            value:
              nodeAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    preference:
                      matchExpressions:
                        - key: accepts-platform-workloads
                          operator: In
                          values:
                            - "true"
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: workload.cryptophys.work/platform
                          operator: In
                          values:
                            - "true"
      - target:
          kind: Deployment
          name: crossplane-rbac-manager
        patch: |
          - op: replace
            path: /spec/template/spec/nodeSelector
            value:
              kubernetes.io/os: linux
          - op: replace
            path: /spec/template/spec/tolerations
            value:
              - key: cryptophys.io/role
                operator: Equal
                value: llm-inference
                effect: NoSchedule
              - key: bridge-system
                operator: Exists
                effect: NoSchedule
              - key: dao-system
                operator: Exists
                effect: NoSchedule
              - key: ray-head
                operator: Exists
                effect: NoSchedule
              - key: cryptophys.io/pool
                operator: Equal
                value: platform-ha
                effect: NoSchedule
          - op: replace
            path: /spec/template/spec/affinity
            value:
              nodeAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    preference:
                      matchExpressions:
                        - key: accepts-platform-workloads
                          operator: In
                          values:
                            - "true"
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: workload.cryptophys.work/platform
                          operator: In
                          values:
                            - "true"
  values:
    replicas: 1
    deploymentStrategy: RollingUpdate
    nodeSelector:
      kubernetes.io/os: linux
    tolerations:
      - key: cryptophys.io/role
        operator: Equal
        value: llm-inference
        effect: NoSchedule
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
            - key: accepts-platform-workloads
              operator: In
              values:
              - "true"
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: workload.cryptophys.work/platform
              operator: In
              values:
              - "true"
    resources:
      requests:
        cpu: 10m
        memory: 96Mi
      limits:
        cpu: 500m
        memory: 512Mi
