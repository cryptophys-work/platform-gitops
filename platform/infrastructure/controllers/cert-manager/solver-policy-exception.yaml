apiVersion: kyverno.io/v2beta1
kind: PolicyException
metadata:
  name: cert-manager-solver-exception
  namespace: cert-manager
spec:
  exceptions:
    - policyName: cp-security-hardening-v1
      ruleNames:
        - restrict-pod-security-standard
    - policyName: cp-standard-resources-limits-v1
      ruleNames:
        - require-limits-requests
    - policyName: cp-enforce-business
      ruleNames:
        - require-resources
  match:
    any:
      - resources:
          namespaces:
            - cert-manager
            - tekton-system
          selector:
            matchLabels:
              acme.cert-manager.io/http01-solver: "true"
