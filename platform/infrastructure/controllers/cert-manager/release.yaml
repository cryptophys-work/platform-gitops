apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: cert-manager
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
spec:
  interval: 1h
  chart:
    spec:
      chart: cert-manager
      version: v1.14.0
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
  values:
    installCRDs: true
    replicaCount: 2
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/os
              operator: In
              values:
              - linux
            - key: kubernetes.io/hostname
              operator: In
              values:
              - nexus-144-91-103-10
              - thalamus-217-76-59-241
              - cerebellum-161-97-117-96
    tolerations:
    - key: ray-cluster
      operator: Equal
      value: "true"
      effect: NoSchedule
    - key: cryptophys.io/pool
      operator: Equal
      value: platform-ha
      effect: NoSchedule
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 256Mi
    webhook:
      replicaCount: 2
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
              - key: kubernetes.io/hostname
                operator: In
                values:
                - nexus-144-91-103-10
                - thalamus-217-76-59-241
                - cerebellum-161-97-117-96
      tolerations:
      - key: ray-cluster
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: cryptophys.io/pool
        operator: Equal
        value: platform-ha
        effect: NoSchedule
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
    cainjector:
      replicaCount: 2
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
              - key: kubernetes.io/hostname
                operator: In
                values:
                - nexus-144-91-103-10
                - thalamus-217-76-59-241
                - cerebellum-161-97-117-96
      tolerations:
      - key: ray-cluster
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: cryptophys.io/pool
        operator: Equal
        value: platform-ha
        effect: NoSchedule
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 512Mi
    startupapicheck:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
              - key: kubernetes.io/hostname
                operator: In
                values:
                - nexus-144-91-103-10
                - thalamus-217-76-59-241
                - cerebellum-161-97-117-96
      tolerations:
      - key: ray-cluster
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: cryptophys.io/pool
        operator: Equal
        value: platform-ha
        effect: NoSchedule
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
