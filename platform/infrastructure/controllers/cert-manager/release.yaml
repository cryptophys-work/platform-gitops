apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: cert-manager
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
spec:
  interval: 1h
  chart:
    spec:
      chart: cert-manager
      version: v1.14.0
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
  values:
    installCRDs: true
    replicaCount: 2
    nodeSelector:
      kubernetes.io/os: linux
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist
    tolerations:
    - key: cryptophys.io/storage-only
      operator: Exists
      effect: NoSchedule
    - key: cryptophys.io/role
      operator: Equal
      value: llm-inference
      effect: NoSchedule
    webhook:
      replicaCount: 2
      nodeSelector:
        kubernetes.io/os: linux
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
      tolerations:
      - key: cryptophys.io/storage-only
        operator: Exists
        effect: NoSchedule
      - key: cryptophys.io/role
        operator: Equal
        value: llm-inference
        effect: NoSchedule
    cainjector:
      replicaCount: 2
      nodeSelector:
        kubernetes.io/os: linux
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
      tolerations:
      - key: cryptophys.io/storage-only
        operator: Exists
        effect: NoSchedule
      - key: cryptophys.io/role
        operator: Equal
        value: llm-inference
        effect: NoSchedule
    startupapicheck:
      nodeSelector:
        kubernetes.io/os: linux
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
      tolerations:
      - key: cryptophys.io/storage-only
        operator: Exists
        effect: NoSchedule
      - key: cryptophys.io/role
        operator: Equal
        value: llm-inference
        effect: NoSchedule
