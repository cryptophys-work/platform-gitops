        - weight: 50
          preference:
            matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
              - thalamus-217-76-59-241
      tolerations:
      - key: cryptophys.io/pool
        operator: Equal
        value: platform-ha
        effect: NoSchedule
      - key: node.cilium.io/agent-not-ready
        operator: Exists
        effect: NoSchedule
      resources:
