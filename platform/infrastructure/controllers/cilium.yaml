apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  releaseName: cilium
  interval: 1h
  timeout: 15m
  chart:
    spec:
      chart: cilium
      version: 1.16.1
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    cluster:
      name: cryptophys-genesis
      id: 1
    clustermesh:
      useAPIServer: true
    kubeProxyReplacement: false
    k8sServiceHost: 10.8.0.2
    k8sServicePort: 6443
    hubble:
      enabled: true
      relay: {enabled: true}
      ui: {enabled: true}
