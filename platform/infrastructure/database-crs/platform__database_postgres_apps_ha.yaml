apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-security-ha
  namespace: postgresql-system
spec:
  # HA: three instances on platform-ha pool (no MinIO WAL archive — in-cluster replication only).
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  monitoring:
    enablePodMonitor: false
    disableDefaultQueries: true
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser-secret
  storage:
    size: 10Gi
    storageClass: longhorn-single
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  bootstrap:
    initdb:
      database: gitea
      owner: gitea
      encoding: UTF8
      localeCType: C
      localeCollate: C
  # Resource limits: reduced to allow scheduling on memory-pressured workers
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  affinity:
    nodeSelector:
      platform-ha: "true"
    podAntiAffinityType: required
    tolerations:
    - effect: NoSchedule
      key: cryptophys.io/pool
      operator: Equal
      value: platform-ha
    - effect: NoSchedule
      key: ray-head
      operator: Equal
      value: "true"
