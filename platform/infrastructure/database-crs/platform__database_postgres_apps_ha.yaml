apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-apps-ha
  namespace: postgresql-system
spec:
  # HA: three instances on platform-ha pool (no MinIO WAL archive — in-cluster replication only).
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  monitoring:
    enablePodMonitor: false
    disableDefaultQueries: true
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser-secret
  storage:
    size: 10Gi
    storageClass: longhorn-single
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  bootstrap:
    initdb:
      database: jarvis
      owner: jarvis
      encoding: UTF8
      localeCType: C
      localeCollate: C
      postInitApplicationSQL:
      - CREATE EXTENSION IF NOT EXISTS vector;
      - |
        CREATE TABLE IF NOT EXISTS jarvis_semantic_memory (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            session_id UUID NOT NULL,
            context_type VARCHAR(255) NOT NULL,
            content TEXT NOT NULL,
            embedding VECTOR(384) NOT NULL,
            created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
        );
      - GRANT ALL PRIVILEGES ON TABLE jarvis_semantic_memory TO jarvis;
  # Resource limits: reduced to allow scheduling on memory-pressured workers
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  affinity:
    nodeSelector:
      platform-ha: "true"
    podAntiAffinityType: required
    tolerations:
    - effect: NoSchedule
      key: cryptophys.io/pool
      operator: Equal
      value: platform-ha
    - effect: NoSchedule
      key: ray-head
      operator: Equal
      value: "true"
    - effect: NoSchedule
      key: node-role.kubernetes.io/control-plane
      operator: Exists
