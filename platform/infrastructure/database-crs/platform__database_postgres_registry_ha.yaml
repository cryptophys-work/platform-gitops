# Harbor registry metadata DB — CNPG HA in postgresql-system (no MinIO WAL archive).
# Cutover from embedded Harbor PostgreSQL requires operator pg_dump/pg_restore into this cluster.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-registry-ha
  namespace: postgresql-system
spec:
  # Temporary: single instance until platform-ha nodes have headroom (scheduling was
  # failing with Insufficient memory / Too many pods; primary had readiness 500 + CrashLoop).
  # Revert to 3 when Harbor registry DB is stable and nodes can schedule anti-affinity pods.
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  monitoring:
    enablePodMonitor: false
    disableDefaultQueries: true
  enableSuperuserAccess: true
  superuserSecret:
    name: postgres-superuser-secret
  storage:
    size: 10Gi
    storageClass: longhorn
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  bootstrap:
    initdb:
      database: registry
      owner: registry
      secret:
        name: harbor-registry-db-bootstrap
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  affinity:
    nodeSelector:
      platform-ha: "true"
    podAntiAffinityType: required
    tolerations:
      - effect: NoSchedule
        key: cryptophys.io/pool
        operator: Equal
        value: platform-ha
      - effect: NoSchedule
        key: ray-head
        operator: Equal
        value: "true"
