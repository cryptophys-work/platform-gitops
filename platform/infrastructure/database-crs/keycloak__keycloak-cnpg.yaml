apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-cnpg
  namespace: postgresql-system
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:15.12
  monitoring:
    enablePodMonitor: false
    disableDefaultQueries: true
  enableSuperuserAccess: true
  superuserSecret:
    name: keycloak-cnpg-superuser
  storage:
    size: 5Gi
    storageClass: longhorn-single
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak
      encoding: UTF8
      localeCType: C
      localeCollate: C
      secret:
        name: keycloak-db-secret
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  affinity:
    podAntiAffinityType: required
  managed:
    roles:
      - name: keycloak
        ensure: present
        login: true
        passwordSecret:
          name: keycloak-db-secret
          key: password
        superuser: false
        createdb: false
        createrole: false
        inherit: true
        replication: false
        bypassrls: false
