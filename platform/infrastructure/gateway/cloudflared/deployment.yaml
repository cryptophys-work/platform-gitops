apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflare-tunnel
  labels:
    app.kubernetes.io/instance: cloudflared
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: edge-tunnel
    app.kubernetes.io/part-of: cryptophys-edge
    cryptophys.io/domain: platform
    cryptophys.io/component: cloudflared
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
spec:
  replicas: 2
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: cloudflared
        app.kubernetes.io/managed-by: flux
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/component: edge-tunnel
        app.kubernetes.io/part-of: cryptophys-edge
        cryptophys.io/domain: platform
        cryptophys.io/component: cloudflared
        cryptophys.io/managed-by: flux
        cryptophys.io/layer: platform
    spec:
      serviceAccountName: cloudflared
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload.cryptophys.work/platform
                    operator: In
                    values:
                      - "true"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: cloudflared
                topologyKey: kubernetes.io/hostname
      tolerations:
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      containers:
        - name: cloudflared
          image: docker.io/cloudflare/cloudflared:2026.3.0
          imagePullPolicy: IfNotPresent
          env:
            - name: TUNNEL_ID
              valueFrom:
                secretKeyRef:
                  name: cloudflared-credentials
                  key: tunnel_id
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config.yaml
            - run
            - $(TUNNEL_ID)
          ports:
            - name: metrics
              containerPort: 2000
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          volumeMounts:
            - name: cloudflared-config
              mountPath: /etc/cloudflared/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: cloudflared-credentials
              mountPath: /etc/cloudflared/creds
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: cloudflared-config
          configMap:
            name: cloudflared-config
            defaultMode: 0444
        - name: cloudflared-credentials
          secret:
            secretName: cloudflared-credentials
            defaultMode: 0440
        - name: tmp
          emptyDir: {}
