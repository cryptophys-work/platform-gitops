apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-n8n-to-cerebrum
  namespace: cerebrum
spec:
  podSelector:
    matchLabels:
      app: cerebrum-llm
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: apps-automation
      podSelector:
        matchLabels:
          app.kubernetes.io/name: n8n
    ports:
    - protocol: TCP
      port: 8080
