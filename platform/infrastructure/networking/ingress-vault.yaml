apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault
  namespace: vault-system
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Layer 1: browser HTTP Basic Auth (native username/password popup) before the Vault UI loads.
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: vault-ui-basic-auth
    # Realm string MUST be plain ASCII — ingress-nginx 1.14.x validator rejects
    # non-ASCII characters (e.g. em-dash U+2014) and silently drops the entire
    # server block from nginx.conf, producing a 404 from the default server.
    # See: ingress-nginx/internal/ingress/annotations/validators.go validateAuthRealm
    nginx.ingress.kubernetes.io/auth-realm: "Cryptophys Vault UI"
    nginx.ingress.kubernetes.io/configuration-snippet: if ($request_uri = /) { 
      return 302 /ui/; }
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - vault.cryptophys.work
    secretName: platform-wildcard-tls
  rules:
  - host: vault.cryptophys.work
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
                # Helm ui.enabled + activeVaultPodOnly: UI traffic follows the active Raft leader.
            name: vault-ui
            port:
              number: 8200
