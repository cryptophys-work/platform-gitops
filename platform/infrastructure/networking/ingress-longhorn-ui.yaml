# Longhorn UI SSO: Keycloak via a dedicated oauth2-proxy on the same hostname.
# If operators see Cloudflare Access instead of Keycloak, disable overlapping Zero Trust apps for this hostname — see docs/runbooks/longhorn-ui-cloudflare-access-vs-keycloak.md
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn-ui
  namespace: longhorn-system
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 16 128k;
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Set-Cookie "_oauth2_proxy_cryptophys=; Domain=.cryptophys.work; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; Max-Age=0; HttpOnly; Secure; SameSite=Lax" always;
      add_header Set-Cookie "_oauth2_proxy_cryptophys_csrf=; Domain=.cryptophys.work; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; Max-Age=0; HttpOnly; Secure; SameSite=Lax" always;
      add_header Set-Cookie "_oauth2_proxy=; Domain=.cryptophys.work; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; Max-Age=0; HttpOnly; Secure; SameSite=Lax" always;
      add_header Set-Cookie "_oauth2_proxy_csrf=; Domain=.cryptophys.work; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; Max-Age=0; HttpOnly; Secure; SameSite=Lax" always;
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - longhorn.cryptophys.work
      secretName: platform-wildcard-tls
  rules:
    - host: longhorn.cryptophys.work
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: longhorn-oauth2-proxy
                port:
                  number: 4180
