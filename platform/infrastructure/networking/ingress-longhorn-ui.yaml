# Longhorn UI SSO: Keycloak via headlamp-oauth2-proxy (nginx auth_request).
# If operators see Cloudflare Access instead of Keycloak, disable overlapping Zero Trust apps for this hostname — see docs/runbooks/longhorn-ui-cloudflare-access-vs-keycloak.md
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn-ui
  namespace: longhorn-system
  annotations:
    nginx.ingress.kubernetes.io/auth-url: http://headlamp-oauth2-proxy.platform-ui.svc.cluster.local:4180/oauth2/auth
    nginx.ingress.kubernetes.io/auth-signin: https://headlamp.cryptophys.work/oauth2/start?rd=$scheme://$best_http_host$escaped_request_uri
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 16 128k;
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Set-Cookie: _oauth2_proxy_cryptophys=; Domain=.cryptophys.work; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; Max-Age=0; HttpOnly; Secure; SameSite=Lax";
      more_set_headers "Set-Cookie: _oauth2_proxy_cryptophys_csrf=; Domain=.cryptophys.work; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; Max-Age=0; HttpOnly; Secure; SameSite=Lax";
      more_set_headers "Set-Cookie: _oauth2_proxy=; Domain=.cryptophys.work; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; Max-Age=0; HttpOnly; Secure; SameSite=Lax";
      more_set_headers "Set-Cookie: _oauth2_proxy_csrf=; Domain=.cryptophys.work; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; Max-Age=0; HttpOnly; Secure; SameSite=Lax";
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - longhorn.cryptophys.work
      secretName: platform-wildcard-tls
  rules:
    - host: longhorn.cryptophys.work
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: longhorn-frontend
                port:
                  number: 80
