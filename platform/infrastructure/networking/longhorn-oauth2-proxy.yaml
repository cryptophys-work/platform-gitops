apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: longhorn-oauth2-proxy-secret
  namespace: longhorn-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: longhorn-oauth2-proxy-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        cookie-secret: "b45fbd57cd40688ef4f16ea87a99f922"
  data:
    - secretKey: client-secret
      remoteRef:
        key: apps/platform-ui/oauth2-proxy
        property: client-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: longhorn-oauth2-proxy
  namespace: longhorn-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: longhorn-oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: longhorn-oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=keycloak-oidc
            - --skip-oidc-discovery=true
            - --oidc-issuer-url=https://id.cryptophys.work/realms/cryptophys
            - --login-url=https://id.cryptophys.work/realms/cryptophys/protocol/openid-connect/auth
            - --redeem-url=http://identity-core.apps-dash.svc.cluster.local/realms/cryptophys/protocol/openid-connect/token
            - --oidc-jwks-url=http://identity-core.apps-dash.svc.cluster.local/realms/cryptophys/protocol/openid-connect/certs
            - --client-id=longhorn-oauth2-proxy
            - --oidc-audience-claim=azp
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://longhorn.cryptophys.work/oauth2/callback
            - --email-domain=*
            - --upstream=http://longhorn-frontend.longhorn-system.svc.cluster.local:80/
            - --upstream-timeout=30s
            - --pass-host-header=true
            - --pass-authorization-header=false
            - --pass-access-token=false
            - --insecure-oidc-allow-unverified-email=true
            - --cookie-secure=true
            - --cookie-name=__Host-longhorn_oauth2_proxy
            - --cookie-samesite=lax
            - --cookie-path=/
            - --cookie-expire=168h
            - --cookie-refresh=1h
            - --skip-provider-button=true
            - --session-store-type=cookie
            - --real-client-ip-header=X-Forwarded-For
            - --reverse-proxy=true
            - --whitelist-domain=longhorn.cryptophys.work
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: longhorn-oauth2-proxy-secret
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: longhorn-oauth2-proxy-secret
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: http
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            runAsNonRoot: true
            runAsUser: 2000
            seccompProfile:
              type: RuntimeDefault
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: longhorn-oauth2-proxy
  namespace: longhorn-system
spec:
  selector:
    app.kubernetes.io/name: longhorn-oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: 4180
