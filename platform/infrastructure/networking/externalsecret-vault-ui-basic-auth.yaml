# Vault UI — Layer 1: nginx ingress HTTP Basic Auth (browser username/password popup).
# Layer 2 (inside Vault): enable userpass + UI default auth; see VAULT_UNSEAL_PROCEDURE.md § 6.
#
# Populate KV v2 once (operator, with a Vault admin token), then let ESO sync:
#   htpasswd -nbBC 10 cryptophys.adm 'your-strong-password'   # copy the single line output
#   vault kv put secret/platform/ingress/vault-ui auth='cryptophys.adm:$2y$10$...'
#
# The Secret key must be "auth" (htpasswd format). Multiple lines = multiple users.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-ui-basic-auth
  namespace: vault-system
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vault-ui-basic-auth
    creationPolicy: Owner
  data:
    - secretKey: auth
      remoteRef:
        key: platform/ingress/vault-ui
        property: auth
