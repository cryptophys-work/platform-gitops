# Vault UI: nginx ingress HTTP basic auth (browser username/password before the Vault UI).
#
# Populate KV v2 once (operator, with a Vault admin token), then let ESO sync:
#   htpasswd -nbBC 10 vaultui 'your-strong-password'   # copy the single line output
#   vault kv put secret/platform/ingress/vault-ui auth='vaultui:$2y$10$...'
#
# The Secret key must be "auth" (htpasswd format). Multiple lines = multiple users.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-ui-basic-auth
  namespace: vault-system
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vault-ui-basic-auth
    creationPolicy: Owner
  data:
    - secretKey: auth
      remoteRef:
        key: platform/ingress/vault-ui
        property: auth
