---
# SPIRE CA Bundle Secret for NGINX Ingress mTLS validation
# This secret contains the SPIRE root CA certificate used to validate client certificates
apiVersion: v1
kind: Secret
metadata:
  name: spire-ca-bundle
  namespace: ingress-system
type: Opaque
data:
  # This will be populated by a Job or manually
  # Format: base64 encoded SPIRE bundle.crt
  ca.crt: ""  # Placeholder - to be populated by automation
---
# Same secret, but in `gitops-system` for Ingresses that live in that namespace.
# ingress-nginx will return 403 if an Ingress references a Secret in another namespace.
apiVersion: v1
kind: Secret
metadata:
  name: spire-ca-bundle
  namespace: gitops-system
type: Opaque
data:
  ca.crt: ""  # Placeholder - populated by the CronJob extractor
---
# CronJob to continuously refresh the SPIRE CA bundle in secrets.
# Runs every 15 minutes; SPIRE rotates its CA ~hourly so 15-min cadence keeps it fresh.
# Uses Alpine + curl to call Kubernetes API directly (no kubectl binary needed).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: spire-ca-bundle-extractor
  namespace: ingress-system
  labels:
    app.kubernetes.io/name: spire-ca-bundle-extractor
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/instance: spire-ca-bundle-extractor
    app.kubernetes.io/managed-by: flux
spec:
  schedule: "*/15 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: spire-ca-bundle-extractor
            app.kubernetes.io/part-of: spire
            app.kubernetes.io/instance: spire-ca-bundle-extractor
        spec:
          serviceAccountName: spire-ca-bundle-extractor
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: extract-bundle
            image: registry.cryptophys.work/library/alpine:3.20.3
            imagePullPolicy: IfNotPresent
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              privileged: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 65532
              capabilities:
                drop:
                - ALL
            command:
            - /bin/sh
            - -c
            - |
              set -e
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              API=https://kubernetes.default.svc
              echo "Fetching SPIRE bundle ConfigMap..."
              BUNDLE_CRT=$(wget -qO- --no-check-certificate \
                --header "Authorization: Bearer $TOKEN" \
                "$API/api/v1/namespaces/spire-system/configmaps/spire-bundle" | \
                sed 's/.*"bundle\.crt":"\([^"]*\)".*/\1/' | \
                sed 's/\\n/\n/g' | \
                base64 | tr -d '\n')
              if [ -z "$BUNDLE_CRT" ]; then
                echo "ERROR: empty bundle"
                exit 1
              fi
              for NS in ingress-system gitops-system; do
                echo "Patching $NS..."
                wget -qO- --no-check-certificate \
                  --header "Authorization: Bearer $TOKEN" \
                  --header "Content-Type: application/json-patch+json" \
                  --method PATCH \
                  --body-data '[{"op":"replace","path":"/data/ca.crt","value":"'"$BUNDLE_CRT"'"}]' \
                  "$API/api/v1/namespaces/$NS/secrets/spire-ca-bundle" || true
              done
              echo "Done."
          tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
---
# ServiceAccount for the job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-ca-bundle-extractor
  namespace: ingress-system
  labels:
    app.kubernetes.io/name: spire-ca-bundle-extractor
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/instance: spire-ca-bundle-extractor
    app.kubernetes.io/managed-by: flux
---
# ClusterRole to read SPIRE bundle and update secret
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-ca-bundle-extractor
  labels:
    app.kubernetes.io/name: spire-ca-bundle-extractor
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/instance: spire-ca-bundle-extractor
    app.kubernetes.io/managed-by: flux
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
  resourceNames: ["spire-bundle"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "patch"]
  resourceNames: ["spire-ca-bundle"]
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-ca-bundle-extractor
  labels:
    app.kubernetes.io/name: spire-ca-bundle-extractor
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/instance: spire-ca-bundle-extractor
    app.kubernetes.io/managed-by: flux
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-ca-bundle-extractor
subjects:
- kind: ServiceAccount
  name: spire-ca-bundle-extractor
  namespace: ingress-system
