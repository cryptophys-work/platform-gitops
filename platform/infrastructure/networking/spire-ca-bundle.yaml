---
# SPIRE CA Bundle Secret for NGINX Ingress mTLS validation
# This secret contains the SPIRE root CA certificate used to validate client certificates
apiVersion: v1
kind: Secret
metadata:
  name: spire-ca-bundle
  namespace: ingress-system
type: Opaque
data:
  # This will be populated by a Job or manually
  # Format: base64 encoded SPIRE bundle.crt
  ca.crt: ""  # Placeholder - to be populated by automation
---
# Same secret, but in `gitops-system` for Ingresses that live in that namespace.
# ingress-nginx will return 403 if an Ingress references a Secret in another namespace.
apiVersion: v1
kind: Secret
metadata:
  name: spire-ca-bundle
  namespace: gitops-system
type: Opaque
data:
  ca.crt: ""  # Placeholder - populated by the extractor Job
---
# Job to extract SPIRE CA bundle and populate the secret
apiVersion: batch/v1
kind: Job
metadata:
  # NOTE: keep this versioned to avoid immutable-field conflicts on GitOps reconciles.
  name: spire-ca-bundle-extractor-v4
  namespace: ingress-system
  labels:
    app.kubernetes.io/name: spire-ca-bundle-extractor
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/instance: spire-ca-bundle-extractor
    app.kubernetes.io/managed-by: flux
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-ca-bundle-extractor
        app.kubernetes.io/part-of: spire
        app.kubernetes.io/instance: spire-ca-bundle-extractor
        app.kubernetes.io/managed-by: flux
        job: spire-ca-bundle-extractor-v4
    spec:
      serviceAccountName: spire-ca-bundle-extractor
      restartPolicy: OnFailure
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: extract-bundle
        image: ghcr.io/bitnami/kubectl:1.30.3
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          capabilities:
            drop:
            - ALL
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Extracting SPIRE CA bundle..."
          
          # Get SPIRE bundle from ConfigMap
          # NOTE: The key is literally `bundle.crt` (contains a dot). kubectl jsonpath handling for
          # dotted keys is brittle across versions; use go-template + index instead.
          BUNDLE="$(kubectl get configmap -n spire-system spire-bundle -o go-template='{{ index .data \"bundle.crt\" }}' | base64 -w 0)"
          
          if [ -z "$BUNDLE" ]; then
            echo "ERROR: SPIRE bundle extracted empty; refusing to patch secrets."
            exit 1
          fi

          # Update secrets (namespaced copies).
          for ns in ingress-system gitops-system; do
            echo "Patching secret spire-ca-bundle in namespace: $ns"
            kubectl patch secret spire-ca-bundle -n "$ns" \
              --type='json' \
              -p='[{"op":"replace","path":"/data/ca.crt","value":"'"$BUNDLE"'"}]'
          done
          
          echo "SPIRE CA bundle extracted successfully"
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      nodeSelector:
        cryptophys.io/tier: platform
---
# ServiceAccount for the job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-ca-bundle-extractor
  namespace: ingress-system
  labels:
    app.kubernetes.io/name: spire-ca-bundle-extractor
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/instance: spire-ca-bundle-extractor
    app.kubernetes.io/managed-by: flux
---
# ClusterRole to read SPIRE bundle and update secret
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-ca-bundle-extractor
  labels:
    app.kubernetes.io/name: spire-ca-bundle-extractor
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/instance: spire-ca-bundle-extractor
    app.kubernetes.io/managed-by: flux
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
  resourceNames: ["spire-bundle"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "patch"]
  resourceNames: ["spire-ca-bundle"]
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-ca-bundle-extractor
  labels:
    app.kubernetes.io/name: spire-ca-bundle-extractor
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/instance: spire-ca-bundle-extractor
    app.kubernetes.io/managed-by: flux
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-ca-bundle-extractor
subjects:
- kind: ServiceAccount
  name: spire-ca-bundle-extractor
  namespace: ingress-system
