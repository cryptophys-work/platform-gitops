apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: gitops-gitea
  namespace: gitops-system
spec:
  interval: 30m
  releaseName: gitops-gitea
  timeout: 30m
  install:
    timeout: 30m
    remediation:
      retries: 3
  upgrade:
    timeout: 30m
    cleanupOnFail: true
    remediation:
      retries: 5
  chart:
    spec:
      chart: gitea
      version: 12.5.0
      sourceRef:
        kind: HelmRepository
        name: gitea-charts
        namespace: flux-system
  values:
    replicaCount: 1
    image:
      registry: ghcr.io
      repository: go-gitea/gitea
      tag: "1.25.4"
      rootless: true
    gitea:
      admin:
        username: gitea-admin
        email: gitea-admin@cryptophys.work
        existingSecret: gitea-admin-secret
        passwordMode: keepUpdated
      livenessProbe:
        enabled: true
        initialDelaySeconds: 120
        periodSeconds: 10
        failureThreshold: 10
      readinessProbe:
        enabled: true
        initialDelaySeconds: 60
        periodSeconds: 10
        failureThreshold: 10
      config:
        database:
          DB_TYPE: postgres
          HOST: postgres-security-ha-rw.postgresql-system.svc.cluster.local:5432
          NAME: gitea
          USER: gitea
          PASSWD: GiteaSecure2026
        cache:
          ADAPTER: redis
          HOST: redis://gitea-redis.gitops-system.svc.cluster.local:6379/0
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: redis://gitea-redis.gitops-system.svc.cluster.local:6379/0
        queue:
          TYPE: channel
        server:
          ROOT_URL: https://gitea.cryptophys.work
          DOMAIN: gitea.cryptophys.work
          GIT_EXECUTABLE_PATH: /usr/bin/git
        webhook:
          ALLOWED_HOST_LIST: webhook.cryptophys.work,webhook-receiver.tekton-system.svc.cluster.local,webhook-receiver.tekton-system.svc,localhost,127.0.0.1
          DELIVER_COMMIT_FILE_INFO: "true"
          DELIVER_TIMEOUT: "60"
        repository:
          MIN_MIRROR_SYNC_INTERVAL: 3m
          DEFAULT_MIRROR_SYNC_INTERVAL: 3m
        mirror:
          MIN_INTERVAL: 3m
          DEFAULT_INTERVAL: 3m
    extraEnv:
      - name: GITEA__WEBHOOK__ALLOWED_HOST_LIST
        value: webhook.cryptophys.work,webhook-receiver.tekton-system.svc.cluster.local,webhook-receiver.tekton-system.svc,localhost,127.0.0.1
      - name: GITEA__WEBHOOK__DELIVER_COMMIT_FILE_INFO
        value: "true"
      - name: GITEA__WEBHOOK__DELIVER_TIMEOUT
        value: "60"
      - name: GITEA__CACHE__ADAPTER
        value: redis
      - name: GITEA__CACHE__HOST
        value: gitea-redis.gitops-system.svc.cluster.local:6379
      - name: GITEA__SESSION__PROVIDER
        value: redis
      - name: GITEA__SESSION__PROVIDER_CONFIG
        value: redis://gitea-redis.gitops-system.svc.cluster.local:6379/0
      - name: GITEA__QUEUE__TYPE
        value: channel
      - name: GITEA__REPOSITORY__MIN_MIRROR_SYNC_INTERVAL
        value: "3m"
      - name: GITEA__REPOSITORY__DEFAULT_MIRROR_SYNC_INTERVAL
        value: "3m"
      - name: GITEA__MIRROR__MIN_INTERVAL
        value: "3m"
      - name: GITEA__MIRROR__DEFAULT_INTERVAL
        value: "3m"
      - name: GITHUB_MIRROR_USER
        valueFrom:
          secretKeyRef:
            name: gitea-mirror-token
            key: user
      - name: GITHUB_MIRROR_TOKEN
        valueFrom:
          secretKeyRef:
            name: gitea-mirror-token
            key: token
      - name: GITEA_ADMIN_BOOTSTRAP_USERNAME
        valueFrom:
          secretKeyRef:
            name: gitea-admin-secret
            key: username
      - name: GITEA_ADMIN_BOOTSTRAP_PASSWORD
        valueFrom:
          secretKeyRef:
            name: gitea-admin-secret
            key: password
    strategy:
      type: Recreate
    deployment:
      lifecycle:
        postStart:
          exec:
            command:
              - /bin/sh
              - -c
              - |
                REPO=/data/git/gitea-repositories/cryptophys-work/apps-gitops.git
                if [ -d "$REPO" ]; then
                  git -C "$REPO" remote set-url origin \
                    "https://${GITHUB_MIRROR_USER}:${GITHUB_MIRROR_TOKEN}@github.com/cryptophys-work/apps-gitops.git"
                  echo "[mirror-init] remote URL set for apps-gitops" >> /tmp/mirror-init.log
                fi
                if [ -n "${GITEA_ADMIN_BOOTSTRAP_USERNAME:-}" ] && [ -n "${GITEA_ADMIN_BOOTSTRAP_PASSWORD:-}" ]; then
                  n=0
                  until gitea admin user change-password \
                    --username "${GITEA_ADMIN_BOOTSTRAP_USERNAME}" \
                    --password "${GITEA_ADMIN_BOOTSTRAP_PASSWORD}" \
                    --must-change-password=false >> /tmp/mirror-init.log 2>&1; do
                    n=$((n+1))
                    if [ "$n" -ge 12 ]; then
                      echo "[bootstrap-auth] failed to normalize ${GITEA_ADMIN_BOOTSTRAP_USERNAME}" >> /tmp/mirror-init.log
                      exit 1
                    fi
                    sleep 5
                  done
                  echo "[bootstrap-auth] normalized ${GITEA_ADMIN_BOOTSTRAP_USERNAME}" >> /tmp/mirror-init.log
                fi
    ingress:
      enabled: true
      className: nginx
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "512m"
      hosts:
        - host: gitea.cryptophys.work
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: platform-wildcard-tls
          hosts:
            - gitea.cryptophys.work
    service:
      http:
        type: ClusterIP
        port: 3000
        clusterIP: ""
    persistence:
      enabled: true
      create: false
      claimName: gitea-shared-storage-v2
      size: 10Gi
      storageClass: longhorn
      accessModes:
        - ReadWriteOnce
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
    redis:
      enabled: false
    valkey:
      enabled: false
    valkey-cluster:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 1000m     # increased from 600m for 280MB repo with concurrent git ops
        memory: 1Gi    # increased from 768Mi
    tolerations: []
    nodeSelector:
      workload.cryptophys.work/apps-core: "true"
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                   values:
                     - cerebellum-161-97-117-96
                     - quanta-194-163-186-222
    initContainers:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
