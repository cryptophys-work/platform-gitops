apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-code-forge-gitea
  namespace: gitops-system
spec:
  interval: 30m
  releaseName: platform-code-forge-gitea
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: gitea
      version: 12.5.0
      sourceRef:
        kind: HelmRepository
        name: gitea-charts
        namespace: flux-system
  values:
    replicaCount: 1
    strategy:
      type: Recreate
    image:
      registry: ghcr.io
      repository: go-gitea/gitea
      tag: "1.25.4"
      rootless: true
      pullPolicy: IfNotPresent
    gitea:
      admin:
        email: admin@cryptophys.work
        existingSecret: gitea-admin-secret
      config:
        security:
          INSTALL_LOCK: true
        server:
          DOMAIN: gitea.cryptophys.work
          ROOT_URL: https://gitea.cryptophys.work/
          SSH_DOMAIN: gitea.cryptophys.work
          SSH_PORT: 2222
        database:
          DB_TYPE: postgres
          HOST: postgres-apps-ha-rw.postgresql-system.svc.cluster.local:5432
          NAME: gitea
          USER: gitea
          PASSWD: GiteaSecure2026
        session:
          PROVIDER: memory
        queue:
          TYPE: level
        cache:
          ADAPTER: memory
        webhook:
          ALLOWED_HOST_LIST: "*"
        service:
          DISABLE_REGISTRATION: true
          SHOW_REGISTRATION_BUTTON: false
          ALLOW_ONLY_EXTERNAL_REGISTRATION: false
    ingress:
      enabled: true
      className: nginx
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: 512m
      hosts:
        - host: gitea.cryptophys.work
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: cryptophys-wildcard-tls
          hosts:
            - gitea.cryptophys.work
    persistence:
      enabled: true
      create: false
      claimName: gitea-shared-storage-rwx
      accessModes:
        - ReadWriteMany
      mount: true
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
    redis-cluster:
      enabled: false
    valkey-cluster:
      enabled: false
    memcached:
      enabled: false
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    nodeSelector:
      cryptophys.io/tier: platform
    resources:
      requests:
        cpu: 50m
        memory: 55Mi
      limits:
        cpu: 500m
        memory: 1Gi
    podSecurityContext:
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      privileged: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    initContainers:
      resources:
        requests:
          cpu: 50m
          memory: 55Mi
        limits:
          cpu: 200m
          memory: 256Mi
    commonLabels:
      cryptophys.work/domain: gitea
    commonAnnotations:
      cryptophys.io/anti-regression: "true"
      cryptophys.io/contract: contract.platform.code_forge.v1
      cryptophys.io/ssot-ref: ssot/gitea/deployment.yaml
    global:
      security:
        allowInsecureImages: true
