apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-code-forge-gitea
  namespace: gitops-system
spec:
  interval: 30m
  releaseName: platform-code-forge-gitea
  values:
    replicaCount: 1 # Scale down temporarily for faster stabilization
    image:
      registry: ghcr.io
      repository: go-gitea/gitea
      tag: "1.25.4"
      rootless: true
    gitea:
      admin:
        existingSecret: gitea-admin-secret
      config:
        # Move all cache/session/queue config to extraConfig to avoid default generator logic
        database:
          DB_TYPE: postgres
          HOST: postgres-apps-ha-rw.postgresql-system.svc.cluster.local:5432
          NAME: gitea
          USER: gitea
          PASSWD: GiteaSecure2026
    # Master Override using custom app.ini additions
    extraConfig: |
      [cache]
      ADAPTER = redis
      HOST = gitea-redis.gitops-system.svc.cluster.local:6379
      [session]
      PROVIDER = redis
      PROVIDER_CONFIG = redis://gitea-redis.gitops-system.svc.cluster.local:6379/0
      [queue]
      TYPE = redis
      CONN_STR = redis://gitea-redis.gitops-system.svc.cluster.local:6379/1
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: gitea.cryptophys.work
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: cryptophys-wildcard-tls
          hosts:
            - gitea.cryptophys.work
    persistence:
      enabled: true
      claimName: gitea-shared-storage-rwx
    valkey-cluster:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
