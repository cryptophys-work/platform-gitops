apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-code-forge-gitea
  namespace: gitops-system
spec:
  interval: 30m
  releaseName: platform-code-forge-gitea
  timeout: 20m
  install:
    timeout: 20m
    remediation:
      retries: 3
  upgrade:
    timeout: 20m
    cleanupOnFail: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: gitea
      version: 12.5.0
      sourceRef:
        kind: HelmRepository
        name: gitea-charts
        namespace: flux-system
  values:
    replicaCount: 2
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/name: gitea
          topologyKey: "kubernetes.io/hostname"
    image:
      registry: ghcr.io
      repository: go-gitea/gitea
      tag: "1.25.4"
      rootless: true
    gitea:
      admin:
        existingSecret: gitea-admin-secret
      config:
        database:
          DB_TYPE: postgres
          HOST: postgres-apps-ha-rw.postgresql-system.svc.cluster.local:5432
          NAME: gitea
          USER: gitea
          PASSWD: GiteaSecure2026!
        cache:
          ADAPTER: redis
          HOST: gitea-redis.gitops-system.svc.cluster.local:6379
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: redis://gitea-redis.gitops-system.svc.cluster.local:6379/0
        queue:
          TYPE: redis
          CONN_STR: redis://gitea-redis.gitops-system.svc.cluster.local:6379/1
        server:
          ROOT_URL: https://gitea.cryptophys.work
          DOMAIN: gitea.cryptophys.work
          GIT_EXECUTABLE_PATH: /usr/bin/git
    extraEnv:
      - name: GITEA__CACHE__ADAPTER
        value: redis
      - name: GITEA__CACHE__HOST
        value: gitea-redis.gitops-system.svc.cluster.local:6379
      - name: GITEA__SESSION__PROVIDER
        value: redis
      - name: GITEA__SESSION__PROVIDER_CONFIG
        value: redis://gitea-redis.gitops-system.svc.cluster.local:6379/0
      - name: GITEA__QUEUE__TYPE
        value: redis
      - name: GITEA__QUEUE__CONN_STR
        value: redis://gitea-redis.gitops-system.svc.cluster.local:6379/1
    ingress:
      enabled: true
      className: nginx
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: "512m"
      hosts:
        - host: gitea.cryptophys.work
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: platform-wildcard-tls
          hosts:
            - gitea.cryptophys.work
    persistence:
      enabled: true
      claimName: gitea-shared-storage-rwx
      accessModes:
        - ReadWriteMany
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
    redis:
      enabled: false
    valkey:
      enabled: false
    valkey-cluster:
      enabled: false
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    initContainers:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
