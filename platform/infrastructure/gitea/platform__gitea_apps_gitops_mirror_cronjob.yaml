apiVersion: batch/v1
kind: CronJob
metadata:
  name: gitea-apps-gitops-mirror
  namespace: gitops-system
  labels:
    app.kubernetes.io/instance: gitea-apps-gitops-mirror
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/name: gitea-apps-gitops-mirror
    app.kubernetes.io/component: recovery
    cryptophys.io/domain: platform
    cryptophys.io/component: gitea
    cryptophys.io/layer: platform
    cryptophys.io/managed-by: flux
spec:
  schedule: "*/10 * * * *"
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/instance: gitea-apps-gitops-mirror
            app.kubernetes.io/managed-by: flux
            app.kubernetes.io/name: gitea-apps-gitops-mirror
            cryptophys.io/component: gitea
        spec:
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/worker
                        operator: Exists
                      - key: cryptophys.io/tier
                        operator: In
                        values:
                          - compute
                      - key: cryptophys.io/platform-ha
                        operator: In
                        values:
                          - "true"
                      - key: cryptophys.io/role
                        operator: DoesNotExist
          tolerations:
            - key: cryptophys.io/pool
              operator: Equal
              value: platform-ha
              effect: NoSchedule
          securityContext:
            fsGroup: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: mirror-apps-gitops
              image: docker.io/alpine/git@sha256:d453f54c83320412aa89c391b076930bd8569bc1012285e8c68ce2d4435826a3
              imagePullPolicy: IfNotPresent
              env:
                - name: HOME
                  value: /tmp/home
                - name: TMPDIR
                  value: /tmp
                - name: GITEA_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: gitea-admin-secret
                      key: username
                - name: GITEA_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: gitea-admin-secret
                      key: password
              command:
                - /bin/sh
                - -lc
                - |
                  set -eu
                  src_url="ssh://git@github.com/cryptophys-work/apps-gitops.git"
                  clone_url="http://gitea-http-internal.gitops-system.svc.cluster.local:3000/cryptophys-work/apps-gitops.git"
                  webhook_url="http://webhook-receiver.tekton-system.svc.cluster.local/hook"
                  old_rev=""
                  export GIT_SSH_COMMAND="ssh -i /github-ssh/identity -o UserKnownHostsFile=/github-ssh/known_hosts -o StrictHostKeyChecking=yes"
                  git_auth() { GIT_TERMINAL_PROMPT=0 git "$@"; }
                  mkdir -p /tmp/home
                  cat >/tmp/home/.netrc <<EOF
                  machine gitea-http-internal.gitops-system.svc.cluster.local login ${GITEA_ADMIN_USER} password ${GITEA_ADMIN_PASSWORD}
                  machine gitops-gitea-http.gitops-system.svc.cluster.local login ${GITEA_ADMIN_USER} password ${GITEA_ADMIN_PASSWORD}
                  EOF
                  chmod 600 /tmp/home/.netrc
                  old_rev="$(git ls-remote "$clone_url" refs/heads/main 2>/dev/null | awk '{print $1}')"
                  tmp_repo="$(mktemp -d /tmp/apps-gitops.XXXXXX)"
                  rmdir "$tmp_repo"
                  git_auth clone --mirror "$src_url" "$tmp_repo"
                  git --git-dir="$tmp_repo" remote add gitea "$clone_url"
                  git_auth --git-dir="$tmp_repo" push --mirror gitea
                  new_rev="$(git --git-dir="$tmp_repo" rev-parse refs/heads/main)"
                  if [ -n "$old_rev" ] && [ "$old_rev" != "$new_rev" ]; then
                    modified_json="$(
                      git --git-dir="$tmp_repo" diff --name-only "$old_rev" "$new_rev" \
                        | sed 's/\\/\\\\/g; s/"/\\"/g; s/^/"/; s/$/"/' \
                        | paste -sd, -
                    )"
                    cat >/tmp/apps-gitops-webhook.json <<EOF
                  {"ref":"refs/heads/main","after":"${new_rev}","repository":{"name":"apps-gitops","clone_url":"${clone_url}"},"pusher":{"username":"gitea-mirror"},"commits":[{"added":[],"removed":[],"modified":[${modified_json}]}]}
                  EOF
                    wget -qO- \
                      --header="Content-Type: application/json" \
                      --post-file=/tmp/apps-gitops-webhook.json \
                      "${webhook_url}" >/dev/null
                  fi
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                privileged: false
                capabilities:
                  drop:
                    - ALL
                runAsGroup: 1000
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: github-ssh-key
                  mountPath: /github-ssh
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: github-ssh-key
              secret:
                secretName: github-ssh-key
                defaultMode: 0400
            - name: tmp
              emptyDir: {}
