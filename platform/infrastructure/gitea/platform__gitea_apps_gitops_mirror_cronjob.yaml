apiVersion: batch/v1
kind: CronJob
metadata:
  name: gitea-apps-gitops-mirror
  namespace: gitops-system
  labels:
    app.kubernetes.io/instance: gitea-apps-gitops-mirror
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/name: gitea-apps-gitops-mirror
    app.kubernetes.io/component: recovery
    cryptophys.io/domain: platform
    cryptophys.io/component: gitea
    cryptophys.io/layer: platform
    cryptophys.io/managed-by: flux
spec:
  schedule: "*/10 * * * *"
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/instance: gitea-apps-gitops-mirror
            app.kubernetes.io/managed-by: flux
            app.kubernetes.io/name: gitea-apps-gitops-mirror
            cryptophys.io/component: gitea
        spec:
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/worker
                        operator: Exists
                      - key: cryptophys.io/tier
                        operator: In
                        values:
                          - compute
                      - key: cryptophys.io/platform-ha
                        operator: In
                        values:
                          - "true"
                      - key: cryptophys.io/role
                        operator: DoesNotExist
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: gitea
                      app.kubernetes.io/instance: gitops-gitea
                  namespaces:
                    - gitops-system
                  topologyKey: kubernetes.io/hostname
          tolerations:
            - key: cryptophys.io/pool
              operator: Equal
              value: platform-ha
              effect: NoSchedule
          securityContext:
            fsGroup: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: mirror-apps-gitops
              image: docker.io/alpine/git@sha256:d453f54c83320412aa89c391b076930bd8569bc1012285e8c68ce2d4435826a3
              imagePullPolicy: IfNotPresent
              env:
                - name: HOME
                  value: /tmp/home
                - name: TMPDIR
                  value: /tmp
              command:
                - /bin/sh
                - -lc
                - |
                  set -eu
                  src_url="ssh://git@github.com/cryptophys-work/apps-gitops.git"
                  served_repo_dir="/data/git/gitea-repositories/cryptophys-work/apps-gitops.git"
                  clone_url="http://gitops-gitea-http.gitops-system.svc.cluster.local:3000/cryptophys-work/apps-gitops.git"
                  webhook_url="http://webhook-receiver.tekton-system.svc.cluster.local/hook"
                  old_rev=""
                  export GIT_SSH_COMMAND="ssh -i /github-ssh/identity -o UserKnownHostsFile=/github-ssh/known_hosts -o StrictHostKeyChecking=yes"
                  git_auth() { GIT_TERMINAL_PROMPT=0 git "$@"; }
                  mkdir -p /tmp/home \
                    /data/git/gitea-repositories/cryptophys-work
                  if [ -d "$served_repo_dir" ] && git --git-dir="$served_repo_dir" rev-parse --is-bare-repository >/dev/null 2>&1; then
                    old_rev="$(git --git-dir="$served_repo_dir" rev-parse refs/heads/main 2>/dev/null || true)"
                    if git --git-dir="$served_repo_dir" remote get-url origin >/dev/null 2>&1; then
                      git --git-dir="$served_repo_dir" remote set-url origin "$src_url"
                    else
                      git --git-dir="$served_repo_dir" remote add origin "$src_url"
                    fi
                    git_auth --git-dir="$served_repo_dir" fetch --prune origin "+refs/*:refs/*"
                  else
                    tmp_repo="$(mktemp -d /tmp/apps-gitops.XXXXXX)"
                    rmdir "$tmp_repo"
                    git_auth clone --mirror "$src_url" "$tmp_repo"
                    rm -rf "$served_repo_dir"
                    mv "$tmp_repo" "$served_repo_dir"
                  fi
                  git --git-dir="$served_repo_dir" symbolic-ref HEAD refs/heads/main || true
                  new_rev="$(git --git-dir="$served_repo_dir" rev-parse refs/heads/main)"
                  if [ -n "$old_rev" ] && [ "$old_rev" != "$new_rev" ]; then
                    modified_json="$(
                      git --git-dir="$served_repo_dir" diff --name-only "$old_rev" "$new_rev" \
                        | sed 's/\\/\\\\/g; s/"/\\"/g; s/^/"/; s/$/"/' \
                        | paste -sd, -
                    )"
                    cat >/tmp/apps-gitops-webhook.json <<EOF
                  {"ref":"refs/heads/main","after":"${new_rev}","repository":{"name":"apps-gitops","clone_url":"${clone_url}"},"pusher":{"username":"gitea-mirror"},"commits":[{"added":[],"removed":[],"modified":[${modified_json}]}]}
                  EOF
                    wget -qO- \
                      --header="Content-Type: application/json" \
                      --post-file=/tmp/apps-gitops-webhook.json \
                      "${webhook_url}" >/dev/null
                  fi
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                privileged: false
                capabilities:
                  drop:
                    - ALL
                runAsGroup: 1000
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: github-ssh-key
                  mountPath: /github-ssh
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: gitea-shared-storage-rwx
            - name: github-ssh-key
              secret:
                secretName: github-ssh-key
                defaultMode: 0400
            - name: tmp
              emptyDir: {}
