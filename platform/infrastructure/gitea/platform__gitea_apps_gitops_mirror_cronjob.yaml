apiVersion: batch/v1
kind: CronJob
metadata:
  name: gitea-apps-gitops-mirror
  namespace: gitops-system
  labels:
    app.kubernetes.io/name: gitea-apps-gitops-mirror
    app.kubernetes.io/component: recovery
    cryptophys.io/domain: platform
    cryptophys.io/component: gitea
    cryptophys.io/layer: platform
    cryptophys.io/managed-by: flux
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: gitea-apps-gitops-mirror
            cryptophys.io/component: gitea
        spec:
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: gitea
                      app.kubernetes.io/instance: gitops-gitea
                  namespaces:
                    - gitops-system
                  topologyKey: kubernetes.io/hostname
          securityContext:
            fsGroup: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: mirror-apps-gitops
              image: ghcr.io/go-gitea/gitea:1.25.4-rootless
              imagePullPolicy: IfNotPresent
              env:
                - name: HOME
                  value: /tmp/home
                - name: TMPDIR
                  value: /tmp
              command:
                - /bin/sh
                - -lc
                - |
                  set -eu
                  src_url="https://github.com/cryptophys-work/apps-gitops.git"
                  repo_dir="/data/git/gitea-repositories/cryptophys-work/apps-gitops.git"
                  mkdir -p /tmp/home /data/git/gitea-repositories/cryptophys-work
                  if [ -d "$repo_dir" ] && git --git-dir="$repo_dir" rev-parse --is-bare-repository >/dev/null 2>&1; then
                    git --git-dir="$repo_dir" remote set-url origin "$src_url" || true
                    git --git-dir="$repo_dir" fetch --prune origin "+refs/*:refs/*"
                  else
                    tmp_repo="$(mktemp -d /tmp/apps-gitops.XXXXXX.git)"
                    rmdir "$tmp_repo"
                    git clone --mirror "$src_url" "$tmp_repo"
                    rm -rf "$repo_dir"
                    mv "$tmp_repo" "$repo_dir"
                  fi
                  git --git-dir="$repo_dir" symbolic-ref HEAD refs/heads/main || true
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: gitea-shared-storage-v2
            - name: tmp
              emptyDir: {}
