apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-redis
  namespace: gitops-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea-redis
  template:
    metadata:
      labels:
        app: gitea-redis
    spec:
      nodeSelector:
        workload.cryptophys.work/platform: "true"
      tolerations:
      - key: cryptophys.io/pool
        operator: Equal
        value: platform-ha
        effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - nexus-144-91-103-10
                - cerebellum-161-97-117-96
                - thalamus-217-76-59-241
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - nexus-144-91-103-10
          - weight: 80
            preference:
              matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - cerebellum-161-97-117-96
                - thalamus-217-76-59-241
      containers:
      - name: redis
        image: redis:7.2-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gitea-redis
  namespace: gitops-system
spec:
  selector:
    app: gitea-redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: gitops-gitea-valkey-cluster
  namespace: gitops-system
spec:
  selector:
    app: gitea-redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: gitops-gitea-valkey-cluster-headless
  namespace: gitops-system
spec:
  clusterIP: None
  selector:
    app: gitea-redis
  ports:
  - name: tcp-valkey
    protocol: TCP
    port: 6379
    targetPort: 6379
  - name: tcp-valkey-bus
    protocol: TCP
    port: 16379
    targetPort: 16379
