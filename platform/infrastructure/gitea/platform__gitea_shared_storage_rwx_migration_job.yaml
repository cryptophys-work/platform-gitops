apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-shared-storage-rwx-migration
  namespace: gitops-system
  labels:
    app.kubernetes.io/name: gitops-gitea
    app.kubernetes.io/component: storage-migration
    cryptophys.io/domain: platform
    cryptophys.io/component: gitea
    cryptophys.io/layer: platform
    cryptophys.io/managed-by: flux
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitops-gitea
        app.kubernetes.io/component: storage-migration
        cryptophys.io/domain: platform
        cryptophys.io/component: gitea
        cryptophys.io/layer: platform
        cryptophys.io/managed-by: flux
    spec:
      restartPolicy: OnFailure
      securityContext:
        fsGroup: 1000
      nodeSelector:
        kubernetes.io/hostname: thalamus-217-76-59-241
      tolerations:
        - key: cryptophys.io/pool
          operator: Equal
          value: apps-ha
          effect: NoSchedule
      containers:
        - name: migrate
          image: ghcr.io/go-gitea/gitea:1.25.4-rootless
          command:
            - /bin/sh
            - -ec
            - |
              if [ ! -d /source/gitea ]; then
                echo "legacy gitea data not found under /source"
                exit 1
              fi
              if [ ! -f /target/.gitea-rwx-migrated ]; then
                cp -a /source/. /target/
                touch /target/.gitea-rwx-migrated
              fi
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: source
              mountPath: /source
            - name: target
              mountPath: /target
      volumes:
        - name: source
          persistentVolumeClaim:
            claimName: gitea-shared-storage
        - name: target
          persistentVolumeClaim:
            claimName: gitea-shared-storage-rwx
