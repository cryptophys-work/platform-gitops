apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: default-flavor
spec:
  nodeLabels:
    node-role.kubernetes.io/worker: ""
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: tekton-cluster-queue
spec:
  namespaceSelector: {} # Match all namespaces
  resourceGroups:
    - coveredResources: ["cpu", "memory"]
      flavors:
        - name: default-flavor
          resources:
            - name: "cpu"
              nominalQuota: "8"
            - name: "memory"
              nominalQuota: "16Gi"
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: build-queue
  namespace: tekton-system
spec:
  clusterQueue: tekton-cluster-queue
