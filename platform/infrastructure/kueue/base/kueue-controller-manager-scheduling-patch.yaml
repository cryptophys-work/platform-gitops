apiVersion: apps/v1
kind: Deployment
metadata:
  name: kueue-controller-manager
  namespace: kueue-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: kueue
    cryptophys.io/managed-by: flux
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
                  - key: node-role.kubernetes.io/worker
                    operator: Exists
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - cerebellum-161-97-117-96
                      - quanta-194-163-186-222
      containers:
        - name: manager
          resources:
            limits:
              cpu: 300m
              memory: 384Mi
            requests:
              cpu: 50m
              memory: 96Mi
