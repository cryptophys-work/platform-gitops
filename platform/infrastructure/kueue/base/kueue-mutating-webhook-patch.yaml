apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: kueue-mutating-webhook-configuration
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: kueue
    cryptophys.io/managed-by: flux
webhooks:
  - name: mjob.kb.io
    failurePolicy: Ignore
    # Same namespace allowlist as mpod.kb.io — only Tekton/Ray/build namespaces use Kueue Jobs.
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - aide
            - cqls-compute
            - image-factory
            - tekton-system
  - name: mclusterqueue.kb.io
    failurePolicy: Ignore
  - name: mpod.kb.io
    failurePolicy: Ignore
    # Allowlist only namespaces where GitOps declares LocalQueue / Kueue-gated batch work.
    # Upstream default (NotIn kube-system,kueue-system,apps-user) still called mpod for
    # almost every other namespace (MetalLB, CNI, vault, etc.), which is unsafe: the
    # webhook can normalize Pod specs and strip Helm tolerations before Kyverno runs.
    #
    # Source of truth for this list (update when adding a LocalQueue or Kueue-gated Pod):
    #   apps-gitops/apps/core/kueue/base/local-queue-{aide,cqls,tekton}.yaml
    #   apps-gitops/apps/tekton/infra/base/kueue/*.yaml
    #   apps-gitops/apps/tekton/infra/base/wave-queue/kueue-resources.yaml
    # Same values are applied to mjob.kb.io and mdeployment.kb.io in this file.
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - aide
            - cqls-compute
            - image-factory
            - tekton-system
  - name: mdeployment.kb.io
    failurePolicy: Ignore
    # Same allowlist as mpod — Kueue Deployment integration only for queued workloads here.
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - aide
            - cqls-compute
            - image-factory
            - tekton-system
  - name: mjobset.kb.io
    failurePolicy: Ignore
  - name: mmxjob.kb.io
    failurePolicy: Ignore
  - name: mpaddlejob.kb.io
    failurePolicy: Ignore
  - name: mpytorchjob.kb.io
    failurePolicy: Ignore
  - name: mtfjob.kb.io
    failurePolicy: Ignore
  - name: mxgboostjob.kb.io
    failurePolicy: Ignore
  - name: mmpijob.kb.io
    failurePolicy: Ignore
  - name: mraycluster.kb.io
    failurePolicy: Ignore
  - name: mrayjob.kb.io
    failurePolicy: Ignore
  - name: mstatefulset.kb.io
    failurePolicy: Ignore
  - name: mresourceflavor.kb.io
    failurePolicy: Ignore
  - name: mworkload.kb.io
    failurePolicy: Ignore
