apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: kueue-mutating-webhook-configuration
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: kueue
    cryptophys.io/managed-by: flux
webhooks:
  - name: mjob.kb.io
    failurePolicy: Ignore
  - name: mclusterqueue.kb.io
    failurePolicy: Ignore
  - name: mpod.kb.io
    failurePolicy: Ignore
    # Exclude metallb-system: Kueue pod mutation can drop chart tolerations; Kyverno then
    # injects only platform-ha and the controller stays Pending on tainted workers.
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - kueue-system
            - apps-user
            - metallb-system
  - name: mdeployment.kb.io
    failurePolicy: Ignore
  - name: mjobset.kb.io
    failurePolicy: Ignore
  - name: mmxjob.kb.io
    failurePolicy: Ignore
  - name: mpaddlejob.kb.io
    failurePolicy: Ignore
  - name: mpytorchjob.kb.io
    failurePolicy: Ignore
  - name: mtfjob.kb.io
    failurePolicy: Ignore
  - name: mxgboostjob.kb.io
    failurePolicy: Ignore
  - name: mmpijob.kb.io
    failurePolicy: Ignore
  - name: mraycluster.kb.io
    failurePolicy: Ignore
  - name: mrayjob.kb.io
    failurePolicy: Ignore
  - name: mstatefulset.kb.io
    failurePolicy: Ignore
  - name: mresourceflavor.kb.io
    failurePolicy: Ignore
  - name: mworkload.kb.io
    failurePolicy: Ignore
