apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: kueue-validating-webhook-configuration
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: kueue
    cryptophys.io/managed-by: flux
webhooks:
  - name: vjob.kb.io
    # Change to Ignore so Kueue restarts don't block Job dry-runs cluster-wide
    failurePolicy: Ignore
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - kube-public
            - kube-node-lease
            - kueue-system
  - name: vjobset.kb.io
    failurePolicy: Ignore
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - kube-public
            - kube-node-lease
            - kueue-system
  - name: vclusterqueue.kb.io
    # Avoid Flux deadlock when Kueue webhook service is temporarily unreachable.
    failurePolicy: Ignore
