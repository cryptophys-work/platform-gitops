apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: security-trivy-operator
  namespace: security-system
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
    createNamespace: false
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  chart:
    spec:
      chart: trivy-operator
      sourceRef:
        kind: HelmRepository
        name: aquasecurity
        namespace: flux-system
  values:
    replicaCount: 1
    trivy:
      # ClientServer mode — operator tidak spawn pod untuk download DB
      # Semua scan di-forward ke trivy-server di security-system
      mode: ClientServer
      serverURL: "http://trivy-server.security-system:4954"
      ignoreUnfixed: true
      dbRepository: mirror.gcr.io/aquasec/trivy-db
      resources:
        requests:
          cpu: 100m
          memory: 100M
        limits:
          cpu: 500m
          memory: 2Gi    # peak 1394Mi; was 500M (too low!)
    serviceMonitor:
      enabled: true
    tolerations: []
    operator:
      # Limit parallel scan bursts so security scans cannot starve Longhorn on a single worker.
      scanJobsConcurrentLimit: 2
      scanJobTimeout: 10m
      infraAssessmentScannerEnabled: false   # disabled: high CPU, low value vs trivy vuln scan
      clusterComplianceEnabled: false         # disabled: no compliance profile configured
    scanJob:
      tolerations: []
      nodeSelector:
        workload.cryptophys.work/apps-core: "true"   # pin scan jobs to general workers only
      priorityClassName: cryptophys-batch             # preemptionPolicy: Never — tidak preempt workloads
    nodeCollector:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 2Gi    # trivy-server: peak ~715Mi actual, 2Gi for scan bursts
