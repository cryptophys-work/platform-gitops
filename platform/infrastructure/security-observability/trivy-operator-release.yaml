apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: security-trivy-operator
  namespace: security-system
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
    createNamespace: false
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace
  chart:
    spec:
      chart: trivy-operator
      sourceRef:
        kind: HelmRepository
        name: aquasecurity
        namespace: flux-system
  values:
    replicaCount: 1
    trivy:
      ignoreUnfixed: true
    serviceMonitor:
      enabled: true
    tolerations: []
    nodeSelector:
      kubernetes.io/os: linux
    scanJob:
      nodeSelector:
        kubernetes.io/os: linux
      tolerations: []
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 512Mi
