apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loki-minio-credentials
  namespace: observability-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: loki-minio-secret
    creationPolicy: Owner
    template:
      # Loki AWS SDK reads AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY from the environment.
      data:
        AWS_ACCESS_KEY_ID: "{{ .rootUser | toString }}" # gitleaks:allow
        AWS_SECRET_ACCESS_KEY: "{{ .rootPassword | toString }}" # gitleaks:allow
  data:
    - secretKey: rootUser
      remoteRef:
        key: apps/minio/admin
        property: rootUser
    - secretKey: rootPassword
      remoteRef:
        key: apps/minio/admin
        property: rootPassword
