# Reuses Vault path platform/backup/minio (same MinIO root user as platform-backup-minio).
# Loki AWS SDK reads AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY from the environment.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-observability-loki-minio
  namespace: observability-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: loki-minio
    cryptophys.io/managed-by: flux
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: platform-observability-loki-minio
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        AWS_ACCESS_KEY_ID: "{{ .rootUser | toString }}"
        AWS_SECRET_ACCESS_KEY: "{{ .rootPassword | toString }}"
  data:
    - secretKey: rootUser
      remoteRef:
        key: platform/backup/minio
        property: rootUser
    - secretKey: rootPassword
      remoteRef:
        key: platform/backup/minio
        property: rootPassword
