apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-observability-loki
  namespace: observability-system
spec:
  interval: 1h
  timeout: 15m
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: loki-stack
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    loki:
      enabled: true
      isDefault: false
      # Chunks + shipped index live on MinIO (bucket `loki`). Boltdb active/cache use
      # emptyDir here — enabling PVC would require StatefulSet replace (immutable PVC template).
      persistence:
        enabled: false
      extraEnvFrom:
        - secretRef:
            name: platform-observability-loki-minio
      config:
        schema_config:
          configs:
            - from: "2026-04-20"
              store: boltdb-shipper
              object_store: aws
              schema: v11
              index:
                prefix: index_
                period: 24h
        storage_config:
          aws:
            endpoint: http://platform-backup-minio.minio-system.svc.cluster.local:9000
            region: us-east-1
            bucketnames: loki
            insecure: true
            s3forcepathstyle: true
          boltdb_shipper:
            active_index_directory: /data/loki/boltdb-shipper-active
            cache_location: /data/loki/boltdb-shipper-cache
            cache_ttl: 24h
            shared_store: s3
        compactor:
          working_directory: /data/loki/boltdb-shipper-compactor
          shared_store: s3
      image:
        repository: docker.io/grafana/loki
      nodeSelector:
        cryptophys.io/platform-ha: "true"
      tolerations:
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
    promtail:
      enabled: false
    grafana:
      enabled: false
    prometheus:
      enabled: false
    fluent-bit:
      enabled: true
      tolerations:
        - operator: Exists
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
