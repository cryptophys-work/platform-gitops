apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-observability-loki
  namespace: observability
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: loki-stack
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    loki:
      enabled: true
      persistence:
        enabled: false
      image:
        repository: quay.io/grafana/loki
    promtail:
      enabled: true
      image:
        repository: quay.io/grafana/promtail
    grafana:
      enabled: false
    prometheus:
      enabled: false
    fluent-bit:
      enabled: false
