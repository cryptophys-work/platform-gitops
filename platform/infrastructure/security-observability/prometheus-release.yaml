apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-observability-prometheus
  namespace: observability-system
spec:
  interval: 1h
  timeout: 15m
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    # Talos / static control plane: no kube-system Services for these components; keeping
    # monitors enabled yields permanent scrape failures and empty control-plane dashboard rows.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    alertmanager:
      enabled: true
      alertmanagerSpec:
        replicas: 1
        nodeSelector:
          cryptophys.io/platform-ha: "true"
        tolerations:
          - key: cryptophys.io/pool
            operator: Equal
            value: platform-ha
            effect: NoSchedule
          - key: node.cilium.io/agent-not-ready
            operator: Exists
            effect: NoSchedule
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 256Mi
        alertmanagerConfigSelector:
          matchLabels:
            alertmanagerConfig: platform-observability
        alertmanagerConfigNamespaceSelector: {}
    grafana:
      enabled: true
      replicas: 1
      nodeSelector:
        cryptophys.io/platform-ha: "true"
      tolerations:
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 512Mi
      persistence:
        enabled: true
        storageClassName: longhorn-single
        size: 5Gi
      adminPassword: ""
      admin:
        existingSecret: grafana-admin-credentials
        passwordKey: admin-password
      grafana.ini:
        security:
          allow_embedding: true
        auth.anonymous:
          enabled: true
          org_name: Main Org.
          org_role: Viewer
      # Align uid with dashboards (e.g. Falco) that reference datasource uid `loki`.
      additionalDataSources:
        - name: Loki
          uid: loki
          type: loki
          url: http://platform-observability-loki.observability-system.svc.cluster.local:3100
          access: proxy
          isDefault: false
          jsonData:
            maxLines: 5000
      sidecar:
        datasources:
          defaultDatasourceEnabled: true
          isDefaultDatasource: true
    prometheus:
      enabled: true
      prometheusSpec:
        replicas: 1
        nodeSelector:
          cryptophys.io/platform-ha: "true"
        retention: 7d
        retentionSize: 20GiB
        tolerations:
          - key: cryptophys.io/pool
            operator: Equal
            value: platform-ha
            effect: NoSchedule
          - key: node.cilium.io/agent-not-ready
            operator: Exists
            effect: NoSchedule
        resources:
          requests:
            cpu: 700m      # peak 677m over 7d
            memory: 1.5Gi  # steady-state ~2Gi; reduced from 2Gi to free cluster memory
          limits:
            cpu: 1000m
            memory: 4Gi    # 4028Mi peak × 1.0 = 4Gi; cluster-wide memory pressure requires reduction
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-single
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi
    prometheusOperator:
      nodeSelector:
        cryptophys.io/platform-ha: "true"
      tolerations:
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
      admissionWebhooks:
        patch:
          nodeSelector:
            cryptophys.io/platform-ha: "true"
          tolerations:
            - key: cryptophys.io/pool
              operator: Equal
              value: platform-ha
              effect: NoSchedule
            - key: node.cilium.io/agent-not-ready
              operator: Exists
              effect: NoSchedule
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
    kube-state-metrics:
      nodeSelector:
        cryptophys.io/platform-ha: "true"
      tolerations:
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 256Mi
    kubeEtcd:
      enabled: false
    kubeApiServer:
      serviceMonitor:
        interval: 60s
        scrapeTimeout: 10s
    # Recording rules for SPIRE agent CPU/memory (cAdvisor + kube-state) to size quotas from Prometheus.
    additionalPrometheusRulesMap:
      cryptophys-spire-agent-sizing:
        groups:
          - name: cryptophys.spire_agent.sizing
            interval: 60s
            rules:
              - record: cryptophys:spire_agent:container_memory_working_set_bytes:max
                expr: max by (pod, node) (container_memory_working_set_bytes{namespace="spire-system", pod=~"spire-agent-.*", container="spire-agent", image!=""})
              - record: cryptophys:spire_agent:container_memory_working_set_bytes:p99_1h
                expr: max by (pod) (quantile_over_time(0.99, container_memory_working_set_bytes{namespace="spire-system", pod=~"spire-agent-.*", container="spire-agent", image!=""}[1h]))
              - record: cryptophys:spire_agent:container_cpu_usage_seconds:rate5m
                expr: sum by (pod, node) (rate(container_cpu_usage_seconds_total{namespace="spire-system", pod=~"spire-agent-.*", container="spire-agent", image!=""}[5m]))
              - record: cryptophys:spire_agent:kube_pod_container_resource_limits_memory_bytes
                expr: kube_pod_container_resource_limits{namespace="spire-system", pod=~"spire-agent-.*", container="spire-agent", resource="memory"}
              - record: cryptophys:spire_agent:kube_pod_container_resource_limits_cpu_cores
                expr: kube_pod_container_resource_limits{namespace="spire-system", pod=~"spire-agent-.*", container="spire-agent", resource="cpu"}
              - record: cryptophys:spire_agent:kube_pod_container_resource_requests_memory_bytes
                expr: kube_pod_container_resource_requests{namespace="spire-system", pod=~"spire-agent-.*", container="spire-agent", resource="memory"}
              - record: cryptophys:spire_agent:kube_pod_container_resource_requests_cpu_cores
                expr: kube_pod_container_resource_requests{namespace="spire-system", pod=~"spire-agent-.*", container="spire-agent", resource="cpu"}
      cryptophys-cluster-guardrails:
        groups:
          - name: cryptophys.cluster.guardrails
            interval: 60s
            rules:
              - alert: CryptophysImagePullFailures
                expr: sum by (namespace) (kube_pod_container_status_waiting_reason{reason=~"ImagePullBackOff|ErrImagePull"}) > 5
                for: 15m
                labels:
                  severity: warning
                annotations:
                  summary: Registry pull failures are accumulating
                  description: Namespace {{ $labels.namespace }} has more than 5 containers stuck in image pull failure states for at least 15 minutes.
              - alert: CryptophysUnschedulablePods
                expr: sum by (namespace) (kube_pod_status_unschedulable == 1) > 0
                for: 15m
                labels:
                  severity: warning
                annotations:
                  summary: Unschedulable pods detected
                  description: Namespace {{ $labels.namespace }} has pods that remain unschedulable for at least 15 minutes.
              - alert: CryptophysNexusPodSkew
                expr: count(kube_pod_info{node="nexus-144-91-103-10"}) > 200
                for: 30m
                labels:
                  severity: warning
                annotations:
                  summary: Nexus is carrying too many pods
                  description: nexus-144-91-103-10 has more than 200 scheduled pods for at least 30 minutes, indicating unhealthy workload concentration.
              - alert: CryptophysLonghornNonHealthyVolumes
                expr: sum(longhorn_volume_robustness{robustness!="healthy"}) > 0
                for: 20m
                labels:
                  severity: warning
                annotations:
                  summary: Longhorn volumes are not healthy
                  description: One or more Longhorn volumes have remained outside the healthy state for at least 20 minutes.
    nodeExporter:
      tolerations:
        - operator: Exists
