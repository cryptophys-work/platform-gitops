apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-observability-prometheus
  namespace: observability-system
spec:
  interval: 1h
  timeout: 15m
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    alertmanager:
      enabled: true
      alertmanagerSpec:
        replicas: 1
    grafana:
      enabled: true
      replicas: 1
    prometheus:
      enabled: true
      prometheusSpec:
        replicas: 1
        retention: 7d
        retentionSize: 20GiB
    kubeEtcd:
      enabled: false
