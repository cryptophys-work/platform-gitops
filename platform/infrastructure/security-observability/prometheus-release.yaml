apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: platform-observability-prometheus
  namespace: observability-system
spec:
  interval: 1h
  timeout: 15m
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    alertmanager:
      enabled: true
      alertmanagerSpec:
        replicas: 1
        nodeSelector:
          workload.cryptophys.work/apps-core: "true"
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
          - key: cryptophys.io/role
            operator: Equal
            value: llm-inference
            effect: NoSchedule
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 256Mi
        alertmanagerConfigSelector:
          matchLabels:
            alertmanagerConfig: platform-observability
        alertmanagerConfigNamespaceSelector: {}
    grafana:
      enabled: true
      replicas: 1
      nodeSelector:
        workload.cryptophys.work/apps-core: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 512Mi
      persistence:
        enabled: true
        storageClassName: longhorn-single
        size: 5Gi
      adminPassword: ""
      admin:
        existingSecret: grafana-admin-credentials
        passwordKey: admin-password
      grafana.ini:
        security:
          allow_embedding: true
        auth.anonymous:
          enabled: true
          org_name: Main Org.
          org_role: Viewer
      sidecar:
        datasources:
          defaultDatasourceEnabled: true
          isDefaultDatasource: true
    prometheus:
      enabled: true
      prometheusSpec:
        replicas: 1
        nodeSelector:
          workload.cryptophys.work/apps-core: "true"
        retention: 7d
        retentionSize: 20GiB
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
          - key: cryptophys.io/role
            operator: Equal
            value: llm-inference
            effect: NoSchedule
        resources:
          requests:
            cpu: 700m      # peak 677m over 7d
            memory: 2Gi    # steady-state ~2Gi; peak 4028Mi during WAL replay
          limits:
            cpu: 1000m
            memory: 6Gi    # 4028Mi peak × 1.5 = 6Gi; prevents OOM during WAL
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-single
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi
    prometheusOperator:
      nodeSelector:
        workload.cryptophys.work/apps-core: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
      admissionWebhooks:
        patch:
          nodeSelector:
            workload.cryptophys.work/apps-core: "true"
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
            - key: cryptophys.io/role
              operator: Equal
              value: llm-inference
              effect: NoSchedule
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
    kube-state-metrics:
      nodeSelector:
        workload.cryptophys.work/apps-core: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 256Mi
    kubeEtcd:
      enabled: false
    nodeExporter:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
