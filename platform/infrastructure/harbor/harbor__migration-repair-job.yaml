apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-migration-repair-v2
  namespace: registry-system
  labels:
    app.kubernetes.io/name: harbor-migration-repair
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor
    cryptophys.io/layer: platform
    cryptophys.io/managed-by: flux
  annotations:
    cryptophys.io/anti-regression: "true"
    cryptophys.io/purpose: >-
      One-time idempotent Harbor PostgreSQL repair job to clear any dirty
      schema_migrations rows and restore the missing artifact_accessory
      table so registry-harbor-core can resume startup migrations and cosign
      attachment after interrupted upgrades.
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: harbor-migration-repair
        cryptophys.io/domain: platform
        cryptophys.io/component: harbor
        cryptophys.io/layer: platform
        cryptophys.io/managed-by: flux
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        platform-ha: "true"
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      containers:
        - name: repair
          image: goharbor/harbor-db:v2.14.2
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: registry-harbor-database
                  key: POSTGRES_PASSWORD
          command:
            - /bin/sh
            - -ec
            - |
              psql \
                "host=registry-harbor-database port=5432 user=postgres dbname=registry sslmode=disable" \
                -v ON_ERROR_STOP=1 \
                -c "CREATE TABLE IF NOT EXISTS artifact_accessory (
                      id SERIAL PRIMARY KEY NOT NULL,
                      artifact_id bigint,
                      subject_artifact_id bigint,
                      type varchar(256),
                      size bigint,
                      digest varchar(1024),
                      creation_time timestamp default CURRENT_TIMESTAMP,
                      FOREIGN KEY (artifact_id) REFERENCES artifact(id),
                      FOREIGN KEY (subject_artifact_id) REFERENCES artifact(id),
                      CONSTRAINT unique_artifact_accessory UNIQUE (artifact_id, subject_artifact_id)
                    );"
              psql \
                "host=registry-harbor-database port=5432 user=postgres dbname=registry sslmode=disable" \
                -v ON_ERROR_STOP=1 \
                -c "UPDATE schema_migrations SET dirty = FALSE WHERE dirty = TRUE;"
              psql \
                "host=registry-harbor-database port=5432 user=postgres dbname=registry sslmode=disable" \
                -v ON_ERROR_STOP=1 \
                -c "SELECT version, dirty FROM schema_migrations;"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
