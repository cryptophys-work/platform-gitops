apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-reset-job-cleanup
  namespace: registry-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-reset-job-cleanup
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: harbor-reset-job-cleanup
  namespace: registry-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-reset-job-cleanup
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: harbor-reset-job-cleanup
  namespace: registry-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-reset-job-cleanup
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
subjects:
  - kind: ServiceAccount
    name: harbor-reset-job-cleanup
    namespace: registry-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: harbor-reset-job-cleanup
---
apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-reset-job-cleanup
  namespace: registry-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-reset-job-cleanup
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        cryptophys.io/domain: platform
        cryptophys.io/component: harbor-reset-job-cleanup
        cryptophys.io/managed-by: flux
        cryptophys.io/layer: platform
    spec:
      serviceAccountName: harbor-reset-job-cleanup
      restartPolicy: OnFailure
      tolerations:
        - operator: Exists
      containers:
        - name: cleanup
          image: bitnami/kubectl:1.32.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              kubectl -n registry-system delete job harbor-release-reset-v1 harbor-release-reset-v3 --ignore-not-found=true --wait=true
              kubectl -n registry-system delete pod -l job-name=harbor-release-reset-v1 --ignore-not-found=true --wait=true
              kubectl -n registry-system delete pod -l job-name=harbor-release-reset-v3 --ignore-not-found=true --wait=true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
