apiVersion: v1
kind: Service
metadata:
  name: registry-harbor-redis-external
  namespace: registry-system
  labels:
    app.kubernetes.io/instance: registry-harbor
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/name: harbor-external-redis
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: harbor
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-external-redis
    cryptophys.io/environment: production
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
    cryptophys.work/managed-by: aide
spec:
  selector:
    app.kubernetes.io/name: harbor-external-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-harbor-redis-external
  namespace: registry-system
  labels:
    app.kubernetes.io/instance: registry-harbor
    app.kubernetes.io/managed-by: flux
    app.kubernetes.io/name: harbor-external-redis
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: harbor
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-external-redis
    cryptophys.io/environment: production
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
    cryptophys.work/managed-by: aide
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: harbor-external-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: registry-harbor
        app.kubernetes.io/managed-by: flux
        app.kubernetes.io/name: harbor-external-redis
        app.kubernetes.io/component: redis
        app.kubernetes.io/part-of: harbor
        cryptophys.io/domain: platform
        cryptophys.io/component: harbor-external-redis
        cryptophys.io/environment: production
        cryptophys.io/managed-by: flux
        cryptophys.io/layer: platform
        cryptophys.work/managed-by: aide
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
      containers:
        - name: redis
          # Digest-pinned multi-arch index (security: supply-chain stability).
          image: docker.io/library/redis@sha256:9907ac0c435717b4d95697cb4d0ce77d100b1d21269a01a0ce66f27335184c38
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - exec redis-server --save "" --appendonly no --requirepass "$REDIS_PASSWORD"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: registry-harbor-redis
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
