apiVersion: v1
kind: Service
metadata:
  name: registry-harbor-redis-external
  namespace: registry-system
  labels:
    app.kubernetes.io/name: harbor-external-redis
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: harbor
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-external-redis
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
spec:
  selector:
    app.kubernetes.io/name: harbor-external-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-harbor-redis-external
  namespace: registry-system
  labels:
    app.kubernetes.io/name: harbor-external-redis
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: harbor
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-external-redis
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: harbor-external-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: harbor-external-redis
        app.kubernetes.io/component: redis
        app.kubernetes.io/part-of: harbor
        cryptophys.io/domain: platform
        cryptophys.io/component: harbor-external-redis
        cryptophys.io/managed-by: flux
        cryptophys.io/layer: platform
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: medulla-82-208-20-242
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
      securityContext:
        fsGroup: 999
      containers:
        - name: redis
          image: docker.io/redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
            - --protected-mode
            - "no"
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
