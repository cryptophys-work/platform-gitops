# Redis AUTH for registry-harbor-redis-external (Harbor chart expects secret key REDIS_PASSWORD).
# Operator: vault kv put secret/apps/harbor/registry-redis password='<long-random>'
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: registry-harbor-redis
  namespace: registry-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor
    cryptophys.io/layer: platform
    cryptophys.io/managed-by: flux
  annotations:
    cryptophys.io/contract: contract.platform.registry.v1
    cryptophys.io/ssot: "true"
    cryptophys.io/anti-regression: "true"
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: registry-harbor-redis
    creationPolicy: Owner
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: apps/harbor/registry-redis
        property: password
