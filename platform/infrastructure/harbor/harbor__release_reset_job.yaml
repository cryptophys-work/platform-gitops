apiVersion: v1
kind: ServiceAccount
metadata:
  name: harbor-release-reset
  namespace: registry-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-release-reset
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: harbor-release-reset
  namespace: registry-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-release-reset
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
rules:
  - apiGroups: [""]
    resources: ["configmaps", "pods", "secrets", "services", "serviceaccounts"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: harbor-release-reset
  namespace: registry-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-release-reset
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: harbor-release-reset
subjects:
  - kind: ServiceAccount
    name: harbor-release-reset
    namespace: registry-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-release-reset-v3
  namespace: registry-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-release-reset
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        cryptophys.io/domain: platform
        cryptophys.io/component: harbor-release-reset
    spec:
      serviceAccountName: harbor-release-reset
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: cortex-178-18-250-39
      tolerations:
        - key: cryptophys.io/pool
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: reset
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          command:
            - /bin/sh
            - -ec
            - |
              k() {
                attempt=1
                while [ "${attempt}" -le 8 ]; do
                  if kubectl --request-timeout=15s "$@"; then
                    return 0
                  fi
                  attempt=$((attempt + 1))
                  sleep 5
                done
                return 1
              }

              delete_list() {
                kind="$1"
                shift
                for name in "$@"; do
                  k -n registry-system delete "${kind}" "${name}" --ignore-not-found=true --wait=false || true
                done
              }

              k -n registry-system delete secret -l owner=helm,name=registry-harbor --ignore-not-found=true --wait=false || true
              delete_list ingress registry-harbor-ingress
              delete_list configmap \
                registry-harbor-core \
                registry-harbor-jobservice \
                registry-harbor-jobservice-env \
                registry-harbor-portal \
                registry-harbor-registry \
                registry-harbor-registryctl
              delete_list secret \
                registry-harbor-core \
                registry-harbor-database \
                registry-harbor-jobservice \
                registry-harbor-registry \
                registry-harbor-registryctl \
                registry-harbor-registry-htpasswd \
                registry-harbor-trivy
              delete_list service \
                registry-harbor-core \
                registry-harbor-database \
                registry-harbor-jobservice \
                registry-harbor-portal \
                registry-harbor-registry \
                registry-harbor-trivy
              delete_list deployment \
                registry-harbor-core \
                registry-harbor-jobservice \
                registry-harbor-portal \
                registry-harbor-registry
              delete_list statefulset \
                registry-harbor-database \
                registry-harbor-trivy
              delete_list poddisruptionbudget \
                registry-harbor-core \
                registry-harbor-portal
