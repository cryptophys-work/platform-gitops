# Harbor core/jobservice DB credentials — same Vault path as CNPG bootstrap (registry user).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: registry-harbor-database
  namespace: registry-system
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: registry-harbor-database
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: apps/harbor/registry-db
        property: password
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: apps/harbor/registry-db
        property: password
