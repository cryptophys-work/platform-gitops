apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: registry-harbor
  namespace: registry-system
spec:
  interval: 30m
  releaseName: registry-harbor
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  chart:
    spec:
      chart: harbor
      version: 1.18.2
      sourceRef:
        kind: HelmRepository
        name: goharbor
        namespace: flux-system
  values:
    expose:
      type: ingress
      tls:
        enabled: true
        certSource: secret
        secret:
          secretName: platform-wildcard-tls
      ingress:
        className: nginx
        hosts:
          core: registry.cryptophys.work
        annotations:
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
    externalURL: https://registry.cryptophys.work
    harborAdminPassword: ChangeMe-From-Vault
    internalTLS:
      enabled: false
    persistence:
      enabled: true
      resourcePolicy: keep
      persistentVolumeClaim:
        registry:
          storageClass: longhorn
          size: 5Gi
        jobservice:
          jobLog:
            storageClass: longhorn
            size: 5Gi
        database:
          storageClass: longhorn-single
          size: 20Gi
        redis:
          storageClass: longhorn-single
          size: 5Gi
        trivy:
          storageClass: longhorn-single
          size: 20Gi
    database:
      type: internal
      internal:
        nodeSelector:
          kubernetes.io/hostname: campus-212-47-66-101
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
    redis:
      internal:
        nodeSelector:
          kubernetes.io/hostname: campus-212-47-66-101
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
    trivy:
      enabled: true
      nodeSelector:
        kubernetes.io/hostname: campus-212-47-66-101
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    portal:
      nodeSelector:
        kubernetes.io/hostname: campus-212-47-66-101
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    core:
      nodeSelector:
        kubernetes.io/hostname: campus-212-47-66-101
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    jobservice:
      nodeSelector:
        kubernetes.io/hostname: campus-212-47-66-101
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    registry:
      nodeSelector:
        kubernetes.io/hostname: campus-212-47-66-101
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    exporter:
      nodeSelector:
        kubernetes.io/hostname: campus-212-47-66-101
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    metrics:
      enabled: true
