apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: registry-harbor
  namespace: registry-system
spec:
  interval: 30m
  releaseName: registry-harbor
  timeout: 20m
  install:
    timeout: 20m
    remediation:
      retries: 3
  upgrade:
    timeout: 20m
    cleanupOnFail: true
    remediation:
      retries: 2
      strategy: uninstall
  chart:
    spec:
      chart: harbor
      version: 1.18.2
      sourceRef:
        kind: HelmRepository
        name: goharbor
        namespace: flux-system
  values:
    expose:
      type: ingress
      tls:
        enabled: true
        certSource: secret
        secret:
          secretName: platform-wildcard-tls
      ingress:
        className: nginx
        hosts:
          core: registry.cryptophys.work
        annotations:
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
    externalURL: https://registry.cryptophys.work
    storage:
      disableredirect: true
    existingSecretAdminPassword: harbor-admin-credentials
    existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
    internalTLS:
      enabled: false
    persistence:
      enabled: true
      resourcePolicy: keep
      imageChartStorage:
        type: filesystem
        filesystem:
          rootdirectory: /storage
      persistentVolumeClaim:
        registry:
          existingClaim: registry-harbor-registry-v2
          storageClass: longhorn-single
          size: 50Gi
        jobservice:
          jobLog:
            storageClass: longhorn
            size: 5Gi
        database:
          storageClass: longhorn
          size: 20Gi
        redis:
          storageClass: longhorn
          size: 5Gi
        trivy:
          storageClass: longhorn
          size: 20Gi
    database:
      type: internal
      internal:
        extrInitContainers:
          - name: stale-postmaster-cleaner
            image: goharbor/harbor-db:v2.14.2
            imagePullPolicy: IfNotPresent
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              runAsNonRoot: true
              runAsUser: 999
              runAsGroup: 999
              seccompProfile:
                type: RuntimeDefault
            command:
              - /bin/sh
            args:
              - -c
              - |
                for candidate in \
                  /var/lib/postgresql/data/pgdata/postmaster.pid \
                  /var/lib/postgresql/data/pgdata/pg15/postmaster.pid; do
                  if [ -f "$candidate" ] && [ -w "$candidate" ]; then
                    rm -f "$candidate"
                  fi
                done
            volumeMounts:
              - name: database-data
                mountPath: /var/lib/postgresql/data
        nodeSelector:
          registry-system: "true"
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 128Mi
        tolerations:
          - key: cryptophys.io/role
            operator: Equal
            value: llm-inference
            effect: NoSchedule
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: registry-system
                      operator: In
                      values: ["true"]
    redis:
      type: external
      external:
        addr: registry-harbor-redis-external.registry-system.svc.cluster.local:6379
        coreDatabaseIndex: "0"
        jobserviceDatabaseIndex: "1"
        registryDatabaseIndex: "2"
        trivyAdapterIndex: "5"
        username: ""
        password: ""
    trivy:
      enabled: true
      nodeSelector:
        registry-system: "true"
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 50m
          memory: 64Mi
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: registry-system
                    operator: In
                    values: ["true"]
    portal:
      nodeSelector:
        registry-system: "true"
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 32Mi
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: registry-system
                    operator: In
                    values: ["true"]
    core:
      replicas: 1
      nodeSelector:
        registry-system: "true"
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 256Mi
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: registry-system
                    operator: In
                    values: ["true"]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: harbor
                    component: core
                    release: registry-harbor
    jobservice:
      nodeSelector:
        registry-system: "true"
      resources:
        limits:
          cpu: 200m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 128Mi
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: registry-system
                    operator: In
                    values: ["true"]
    registry:
      nodeSelector:
        registry-system: "true"
      registry:
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi

      controller:
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: registry-system
                    operator: In
                    values: ["true"]
    exporter:
      nodeSelector:
        registry-system: "true"
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 32Mi
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: registry-system
                    operator: In
                    values: ["true"]
    metrics:
      enabled: true
