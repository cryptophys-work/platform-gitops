apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: registry-harbor
  namespace: registry-system
spec:
  interval: 30m
  releaseName: registry-harbor
  timeout: 20m
  install:
    timeout: 20m
    remediation:
      retries: 3
  upgrade:
    timeout: 20m
    cleanupOnFail: false
    remediation:
      retries: 3
  chart:
    spec:
      chart: harbor
      version: 1.18.2
      sourceRef:
        kind: HelmRepository
        name: goharbor
        namespace: flux-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: registry-harbor-core
            patch: |
              - op: replace
                path: /spec/replicas
                value: 2
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/node-class
                    operator: Equal
                    value: nexus-hpc
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Equal
                    value: platform-ha
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: platform-ha
                              operator: In
                              values:
                                - "true"
                            - key: kubernetes.io/hostname
                              operator: In
                              values:
                                - nexus-144-91-103-10
                                - cerebellum-161-97-117-96
                                - thalamus-217-76-59-241
          - target:
              kind: Deployment
              name: registry-harbor-jobservice
            patch: |
              - op: replace
                path: /spec/replicas
                value: 2
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/node-class
                    operator: Equal
                    value: nexus-hpc
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Equal
                    value: platform-ha
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: platform-ha
                              operator: In
                              values:
                                - "true"
                            - key: kubernetes.io/hostname
                              operator: In
                              values:
                                - nexus-144-91-103-10
                                - cerebellum-161-97-117-96
                                - thalamus-217-76-59-241
          - target:
              kind: Deployment
              name: registry-harbor-portal
            patch: |
              - op: replace
                path: /spec/replicas
                value: 2
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/node-class
                    operator: Equal
                    value: nexus-hpc
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Equal
                    value: platform-ha
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: platform-ha
                              operator: In
                              values:
                                - "true"
                            - key: kubernetes.io/hostname
                              operator: In
                              values:
                                - nexus-144-91-103-10
                                - cerebellum-161-97-117-96
                                - thalamus-217-76-59-241
          - target:
              kind: Deployment
              name: registry-harbor-registry
            patch: |
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/node-class
                    operator: Equal
                    value: nexus-hpc
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Equal
                    value: platform-ha
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: platform-ha
                              operator: In
                              values:
                                - "true"
                            - key: kubernetes.io/hostname
                              operator: In
                              values:
                                - nexus-144-91-103-10
                                - cerebellum-161-97-117-96
                                - thalamus-217-76-59-241
          - target:
              kind: StatefulSet
              name: registry-harbor-trivy
            patch: |
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/node-class
                    operator: Equal
                    value: nexus-hpc
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Equal
                    value: platform-ha
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: platform-ha
                              operator: In
                              values:
                                - "true"
                            - key: kubernetes.io/hostname
                              operator: In
                              values:
                                - nexus-144-91-103-10
                                - cerebellum-161-97-117-96
                                - thalamus-217-76-59-241
  values:
    expose:
      type: ingress
      tls:
        enabled: true
        certSource: secret
        secret:
          secretName: platform-wildcard-tls
      ingress:
        className: nginx
        hosts:
          core: registry.cryptophys.work
        annotations:
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
    externalURL: https://registry.cryptophys.work
    storage:
      disableredirect: true
    existingSecretAdminPassword: harbor-admin-credentials
    existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
    internalTLS:
      enabled: false
    persistence:
      enabled: true
      resourcePolicy: keep
      imageChartStorage:
        type: filesystem
        filesystem:
          rootdirectory: /storage
      persistentVolumeClaim:
        registry:
          existingClaim: registry-harbor-registry-v3
          storageClass: longhorn-harbor-retain
          size: 50Gi
        jobservice:
          jobLog:
            storageClass: longhorn-harbor-retain
            size: 1Gi
        redis:
          storageClass: longhorn
          size: 5Gi
        trivy:
          storageClass: longhorn-harbor-retain
          size: 20Gi
    updateStrategy:
      type: Recreate
    # Registry metadata DB runs in postgresql-system (CNPG postgres-registry-ha, 3 replicas).
    # Before switching from embedded Harbor Postgres: pg_dump from old DB, pg_restore into CNPG.
    database:
      type: external
      external:
        host: postgres-registry-ha-rw.postgresql-system.svc.cluster.local
        port: "5432"
        username: registry
        existingSecret: registry-harbor-database
        coreDatabase: registry
        sslmode: disable
      maxIdleConns: 100
      maxOpenConns: 900
    redis:
      type: external
      external:
        addr: registry-harbor-redis-external.registry-system.svc.cluster.local:6379
        coreDatabaseIndex: "0"
        jobserviceDatabaseIndex: "1"
        registryDatabaseIndex: "2"
        trivyAdapterIndex: "5"
        username: ""
        password: ""
    trivy:
      enabled: true
      replicas: 1
      podDisruptionBudget:
        enabled: false
        minAvailable: 1
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 50m
          memory: 64Mi
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: harbor
                  component: trivy
                  release: registry-harbor
              topologyKey: kubernetes.io/hostname
    portal:
      replicas: 2
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 32Mi
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - nexus-144-91-103-10
                      - cerebellum-161-97-117-96
                      - thalamus-217-76-59-241
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: harbor
                    component: portal
                    release: registry-harbor
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
    core:
      replicas: 2
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
      # initContainers removed: external CNPG empty DB must be migrated by harbor-core first;
      # the previous repair job assumed existing artifact/schema_migrations tables.
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 256Mi
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - nexus-144-91-103-10
                      - cerebellum-161-97-117-96
                      - thalamus-217-76-59-241
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: harbor
                    component: core
                    release: registry-harbor
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
    jobservice:
      replicas: 2
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
      jobLoggers:
        - database
      resources:
        limits:
          cpu: 200m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 128Mi
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - nexus-144-91-103-10
                      - cerebellum-161-97-117-96
                      - thalamus-217-76-59-241
    registry:
      registry:
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi

      controller:
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - nexus-144-91-103-10
                      - cerebellum-161-97-117-96
                      - thalamus-217-76-59-241
    exporter:
      replicas: 1
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 32Mi
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: harbor
                    component: exporter
                    release: registry-harbor
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
      metrics:
        enabled: true
