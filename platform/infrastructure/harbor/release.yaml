apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: registry-harbor
  namespace: registry-system
spec:
  interval: 30m
  releaseName: registry-harbor
  timeout: 20m
  install:
    timeout: 20m
    remediation:
      retries: 3
  upgrade:
    timeout: 20m
    cleanupOnFail: false
    remediation:
      retries: 3
  chart:
    spec:
      chart: harbor
      version: 1.18.2
      sourceRef:
        kind: HelmRepository
        name: goharbor
        namespace: flux-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: registry-harbor-core
            patch: |
              - op: replace
                path: /spec/replicas
                value: 1
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/node-class
                    operator: Equal
                    value: nexus-hpc
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Equal
                    value: platform-ha
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: platform-ha
                              operator: In
                              values:
                                - "true"
          - target:
              kind: Deployment
              name: registry-harbor-jobservice
            patch: |
              - op: replace
                path: /spec/replicas
                value: 1
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/node-class
                    operator: Equal
                    value: nexus-hpc
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Equal
                    value: platform-ha
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: platform-ha
                              operator: In
                              values:
                                - "true"
          - target:
              kind: Deployment
              name: registry-harbor-portal
            patch: |
              - op: replace
                path: /spec/replicas
                value: 1
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/node-class
                    operator: Equal
                    value: nexus-hpc
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Equal
                    value: platform-ha
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: platform-ha
                              operator: In
                              values:
                                - "true"
          - target:
              kind: Deployment
              name: registry-harbor-registry
            patch: |
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/node-class
                    operator: Equal
                    value: nexus-hpc
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Equal
                    value: platform-ha
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: platform-ha
                              operator: In
                              values:
                                - "true"
          - target:
              kind: StatefulSet
              name: registry-harbor-database
            patch: |
              - op: replace
                path: /spec/replicas
                value: 1
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/node-class
                    operator: Equal
                    value: nexus-hpc
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Equal
                    value: platform-ha
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: platform-ha
                              operator: In
                              values:
                                - "true"
          - target:
              kind: StatefulSet
              name: registry-harbor-trivy
            patch: |
              - op: replace
                path: /spec/template/spec/tolerations
                value:
                  - key: cryptophys.io/node-class
                    operator: Equal
                    value: nexus-hpc
                    effect: NoSchedule
                  - key: cryptophys.io/pool
                    operator: Equal
                    value: platform-ha
                    effect: NoSchedule
              - op: replace
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: platform-ha
                              operator: In
                              values:
                                - "true"
  values:
    expose:
      type: ingress
      tls:
        enabled: true
        certSource: secret
        secret:
          secretName: platform-wildcard-tls
      ingress:
        className: nginx
        hosts:
          core: registry.cryptophys.work
        annotations:
          nginx.ingress.kubernetes.io/ssl-redirect: "true"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
    externalURL: https://registry.cryptophys.work
    storage:
      disableredirect: true
    existingSecretAdminPassword: harbor-admin-credentials
    existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
    internalTLS:
      enabled: false
    persistence:
      enabled: true
      resourcePolicy: keep
      imageChartStorage:
        type: filesystem
        filesystem:
          rootdirectory: /storage
      persistentVolumeClaim:
        registry:
          existingClaim: registry-harbor-registry-v3
          storageClass: longhorn-harbor-retain
          size: 50Gi
        jobservice:
          jobLog:
            storageClass: longhorn-harbor-retain
            size: 1Gi
        database:
          storageClass: longhorn-harbor-retain
          size: 20Gi
        redis:
          storageClass: longhorn
          size: 5Gi
        trivy:
          storageClass: longhorn-harbor-retain
          size: 20Gi
    updateStrategy:
      type: Recreate
    database:
      type: internal
      internal:
        nodeSelector:
          platform-ha: "true"
        extrInitContainers:
          - name: stale-postmaster-cleaner
            image: goharbor/harbor-db:v2.14.2
            imagePullPolicy: IfNotPresent
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              runAsNonRoot: true
              runAsUser: 999
              runAsGroup: 999
              seccompProfile:
                type: RuntimeDefault
            command:
              - /bin/sh
            args:
              - -c
              - |
                for candidate in \
                  /var/lib/postgresql/data/pgdata/postmaster.pid \
                  /var/lib/postgresql/data/pgdata/pg15/postmaster.pid; do
                  if [ -f "$candidate" ] && [ -w "$candidate" ]; then
                    rm -f "$candidate"
                  fi
                done
            volumeMounts:
              - name: database-data
                mountPath: /var/lib/postgresql/data
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 128Mi
        tolerations:
          - key: cryptophys.io/node-class
            operator: Equal
            value: nexus-hpc
            effect: NoSchedule
          - key: cryptophys.io/role
            operator: Equal
            value: llm-inference
            effect: NoSchedule
          - key: cryptophys.io/pool
            operator: Equal
            value: platform-ha
            effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
    redis:
      type: external
      external:
        addr: registry-harbor-redis-external.registry-system.svc.cluster.local:6379
        coreDatabaseIndex: "0"
        jobserviceDatabaseIndex: "1"
        registryDatabaseIndex: "2"
        trivyAdapterIndex: "5"
        username: ""
        password: ""
    trivy:
      enabled: true
      replicas: 1
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 50m
          memory: 64Mi
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: harbor
                  component: trivy
                  release: registry-harbor
              topologyKey: kubernetes.io/hostname
    portal:
      replicas: 1
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 32Mi
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: harbor
                    component: portal
                    release: registry-harbor
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
    core:
      replicas: 1
      initContainers:
        - name: clear-dirty-schema-migration
          image: goharbor/harbor-db:v2.14.2
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - configMapRef:
                name: registry-harbor-core
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: registry-harbor-database
                  key: POSTGRES_PASSWORD
          command:
            - /bin/sh
          args:
            - -c
            - |
              psql "host=${POSTGRESQL_HOST} port=${POSTGRESQL_PORT} user=${POSTGRESQL_USERNAME} dbname=${POSTGRESQL_DATABASE} sslmode=${POSTGRESQL_SSLMODE}" <<'SQL'
              DO $$
              BEGIN
                IF EXISTS (
                  SELECT 1
                  FROM information_schema.tables
                  WHERE table_schema = 'public'
                    AND table_name = 'schema_migrations'
                ) THEN
                  UPDATE schema_migrations
                  SET dirty = FALSE
                  WHERE version = 80
                    AND dirty = TRUE;
                END IF;
              END $$;
              SQL
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 256Mi
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: harbor
                    component: core
                    release: registry-harbor
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
    jobservice:
      replicas: 1
      resources:
        limits:
          cpu: 200m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 128Mi
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
    registry:
      registry:
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi

      controller:
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
    exporter:
      replicas: 1
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 32Mi
      tolerations:
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: harbor
                    component: exporter
                    release: registry-harbor
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
      metrics:
        enabled: true
