apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-agent-config
  namespace: spire-system
data:
  agent.conf: |
    Agent {
      data_dir = "/run/spire/data"
      log_level = "INFO"
      server_address = "spire-server.spire-system.svc.cluster.local"
      server_port = "8081"
      socket_path = "/run/spire/sockets/agent/agent.sock"
      admin_socket_path = "/run/spire/sockets/admin.sock"
      trust_bundle_path = "/run/spire/bundle/bundle.crt"
      trust_domain = "cryptophys.work"
    }
    plugins {
      NodeAttestor "k8s_psat" {
        plugin_data {
          cluster = "cryptophys-genesis"
        }
      }
      KeyManager "memory" {
        plugin_data {
        }
      }
      WorkloadAttestor "k8s" {
        plugin_data {
          skip_kubelet_verification = true
        }
      }
      WorkloadAttestor "containerd" {
        plugin_data {
          containerd_socket_path = "/run/containerd/containerd.sock"
        }
      }
    }
