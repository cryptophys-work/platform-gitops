apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-server-config
  namespace: spire-system
data:
  server.conf: |
    Server {
      bind_address = "0.0.0.0"
      bind_port = "8081"
      trust_domain = "cryptophys.work"
      data_dir = "/run/spire/data"
      log_level = "DEBUG"  # Changed for audit logging (Kimi 2026-B)
      ca_key_type = "rsa-2048"
      ca_ttl = "24h"
      default_x509_svid_ttl = "1h"
      default_jwt_svid_ttl = "5m"
    }
    plugins {
      DataStore "sql" {
        plugin_data {
          database_type = "postgres"
          connection_string = "dbname=spire user=spire host=postgres-security-ha-rw.postgresql-system.svc.cluster.local port=5432 sslmode=require"
        }
      }
      NodeAttestor "k8s_psat" {
        plugin_data {
          clusters = {
            "cryptophys-genesis" = {
              service_account_allow_list = ["spire-system:spire-agent"]
            }
          }
        }
      }
      KeyManager "disk" {
        plugin_data {
          keys_path = "/run/spire/keys/keys.json"
        }
      }
      Notifier "k8sbundle" {
        plugin_data {
          namespace = "spire-system"
          config_map = "spire-bundle"
          config_map_key = "bundle.crt"
        }
      }
      SVIDStore "k8s" {
        plugin_data {
        }
      }
    }
