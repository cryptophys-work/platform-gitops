---
# SPIRE Workload Registration for auth-gateway
# Enables SPIRE delegated identity API for auth-gateway mTLS
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: auth-gateway
  labels:
    app.kubernetes.io/name: spire
    app.kubernetes.io/part-of: spire
    cryptophys.work/domain: identity
  annotations:
    cryptophys.io/contract: contract.platform.spire.v1
    cryptophys.io/anti-regression: "true"
spec:
  spiffeIDTemplate: "spiffe://cryptophys.work/ns/{{ .PodMeta.Namespace }}/sa/{{ .PodSpec.ServiceAccountName }}"

  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: nervous-system

  podSelector:
    matchLabels:
      app: auth-gateway

  autoPopulateDNSNames: true
  ttl: "24h"
