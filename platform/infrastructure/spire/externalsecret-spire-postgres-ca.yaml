# ExternalSecret for Postgres CA certificate used by SPIRE server to verify SSL connections.
#
# The CA certificate is sourced from HashiCorp Vault at:
#   path: secret/data/platform/spire/postgres-ca
#   key:  ca.crt
#
# To seed the Vault path with the CA certificate from the CNPG cluster:
#   # First, extract the CA cert from the cluster:
#   CA_CERT=$(kubectl get secret postgres-security-ha-ca \
#     -n postgresql-system \
#     -o jsonpath='{.data.ca\.crt}' | base64 -d)
#
#   # Then store it in Vault:
#   vault kv put secret/platform/spire/postgres-ca ca.crt="${CA_CERT}"
#
# The CNPG postgres-security-ha cluster stores its CA cert in:
#   Secret: postgres-security-ha-ca (namespace: postgresql-system)
#   Key:    ca.crt
#
# Without the real CA certificate in Vault, SPIRE server will fail to connect
# to Postgres when sslmode=verify-full is configured in server-config.yaml.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: spire-postgres-ca
  namespace: spire-system
  labels:
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: flux
    cryptophys.io/component: spire
    cryptophys.io/domain: platform
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: spire-postgres-ca
    creationPolicy: Owner
  data:
    - secretKey: ca.crt
      remoteRef:
        key: platform/spire/postgres-ca
        property: ca.crt
