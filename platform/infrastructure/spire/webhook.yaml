---
# ValidatingWebhookConfiguration for SPIRE controller manager
# Must exist before controller-manager starts (it reads and updates CABundle via SPIRE)
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: spire-controller-manager-webhook
  labels:
    app.kubernetes.io/name: spire-controller-manager
    app.kubernetes.io/part-of: spire
webhooks:
  - name: vclusterspiffeid.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: spire-controller-manager-webhook-service
        namespace: spire-system
        path: /validate-spire-spiffe-io-v1alpha1-clusterspiffeid
    failurePolicy: Ignore
    rules:
      - apiGroups: ["spire.spiffe.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["clusterspiffeids"]
    sideEffects: None
---
apiVersion: v1
kind: Service
metadata:
  name: spire-controller-manager-webhook-service
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spire-controller-manager
    app.kubernetes.io/part-of: spire
spec:
  selector:
    app: spire-server
  ports:
    - name: webhook
      port: 443
      targetPort: 9443
      protocol: TCP
