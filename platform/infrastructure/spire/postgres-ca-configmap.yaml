# ConfigMap for Postgres CA certificate used by SPIRE server to verify SSL connections.
#
# IMPORTANT: The certificate below is a PLACEHOLDER. You MUST replace it with the real CA
# certificate from the CNPG cluster before deploying with sslmode=verify-full.
#
# To extract the real CA certificate from the cluster:
#
#   kubectl get secret postgres-security-ha-ca \
#     -n postgresql-system \
#     -o jsonpath='{.data.ca\.crt}' | base64 -d
#
# Then update the ca.crt data field below with the actual certificate content.
#
# The CNPG postgres-security-ha cluster stores its CA cert in:
#   Secret: postgres-security-ha-ca (namespace: postgresql-system)
#   Key:    ca.crt
#
# Without the real CA certificate, SPIRE server will fail to connect to Postgres
# when sslmode=verify-full is configured in server-config.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-ca
  namespace: spire-system
  labels:
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: flux
    cryptophys.io/component: spire
    cryptophys.io/domain: platform
data:
  ca.crt: |
    # PLACEHOLDER - Replace with real CA certificate from:
    # kubectl get secret postgres-security-ha-ca -n postgresql-system -o jsonpath='{.data.ca\.crt}' | base64 -d
    #
    # Example valid certificate format:
    # -----BEGIN CERTIFICATE-----
    # MIIDXTCCAkWgAwIBAgIJA...
    # ... (real certificate content from CNPG cluster)
    # -----END CERTIFICATE-----
