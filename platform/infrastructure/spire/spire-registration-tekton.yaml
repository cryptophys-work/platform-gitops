# SPIRE Registration for Tekton Service Accounts
# Enables SPIFFE/SVID issuance for image factory workloads
# Ref: https://www.kimi.com/preview/19debede-19c2-8350-8000-054af3a3a146
apiVersion: spire.types.spiffe.io/v1
kind: ClusterSPIFFEID
metadata:
  name: tekton-pipeline-sa
  namespace: tekton-system
spec:
  spiffeId: spiffe://cryptophys.work/ns/tekton-system/sa/tekton-pipeline-sa
  selector:
    - type: k8s
      value: "ns:tekton-system"
    - type: k8s
      value: "sa:tekton-pipeline-sa"
  dnsNames:
    - tekton-pipeline-tekton-system.svc.cluster.local
---
apiVersion: spire.types.spiffe.io/v1
kind: ClusterSPIFFEID
metadata:
  name: tekton-chains-sa
  namespace: tekton-chains
spec:
  spiffeId: spiffe://cryptophys.work/ns/tekton-chains/sa/tekton-chains
  selector:
    - type: k8s
      value: "ns:tekton-chains"
    - type: k8s
      value: "sa:tekton-chains"
  dnsNames:
    - tekton-chains-tekton-chains.svc.cluster.local
---
# SPIRE Registration for image-factory namespace
# Allows BuildKit and Ray workers to get SVIDs
apiVersion: spire.types.spiffe.io/v1
kind: ClusterSPIFFEID
metadata:
  name: buildkit-sa
  namespace: image-factory
spec:
  spiffeId: spiffe://cryptophys.work/ns/image-factory/sa/buildkit-sa
  selector:
    - type: k8s
      value: "ns:image-factory"
    - type: k8s
      value: "sa:buildkit-sa"
  dnsNames:
    - buildkitd.image-factory.svc.cluster.local
---
apiVersion: spire.types.spiffe.io/v1
kind: ClusterSPIFFEID
metadata:
  name: ray-build-sa
  namespace: image-factory
spec:
  spiffeId: spiffe://cryptophys.work/ns/image-factory/sa/ray-build-sa
  selector:
    - type: k8s
      value: "ns:image-factory"
    - type: k8s
      value: "sa:ray-build-sa"
  dnsNames:
    - "*.image-factory.svc.cluster.local"
