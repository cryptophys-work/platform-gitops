# SPIRE Workload Registrations for NATS mTLS — all NATS consumers
# Trust domain: spiffe://cryptophys.work
# Pattern: verify client cert (no password), cert rotates every 1h via SPIRE
---
# ai-mesh-broker (NATS server itself)
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: ai-mesh-broker
  labels:
    app.kubernetes.io/name: spire
    app.kubernetes.io/part-of: spire
    cryptophys.work/domain: mesh
  annotations:
    cryptophys.io/contract: contract.platform.spire.v1
    cryptophys.io/anti-regression: "true"
spec:
  spiffeIDTemplate: "spiffe://cryptophys.work/ns/{{ .PodMeta.Namespace }}/sa/{{ .PodSpec.ServiceAccountName }}"
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: mesh-system
  podSelector:
    matchLabels:
      app: ai-mesh-broker
  dnsNameTemplates:
    - "ai-mesh-broker.mesh-system.svc.cluster.local"
    - "mesh-broker.mesh-system.svc.cluster.local"
    - "{{ .PodMeta.Name }}.mesh-broker.mesh-system.svc.cluster.local"
  autoPopulateDNSNames: true
  ttl: "1h"
---
