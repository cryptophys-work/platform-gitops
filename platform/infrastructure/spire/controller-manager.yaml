---
# SPIRE Controller Manager - Manages ClusterSPIFFEID and ClusterFederatedTrustDomain CRDs
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-controller-manager
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spire-controller-manager
    app.kubernetes.io/part-of: spire
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-controller-manager
  labels:
    app.kubernetes.io/name: spire-controller-manager
    app.kubernetes.io/part-of: spire
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingwebhookconfigurations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["spire.spiffe.io"]
    resources: ["clusterspiffeids", "clusterspiffeids/status", "clusterspiffeids/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["spire.spiffe.io"]
    resources: ["clusterfederatedtrustdomains", "clusterfederatedtrustdomains/status", "clusterfederatedtrustdomains/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["spire.spiffe.io"]
    resources: ["clusterstaticentries", "clusterstaticentries/status", "clusterstaticentries/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-controller-manager
  labels:
    app.kubernetes.io/name: spire-controller-manager
    app.kubernetes.io/part-of: spire
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-controller-manager
subjects:
  - kind: ServiceAccount
    name: spire-controller-manager
    namespace: spire-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-controller-manager-config
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spire-controller-manager
    app.kubernetes.io/part-of: spire
data:
  controller-manager.yaml: |
    apiVersion: spire.spiffe.io/v1alpha1
    kind: ControllerManagerConfig
    metrics:
      bindAddress: :8080
    health:
      healthProbeBindAddress: :8083
    clusterName: cryptophys-genesis
    trustDomain: cryptophys.work
    spireServerSocketPath: /run/spire/sockets/api.sock
    ignoreNamespaces:
      - kube-public
      - spire-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spire-controller-manager
  namespace: spire-system
  labels:
    app.kubernetes.io/name: spire-controller-manager
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/component: controller
    cryptophys.work/domain: identity
  annotations:
    cryptophys.io/contract: contract.platform.spire.v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spire-controller-manager
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-controller-manager
        app.kubernetes.io/part-of: spire
        app.kubernetes.io/component: controller
        cryptophys.work/domain: identity
    spec:
      serviceAccountName: spire-controller-manager
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: spire-controller-manager
          image: ghcr.io/spiffe/spire-controller-manager:0.6.3
          imagePullPolicy: IfNotPresent
          args:
            - --config=/run/spire/config/controller-manager.yaml
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: healthz
              containerPort: 8083
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-server-socket
              mountPath: /run/spire/sockets
            - name: tmp
              mountPath: /tmp
        - name: spire-server-proxy
          image: alpine/socat:1.7.4.4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - UNIX-LISTEN:/run/spire/sockets/api.sock,fork,mode=777
            - TCP:spire-server-api.spire-system.svc.cluster.local:8081
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "[ -S /run/spire/sockets/api.sock ]"
            initialDelaySeconds: 1
            periodSeconds: 2
          volumeMounts:
            - name: spire-server-socket
              mountPath: /run/spire/sockets
      volumes:
        - name: config
          configMap:
            name: spire-controller-manager-config
        - name: spire-server-socket
          emptyDir: {}
        - name: tmp
          emptyDir: {}
