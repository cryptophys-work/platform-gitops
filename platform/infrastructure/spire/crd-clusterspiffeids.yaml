---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterspiffeids.spire.spiffe.io
  labels:
    app.kubernetes.io/part-of: spire
spec:
  group: spire.spiffe.io
  names:
