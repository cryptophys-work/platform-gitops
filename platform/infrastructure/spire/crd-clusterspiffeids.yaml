              type: object
              required:
                - spiffeIDTemplate
              properties:
                spiffeIDTemplate:
                  type: string
                podSelector:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                namespaceSelector:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                workloadSelectorTemplates:
                  type: array
                  items:
                    type: string
                dnsNameTemplates:
                  type: array
                  items:
                    type: string
                autoPopulateDNSNames:
                  type: boolean
                ttl:
                  type: string
                admin:
                  type: boolean
                downstream:
                  type: boolean
                federatesWith:
                  type: array
                  items:
                    type: string
                jwtTTL:
                  type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Age
          type: date
