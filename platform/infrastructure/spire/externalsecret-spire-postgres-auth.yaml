apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: spire-postgres-auth
  namespace: spire-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: spire
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: spire-postgres-auth
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: platform/spire/postgres
        property: password
