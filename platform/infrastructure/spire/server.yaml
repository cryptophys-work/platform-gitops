apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spire-server
  namespace: spire-system
  labels:
    app: spire-server
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: flux
    environment: prod
    owner: infrastructure
spec:
  replicas: 3
  selector:
    matchLabels:
      app: spire-server
  serviceName: spire-server
  template:
    metadata:
      labels:
        app: spire-server
        app.kubernetes.io/part-of: spire
        app.kubernetes.io/managed-by: flux
        environment: prod
        owner: infrastructure
    spec:
      serviceAccountName: spire-server
      nodeSelector:
        cryptophys.io/tier: platform
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: spire-server
              topologyKey: kubernetes.io/hostname
      containers:
        - name: spire-server
          image: ghcr.io/spiffe/spire-server:1.8.0
          args: ["-config", "/run/spire/config/server.conf"]
          ports:
            - containerPort: 8081
              protocol: TCP
          livenessProbe:
            exec:
              command: ["/opt/spire/bin/spire-server", "healthcheck"]
            initialDelaySeconds: 15
            periodSeconds: 60
          readinessProbe:
            exec:
              command: ["/opt/spire/bin/spire-server", "healthcheck"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: spire-config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-data
              mountPath: /run/spire/data
              readOnly: false
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: spire-config
          configMap:
            name: spire-server-config
  volumeClaimTemplates:
    - metadata:
        name: spire-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 1Gi
