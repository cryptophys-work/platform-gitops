apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spire-server
  namespace: spire-system
  labels:
    app: spire-server
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: flux
    environment: prod
    owner: infrastructure
spec:
  replicas: 1  # Single SPIRE server writer; postgres datastore allows HA read replicas in a future change
  selector:
    matchLabels:
      app: spire-server
  serviceName: spire-server
  template:
    metadata:
      labels:
        app: spire-server
        app.kubernetes.io/part-of: spire
        app.kubernetes.io/managed-by: flux
        environment: prod
        owner: infrastructure
    spec:
      serviceAccountName: spire-server
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/platform: "true"
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        # Allow scheduling on nodes where Cilium is still initializing (SPIRE must start before Cilium)
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
        # nexus (platform workloads) carries nexus-hpc + ray-head; match Kyverno pool tolerations
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: ray-head
          operator: Equal
          value: "true"
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload.cryptophys.work/platform
                    operator: In
                    values:
                      - "true"
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: accepts-platform-workloads
                    operator: In
                    values:
                      - "true"
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: spire-server
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: spire-render-server-conf
          image: docker.io/library/python:3.11.9-alpine3.20
          imagePullPolicy: IfNotPresent
          env:
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: spire-postgres-credentials
                  key: username
            - name: PG_PASS
              valueFrom:
                secretKeyRef:
                  name: spire-postgres-credentials
                  key: password
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              python3 - <<'PY'
              import os, urllib.parse
              user = os.environ["PG_USER"]
              password = os.environ["PG_PASS"]
              host = "postgres-security-ha-rw.postgresql-system.svc.cluster.local"
              port = "5432"
              db = "spire"
              dsn = (
                  f"postgres://{urllib.parse.quote_plus(user)}:"
                  f"{urllib.parse.quote_plus(password)}@{host}:{port}/{db}?sslmode=disable"
              )
              tpl = open("/template/server.conf.template", encoding="utf-8").read()
              if "<<<SPIRE_POSTGRES_DSN>>>" not in tpl:
                  raise SystemExit("missing placeholder in server.conf.template")
              open("/out/server.conf", "w", encoding="utf-8").write(
                  tpl.replace("<<<SPIRE_POSTGRES_DSN>>>", dsn)
              )
              PY
          volumeMounts:
            - name: spire-server-config-template
              mountPath: /template
              readOnly: true
            - name: spire-rendered-config
              mountPath: /out
      containers:
        - name: spire-server
          image: ghcr.io/spiffe/spire-server:1.8.0
          args: ["-config", "/run/spire/config/server.conf"]
          ports:
            - containerPort: 8081
              protocol: TCP
          startupProbe:
            exec:
              command: ["/opt/spire/bin/spire-server", "healthcheck"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["/opt/spire/bin/spire-server", "healthcheck"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["/opt/spire/bin/spire-server", "healthcheck"]
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: spire-rendered-config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-data
              mountPath: /run/spire/data
              readOnly: false
            - name: server-socket
              mountPath: /tmp/spire-server/private
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
        - name: spire-controller-manager
          image: ghcr.io/spiffe/spire-controller-manager:0.6.3
          imagePullPolicy: IfNotPresent
          args:
            - --config=/run/spire/config/controller-manager.yaml
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: healthz
              containerPort: 8083
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: controller-manager-config
              mountPath: /run/spire/config
              readOnly: true
            - name: server-socket
              mountPath: /spire-server
              readOnly: true
            - name: controller-manager-tmp
              mountPath: /tmp
      volumes:
        - name: spire-server-config-template
          configMap:
            name: spire-server-config
        - name: spire-rendered-config
          emptyDir: {}
        - name: controller-manager-config
          configMap:
            name: spire-controller-manager-config
        - name: server-socket
          emptyDir: {}
        - name: controller-manager-tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: spire-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 1Gi
