apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spire-server
  namespace: spire-system
  labels:
    app: spire-server
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: flux
    environment: prod
    owner: infrastructure
    kagenti.io/role: identity
    kagenti.io/spiffe: "true"
spec:
  # 3x HA: shared Postgres datastore (read/write via SQL); per-pod spire-data (RWO); spire-shared-keys (RWX).
  # required podAntiAffinity on hostname + nodeAffinity to three platform-ha nodes => one replica per node.
  replicas: 3
  selector:
    matchLabels:
      app: spire-server
  serviceName: spire-server
  template:
    metadata:
      labels:
        app: spire-server
        app.kubernetes.io/part-of: spire
        app.kubernetes.io/managed-by: flux
        environment: prod
        owner: infrastructure
    spec:
      serviceAccountName: spire-server
      nodeSelector:
        kubernetes.io/os: linux
        platform-ha: "true"
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        # Allow scheduling on nodes where Cilium is still initializing (SPIRE must start before Cilium)
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
        # nexus (platform workloads) carries nexus-hpc + ray-head; match Kyverno pool tolerations
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
        - key: cryptophys.io/node-class
          operator: Equal
          value: nexus-hpc
          effect: NoSchedule
        - key: ray-head
          operator: Equal
          value: "true"
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform-ha
                    operator: In
                    values:
                      - "true"
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - nexus-144-91-103-10
                      - cerebellum-161-97-117-96
                      - thalamus-217-76-59-241
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - nexus-144-91-103-10
            - weight: 50
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - cerebellum-161-97-117-96
            - weight: 50
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - thalamus-217-76-59-241
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: spire-server
              topologyKey: kubernetes.io/hostname
      containers:
        - name: spire-server
          image: ghcr.io/spiffe/spire-server:1.8.0
          args: ["-config", "/run/spire/config/server.conf"]
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: spire-postgres-auth
                  key: password
          ports:
            - containerPort: 8081
              protocol: TCP
          startupProbe:
            exec:
              command: ["/opt/spire/bin/spire-server", "healthcheck"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["/opt/spire/bin/spire-server", "healthcheck"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["/opt/spire/bin/spire-server", "healthcheck"]
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: spire-config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-shared-keys
              mountPath: /run/spire/keys
              readOnly: false
            - name: spire-data
              mountPath: /run/spire/data
              readOnly: false
            - name: server-socket
              mountPath: /tmp/spire-server/private
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
        - name: spire-controller-manager
          image: ghcr.io/spiffe/spire-controller-manager:0.6.3
          imagePullPolicy: IfNotPresent
          args:
            - --config=/run/spire/config/controller-manager.yaml
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: healthz
              containerPort: 8083
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: controller-manager-config
              mountPath: /run/spire/config
              readOnly: true
            - name: server-socket
              mountPath: /spire-server
              readOnly: true
            - name: controller-manager-tmp
              mountPath: /tmp
      volumes:
        - name: spire-config
          configMap:
            name: spire-server-config
        - name: controller-manager-config
          configMap:
            name: spire-controller-manager-config
        - name: server-socket
          emptyDir: {}
        - name: controller-manager-tmp
          emptyDir: {}
        - name: spire-shared-keys
          persistentVolumeClaim:
            claimName: spire-shared-keys
  volumeClaimTemplates:
    - metadata:
        name: spire-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn-spire-data
        resources:
          requests:
            storage: 1Gi
