---
# SPIRE server PostgreSQL credentials (same logical user as CNPG postgres-security-ha / database spire).
# Populate Vault KV at apps/spire/postgres with username + password matching the spire DB owner
# (must match postgresql-system/spire-postgres-secret used by CNPG bootstrap for postgres-security-ha).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: spire-postgres-credentials
  namespace: spire-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: spire-server
    cryptophys.io/managed-by: flux
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: spire-postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: apps/spire/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: apps/spire/postgres
        property: password
