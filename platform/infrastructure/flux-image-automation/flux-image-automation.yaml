apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: flux-source-controller
  namespace: flux-system
spec:
  image: ghcr.io/fluxcd/source-controller
  interval: 30m
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: flux-source-controller
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: flux-source-controller
  policy:
    semver:
      range: ">=1.7.0 <2.0.0"
---
