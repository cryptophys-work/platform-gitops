apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: flux-components-auto
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: flux-image-automation
        email: flux-image-automation@cryptophys.work
      messageTemplate: "chore(flux): automated Flux controller image update"
    push:
      branch: main
  update:
    path: ./clusters/cryptophys-genesis/flux-system
    strategy: Setters
