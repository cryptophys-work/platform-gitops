# Bootstrap placeholder for apps/gitea/admin Vault secret
# The actual vault kv put must be done manually after Vault unseal
# Reference for admin token creation:
# vault kv put secret/apps/gitea/admin username="admin" password="<gitea-admin-password>"

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitea-admin-bootstrap
  namespace: platform-system
  labels:
    cryptophys.io/component: vault-secrets
    cryptophys.io/managed-by: argocd
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitea-admin-bootstrap
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: apps/gitea/admin
      property: username
  - secretKey: password
    remoteRef:
      key: apps/gitea/admin
      property: password
