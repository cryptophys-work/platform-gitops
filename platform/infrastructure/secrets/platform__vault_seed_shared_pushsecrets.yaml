apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: vault-seed-gitea-admin
  namespace: gitops-system
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: vault-seed
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: vault-backend
      kind: ClusterSecretStore
  selector:
    secret:
      name: gitea-ui-admin
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: apps/gitea/admin
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: apps/gitea/admin
          property: password
---
