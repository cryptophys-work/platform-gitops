# Vault ESO Token Secret
# IMPORTANT: This secret MUST be created manually after Vault unseal using a privileged token
# See VAULT_UNSEAL_PROCEDURE.md for the procedure
# 
# COMMAND TO CREATE (run after unseal):
# NEW_TOKEN=$(kubectl exec -n vault-system vault-0 -- env VAULT_TOKEN="$VAULT_TOKEN" \
#   vault token create -policy=external-secrets -ttl=8760h -renewable=true -format=json | jq -r '.auth.client_token')
# kubectl create secret generic vault-eso-token --namespace apps-system --from-literal=token="$NEW_TOKEN"

apiVersion: external-secrets.io/v1beta1
kind: PushSecret
metadata:
  name: vault-eso-token-sync
  namespace: platform-system
  labels:
    cryptophys.io/component: vault-secrets
    cryptophys.io/managed-by: argocd
spec:
  refreshInterval: "0"
  secretStoreRefs:
    - name: vault-backend
      kind: ClusterSecretStore
  selector:
    secret:
      name: vault-eso-token
  data:
  - sourceRef:
      key: apps/platform/vault-eso-token
      property: token
    key: token
