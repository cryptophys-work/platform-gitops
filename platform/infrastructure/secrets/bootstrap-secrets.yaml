apiVersion: v1
kind: Secret
metadata:
  name: cryptophys-wildcard-tls
  namespace: ingress
type: kubernetes.io/tls
stringData:
  tls.crt: "PLACEHOLDER"
  tls.key: "PLACEHOLDER"
