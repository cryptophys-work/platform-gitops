  name: platform-code-forge-gitea-values
  namespace: gitops-system
stringData:
  values.yaml: |
    gitea:
      config:
        database:
          DB_TYPE: postgres
          HOST: postgres-rw.postgresql-system:5432
          NAME: gitea
          USER: gitea
