# Registry pull secret for the platform-ui namespace.
# The infra-ops visualizer-dep lives in the platform-ui namespace, which uses
# cryptophys.work/domain (not cryptophys.io/domain), so Kyverno cp-generate-
# registry-pullsecret-v1 does NOT fire here. This ESO materialises the canonical
# registry-cryptophys-work-auth secret directly in platform-ui from the same
# apps/harbor/cluster-pull Vault path used everywhere else.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platformui-registry-auth
  namespace: platform-ui
  labels:
    cryptophys.work/domain: platform-ui
    cryptophys.work/component: ui
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
  annotations:
    cryptophys.io/contract: contract.platform.registry.v1
    cryptophys.io/ssot: "true"
    cryptophys.io/anti-regression: "true"
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: registry-cryptophys-work-auth
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "registry.cryptophys.work": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
              },
              "registry-harbor-registry.registry-system.svc.cluster.local:5000": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
              },
              "registry-harbor-core.registry-system.svc.cluster.local": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
              }
            }
          }
  data:
    - secretKey: username
      remoteRef:
        key: apps/harbor/cluster-pull
        property: username
    - secretKey: password
      remoteRef:
        key: apps/harbor/cluster-pull
        property: password
