apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitea-admin-secret
  namespace: gitops-system
  labels:
    cryptophys.io/component: vault-secrets
    cryptophys.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitea-admin-secret
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: apps/gitea/admin
      property: username
  - secretKey: password
    remoteRef:
      key: apps/gitea/admin
      property: password
