apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: sync-gitea-db-credentials
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: gitea
    cryptophys.io/managed-by: flux
    cryptophys.io/anti-regression: "true"
    policies.kyverno.io/title: Sync Gitea DB credentials
    policies.kyverno.io/category: Platform
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Clones the CloudNativePG application secret for postgres-apps-ha into the
      gitops-system namespace so Gitea can consume the current database
      credentials without hardcoding a password in Git.
spec:
  background: true
  validationFailureAction: Audit
  rules:
    - name: clone-postgres-app-secret-for-gitea
      match:
        any:
          - resources:
              kinds:
                - Secret
              namespaces:
                - postgresql-system
              names:
                - postgres-apps-ha-app
      generate:
        apiVersion: v1
        kind: Secret
        name: gitea-db-credentials
        namespace: gitops-system
        generateExisting: true
        synchronize: true
        clone:
          namespace: postgresql-system
          name: postgres-apps-ha-app
