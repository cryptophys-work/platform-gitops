---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: observability-system
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        admin-user: admin
        admin-password: "{{ index . \"admin-password\" }}"
  data:
  - secretKey: admin-password
    remoteRef:
      key: apps/grafana/admin
      property: password
