---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-admin-credentials
  namespace: registry-system
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-admin-credentials
    creationPolicy: Owner
  data:
  - secretKey: HARBOR_ADMIN_PASSWORD
    remoteRef:
      key: apps/harbor/admin
      property: password
