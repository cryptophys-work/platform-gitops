apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: harbor-pull-secret
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-pull-secret
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
  annotations:
    cryptophys.io/contract: contract.platform.registry.v1
    cryptophys.io/ssot: "true"
    cryptophys.io/anti-regression: "true"
spec:
  # Distribute to all namespaces that run workloads pulling from registry.cryptophys.work
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values:
          - apps-user
          - apps-core
          - apps-dash
          - apps-automation
          - aide
          - automation
          - bridge
          - cerebrum
          - cqls-compute
          - dao-governance
          - facilitator
          - gitops-system
          - mesh-system
          - monitoring-core
          - navigator
          - notification
          - observability-system
          - openclaw
          - orchestrator
          - platform-ui
          - postgresql-system
          - sync-engine
          - tekton-system
          - trustedledger
          - watcher
          - security-system
          - kyverno-system
          - apps-system
          - image-factory
          - default
  refreshTime: 24h
  externalSecretSpec:
    refreshInterval: 24h
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    target:
      name: registry-cryptophys-work-auth
      creationPolicy: Owner
      template:
        type: kubernetes.io/dockerconfigjson
        engineVersion: v2
        data:
          .dockerconfigjson: |
            {
              "auths": {
                "registry.cryptophys.work": {
                  "username": "{{ .username }}",
                  "password": "{{ .password }}",
                  "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
                },
                "registry-harbor-registry.registry-system.svc.cluster.local:5000": {
                  "username": "{{ .username }}",
                  "password": "{{ .password }}",
                  "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
                },
                "registry-harbor-core.registry-system.svc.cluster.local": {
                  "username": "{{ .username }}",
                  "password": "{{ .password }}",
                  "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
                }
              }
            }
    data:
      - secretKey: username
        remoteRef:
          key: apps/harbor/admin
          property: username
      - secretKey: password
        remoteRef:
          key: apps/harbor/admin
          property: password
