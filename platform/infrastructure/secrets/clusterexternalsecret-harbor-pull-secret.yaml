apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: harbor-pull-secret
  labels:
    cryptophys.io/domain: platform
    cryptophys.io/component: harbor-pull-secret
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
  annotations:
    cryptophys.io/contract: contract.platform.registry.v1
    cryptophys.io/ssot: "true"
    cryptophys.io/anti-regression: "true"
    cryptophys.io/vault-bootstrap: >-
      Use a Harbor robot or least-privilege pull user — not the UI admin account.
      Example: vault kv put secret/apps/harbor/cluster-pull username='robot$cluster-pull+...' password='<token>'
spec:
  # Most namespaces already receive this secret from Kyverno policy
  # cp-generate-registry-pullsecret-v1. Keep ESO only for the namespaces
  # that are not covered by the cryptophys.io/domain label-based generator.
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: In
        values:
          - apps-automation
          - apps-core
          - apps-system
          - sync-engine
  refreshTime: 24h
  externalSecretSpec:
    refreshInterval: 24h
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    target:
      name: registry-cryptophys-work-auth
      creationPolicy: Owner
      template:
        type: kubernetes.io/dockerconfigjson
        engineVersion: v2
        data:
          .dockerconfigjson: |
            {
              "auths": {
                "registry.cryptophys.work": {
                  "username": "{{ .username }}",
                  "password": "{{ .password }}",
                  "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
                },
                "registry-harbor-registry.registry-system.svc.cluster.local:5000": {
                  "username": "{{ .username }}",
                  "password": "{{ .password }}",
                  "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
                },
                "registry-harbor-core.registry-system.svc.cluster.local": {
                  "username": "{{ .username }}",
                  "password": "{{ .password }}",
                  "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
                }
              }
            }
    data:
      - secretKey: username
        remoteRef:
          key: apps/harbor/cluster-pull
          property: username
      - secretKey: password
        remoteRef:
          key: apps/harbor/cluster-pull
          property: password
