apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-repo-auth-sync
  namespace: gitops-system
  labels:
    app.kubernetes.io/name: github-repo-auth-sync
    app.kubernetes.io/instance: github-repo-auth-sync
    app.kubernetes.io/managed-by: flux
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-repo-auth-sync-source
  namespace: flux-system
  labels:
    app.kubernetes.io/name: github-repo-auth-sync
    app.kubernetes.io/instance: github-repo-auth-sync
    app.kubernetes.io/managed-by: flux
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["github-repo-auth"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-repo-auth-sync-source
  namespace: flux-system
  labels:
    app.kubernetes.io/name: github-repo-auth-sync
    app.kubernetes.io/instance: github-repo-auth-sync
    app.kubernetes.io/managed-by: flux
subjects:
  - kind: ServiceAccount
    name: github-repo-auth-sync
    namespace: gitops-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-repo-auth-sync-source
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-repo-auth-sync-target
  namespace: gitops-system
  labels:
    app.kubernetes.io/name: github-repo-auth-sync
    app.kubernetes.io/instance: github-repo-auth-sync
    app.kubernetes.io/managed-by: flux
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["github-repo-auth"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-repo-auth-sync-target
  namespace: gitops-system
  labels:
    app.kubernetes.io/name: github-repo-auth-sync
    app.kubernetes.io/instance: github-repo-auth-sync
    app.kubernetes.io/managed-by: flux
subjects:
  - kind: ServiceAccount
    name: github-repo-auth-sync
    namespace: gitops-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-repo-auth-sync-target
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: github-repo-auth-sync
  namespace: gitops-system
  labels:
    app.kubernetes.io/name: github-repo-auth-sync
    app.kubernetes.io/instance: github-repo-auth-sync
    app.kubernetes.io/managed-by: flux
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: github-repo-auth-sync
            app.kubernetes.io/instance: github-repo-auth-sync
            app.kubernetes.io/managed-by: flux
        spec:
          serviceAccountName: github-repo-auth-sync
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: sync
              image: bitnami/kubectl:6e2cdb22d6ab7264ea198c717f555e30536b54029d26c8781b9f25f78951b564
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -lc
                - |
                  set -eu
                  user_b64="$(kubectl -n flux-system get secret github-repo-auth -o jsonpath='{.data.username}')"
                  pass_b64="$(kubectl -n flux-system get secret github-repo-auth -o jsonpath='{.data.password}')"
                  cat <<EOF | kubectl apply -f -
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: github-repo-auth
                    namespace: gitops-system
                    labels:
                      app.kubernetes.io/name: github-repo-auth
                      app.kubernetes.io/instance: github-repo-auth
                      app.kubernetes.io/managed-by: flux
                  type: Opaque
                  data:
                    username: ${user_b64}
                    password: ${pass_b64}
                  EOF
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                privileged: false
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop: ["ALL"]
