apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitops-gitea-values
  namespace: gitops-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitops-gitea-values
    creationPolicy: Owner
  data:
    - secretKey: values.yaml
      remoteRef:
        key: apps/gitea/helm-values
        property: values_yaml
