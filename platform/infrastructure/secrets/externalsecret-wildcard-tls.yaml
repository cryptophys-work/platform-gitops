apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cryptophys-wildcard-tls
  namespace: vault-system
spec:
  data:
  - remoteRef:
      key: platform/tls/cryptophys-wildcard
      property: tls_crt
    secretKey: tls.crt
  - remoteRef:
      key: platform/tls/cryptophys-wildcard
      property: tls_key
    secretKey: tls.key
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    creationPolicy: Owner
    name: cryptophys-wildcard-tls
    template:
      type: kubernetes.io/tls
---
