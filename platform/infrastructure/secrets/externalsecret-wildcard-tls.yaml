apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cryptophys-wildcard-tls
  namespace: vault-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cryptophys-wildcard-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: platform/tls/cryptophys-wildcard
        property: tls_crt
    - secretKey: tls.key
      remoteRef:
        key: platform/tls/cryptophys-wildcard
        property: tls_key
---
