# Registry pull secret for kyverno-system namespace.
# Required by kyverno deployments for image pulls from Harbor.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kyverno-registry-auth
  namespace: kyverno-system
  labels:
    cryptophys.work/domain: platform
    cryptophys.work/component: registry
    cryptophys.io/managed-by: flux
    cryptophys.io/layer: platform
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: registry-cryptophys-work-auth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: apps/harbor/cluster-pull
        property: username
    - secretKey: password
      remoteRef:
        key: apps/harbor/cluster-pull
        property: password