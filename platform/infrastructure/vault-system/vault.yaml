apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault-system
spec:
  interval: 1h
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Service
              name: vault
            patch: |
              - op: replace
                path: /spec/publishNotReadyAddresses
                value: false
  chart:
    spec:
      chart: vault
      version: 0.27.0
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
  values:
    global:
      enabled: true
      tlsDisable: true
    server:
      replicas: 3
      resources:
        requests: { cpu: 100m, memory: 128Mi }
        limits: { cpu: 300m, memory: 256Mi }
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/platform: "true"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload.cryptophys.work/platform
                    operator: In
                    values:
                      - "true"
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: accepts-platform-workloads
                    operator: In
                    values:
                      - "true"
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: vault
                  app.kubernetes.io/name: vault
                  component: server
              topologyKey: kubernetes.io/hostname
      tolerations:
        # Cilium bootstrap taint
        - key: node.cilium.io/agent-not-ready
          operator: Exists
          effect: NoSchedule
        # Platform HA pool taint
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
        # Storage-only node taint
        - key: cryptophys.io/storage-only
          operator: Exists
          effect: NoSchedule
        # LLM inference node taint
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
        # Ray head node taint
        - key: ray-head
          operator: Exists
          effect: NoSchedule
        # DAO system node taint
        - key: dao-system
          operator: Exists
          effect: NoSchedule
        # Bridge system node taint
        - key: bridge-system
          operator: Exists
          effect: NoSchedule
        # Temporary taints
        - key: node.kubernetes.io/memory-pressure
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        - key: node.kubernetes.io/pid-pressure
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
      dataStorage:
        enabled: true
        size: 1Gi
        storageClass: longhorn
      ha:
        enabled: true
        raft:
          enabled: true
          setNodeId: true
          config: |
            ui = true
            listener "tcp" {
              tls_disable = 1
              address = "[::]:8200"
              cluster_address = "[::]:8201"
            }
            storage "raft" {
              path = "/vault/data"
            }
            service_registration "kubernetes" {}
    injector:
      enabled: true
      replicas: 2
      certs:
        secretName: vault-injector-certs
      resources:
        requests: { cpu: 100m, memory: 64Mi }
        limits: { cpu: 250m, memory: 128Mi }
      # Increase liveness failureThreshold: cert-manager takes a few seconds to
      # populate vault-injector-certs at pod start → default threshold=2 kills pod too early
      livenessProbe:
        failureThreshold: 10
        initialDelaySeconds: 10
        periodSeconds: 5
      readinessProbe:
        failureThreshold: 5
        initialDelaySeconds: 5
        periodSeconds: 5
      startupProbe:
        failureThreshold: 20
        periodSeconds: 5
      # Rolling update in-place to avoid needing extra scheduling capacity
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/platform: "true"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload.cryptophys.work/platform
                    operator: In
                    values:
                      - "true"
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: accepts-platform-workloads
                    operator: In
                    values:
                      - "true"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/instance: vault
                    app.kubernetes.io/name: vault-agent-injector
                    component: webhook
                topologyKey: kubernetes.io/hostname
      tolerations:
        - key: ray-cluster
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: cryptophys.io/pool
          operator: Equal
          value: platform-ha
          effect: NoSchedule
        - key: node.kubernetes.io/memory-pressure
          operator: Exists
          effect: NoSchedule
        - key: cryptophys.io/storage-only
          operator: Equal
          value: "true"
          effect: NoSchedule
