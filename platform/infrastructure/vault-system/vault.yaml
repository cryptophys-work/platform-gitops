apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault-system
spec:
  interval: 1h
  chart:
    spec:
      chart: vault
      version: 0.27.0
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
  install:
    timeout: 15m
    remediation:
      retries: 2
  upgrade:
    timeout: 15m
    remediation:
      retries: 2
  values:
    global:
      enabled: true
      tlsDisable: true
    server:
      replicas: 3
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi
      # HA Architecture: Platform workloads on control plane
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      dataStorage:
        enabled: true
        size: 10Gi
        storageClass: longhorn
      ha:
        enabled: true
        raft:
          enabled: true
          setNodeId: true
          config: |
            ui = true
            listener "tcp" {
              tls_disable = 1
              address = "[::]:8200"
              cluster_address = "[::]:8201"
            }
            storage "raft" {
              path = "/vault/data"
            }
            service_registration "kubernetes" {}
    injector:
      enabled: true
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 128Mi
        workload.cryptophys.work/apps-core: "true"
      # cert-manager manages TLS cert — persistent, auto-renewing, institutional grade
      certs:
        secretName: vault-injector-certs
        certName: tls.crt
        keyName: tls.key
        caBundle: ""   # managed by cert-manager cainjector via webhook annotation
  # Flux postRenderer: annotates vault-agent-injector-cfg so cert-manager cainjector
  # automatically updates caBundle on every cert renewal — zero manual intervention
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: MutatingWebhookConfiguration
              name: vault-agent-injector-cfg
            patch: |
              apiVersion: admissionregistration.k8s.io/v1
              kind: MutatingWebhookConfiguration
              metadata:
                name: vault-agent-injector-cfg
                annotations:
                  cert-manager.io/inject-ca-from: vault-system/vault-injector-cert
