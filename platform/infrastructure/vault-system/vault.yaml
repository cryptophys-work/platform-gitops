apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault-system
spec:
  interval: 1h
  chart:
    spec:
      chart: vault
      version: 0.27.0
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
  values:
    global:
      enabled: true
      tlsDisable: true
    server:
      replicas: 3
      resources:
        requests: { cpu: 100m, memory: 128Mi }
        limits: { cpu: 250m, memory: 256Mi }
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      tolerations:
        - key: cryptophys.io/role
          operator: Equal
          value: llm-inference
          effect: NoSchedule
      dataStorage:
        enabled: true
        size: 10Gi
        storageClass: longhorn
      ha:
        enabled: true
        raft:
          enabled: true
          setNodeId: true
          config: |
            ui = true
            listener "tcp" {
              tls_disable = 1
              address = "[::]:8200"
              cluster_address = "[::]:8201"
            }
            storage "raft" {
              path = "/vault/data"
            }
            service_registration "kubernetes" {}
    injector:
      enabled: true
      replicas: 2
      certs:
        secretName: vault-injector-certs
      resources:
        requests: { cpu: 100m, memory: 64Mi }
        limits: { cpu: 250m, memory: 128Mi }
      nodeSelector:
        kubernetes.io/os: linux
        workload.cryptophys.work/apps-core: "true"
      tolerations: []
