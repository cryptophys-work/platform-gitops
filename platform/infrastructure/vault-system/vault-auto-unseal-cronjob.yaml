apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-auto-unseal
  namespace: vault-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/component: vault-auto-unseal
    cryptophys.io/managed-by: flux
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: default
          nodeSelector:
            kubernetes.io/os: linux
            workload.cryptophys.work/platform: "true"
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                    - thalamus-217-76-59-241
                    - cerebellum-161-97-117-96
          tolerations:
          - key: cryptophys.io/pool
            operator: Equal
            value: platform-ha
            effect: NoSchedule
          - key: node.cilium.io/agent-not-ready
            operator: Exists
            effect: NoSchedule
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: vault-unseal
            image: docker.io/hashicorp/vault:1.15.2
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
            command:
            - /bin/sh
            - -c
            - |
              for POD in vault-0 vault-1 vault-2; do
                ADDR="http://${POD}.vault-internal.vault-system.svc.cluster.local:8200"
                SEALED=$(vault status -address="$ADDR" 2>/dev/null | grep "^Sealed" | awk '{print $2}')
                if [ "$SEALED" = "true" ]; then
                  echo "Unsealing $POD..."
                  vault operator unseal -address="$ADDR" "$KEY1"
                  vault operator unseal -address="$ADDR" "$KEY2"
                  vault operator unseal -address="$ADDR" "$KEY3"
                else
                  echo "$POD already unsealed"
                fi
              done
            env:
            - name: KEY1
              valueFrom:
                secretKeyRef:
                  name: vault-unseal-keys
                  key: key1
            - name: KEY2
              valueFrom:
                secretKeyRef:
                  name: vault-unseal-keys
                  key: key2
            - name: KEY3
              valueFrom:
                secretKeyRef:
                  name: vault-unseal-keys
                  key: key3
