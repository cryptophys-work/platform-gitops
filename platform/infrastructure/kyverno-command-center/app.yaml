apiVersion: v1
kind: ConfigMap
metadata:
  name: kyverno-command-center
  namespace: kyverno
data:
  server.py: |
    import json
    import os
    import ssl
    import urllib.parse
    import urllib.request
    from collections import Counter, defaultdict
    from datetime import datetime, timezone
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    K8S_HOST = os.environ.get("K8S_HOST", "https://kubernetes.default.svc")
    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

    with open(TOKEN_PATH, "r", encoding="utf-8") as f:
      TOKEN = f.read().strip()

    SSL_CTX = ssl.create_default_context(cafile=CA_PATH)

    def k8s_get(path):
      req = urllib.request.Request(
        f"{K8S_HOST}{path}",
        headers={"Authorization": f"Bearer {TOKEN}", "Accept": "application/json"},
      )
      with urllib.request.urlopen(req, context=SSL_CTX, timeout=15) as resp:
        return json.loads(resp.read().decode("utf-8"))

    def list_all(path):
      items = []
      cont = ""
      sep = "&" if "?" in path else "?"
      while True:
        full = f"{path}{sep}limit=500"
        if cont:
          full += f"&continue={urllib.parse.quote(cont)}"
        data = k8s_get(full)
        items.extend(data.get("items", []))
        cont = data.get("metadata", {}).get("continue", "")
        if not cont:
          break
      return items

    def parse_time(value):
      if not value:
        return None
      try:
        if isinstance(value, str):
          return datetime.fromisoformat(value.replace("Z", "+00:00"))
        if isinstance(value, dict) and value.get("seconds"):
          return datetime.fromtimestamp(int(value["seconds"]), tz=timezone.utc)
      except Exception:
        return None
      return None

    def all_reports():
      namespaced = list_all("/apis/wgpolicyk8s.io/v1alpha2/policyreports")
      cluster = list_all("/apis/wgpolicyk8s.io/v1alpha2/clusterpolicyreports")
      return namespaced + cluster

    def flatten_findings(reports):
      rows = []
      for report in reports:
        m = report.get("metadata", {})
        scope = report.get("scope", {})
        ns = m.get("namespace", "cluster")
        resource_name = scope.get("name") or m.get("name")
        resource_kind = scope.get("kind") or "Cluster"
        for result in report.get("results", []):
          ts = parse_time(result.get("timestamp"))
          rows.append({
            "namespace": ns,
            "resource": resource_name,
            "kind": resource_kind,
            "source": result.get("source", "unknown"),
            "policy": result.get("policy", "unknown"),
            "rule": result.get("rule", "unknown"),
            "severity": (result.get("severity") or "low").lower(),
            "result": (result.get("result") or "pass").lower(),
            "category": result.get("category", "uncategorized"),
            "message": result.get("message", ""),
            "timestamp": ts.isoformat() if ts else "",
          })
      return rows

    def compute_overview(findings):
      sev_counts = Counter()
      mode_counts = Counter()
      policy_counts = Counter()
      ns_counts = Counter()
      workload_counts = Counter()
      hourly = defaultdict(int)

      now = datetime.now(timezone.utc)
      since_24h = now.timestamp() - 24 * 3600

      for f in findings:
        if f["result"] not in ("fail", "warn", "error"):
          continue
        sev_counts[f["severity"]] += 1
        policy_counts[f["policy"]] += 1
        ns_counts[f["namespace"]] += 1
        workload_counts[f"{f['namespace']}/{f['kind']}/{f['resource']}"] += 1

        source = f["source"].lower()
        if "event" in source:
          mode_counts["enforce_blocks"] += 1
        else:
          mode_counts["audit_findings"] += 1

        if f["timestamp"]:
          try:
            ts = datetime.fromisoformat(f["timestamp"]).timestamp()
            if ts >= since_24h:
              bucket = datetime.fromtimestamp(ts, tz=timezone.utc).strftime("%H:00")
              hourly[bucket] += 1
          except Exception:
            pass

      return {
        "kpis": {
          "total_violations": sum(sev_counts.values()),
          "enforce_blocks": mode_counts["enforce_blocks"],
          "audit_findings": mode_counts["audit_findings"],
          "top_severity": sev_counts.most_common(1)[0][0] if sev_counts else "none",
        },
        "severity": sev_counts,
        "top_policies": policy_counts.most_common(10),
        "top_namespaces": ns_counts.most_common(10),
        "top_workloads": workload_counts.most_common(10),
        "trend_24h": sorted(hourly.items()),
      }

    def list_policy_catalog():
      policies = list_all("/apis/kyverno.io/v1/clusterpolicies")
      out = []
      for p in policies:
        m = p.get("metadata", {})
        spec = p.get("spec", {})
        ann = m.get("annotations", {})
        out.append({
          "name": m.get("name"),
          "category": ann.get("policies.kyverno.io/category", "uncategorized"),
          "title": ann.get("policies.kyverno.io/title", m.get("name")),
          "severity": ann.get("policies.kyverno.io/severity", "low"),
          "mode": spec.get("validationFailureAction", "Audit"),
          "rules": len(spec.get("rules", [])),
          "updated": m.get("creationTimestamp", ""),
        })
      out.sort(key=lambda x: x["name"])
      return out

    def json_resp(handler, payload, status=200):
      data = json.dumps(payload, default=list).encode("utf-8")
      handler.send_response(status)
      handler.send_header("Content-Type", "application/json; charset=utf-8")
      handler.send_header("Content-Length", str(len(data)))
      handler.end_headers()
      handler.wfile.write(data)

    def text_resp(handler, body, content_type="text/html; charset=utf-8", status=200):
      data = body.encode("utf-8")
      handler.send_response(status)
      handler.send_header("Content-Type", content_type)
      handler.send_header("Content-Length", str(len(data)))
      handler.end_headers()
      handler.wfile.write(data)

    class Handler(BaseHTTPRequestHandler):
      def do_GET(self):
        if self.path in ("/", "/index.html"):
          return text_resp(self, INDEX_HTML)
        if self.path == "/app.js":
          return text_resp(self, APP_JS, "application/javascript; charset=utf-8")
        if self.path == "/styles.css":
          return text_resp(self, STYLES_CSS, "text/css; charset=utf-8")
        if self.path == "/healthz":
          return json_resp(self, {"status": "ok"})

        if self.path.startswith("/api/"):
          try:
            reports = all_reports()
            findings = flatten_findings(reports)

            if self.path.startswith("/api/overview"):
              return json_resp(self, compute_overview(findings))
            if self.path.startswith("/api/findings"):
              qs = urllib.parse.parse_qs(urllib.parse.urlparse(self.path).query)
              page = int(qs.get("page", ["1"])[0])
              size = min(int(qs.get("size", ["100"])[0]), 500)
              source = qs.get("source", [""])[0].lower()
              policy = qs.get("policy", [""])[0].lower()
              namespace = qs.get("namespace", [""])[0].lower()
              result = qs.get("result", [""])[0].lower()
              filtered = []
              for f in findings:
                if source and source not in f["source"].lower():
                  continue
                if policy and policy not in f["policy"].lower():
                  continue
                if namespace and namespace not in f["namespace"].lower():
                  continue
                if result and result != f["result"]:
                  continue
                filtered.append(f)
              filtered.sort(key=lambda x: x.get("timestamp", ""), reverse=True)
              start = (page - 1) * size
              end = start + size
              return json_resp(self, {"total": len(filtered), "page": page, "size": size, "items": filtered[start:end]})
            if self.path.startswith("/api/policies"):
              portfolio = list_policy_catalog()
              counts = Counter()
              for f in findings:
                if f["result"] in ("fail", "warn", "error"):
                  counts[f["policy"]] += 1
              for p in portfolio:
                p["violations"] = counts.get(p["name"], 0)
              return json_resp(self, {"items": portfolio})
            if self.path.startswith("/api/admissions"):
              blocks = [f for f in findings if "event" in f["source"].lower() and f["result"] in ("fail", "error", "warn")]
              blocks.sort(key=lambda x: x.get("timestamp", ""), reverse=True)
              return json_resp(self, {"items": blocks[:300]})
            if self.path.startswith("/api/export"):
              return json_resp(self, {"generated_at": datetime.now(timezone.utc).isoformat(), "findings": findings})

            return json_resp(self, {"error": "unknown api"}, 404)
          except Exception as e:
            return json_resp(self, {"error": str(e)}, 500)

        return text_resp(self, "Not Found", status=404)

      def log_message(self, format, *args):
        return

    INDEX_HTML = """<!doctype html>
    <html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Kyverno Command Center</title><link rel='stylesheet' href='/styles.css'></head>
    <body>
      <div class='layout'>
        <aside class='sidebar'>
          <div class='brand'>Kyverno Command Center</div>
          <button class='nav active' data-view='dashboard'>Dashboard</button>
          <button class='nav' data-view='reports'>Report (Policy Pivot)</button>
          <button class='nav' data-view='logs'>Log Report</button>
          <button class='nav' data-view='dictionary'>Policy Campus / Dictionary</button>
          <button class='nav' data-view='workloads'>Workloads</button>
          <button class='nav' data-view='admissions'>Admissions</button>
          <button class='nav' data-view='settings'>Settings</button>
        </aside>
        <main class='main'>
          <header class='top'>
            <input id='search' placeholder='Search: namespace:, policy:, kind:, name:' />
            <select id='timeRange'><option value='24h'>24h</option><option value='7d'>7d</option></select>
            <button id='refresh'>Refresh</button>
            <a class='btn' href='/api/export' target='_blank'>Export JSON</a>
          </header>
          <section id='content'></section>
        </main>
      </div>
      <script src='/app.js'></script>
    </body></html>"""

    APP_JS = """
    const state = { view: 'dashboard', query: '', data: {} };
    const $ = (s) => document.querySelector(s);
    const esc = (v) => (v ?? '').toString().replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');

    function setView(view){
      state.view = view;
      document.querySelectorAll('.nav').forEach(b => b.classList.toggle('active', b.dataset.view===view));
      render();
    }

    async function loadAll(){
      const [overview, policies, findings, admissions] = await Promise.all([
        fetch('/api/overview').then(r=>r.json()),
        fetch('/api/policies').then(r=>r.json()),
        fetch('/api/findings?page=1&size=200').then(r=>r.json()),
        fetch('/api/admissions').then(r=>r.json()),
      ]);
      state.data = { overview, policies: policies.items || [], findings: findings.items || [], admissions: admissions.items || [] };
      render();
    }

    function kpi(title, value){
      return `<div class='kpi'><div class='k-title'>${esc(title)}</div><div class='k-val'>${esc(value)}</div></div>`;
    }

    function table(headers, rows){
      return `<div class='table-wrap'><table><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${rows.join('')}</tbody></table></div>`;
    }

    function renderDashboard(){
      const o = state.data.overview || {kpis:{},top_policies:[],top_namespaces:[],top_workloads:[],trend_24h:[]};
      const k = o.kpis || {};
      const trend = (o.trend_24h || []).map(([h,v])=>`${h}:${v}`).join(' | ');
      return `
        <h2>Mission Control</h2>
        <div class='kpis'>
          ${kpi('Total Violations', k.total_violations || 0)}
          ${kpi('Enforce Blocks', k.enforce_blocks || 0)}
          ${kpi('Audit Findings', k.audit_findings || 0)}
          ${kpi('Top Severity', k.top_severity || 'none')}
        </div>
        <div class='panel'><h3>Trend (24h)</h3><pre>${esc(trend || 'no recent data')}</pre></div>
        <div class='grid'>
          <div class='panel'><h3>Top Failing Policies</h3>${table(['Policy','Count'], (o.top_policies||[]).map(x=>`<tr><td>${esc(x[0])}</td><td>${x[1]}</td></tr>`))}</div>
          <div class='panel'><h3>Top Namespaces</h3>${table(['Namespace','Count'], (o.top_namespaces||[]).map(x=>`<tr><td>${esc(x[0])}</td><td>${x[1]}</td></tr>`))}</div>
        </div>`;
    }

    function renderReports(){
      const rows = (state.data.policies || []).sort((a,b)=> (b.violations||0) - (a.violations||0))
        .map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.category)}</td><td>${esc(p.mode)}</td><td>${p.rules}</td><td>${p.violations||0}</td></tr>`);
      return `<h2>Report per Policy Pivot</h2>${table(['Policy','Category','Mode','Rules','Violations'], rows)}`;
    }

    function renderLogs(){
      const q = state.query.toLowerCase();
      const rows = (state.data.findings||[]).filter(f => !q || JSON.stringify(f).toLowerCase().includes(q))
        .map(f=>`<tr><td>${esc(f.timestamp)}</td><td>${esc(f.namespace)}</td><td>${esc(f.kind)}/${esc(f.resource)}</td><td>${esc(f.policy)}</td><td><span class='badge ${esc(f.result)}'>${esc(f.result)}</span></td><td>${esc(f.message)}</td></tr>`);
      return `<h2>Log Report</h2>${table(['Time','Namespace','Workload','Policy','Result','Message'], rows)}`;
    }

    function renderDictionary(){
      const rows = (state.data.policies || []).map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.title)}</td><td>${esc(p.category)}</td><td>${esc(p.severity)}</td><td>${esc(p.updated)}</td></tr>`);
      return `<h2>Policy Campus / Dictionary</h2>${table(['Name','Title','Category','Severity','Updated'], rows)}`;
    }

    function renderWorkloads(){
      const map = new Map();
      for(const f of (state.data.findings||[])){
        if(!['fail','warn','error'].includes(f.result)) continue;
        const key = `${f.namespace}/${f.kind}/${f.resource}`;
        map.set(key, (map.get(key)||0)+1);
      }
      const rows = [...map.entries()].sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${v}</td></tr>`);
      return `<h2>Workload Compliance Drilldown</h2>${table(['Workload','Violation Count'], rows)}`;
    }

    function renderAdmissions(){
      const rows = (state.data.admissions||[]).map(f=>`<tr><td>${esc(f.timestamp)}</td><td>${esc(f.namespace)}</td><td>${esc(f.policy)}</td><td>${esc(f.rule)}</td><td>${esc(f.message)}</td></tr>`);
      return `<h2>Admission Control / Blocked Requests</h2>${table(['Time','Namespace','Policy','Rule','Reason'], rows)}`;
    }

    function renderSettings(){
      return `<h2>Settings</h2><div class='panel'><p>Dark mode default, compact density, single-cluster mode aktif.</p><p>Roadmap multi-cluster & tenant RBAC ada di docs repo.</p></div>`;
    }

    function render(){
      const c = $('#content');
      const view = state.view;
      if(view==='dashboard') c.innerHTML = renderDashboard();
      else if(view==='reports') c.innerHTML = renderReports();
      else if(view==='logs') c.innerHTML = renderLogs();
      else if(view==='dictionary') c.innerHTML = renderDictionary();
      else if(view==='workloads') c.innerHTML = renderWorkloads();
      else if(view==='admissions') c.innerHTML = renderAdmissions();
      else c.innerHTML = renderSettings();
    }

    document.querySelectorAll('.nav').forEach(btn => btn.addEventListener('click', () => setView(btn.dataset.view)));
    $('#refresh').addEventListener('click', loadAll);
    $('#search').addEventListener('input', (e)=>{ state.query = e.target.value || ''; if(state.view==='logs') render(); });
    loadAll();
    """

    STYLES_CSS = """
    :root { --bg:#0b1220; --bg2:#111a2e; --panel:#131f38; --text:#d9e3f0; --muted:#8ea2c0; --line:#223458; --accent:#56a3ff; }
    *{box-sizing:border-box;font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,Arial,sans-serif}
    body{margin:0;background:var(--bg);color:var(--text)}
    .layout{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    .sidebar{background:var(--bg2);border-right:1px solid var(--line);padding:18px;display:flex;flex-direction:column;gap:8px}
    .brand{font-size:16px;font-weight:700;margin-bottom:10px}
    .nav{background:transparent;color:var(--text);border:1px solid var(--line);padding:10px 12px;text-align:left;border-radius:8px;cursor:pointer}
    .nav.active,.nav:hover{border-color:var(--accent);background:#10213e}
    .main{padding:18px 20px}
    .top{display:flex;gap:10px;align-items:center;margin-bottom:14px}
    .top input,.top select{background:#0f1a30;color:var(--text);border:1px solid var(--line);padding:9px 10px;border-radius:8px}
    .top input{min-width:420px;max-width:680px;width:60%}
    .top button,.btn{background:#183665;border:1px solid #2c4f86;color:#e7efff;padding:9px 12px;border-radius:8px;cursor:pointer;text-decoration:none}
    h2{margin:6px 0 14px 0;font-size:20px}
    h3{margin:0 0 10px 0;font-size:14px;color:#c9d7ef}
    .kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}
    .kpi{background:var(--panel);border:1px solid var(--line);padding:12px;border-radius:10px}
    .k-title{font-size:12px;color:var(--muted);margin-bottom:4px}
    .k-val{font-size:28px;font-weight:700;line-height:1.1}
    .panel{background:var(--panel);border:1px solid var(--line);padding:12px;border-radius:10px;margin-bottom:12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .table-wrap{overflow:auto;max-height:65vh;border:1px solid var(--line);border-radius:10px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th,td{padding:7px 8px;border-bottom:1px solid #1e3255;vertical-align:top}
    th{position:sticky;top:0;background:#10213d;text-align:left}
    .badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:11px}
    .badge.fail,.badge.error{background:#5b1f2a;color:#ffc9cf}
    .badge.warn{background:#5a4a1f;color:#ffe7a8}
    pre{margin:0;white-space:pre-wrap;color:#9ec2ff}
    @media (max-width:1200px){.layout{grid-template-columns:220px 1fr}.kpis{grid-template-columns:repeat(2,minmax(0,1fr))}.grid{grid-template-columns:1fr}.top input{width:100%;min-width:200px}}
    """

    if __name__ == "__main__":
      port = int(os.environ.get("PORT", "8080"))
      server = ThreadingHTTPServer(("0.0.0.0", port), Handler)
      server.serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyverno-command-center
  namespace: kyverno
  labels:
    app.kubernetes.io/name: kyverno-command-center
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: kyverno-command-center
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kyverno-command-center
    spec:
      serviceAccountName: kyverno-command-center
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/server.py"]
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: app
              mountPath: /app
            - name: tmp
              mountPath: /tmp
            - name: pycache
              mountPath: /.cache
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: app
          configMap:
            name: kyverno-command-center
        - name: tmp
          emptyDir: {}
        - name: pycache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kyverno-command-center
  namespace: kyverno
spec:
  selector:
    app.kubernetes.io/name: kyverno-command-center
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kyverno-command-center
  namespace: kyverno
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: policy-reporter-ui-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["kyverno.cryptophys.work"]
      secretName: cryptophys-wildcard-tls
  rules:
    - host: kyverno.cryptophys.work
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kyverno-command-center
                port:
                  number: 8080
