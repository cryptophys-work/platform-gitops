apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 34-harbor
  namespace: flux-system
spec:
  interval: 1h
  wait: true
  timeout: 45m
  path: ./platform/infrastructure/harbor
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 30-storage
    - name: 10-controllers
    - name: 35-secrets
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: registry-harbor
      namespace: registry-system
