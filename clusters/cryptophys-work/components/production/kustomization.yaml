apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: production-components

configMapGenerator:
  - name: env-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=warn
      - REPLICA_COUNT=3

replicas:
  - name: harbor-core
    count: 3
  - name: harbor-database
    count: 2
  - name: gitea-0
    count: 1
