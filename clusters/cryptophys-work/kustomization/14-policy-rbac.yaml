apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 14-policy-rbac
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
    cryptophys.io/component: kyverno-rbac-prereqs
spec:
  suspend: false
  interval: 1h
  prune: false
  wait: true
  timeout: 5m
  path: ./platform/infrastructure/policy-rbac
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 11-controllers
