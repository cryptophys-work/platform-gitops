apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
patches:
  # 1. Add NodeSelector and Tolerations
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all
      spec:
        replicas: 2
        template:
          spec:
            nodeSelector:
              cryptophys.io/tier: platform
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
    target:
      kind: Deployment
  # 2. Forcefully DELETE the restrictive affinity block using JSON Patch
  - target:
      kind: Deployment
    patch: |-
      - op: remove
        path: /spec/template/spec/affinity
