apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
  - flux-rbac-controllers.yaml
patches:
  # Recovery base: keep Flux inside the approved platform-ha worker lane only.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all
      spec:
        replicas: 2
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: cryptophys.io/platform-ha
                          operator: In
                          values:
                            - "true"
                        - key: kubernetes.io/hostname
                          operator: In
                          values:
                            - nexus-144-91-103-10
                            - cerebellum-161-97-117-96
                            - thalamus-217-76-59-241
            tolerations:
              - key: cryptophys.io/pool
                operator: Equal
                value: platform-ha
                effect: NoSchedule
              - key: ray-cluster
                operator: Equal
                value: "true"
                effect: NoSchedule
            containers:
              - name: manager
                env:
                  - name: KUBERNETES_SERVICE_HOST
                    value: "157.173.120.200"
                  - name: KUBERNETES_SERVICE_PORT
                    value: "6443"
    target:
      kind: Deployment

  # Spread helm-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: helm-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app: helm-controller
                    topologyKey: kubernetes.io/hostname
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app: helm-controller
    target:
      kind: Deployment
      name: helm-controller

  # Spread kustomize-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kustomize-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app: kustomize-controller
                    topologyKey: kubernetes.io/hostname
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app: kustomize-controller
    target:
      kind: Deployment
      name: kustomize-controller

  # Spread source-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: source-controller
      spec:
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 0
            maxSurge: 1
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: In
                          values:
                            - nexus-144-91-103-10
                            - cerebellum-161-97-117-96
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app: source-controller
                    topologyKey: kubernetes.io/hostname
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app: source-controller
    target:
      kind: Deployment
      name: source-controller

  # Only route source-controller traffic to serving pods; non-ready replicas were
  # causing Flux fetches to hit connection-refused endpoints during rollouts.
  - patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: source-controller
      spec:
        publishNotReadyAddresses: false
    target:
      kind: Service
      name: source-controller

  # Spread notification-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: notification-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app: notification-controller
                    topologyKey: kubernetes.io/hostname
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app: notification-controller
    target:
      kind: Deployment
      name: notification-controller

  # Allow kubelet/node-originated health probes to reach Flux controllers.
  - patch: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-scraping
      spec:
        ingress:
          - from:
              - namespaceSelector: {}
            ports:
              - port: 8080
                protocol: TCP
          - from:
              - ipBlock:
                  cidr: 10.8.0.0/24
            ports:
              - port: 9440
                protocol: TCP
    target:
      kind: NetworkPolicy
      name: allow-scraping

  # Spread image-reflector-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: image-reflector-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app: image-reflector-controller
                    topologyKey: kubernetes.io/hostname
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app: image-reflector-controller
    target:
      kind: Deployment
      name: image-reflector-controller

  # Spread image-automation-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: image-automation-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app: image-automation-controller
                    topologyKey: kubernetes.io/hostname
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app: image-automation-controller
    target:
      kind: Deployment
      name: image-automation-controller
