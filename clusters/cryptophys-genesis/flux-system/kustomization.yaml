apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
patches:
  # HA base: 2 replicas, prefer stable control-plane capacity first and tolerate
  # transient networking taints so Flux can keep reconciling during worker flaps.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all
      spec:
        replicas: 2
        template:
          spec:
            affinity:
              nodeAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    preference:
                      matchExpressions:
                        - key: node-role.kubernetes.io/control-plane
                          operator: Exists
                  - weight: 80
                    preference:
                      matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: In
                          values:
                            - cerebellum-161-97-117-96
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
              - key: node.cilium.io/agent-not-ready
                operator: Exists
                effect: NoSchedule
              - key: node.kubernetes.io/unreachable
                operator: Exists
                effect: NoSchedule
              - key: cryptophys.io/role
                operator: Equal
                value: llm-inference
                effect: NoSchedule
    target:
      kind: Deployment

  # Spread helm-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: helm-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: helm-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: helm-controller

  # Spread kustomize-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kustomize-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: kustomize-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: kustomize-controller

  # Spread source-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: source-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: source-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: source-controller

  # Spread notification-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: notification-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: notification-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: notification-controller
