apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
patches:
  # Recovery base: keep Flux inside the approved platform-ha worker lane only.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all
      spec:
        replicas: 2
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: cryptophys.io/platform-ha
                          operator: In
                          values:
                            - "true"
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    preference:
                      matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: In
                          values:
                            - nexus-144-91-103-10
                  - weight: 80
                    preference:
                      matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: In
                          values:
                            - cerebellum-161-97-117-96
                            - thalamus-217-76-59-241
            tolerations:
              - key: cryptophys.io/pool
                operator: Equal
                value: platform-ha
                effect: NoSchedule
              - key: ray-cluster
                operator: Equal
                value: "true"
                effect: NoSchedule
            containers:
              - name: manager
                env:
                  - name: KUBERNETES_SERVICE_HOST
                    value: "157.173.120.200"
                  - name: KUBERNETES_SERVICE_PORT
                    value: "6443"
    target:
      kind: Deployment

  # Spread helm-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: helm-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: helm-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: helm-controller

  # Spread kustomize-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kustomize-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: kustomize-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: kustomize-controller

  # Spread source-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: source-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: source-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: source-controller

  # Spread notification-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: notification-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: notification-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: notification-controller

  # Spread image-reflector-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: image-reflector-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: image-reflector-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: image-reflector-controller

  # Spread image-automation-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: image-automation-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: image-automation-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: image-automation-controller
