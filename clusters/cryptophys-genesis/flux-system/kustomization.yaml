apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
patches:
  # All Flux controllers: apps-core nodes only, tolerate control-plane taint
  # so flux can still schedule when worker pool is pressure/partially degraded.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all
      spec:
        replicas: 1
        template:
          spec:
            nodeSelector:
              workload.cryptophys.work/apps-core: "true"
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
    target:
      kind: Deployment
  # Keep source-controller off corpus; recent node flaps there break source fetch and stall Flux.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: source-controller
      spec:
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: NotIn
                          values:
                            - corpus-207-180-206-69
    target:
      kind: Deployment
      name: source-controller
