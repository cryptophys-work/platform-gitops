apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
patches:
  # All Flux controllers: apps-core nodes only, tolerate control-plane taint
  # so flux can still schedule when worker pool is pressure/partially degraded.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all
      spec:
        replicas: 1
        template:
          spec:
            nodeSelector:
              workload.cryptophys.work/apps-core: "true"
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
    target:
      kind: Deployment
