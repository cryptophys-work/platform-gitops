apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
patches:
  # Recovery base: keep Flux on control-plane nodes so it retains the most
  # stable path to the Kubernetes API even when worker networking degrades.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all
      spec:
        replicas: 1
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: cryptophys.io/tier
                          operator: In
                          values:
                            - platform
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    preference:
                      matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: In
                          values:
                            - cortex-178-18-250-39
                            - cerebrum-157-173-120-200
                            - corpus-207-180-206-69
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
    target:
      kind: Deployment

  # Spread helm-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: helm-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: helm-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: helm-controller

  # Spread kustomize-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kustomize-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: kustomize-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: kustomize-controller

  # Spread source-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: source-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: source-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: source-controller

  # Spread notification-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: notification-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: notification-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: notification-controller
