apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
patches:
  # Recovery base: place Flux on the platform-ha worker lane, which is
  # explicitly reserved for Flux-managed infrastructure by node-labeler and
  # the mutate-platform-ha-toleration policy.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all
      spec:
        replicas: 1
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: cryptophys.io/platform-ha
                          operator: In
                          values:
                            - "true"
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    preference:
                      matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: In
                          values:
                            - cerebellum-161-97-117-96
                            - thalamus-217-76-59-241
    target:
      kind: Deployment

  # Spread helm-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: helm-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: helm-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: helm-controller

  # Spread kustomize-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kustomize-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: kustomize-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: kustomize-controller

  # Spread source-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: source-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: source-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: source-controller

  # Spread notification-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: notification-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app: notification-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment
      name: notification-controller
