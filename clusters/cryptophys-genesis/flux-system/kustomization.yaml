apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all
      spec:
        replicas: 2
        template:
          spec:
            nodeSelector:
              cryptophys.io/tier: platform
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
            affinity:
              $patch: replace
              podAntiAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchExpressions:
                          - key: app
                            operator: In
                            values:
                              - helm-controller
                              - source-controller
                              - kustomize-controller
                              - notification-controller
                              - image-reflector-controller
                              - image-automation-controller
                      topologyKey: kubernetes.io/hostname
    target:
      kind: Deployment