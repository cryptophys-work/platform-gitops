apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
patches:
  # All Flux controllers: apps-core nodes only, tolerate control-plane taint
  # so flux can still schedule when worker pool is pressure/partially degraded.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all
      spec:
        replicas: 1
        template:
          spec:
            nodeSelector:
              workload.cryptophys.work/apps-core: "true"
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
              - key: cryptophys.io/role
                operator: Equal
                value: llm-inference
                effect: NoSchedule
    target:
      kind: Deployment
  # Co-locate source-controller on a healthy schedulable apps-core worker to stabilize Git fetches.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: source-controller
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/hostname: nexus-144-91-103-10
              workload.cryptophys.work/apps-core: "true"
    target:
      kind: Deployment
      name: source-controller
  # Helm reconciles every downstream release; keep it on the same healthy worker as source-controller.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: helm-controller
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/hostname: nexus-144-91-103-10
              workload.cryptophys.work/apps-core: "true"
    target:
      kind: Deployment
      name: helm-controller
  # Keep kustomize-controller on a schedulable apps-core worker; cortex lacks the apps-core label.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kustomize-controller
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/hostname: nexus-144-91-103-10
              workload.cryptophys.work/apps-core: "true"
    target:
      kind: Deployment
      name: kustomize-controller
  # Notification events share the same DNS/event path as kustomize-controller; keep them colocated.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: notification-controller
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/hostname: nexus-144-91-103-10
              workload.cryptophys.work/apps-core: "true"
    target:
      kind: Deployment
      name: notification-controller
