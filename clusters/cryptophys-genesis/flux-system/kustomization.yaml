apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
  - flux-rbac-controllers.yaml
  - flux__baseline-egress.yaml
patches:
  # Recovery base: keep Flux on approved compute lanes, but tolerate the taints
  # currently used by the recovery pool model so controllers always have a home.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all
      spec:
        replicas: 2
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: platform-ha
                          operator: In
                          values:
                            - "true"
                        - key: kubernetes.io/hostname
                          operator: In
                          values:
                            - cerebellum-161-97-117-96
                            - thalamus-217-76-59-241
            tolerations:
              - key: cryptophys.io/pool
                operator: Equal
                value: platform-ha
                effect: NoSchedule
              - key: cryptophys.io/pool
                operator: Equal
                value: apps-ha
                effect: NoSchedule
              - key: node.cilium.io/agent-not-ready
                operator: Exists
                effect: NoSchedule
              - key: ray-cluster
                operator: Equal
                value: "true"
                effect: NoSchedule
              - key: ray-head
                operator: Equal
                value: "true"
                effect: NoSchedule
              - key: bridge-system
                operator: Equal
                value: "true"
                effect: NoSchedule
              - key: dao-system
                operator: Equal
                value: "true"
                effect: NoSchedule
              - key: cryptophys.io/role
                operator: Equal
                value: llm-inference
                effect: NoSchedule
    target:
      kind: Deployment

  # Spread helm-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: helm-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app: helm-controller
                    topologyKey: kubernetes.io/hostname
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app: helm-controller
    target:
      kind: Deployment
      name: helm-controller

  # Spread kustomize-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kustomize-controller
      spec:
        replicas: 1
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 1
            maxSurge: 0
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: In
                          values:
                            - cerebellum-161-97-117-96
                            - thalamus-217-76-59-241
    target:
      kind: Deployment
      name: kustomize-controller

  # Spread source-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: source-controller
      spec:
        replicas: 1
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxUnavailable: 1
            maxSurge: 0
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: In
                          values:
                            - cerebellum-161-97-117-96
    target:
      kind: Deployment
      name: source-controller

  # Only route source-controller traffic to serving pods; non-ready replicas were
  # causing Flux fetches to hit connection-refused endpoints during rollouts.
  - patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: source-controller
      spec:
        publishNotReadyAddresses: false
    target:
      kind: Service
      name: source-controller

  # Spread notification-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: notification-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app: notification-controller
                    topologyKey: kubernetes.io/hostname
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app: notification-controller
    target:
      kind: Deployment
      name: notification-controller

  # Allow kubelet/node-originated health probes to reach Flux controllers.
  - patch: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: allow-scraping
      spec:
        ingress:
          - from:
              - namespaceSelector: {}
            ports:
              - port: 8080
                protocol: TCP
          - from:
              - ipBlock:
                  cidr: 10.8.0.0/24
            ports:
              - port: 9440
                protocol: TCP
    target:
      kind: NetworkPolicy
      name: allow-scraping

  # Spread image-reflector-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: image-reflector-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app: image-reflector-controller
                    topologyKey: kubernetes.io/hostname
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app: image-reflector-controller
    target:
      kind: Deployment
      name: image-reflector-controller

  # Spread image-automation-controller replicas across different nodes.
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: image-automation-controller
      spec:
        template:
          spec:
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app: image-automation-controller
                    topologyKey: kubernetes.io/hostname
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app: image-automation-controller
    target:
      kind: Deployment
      name: image-automation-controller

  # Schema fix: Add missing status fields to HelmRelease CRD for helm-controller v1.5.3
  # Without this, controller cannot write operation status, causing reconciliation timeouts
  - patch: |-
      - op: add
        path: /spec/versions/0/schema/openAPIV3Schema/properties/status/properties/history/items/properties/action
        value:
          type: string
          description: "Helm action performed for this snapshot"
      - op: add
        path: /spec/versions/0/schema/openAPIV3Schema/properties/status/properties/inventory
        value:
          type: object
          description: "Inventory of objects deployed by this release"
          x-kubernetes-preserve-unknown-fields: true
    target:
      group: apiextensions.k8s.io
      version: v1
      kind: CustomResourceDefinition
      name: helmreleases.helm.toolkit.fluxcd.io
