apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 46-security-obs
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: true
  interval: 1h
  prune: false
  wait: true
  timeout: 10m
  path: ./platform/infrastructure/security-observability
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 45-observability
