apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 46-security-obs
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: false
  interval: 1h
  prune: false
  # Wait disabled: Trivy cache PVC rotation must not block apply when a prior PVC is
  # stuck Terminating; HelmReleases and Deployments enforce their own readiness.
  wait: false
  timeout: 25m
  path: ./platform/infrastructure/security-observability
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 45-observability
