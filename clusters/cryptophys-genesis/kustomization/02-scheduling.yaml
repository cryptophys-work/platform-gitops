apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 02-scheduling
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/layer: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: false   # Unsuspend manually after: 01-namespaces applied, iSCSI/Longhorn ready
  interval: 10m
  prune: true
  wait: true
  timeout: 15m
  path: ./platform/infrastructure/scheduling
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: 01-namespaces
