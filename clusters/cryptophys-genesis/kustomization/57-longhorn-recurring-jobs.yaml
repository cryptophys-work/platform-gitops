apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 57-longhorn-recurring-jobs
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: false
  interval: 1h
  prune: false
  wait: false
  timeout: 10m
  path: ./platform/infrastructure/storage/longhorn-recurring-jobs
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 12-storage
    - name: 55-crossplane-crs
