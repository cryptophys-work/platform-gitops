apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 16-policy-ssot
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: true
  interval: 1h
  prune: false
  wait: true
  timeout: 10m
  path: ./policies/kyverno/full
  sourceRef:
    kind: GitRepository
    name: ssot-core-repo
  dependsOn:
    - name: 15-policy
    - name: 41-harbor  # cp-mutate-supplychain-registry-v1 rewrites docker.io images to registry.cryptophys.work/docker-proxy
