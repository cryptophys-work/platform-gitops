apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ssot-core-repo
  namespace: flux-system
spec:
  suspend: true
  interval: 10m
  wait: false
  timeout: 5m
  path: ./platform/infrastructure/policy-ssot
  prune: false
  sourceRef:
    kind: GitRepository
    name: ssot-core-repo
  dependsOn:
    - name: ssot-core-repo
