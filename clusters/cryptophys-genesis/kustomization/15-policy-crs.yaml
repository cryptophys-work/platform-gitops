apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 15-policy-crs
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: true
  interval: 1h
  prune: false
  wait: true
  timeout: 5m
  path: ./platform/infrastructure/policy-exceptions
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 15-policy
