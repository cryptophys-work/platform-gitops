apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 05-sources
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: false
  interval: 1h
  prune: false
  wait: true
  timeout: 5m
  path: ./platform/infrastructure/sources
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: 01-namespaces
