apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 14-linkerd
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: true  # SKIPPED: Linkerd not used; mTLS via Cilium+SPIRE (see architecture docs)
  interval: 1h
  prune: false
  wait: true
  timeout: 15m
  path: ./platform/infrastructure/linkerd
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 11-controllers
    - name: 35-spire
