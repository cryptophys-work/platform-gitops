apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 14-linkerd
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: true  # Suspended: Cilium+SPIRE handles mTLS — no app pods injected, not needed
  interval: 1h
  prune: false
  wait: true
  timeout: 30m
  path: ./platform/infrastructure/linkerd
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 11-controllers
    - name: 35-spire
