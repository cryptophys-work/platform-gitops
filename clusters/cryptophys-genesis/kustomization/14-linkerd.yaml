apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-repo
  namespace: flux-system
spec:
  suspend: true
  dependsOn:
    - name: platform-repo
    - name: platform-repo
  interval: 1h
  path: ./platform/infrastructure/linkerd
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-repo
