apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 55-crossplane
  namespace: flux-system
spec:
  suspend: true
  interval: 1h
  wait: true
  timeout: 10m
  path: ./platform/infrastructure/crossplane
  prune: false
  sourceRef:
    kind: GitRepository
    name: 55-crossplane
  dependsOn:
    - name: 55-crossplane
    - name: 55-crossplane
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: 55-crossplane
      namespace: crossplane-system
