apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 30-vault
  namespace: flux-system
spec:
  suspend: true
  interval: 1h
  wait: true
  timeout: 30m
  path: ./platform/infrastructure/vault-system
  prune: false
  sourceRef:
    kind: GitRepository
    name: 30-vault
  dependsOn:
    - name: 30-vault
    - name: 30-vault
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: 30-vault
      namespace: vault-system
