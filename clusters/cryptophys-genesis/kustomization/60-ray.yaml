apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-repo
  namespace: flux-system
spec:
  suspend: true
  interval: 10m
  prune: true
  wait: true
  timeout: 5m
  path: ./platform/infrastructure/ray
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: platform-repo
    - name: platform-repo
