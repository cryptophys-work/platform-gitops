apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 42-argocd-crs
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: false
  interval: 1h
  prune: false
  wait: false
  timeout: 10m
  path: ./platform/infrastructure/argocd-crs
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 42-argocd
    - name: 40-gitea
