apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 11-controllers
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: true
  interval: 1h
  prune: false
  wait: true
  timeout: 15m
  path: ./platform/infrastructure/controllers
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: 05-sources
    - name: 10-metallb
