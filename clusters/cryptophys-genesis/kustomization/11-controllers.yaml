apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 11-controllers
  namespace: flux-system
spec:
  suspend: true
  interval: 1h
  wait: true
  timeout: 30m
  path: ./platform/infrastructure/controllers
  prune: false
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: platform-repo
    - name: platform-repo
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: platform-repo
      namespace: kube-system
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: platform-repo
      namespace: cert-manager
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: platform-repo
      namespace: external-secrets
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: platform-repo
      namespace: ingress-system
