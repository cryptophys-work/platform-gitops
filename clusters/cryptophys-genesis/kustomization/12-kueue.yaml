apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 12-kueue
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: false
  interval: 1h
  prune: true
  wait: true
  timeout: 5m
  path: ./platform/infrastructure/kueue/base
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 01-namespaces
    - name: 11-controllers
