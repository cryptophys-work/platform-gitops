apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 12-storage
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
    reconcile.fluxcd.io/requestedAt: "2026-04-12T00:01:33Z"
spec:
  suspend: false
  interval: 1h
  prune: false
  wait: false
  timeout: 20m
  path: ./platform/infrastructure/storage
  sourceRef:
    kind: GitRepository
    name: platform-repo
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: longhorn
      namespace: longhorn-system
  dependsOn:
    - name: 02-scheduling
    - name: 11-controllers
