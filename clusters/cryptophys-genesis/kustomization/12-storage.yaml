apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-repo
  namespace: flux-system
spec:
  suspend: true
  interval: 1h
  wait: true
  timeout: 30m
  path: ./platform/infrastructure/storage
  prune: false
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: platform-repo
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: platform-repo
      namespace: longhorn-system
