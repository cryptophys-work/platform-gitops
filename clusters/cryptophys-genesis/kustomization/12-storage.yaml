apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 12-storage
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: true   # Wait for: iSCSI upgrade by Gemini, then 02-scheduling (campus taint)
  interval: 1h
  prune: false
  wait: true
  timeout: 20m
  path: ./platform/infrastructure/storage
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: 02-scheduling
    - name: 11-controllers
