apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 41-harbor
  namespace: flux-system
spec:
  suspend: true
  interval: 1h
  wait: true
  timeout: 45m
  path: ./platform/infrastructure/harbor
  prune: false
  sourceRef:
    kind: GitRepository
    name: 41-harbor
  dependsOn:
    - name: 41-harbor
    - name: 41-harbor
    - name: 41-harbor
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: 41-harbor
      namespace: registry-system
