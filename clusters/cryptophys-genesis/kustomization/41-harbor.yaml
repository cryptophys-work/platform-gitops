apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 41-harbor
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: false
  interval: 1h
  prune: false
  wait: true
  timeout: 30m
  path: ./platform/infrastructure/harbor
  sourceRef:
    kind: GitRepository
    name: platform-repo
