apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 41-harbor
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
    reconcile.fluxcd.io/requestedAt: "2026-04-12T00:01:28Z"
spec:
  suspend: false
  interval: 1h
  prune: false
  wait: false
  # Harbor chart + admission webhooks: allow headroom when apiserver is under pressure.
  timeout: 45m
  path: ./platform/infrastructure/harbor
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 25-database-crs
