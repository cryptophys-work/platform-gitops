apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 10-cni-cilium
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  path: ./platform/infrastructure/cni
  prune: true
  wait: false
  suspend: false
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 05-sources
