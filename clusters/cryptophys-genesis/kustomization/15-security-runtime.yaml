apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 15-security-runtime
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  path: ./platform/security/
  prune: true
  wait: true
  suspend: false
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 01-namespaces
    - name: 11-controllers
  postBuild:
    substitute:
      environment: production
