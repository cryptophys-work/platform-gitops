apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 00-crds
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/layer: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: true   # First stage — unsuspend first, no dependsOn
  interval: 1h
  prune: false    # Never prune CRDs (destructive)
  wait: true
  timeout: 10m
  path: ./platform/infrastructure/crds
  sourceRef:
    kind: GitRepository
    name: flux-system
