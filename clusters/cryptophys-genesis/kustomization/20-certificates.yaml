apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-repo
  namespace: flux-system
spec:
  suspend: true
  interval: 1h
  wait: true
  timeout: 15m
  path: ./platform/infrastructure/certificates
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: platform-repo
