apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 10-metallb-config
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: false
  interval: 1h
  prune: false
  wait: true
  timeout: 5m
  path: ./platform/infrastructure/metallb-config
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 10-metallb
