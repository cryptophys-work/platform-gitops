apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 10-metallb
  namespace: flux-system
spec:
  suspend: true
  interval: 1h
  wait: true
  timeout: 15m
  path: ./platform/infrastructure/metallb
  prune: false
  sourceRef:
    kind: GitRepository
    name: 10-metallb
  dependsOn:
    - name: 10-metallb
    - name: 10-metallb
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: 10-metallb
      namespace: metallb-system
