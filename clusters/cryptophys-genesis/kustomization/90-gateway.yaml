apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 90-gateway
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: false
  interval: 1h
  prune: false
  wait: true
  timeout: 10m
  path: ./platform/infrastructure/gateway
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 13-networking
    - name: 31-secrets
    - name: 42-argocd
