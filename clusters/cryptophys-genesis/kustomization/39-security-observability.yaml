apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 39-security-observability
  namespace: flux-system
spec:
  suspend: true
  interval: 1h
  wait: false
  timeout: 10m
  path: ./platform/infrastructure/security-observability
  prune: false
  sourceRef:
    kind: GitRepository
    name: platform-repo
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: platform-observability-prometheus
      namespace: observability-system
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: platform-observability-loki
      namespace: observability-system
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: platform-observability-otel-collector
      namespace: observability-system
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: security-trivy-operator
      namespace: security-system
