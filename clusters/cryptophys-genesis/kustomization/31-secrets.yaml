apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 31-secrets
  namespace: flux-system
spec:
  suspend: true
  interval: 10m
  wait: false
  timeout: 10m
  path: ./platform/infrastructure/secrets
  prune: false
  sourceRef:
    kind: GitRepository
    name: 31-secrets
  dependsOn:
    - name: 31-secrets
    - name: 31-secrets
