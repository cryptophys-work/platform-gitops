apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 36-spire-identities
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
    cryptophys.io/component: spire-clusterspiffeids
spec:
  suspend: false
  interval: 10m
  prune: false
  wait: false
  timeout: 5m
  path: ./platform/infrastructure/spire-identities
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 00-crds
