apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 25-database
  namespace: flux-system
spec:
  suspend: true
  dependsOn:
    - name: platform-repo
    - name: platform-repo
  interval: 1h
  path: ./platform/infrastructure/database
  prune: false
  sourceRef:
    kind: GitRepository
    name: platform-repo
