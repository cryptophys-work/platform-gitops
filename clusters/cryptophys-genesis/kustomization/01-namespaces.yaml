apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 01-namespaces
  namespace: flux-system
spec:
  suspend: true
  interval: 1h
  wait: true
  timeout: 5m
  path: ./platform/infrastructure/namespaces
  prune: false
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: platform-repo
