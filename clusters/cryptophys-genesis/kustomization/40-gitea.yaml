apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 40-gitea
  namespace: flux-system
  annotations:
    cryptophys.io/domain: platform
    cryptophys.io/managed-by: flux
spec:
  suspend: true
  interval: 1h
  prune: false
  wait: true
  timeout: 15m
  path: ./platform/infrastructure/gitea
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: 31-secrets
    - name: 12-storage
