apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 40-gitea
  namespace: flux-system
spec:
  suspend: true
  interval: 1h
  wait: true
  timeout: 30m
  path: ./platform/infrastructure/gitea
  prune: false
  sourceRef:
    kind: GitRepository
    name: 40-gitea
  dependsOn:
    - name: 40-gitea
    - name: 40-gitea
    - name: 40-gitea
    - name: 40-gitea
    - name: 40-gitea
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: 40-gitea
      namespace: gitops-system
