apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 35-spire
  namespace: flux-system
spec:
  suspend: true
  interval: 10m
  wait: true
  timeout: 30m
  path: ./platform/infrastructure/spire
  prune: false
  sourceRef:
    kind: GitRepository
    name: 35-spire
  dependsOn:
    - name: 35-spire
  healthChecks:
    - apiVersion: apps/v1
      kind: StatefulSet
      name: 35-spire
      namespace: spire-system
    - apiVersion: apps/v1
      kind: DaemonSet
      name: 35-spire
      namespace: spire-system
