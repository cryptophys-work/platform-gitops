apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 15-security-runtime
  namespace: flux-system
spec:
  interval: 1h
  wait: false
  timeout: 10m
  path: ./platform/security/
  prune: false
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 22-policy-reporter   # Kyverno + policy exceptions harus siap dulu
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: tetragon
      namespace: tetragon-system
