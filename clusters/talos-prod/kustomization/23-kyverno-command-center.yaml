apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 23-kyverno-command-center
  namespace: flux-system
spec:
  interval: 10m
  wait: true
  timeout: 10m
  path: ./platform/infrastructure/kyverno-command-center
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 22-policy-reporter
    - name: secrets
