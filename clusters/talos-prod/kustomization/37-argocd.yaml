apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 37-argocd
  namespace: flux-system
spec:
  interval: 1h
  wait: true
  timeout: 30m
  path: ./platform/infrastructure/argocd
  prune: false
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 10-controllers
    - name: 15-dns-core
    - name: secrets
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: argocd
      namespace: argocd
