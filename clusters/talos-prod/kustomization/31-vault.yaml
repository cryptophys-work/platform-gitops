apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 31-vault
  namespace: flux-system
spec:
  interval: 1h
  wait: true
  timeout: 30m
  path: ./platform/infrastructure/vault-system
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 30-storage
    - name: 10-controllers
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: vault
      namespace: vault-system-system-secrets
