apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 02-flux-patches
  namespace: flux-system
spec:
  interval: 10m
  path: ./platform/infrastructure/flux-patches
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 01-namespaces
  force: true
