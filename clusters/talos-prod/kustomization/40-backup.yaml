apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 40-backup-stack
  namespace: flux-system
spec:
  interval: 1h
  wait: false
  timeout: 15m
  path: ./platform/infrastructure/backup
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 30-storage
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: platform-backup-minio
      namespace: minio
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: platform-backup-velero
      namespace: velero
