apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 32-spire
  namespace: flux-system
spec:
  interval: 1h
  wait: true
  timeout: 30m
  path: ./platform/infrastructure/spire
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 30-storage
  healthChecks:
    - apiVersion: apps/v1
      kind: StatefulSet
      name: spire-server
      namespace: spire
    - apiVersion: apps/v1
      kind: DaemonSet
      name: spire-agent
      namespace: spire
