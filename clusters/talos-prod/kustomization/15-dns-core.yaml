apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 15-dns-core
  namespace: flux-system
spec:
  interval: 1h
  wait: true
  timeout: 10m
  path: ./platform/infrastructure/dns
  prune: false
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 10-controllers
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: coredns
      namespace: kube-system
