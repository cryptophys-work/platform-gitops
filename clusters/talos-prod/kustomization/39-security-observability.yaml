apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 39-security-observability
  namespace: flux-system
spec:
  interval: 1h
  wait: false
  timeout: 10m
  path: ./platform/infrastructure/security-observability
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 15-dns-core
    - name: 20-policy
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: platform-observability-prometheus
      namespace: observability
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: platform-observability-loki
      namespace: observability
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: platform-observability-otel-collector
      namespace: observability
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: security-trivy-operator
      namespace: security
