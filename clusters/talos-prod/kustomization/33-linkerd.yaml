apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 33-linkerd
  namespace: flux-system
spec:
  interval: 10m
  wait: true
  timeout: 30m
  path: ./platform/infrastructure/linkerd
  prune: false
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 15-dns-core
    - name: 32-spire
    - name: secrets
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: linkerd-crds
      namespace: linkerd
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: linkerd-control-plane
      namespace: linkerd
