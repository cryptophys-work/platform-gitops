apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 07-metallb
  namespace: flux-system
spec:
  interval: 1h
  wait: true
  timeout: 15m
  path: ./platform/infrastructure/metallb
  prune: true
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 01-namespaces
    - name: 05-sources
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: platform-metallb
      namespace: metallb-system
