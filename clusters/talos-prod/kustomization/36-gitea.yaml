apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: 36-gitea
  namespace: flux-system
spec:
  interval: 1h
  wait: false
  timeout: 30m
  path: ./platform/infrastructure/gitea
  prune: false
  sourceRef:
    kind: GitRepository
    name: platform-repo
  dependsOn:
    - name: 01-namespaces
    - name: 10-database
    - name: 10-controllers
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: gitops-gitea
      namespace: gitops-system
