name: GitOps Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pipx install yamllint==1.35.1
      - name: Detect changed files
        id: changed
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.yaml
            **/*.yml
      - name: Run yamllint
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files="${{ steps.changed.outputs.all_changed_files }}"
            if [ -z "$files" ]; then
              echo "No YAML changes in PR."
              exit 0
            fi
            yamllint -d '{extends: relaxed, rules: {line-length: disable, trailing-spaces: disable, indentation: disable}}' $files
          else
            yamllint -d '{extends: relaxed, rules: {line-length: disable, trailing-spaces: disable, indentation: disable}}' .
          fi

  kustomize-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cluster:
          - talos-prod
          - cryptophys-genesis
    steps:
      - uses: actions/checkout@v4
      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.4.3
      - name: Build cluster manifests
        run: kustomize build clusters/${{ matrix.cluster }} > /tmp/${{ matrix.cluster }}.yaml

  schema-validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cluster:
          - talos-prod
          - cryptophys-genesis
    steps:
      - uses: actions/checkout@v4
      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.4.3
      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -C /tmp -xzf /tmp/kubeconform.tar.gz kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
      - name: Validate schemas
        run: |
          kustomize build clusters/${{ matrix.cluster }} > /tmp/${{ matrix.cluster }}.yaml
          kubeconform \
            -summary \
            -strict \
            -ignore-missing-schemas \
            /tmp/${{ matrix.cluster }}.yaml

  policy-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cluster:
          - talos-prod
          - cryptophys-genesis
    steps:
      - uses: actions/checkout@v4
      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.4.3
      - name: Install kyverno CLI
        run: |
          curl -sSL https://github.com/kyverno/kyverno/releases/download/v1.13.2/kyverno-cli_v1.13.2_linux_x86_64.tar.gz -o /tmp/kyverno.tar.gz
          tar -C /tmp -xzf /tmp/kyverno.tar.gz kyverno
          sudo mv /tmp/kyverno /usr/local/bin/kyverno
      - name: Run kyverno apply in audit mode
        run: |
          kustomize build clusters/${{ matrix.cluster }} > /tmp/${{ matrix.cluster }}.yaml
          if [ -d "platform/infrastructure/policy-ssot" ]; then
            kyverno apply platform/infrastructure/policy-ssot --resource /tmp/${{ matrix.cluster }}.yaml --audit-warn
          fi

  required-gates:
    runs-on: ubuntu-latest
    needs:
      - yaml-lint
      - kustomize-build
      - schema-validate
      - policy-check
    steps:
      - name: All gates passed
        run: echo "All quality gates passed"
