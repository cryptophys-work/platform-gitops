name: Drift Audit Snapshot

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compare-cluster-stages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare stage files between clusters
        run: |
          set -euo pipefail
          talos=$(mktemp)
          genesis=$(mktemp)
          if [ -d clusters/talos-prod/kustomization ]; then
            ls clusters/talos-prod/kustomization/*.yaml | xargs -n1 basename | sort > "$talos"
          else
            ls clusters/talos-prod/*.yaml | xargs -n1 basename | sort > "$talos"
          fi

          if [ -d clusters/cryptophys-genesis/kustomization ]; then
            ls clusters/cryptophys-genesis/kustomization/*.yaml | xargs -n1 basename | sort > "$genesis"
          else
            ls clusters/cryptophys-genesis/*.yaml | xargs -n1 basename | sort > "$genesis"
          fi

          echo "## Stage files only in talos-prod"
          comm -23 "$talos" "$genesis" || true

          echo "## Stage files only in cryptophys-genesis"
          comm -13 "$talos" "$genesis" || true

          echo "## Common stage files"
          comm -12 "$talos" "$genesis" || true
