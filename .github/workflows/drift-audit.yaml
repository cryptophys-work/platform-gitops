name: Drift Audit Snapshot

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compare-cluster-stages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare stage files between clusters
        run: |
          set -euo pipefail
          talos=$(mktemp)
          genesis=$(mktemp)
          list_stage_files() {
            local base="$1"
            if [ -d "$base/kustomization" ]; then
              find "$base/kustomization" -maxdepth 1 -type f -name '*.yaml' -printf '%f\n' | sort
            else
              find "$base" -maxdepth 1 -type f -name '*.yaml' -printf '%f\n' | sort
            fi
          }

          list_stage_files clusters/talos-prod > "$talos"
          list_stage_files clusters/cryptophys-genesis > "$genesis"

          [ -s "$talos" ] || { echo "No stage YAML files discovered for talos-prod" >&2; exit 1; }
          [ -s "$genesis" ] || { echo "No stage YAML files discovered for cryptophys-genesis" >&2; exit 1; }

          echo "## Stage files only in talos-prod"
          comm -23 "$talos" "$genesis" || true

          echo "## Stage files only in cryptophys-genesis"
          comm -13 "$talos" "$genesis" || true

          echo "## Common stage files"
          comm -12 "$talos" "$genesis" || true
